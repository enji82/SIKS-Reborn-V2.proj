<section class="content sultan-page-transition">

      <div class="col-12">

        <!-- FILTER BAR AREA (Identik dengan modul siks yang lain) -->

        <!-- MAIN DATA TABLE CARD -->
        <div class="card-sultan">
          <div class="card-body p-3">
            
            <div id="seragamdist_loadingState">
              <div class="sultan-loading-box">
                <div class="sultan-spinner-icon"><i class="fas fa-circle-notch fa-spin"></i></div>
                <h6 class="text-dark font-weight-bold mb-0">Menghubungkan ke Server...</h6>
              </div>

            <div id="seragamdist_tableState" style="display: none;">
              <div class="table-responsive sultan-scroll">

                  <thead class="thead-sultan-premium thead-tiered text-uppercase font-weight-bold text-center">
                    <tr>
                      <th rowspan="2" class="align-middle text-left py-1 px-2" style="min-width: 220px;">NAMA SEKOLAH</th>
                      <th rowspan="2" class="align-middle text-center py-1 px-2">TAHUN</th>

                    <tr>
                      <!-- Rekap sub-cols -->

                      <!-- Terima sub-cols -->
                      <th class="align-middle text-center py-1 px-2 th-terima-sub">L</th>
                      <th class="align-middle text-center py-1 px-2 th-terima-sub">P</th>
                      <th class="align-middle text-center font-weight-bold py-1 px-2 th-terima-sub">JML</th>
                      <!-- Selisih sub-cols -->
                      <th class="align-middle text-center py-1 px-2 th-selisih-sub">L</th>

<script>
  (function() {
    var IS_ADMIN = false;
    var SERAGAMDIST_CACHE_DATA = [];
    var SERAGAMDIST_TABEL_INSTANCE = null;
    var availableYears = [];
    var userLogin = typeof getSesiUser === 'function' ? getSesiUser() : {};

    $(document).ready(function() {
      IS_ADMIN = checkUserRoleIsAdmin();
      loadYears();
    });

    function loadYears() {
      SultanUI.showLoading('#seragamdist_loadingState', 'Memuat daftar tahun...');
      google.script.run
        .withSuccessHandler(function(response) {
          var res = JSON.parse(response);
          if (res.success) {
            availableYears = res.data || [2026, 2025, 2024];
            renderFilterBar();
            loadDataFromServer();
          } else {
            Sultan.notif.gagal('Gagal memuat tahun: ' + res.message);
          }
        })
        .withFailureHandler(function(err) {
          Sultan.notif.gagal('Koneksi terputus: ' + err.message);
        })
        .seragam_getAvailableYears();
    }

    function renderFilterBar() {
      var filterTahunOpts = availableYears.map(function(y) { return `<option value="${y}">${y}</option>`; }).join('');
      
      // Mengikuti format filter terpusat siks reborn
      var filtersConfig = [
        { id: "seragamdist_filterSekolah", placeholder: "- Memuat Unit Kerja... -", disabled: true, visible: IS_ADMIN },
        { id: "seragamdist_filterTahun", placeholder: "- Memuat Tahun... -", disabled: true },
        { id: "seragamdist_filterJenis", placeholder: "- Pilih Jenis Seragam -", disabled: false }
      ];

      var extraButtons = `
        <div class="divider-vertical d-none d-md-block mx-2"></div>
        <button type="button" id="seragamdist_btnSync" class="sultan-btn-refresh" title="Segarkan Data dari Server">
          <i class="fas fa-sync-alt"></i>
        </button>
      `;

      $('#seragamdist_filterBarArea').html(SultanUI.renderFilterBar(filtersConfig, extraButtons));
      $('#seragamdist_filterSekolah_container').addClass('sultan-filter-unit-width');

      // Populate static dropdown elements
      $('#seragamdist_filterTahun').html(filterTahunOpts).prop('disabled', false);
      $('#seragamdist_filterJenis').html(`
        <option value="SEMUA">- Semua Jenis Seragam -</option>
        <option value="Merah Putih">Merah Putih</option>
        <option value="Pramuka">Pramuka</option>
      `);

      // Bind Listeners
      $('#seragamdist_filterTahun').on('change', loadDataFromServer);
      $('#seragamdist_filterSekolah, #seragamdist_filterJenis').on('change', applyLocalFilter);
      $('#seragamdist_btnSync').on('click', loadDataFromServer);
    }

    function loadDataFromServer() {
      var tahun = $('#seragamdist_filterTahun').val() || availableYears[0] || "2026";
      var npsnQuery = IS_ADMIN ? "SEMUA" : (userLogin.npsn || userLogin.username || "");
      
      $('#seragamdist_tableState').hide();
      if ($('#seragamdist_loadingState').is(':hidden')) {
        SultanUI.showLoading('#seragamdist_loadingState', 'Memuat rincian distribusi...');
      }

      google.script.run
        .withSuccessHandler(function(response) {
          SultanUI.hideLoading('#seragamdist_loadingState');
          var res = JSON.parse(response);
          if (res.success) {
            SERAGAMDIST_CACHE_DATA = res.data || [];
            updateSekolahDropdown();
            applyLocalFilter();
            $('#seragamdist_tableState').show();
          } else {
            Sultan.notif.gagal('Gagal memuat rincian: ' + res.message);
            $('#seragamdist_tableState').show();
          }
        })
        .withFailureHandler(function(err) {
          SultanUI.hideLoading('#seragamdist_loadingState');
          Sultan.notif.gagal('Koneksi terputus: ' + err.message);
          $('#seragamdist_tableState').show();
        })
        .seragam_getLaporan(tahun, npsnQuery);
    }

    function updateSekolahDropdown() {
      if (!IS_ADMIN) return;
      
      var currentSelection = $('#seragamdist_filterSekolah').val() || "SEMUA";
      var uniqueSchools = {};
      SERAGAMDIST_CACHE_DATA.forEach(function(row) {
        if (row.npsn) {
          uniqueSchools[row.npsn] = row.nama_sekolah || row.npsn;
        }
      });

      var $dropdown = $('#seragamdist_filterSekolah');
      $dropdown.empty().append('<option value="SEMUA">- Semua Unit Kerja -</option>');
      
      Object.keys(uniqueSchools).sort(function(a, b) {
        return uniqueSchools[a].localeCompare(uniqueSchools[b]);
      }).forEach(function(npsn) {
        $dropdown.append(`<option value="${npsn}">${uniqueSchools[npsn]}</option>`);
      });

      $dropdown.prop('disabled', false);

      if (uniqueSchools[currentSelection] || currentSelection === "SEMUA") {
        $dropdown.val(currentSelection);
      } else {
        $dropdown.val("SEMUA");
      }
    }

    function applyLocalFilter() {
      var targetSekolah = IS_ADMIN ? $('#seragamdist_filterSekolah').val() : (userLogin.npsn || userLogin.username || "");
      var targetJenis = $('#seragamdist_filterJenis').val() || "SEMUA";
      
      var filtered = SERAGAMDIST_CACHE_DATA;

      // Filter by school
      if (targetSekolah && targetSekolah !== "SEMUA") {
        filtered = filtered.filter(function(row) {
          return String(row.npsn).trim() === String(targetSekolah).trim();
        });
      }

      // Filter by jenis seragam
      if (targetJenis && targetJenis !== "SEMUA") {
        filtered = filtered.filter(function(row) {
          return String(row.jenis_seragam || "").includes(targetJenis);
        });
      }

      renderTable(filtered);
    }

    function renderTable(data) {
      if ($.fn.DataTable.isDataTable('#seragamdist_tabelUtama')) {
        SERAGAMDIST_TABEL_INSTANCE = $('#seragamdist_tabelUtama').DataTable();
      } else {
        SERAGAMDIST_TABEL_INSTANCE = SultanTable.init('#seragamdist_tabelUtama', {
          destroy: true,
          ordering: false,
          pageLength: 25,
          autoWidth: false,
          deferRender: true,
          responsive: false,
          dom: "<'row mb-2'<'col-sm-12 col-md-6'l><'col-sm-12 col-md-6'f>>" +
               "<'row'<'col-sm-12'<'table-responsive sultan-scroll'tr>>>" +
               "<'row mt-2'<'col-sm-12 col-md-5'i><'col-sm-12 col-md-7'p>>",
          columnDefs: [
            { targets: [0, 2], className: "text-left align-middle text-wrap" },
            { targets: [1, 3], width: "1%", className: "text-center align-middle font-weight-bold" },
            { targets: [4, 5, 6, 7, 8, 9, 10, 11, 12], width: "1%", className: "text-center align-middle font-weight-bold" }
          ],
          language: {
            url: "//cdn.datatables.net/plug-ins/1.10.25/i18n/Indonesian.json",
            emptyTable: "Belum ada rincian data distribusi seragam."
          },
          footerCallback: function (row, data, start, end, display) {
            var api = this.api();
            
            var getInt = function (val) {
              if (typeof val === 'number') return val;
              if (typeof val === 'string') {
                var clean = val.replace(/<[^>]*>/g, '').trim();
                if (clean === '-' || !clean) return 0;
                return parseInt(clean.replace('+', '')) || 0;
              }
              return 0;
            };

            for (var col = 4; col <= 12; col++) {
              var total = api.column(col, { page: 'current' }).data().reduce(function (a, b) {
                return getInt(a) + getInt(b);
              }, 0);
              
              var formatted = total === 0 ? '-' : total;
              if (col >= 10 && col <= 12) {
                if (total > 0) {
                  formatted = '<span class="text-success font-weight-bold">+' + total + '</span>';
                } else if (total < 0) {
                  formatted = '<span class="text-danger font-weight-bold">' + total + '</span>';
                } else {
                  formatted = '-';
                }
              }
              $(api.column(col).footer()).html(formatted);
            }
          }
        });
      }

      var sizes = ["S", "M", "L", "XL", "2XL", "3XL", "4XL", "5XL"];
      var dtArray = [];
      
      data.forEach(function(row) {
        var detail = {};
        try { detail = row.detail_json ? JSON.parse(row.detail_json) : {}; } catch(e) {}
        
        var parts = String(row.jenis_seragam || "").split(', ');
        parts.forEach(function(jns) {
          jns = jns.trim();
          if (!detail[jns]) return;

          sizes.forEach(function(ukr) {
            var sizeData = detail[jns][ukr] || {};
            var rL = parseInt(sizeData.rekap_l) || 0;
            var rP = parseInt(sizeData.rekap_p) || 0;
            var tL = parseInt(sizeData.terima_l) || 0;
            var tP = parseInt(sizeData.terima_p) || 0;

            // Only show size rows that have some valid target/received data to keep the report compact
            if (rL > 0 || rP > 0 || tL > 0 || tP > 0) {
              var rJml = rL + rP;
              var tJml = tL + tP;
              var sL = tL - rL;
              var sP = tP - rP;
              var sJml = tJml - rJml;

              var sekolahCell = `
                <div class="font-weight-bold text-brand-maroon text-left text-wrap" style="font-size: 13px; line-height: 1.2;">${row.nama_sekolah}</div>
                <div class="text-muted text-left small font-weight-normal">${row.npsn}</div>
              `;

              var fmt = function(v) { return v === 0 ? '-' : v; };
              var fmtS = function(v) {
                if (v === 0) return '-';
                var cls = v > 0 ? 'text-success' : 'text-danger';
                var sign = v > 0 ? '+' : '';
                return `<span class="${cls} font-weight-bold">${sign}${v}</span>`;
              };

              dtArray.push([
                sekolahCell,
                row.tahun,
                jns,
                `<span class="font-weight-bold text-dark">${ukr}</span>`,
                fmt(rL),
                fmt(rP),
                fmt(rJml),
                fmt(tL),
                fmt(tP),
                fmt(tJml),
                fmtS(sL),
                fmtS(sP),
                fmtS(sJml)
              ]);
            }
          });
        });
      });

      SERAGAMDIST_TABEL_INSTANCE.clear().rows.add(dtArray).draw(false);
    }

  })();
</script>

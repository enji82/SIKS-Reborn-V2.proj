<script>
var CHART_MURID = null;

$(document).ready(function() {
    // 1. LOGIKA TANGGAL: DEFAULT BULAN LALU (VAKSIN OVERFLOW HARI)
    var d = new Date(); 
    d.setDate(1); // MENCEGAH BUG: Paksa tanggal ke 1 dulu sebelum mundur bulan
    d.setMonth(d.getMonth() - 1); 

    var thn = d.getFullYear(); 
    var bln = d.getMonth() + 1; // getMonth() dimulai dari 0 (Januari = 0)

    // 2. POPULASI FILTER TAHUN (ES5 Murni)
    var currentRealYear = new Date().getFullYear(); 
    var $selTahun = $('#dashTahun').empty();
    
    // Load opsi dari tahun depan s.d 2022
    for(var i = currentRealYear + 1; i >= 2022; i--) { 
        var selectedStr = (i === thn) ? ' selected' : '';
        $selTahun.append('<option value="' + i + '"' + selectedStr + '>' + i + '</option>'); 
    }
    
    // Set default Bulan
    $('#dashBulan').val(bln);

    // 3. INISIASI CHART.JS SECARA ASINKRON
    if (typeof Chart === 'undefined') {
        $.getScript("https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js")
         .done(function() { loadDashboardMurid(); });
    } else {
        loadDashboardMurid();
    }
});

function loadDashboardMurid() {
    var th = $('#dashTahun').val();
    var bl = $('#dashBulan').val();
    var namaBulan = $('#dashBulan option:selected').text();

    if(!th) th = new Date().getFullYear();

    // SPINNER STATE (Memanipulasi DOM sebelum data datang)
    var spinWhite = '<i class="fas fa-spinner fa-spin text-white-50"></i>';
    var spinDark = '<i class="fas fa-spinner fa-spin text-dark"></i>';

    $('#sd_total_t').html(spinWhite);
    $('#sd_total_n, #sd_total_s').html(spinWhite);
    
    for(var i = 1; i <= 6; i++) { 
        $('#sd_k' + i + '_t').html('<i class="fas fa-spinner fa-spin text-maroon"></i>'); 
        $('#sd_k' + i + '_n, #sd_k' + i + '_s').html(spinDark);
    }
    
    $('#paud_tk').html(spinDark);
    $('#paud_kb').html('<i class="fas fa-spinner fa-spin text-white"></i>');
    $('#paud_sps').html('<i class="fas fa-spinner fa-spin text-white"></i>');

    $('#labelBulanIni, #labelBulanIniPaud').text(namaBulan);
    $('#labelTahunGrafik').text(th);
    
    google.script.run
        .withSuccessHandler(function(jsonString) {
            try {
                var data = JSON.parse(jsonString);
                renderCards(data.cards);
                renderChart(data.chart);
            } catch(e) { 
                console.error("Gagal membaca struktur data: ", e); 
            }
        })
        .withFailureHandler(function(e) { 
            if (typeof Sultan !== 'undefined') {
                Sultan.alert('error', 'Gagal Memuat Data', e.message);
            } else {
                alert("Koneksi gagal: " + e.message);
            }
        })
        .getDashboardMuridData(th, bl);
}

function renderCards(c) {
    if(!c) return;
    
    $('#sd_total_t').text(c.sd_total.t);
    $('#sd_total_n').text(c.sd_total.n);
    $('#sd_total_s').text(c.sd_total.s);

    for(var i = 1; i <= 6; i++) {
        var key = 'sd_k' + i;
        if (c[key]) {
            $('#' + key + '_t').text(c[key].t);
            $('#' + key + '_n').text(c[key].n);
            $('#' + key + '_s').text(c[key].s);
        }
    }

    $('#paud_tk').text(c.tk || 0);
    $('#paud_kb').text(c.kb || 0);
    $('#paud_sps').text(c.sps || 0);
}

function renderChart(c) {
    if(!c || typeof Chart === 'undefined') return;
    var ctx = document.getElementById('chartMurid').getContext('2d');

    if(CHART_MURID) {
        CHART_MURID.destroy();
    }

    CHART_MURID = new Chart(ctx, {
        type: 'line',
        data: {
            labels: ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'],
            datasets: [
                { label: 'SD Negeri', data: c.sd_negeri, borderColor: '#800000', backgroundColor: 'rgba(128, 0, 0, 0.1)', tension: 0.4, fill: true },
                { label: 'SD Swasta', data: c.sd_swasta, borderColor: '#007bff', backgroundColor: 'transparent', tension: 0.4, borderDash: [5, 5] },
                { label: 'TK', data: c.tk, borderColor: '#ffc107', backgroundColor: 'transparent', tension: 0.4 },
                { label: 'KB', data: c.kb, borderColor: '#28a745', backgroundColor: 'transparent', tension: 0.4 },
                { label: 'SPS', data: c.sps, borderColor: '#17a2b8', backgroundColor: 'transparent', tension: 0.4 }
            ]
        },
        options: {
            responsive: true, 
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: { legend: { position: 'bottom' } },
            scales: { y: { beginAtZero: true } }
        }
    });
}
</script>

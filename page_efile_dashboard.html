<script>
// ======================================================================
// ISOLASI VARIABEL GLOBAL (MASTER BLUEPRINT V8)
// ======================================================================
var EFILEDASH_CACHE_REKAP = [];
var EFILEDASH_CACHE_BELUM = [];
var EFILEDASH_KATEGORI_MAP = []; // Menyimpan A:Rekap, B:Lapor
var EFILEDASH_TABEL_INSTANCE = null;
var EFILEDASH_PENDING_REQ = 0; 

var EFILEDASH_USER_AKTIF = "";
var EFILEDASH_IS_ADMIN = false;
var EFILEDASH_UNIT_TERKUNCI = ""; 
var EFILEDASH_USER_NPSN = "";
var EFILEDASH_USE_NPSN_FILTER = false;
var EFILEDASH_TAHUN_DEFAULTED = false;

// =================================================================
// 1. INITIALIZATION & DELEGATION
// =================================================================
$(document).ready(function() {
    EFILEDASH_TABEL_INSTANCE = null;
    $('#efiledash_dashboardState').hide();
    SultanUI.showLoading('#efiledash_loadingState');
    $('#efiledash_filterContainer').hide();

    try {
        var user = typeof getSesiUser === 'function' ? getSesiUser() : {};
        EFILEDASH_USER_AKTIF = user.nama_lengkap || user.fullname || user.nama || user.username || "User Web";
        var rStr = String(user.role || "").toLowerCase();
        EFILEDASH_IS_ADMIN = (typeof checkUserRoleIsAdmin==='function' && checkUserRoleIsAdmin()) || rStr.includes("admin") || rStr.includes("verifikator");
        EFILEDASH_USER_NPSN = user.npsn || user.unit || user.username || ""; 
    } catch(e) { EFILEDASH_USER_NPSN = ""; EFILEDASH_IS_ADMIN = false; }
    
    $(document).off('click', '#efiledash_btnRefresh').on('click', '#efiledash_btnRefresh', function() {
        var k = $('#efiledash_filterKategori').val();
        if (k !== "" && k != null) efiledash_loadDataKategori(k, true);
    }); 
    
    $(document).off('change', '#efiledash_filterKategori').on('change', '#efiledash_filterKategori', function() {
        var k = $(this).val(); if(k) efiledash_loadDataKategori(k);
    });

    $(document).off('change', '#efiledash_filterUnit, #efiledash_filterTahun').on('change', '#efiledash_filterUnit, #efiledash_filterTahun', efiledash_terapkanFilterLokal);
    $(document).off('click', '#efiledash_btnSalinWa').on('click', '#efiledash_btnSalinWa', efiledash_salinKeWA);

    $(document).off('keyup', '#efiledash_inputCariBelum').on('keyup', '#efiledash_inputCariBelum', function() {
        var val = $(this).val().toLowerCase();
        $('.efiledash-item-belum').filter(function() { $(this).toggle($(this).text().toLowerCase().indexOf(val) > -1); });
    });

    efiledash_initMasterAccess();
});

// =================================================================
// 2. GATEKEEPER & INITIAL SETUP
// =================================================================
function efiledash_initMasterAccess() {
    var targetNpsn = EFILEDASH_IS_ADMIN ? "" : EFILEDASH_USER_NPSN;

    if (EFILEDASH_IS_ADMIN) {
        $('#efiledash_filterContainer').show();
        $('#efiledash_filterUnit').empty().append('<option value="SEMUA">- Semua Unit Kerja -</option>').prop('disabled', false).removeClass('bg-light text-maroon font-weight-bold');
    } else if (!EFILEDASH_USER_NPSN) {
        $('#efiledash_loadingState').find('.sultan-loading-text').html('<span class="text-danger"><i class="fas fa-ban mb-2"></i><br>Akses ditolak: Sesi login tidak valid.</span>'); return;
    }

    google.script.run.withSuccessHandler(function(json) {
        var res = JSON.parse(json);
        if(!res.success) { $('#efiledash_loadingState').find('.sultan-loading-text').html('<span class="text-danger"><i class="fas fa-exclamation-triangle mb-2"></i><br>' + efiledash_escapeHtml(res.message) + '</span>'); return; }
        
        EFILEDASH_KATEGORI_MAP = res.kategori || [];
        if (!EFILEDASH_IS_ADMIN) {
            if (res.myUnit) {
                EFILEDASH_UNIT_TERKUNCI = res.myUnit;
                EFILEDASH_USE_NPSN_FILTER = false;
                $('#efiledash_filterContainer').show();
                $('#efiledash_filterUnit').empty().append($('<option>', { value: EFILEDASH_USER_NPSN, text: EFILEDASH_UNIT_TERKUNCI })).prop('disabled', true);
            } else {
                // Fallback: filter via NPSN di sheet rekap (hindari tampil semua unit)
                EFILEDASH_USE_NPSN_FILTER = true;
                EFILEDASH_UNIT_TERKUNCI = "";
                $('#efiledash_filterContainer').show();
                $('#efiledash_filterUnit').empty().append($('<option>', {
                    value: "SEMUA",
                    text: '- Semua Unit Kerja Anda -'
                })).prop('disabled', false);
            }
        }

        if(EFILEDASH_KATEGORI_MAP.length === 0) {
            $('#efiledash_loadingState').find('.sultan-loading-text').html('<span class="text-danger"><i class="fas fa-exclamation-triangle mb-2"></i><br>Belum ada Master Kategori di Sheet Dashboard.</span>'); return;
        }

        var selectKat = $('#efiledash_filterKategori');
        selectKat.empty();
        EFILEDASH_KATEGORI_MAP.forEach(function(k, idx) {
            selectKat.append($('<option>', { value: idx, text: k.namaKategori }));
        });

        // Trigger muat data untuk kategori pertama
        efiledash_loadDataKategori(0);

    }).withFailureHandler(function(err){
        $('#efiledash_loadingState').find('.sultan-loading-text').html('<span class="text-danger"><i class="fas fa-wifi mb-2"></i><br>Koneksi Terputus: ' + efiledash_escapeHtml(err.message) + '</span>');
    }).getEfileDashboardInit(targetNpsn);
}

// =================================================================
// 3. FETCH DATA SPESIFIK KATEGORI
// =================================================================
function efiledash_loadDataKategori(indexMap, forceRefresh) {
    if (EFILEDASH_PENDING_REQ > 0) return; 
    EFILEDASH_PENDING_REQ = 1;
    forceRefresh = !!forceRefresh;

    var mapData = EFILEDASH_KATEGORI_MAP[indexMap];
    if(!mapData) return;

    var btn = $('#efiledash_btnRefresh');
    btn.prop('disabled', true).html('<i class="fas fa-spinner fa-spin text-maroon"></i>');
    $('#efiledash_filterKategori, #efiledash_filterTahun, #efiledash_filterUnit').prop('disabled', true);

    $('#efiledash_lblTableKategori').text(mapData.namaKategori);

    if (!$.fn.DataTable.isDataTable('#efiledash_tabelRekap')) {
        $('#efiledash_dashboardState').hide();
        SultanUI.showLoading('#efiledash_loadingState', 'Menyinkronkan data dasbor ' + mapData.namaKategori + '...');
    }

    google.script.run.withSuccessHandler(function(jsonStr) {
        EFILEDASH_PENDING_REQ = 0;
        btn.prop('disabled', false).html('<i class="fas fa-sync-alt text-maroon"></i>');
        $('#efiledash_filterKategori, #efiledash_filterTahun').prop('disabled', false);
        if(EFILEDASH_IS_ADMIN || EFILEDASH_USE_NPSN_FILTER) $('#efiledash_filterUnit').prop('disabled', false);
        
        var data = JSON.parse(jsonStr);
        if (!data.success) { 
            $('#efiledash_loadingState').find('.sultan-loading-text').html('<span class="text-danger"><i class="fas fa-exclamation-triangle mb-2"></i><br>' + efiledash_escapeHtml(data.message) + '</span>'); return; 
        }
        
        EFILEDASH_CACHE_REKAP = data.rekap || [];
        EFILEDASH_CACHE_BELUM = data.belum || [];
        
        if (EFILEDASH_IS_ADMIN || EFILEDASH_USE_NPSN_FILTER) efiledash_initDropdownUnit();
        efiledash_initDropdownTahun();

        if (!$.fn.DataTable.isDataTable('#efiledash_tabelRekap')) {
            EFILEDASH_TABEL_INSTANCE = SultanTable.init('#efiledash_tabelRekap', {
                "destroy": true, "ordering": true, "pageLength": 10, "autoWidth": false, "deferRender": true, 
                "dom": "<'row mb-2'<'col-sm-12 col-md-6'l><'col-sm-12 col-md-6'f>>" +
                       "<'row'<'col-sm-12'<'table-responsive sultan-scroll'tr>>>" +
                       "<'row mt-2'<'col-sm-12 col-md-5'i><'col-sm-12 col-md-7'p>>",
                "columnDefs": [ 
                    { "targets": 0, "width": "auto", "className": "col-sticky-left align-middle border-right text-left font-weight-bold text-nowrap" }, 
                    { "targets": [1,2,3,4], "width": "1%", "className": "text-center align-middle text-nowrap" }
                ],
                "language": { "url": "//cdn.datatables.net/plug-ins/1.10.25/i18n/Indonesian.json", "emptyTable": "Tidak ada data pada kategori ini." }
            });
        }

        efiledash_terapkanFilterLokal();

        SultanUI.hideLoading('#efiledash_loadingState');
        $('#efiledash_dashboardState').show();
        if(EFILEDASH_TABEL_INSTANCE) { setTimeout(function() { EFILEDASH_TABEL_INSTANCE.columns.adjust(); }, 150); }

    }).withFailureHandler(function(err) {
        EFILEDASH_PENDING_REQ = 0; btn.prop('disabled', false).html('<i class="fas fa-sync-alt text-maroon"></i>');
        $('#efiledash_filterKategori').prop('disabled', false);
        $('#efiledash_loadingState').find('.sultan-loading-text').html('<span class="text-danger"><i class="fas fa-wifi mb-2"></i><br>Koneksi Terputus: ' + efiledash_escapeHtml(err.message) + '</span>');
    }).getEfileDashboardData(mapData.sheetRekap, mapData.sheetLapor, forceRefresh); 
}

function efiledash_initDropdownUnit() {
    var unique = new Set();
    var npsnUser = String(EFILEDASH_USER_NPSN || "").trim().toUpperCase();
    EFILEDASH_CACHE_REKAP.forEach(function(r) {
        var unit = String(r.unit || "").trim();
        if (unit) {
            if (EFILEDASH_IS_ADMIN) {
                unique.add(unit);
            } else if (EFILEDASH_USE_NPSN_FILTER && String(r.npsn || "").trim().toUpperCase() === npsnUser) {
                unique.add(unit);
            }
        }
    });
    var sorted = Array.from(unique).sort();
    var select = $('#efiledash_filterUnit'); var curVal = select.val();
    var labelSemua = EFILEDASH_IS_ADMIN ? "- Semua Unit Kerja -" : "- Semua Unit Kerja Anda -";
    select.empty().append(`<option value="SEMUA">${labelSemua}</option>`);
    sorted.forEach(function(u) { select.append(`<option value="${efiledash_escapeHtml(u)}">${efiledash_escapeHtml(u)}</option>`); });
    if (sorted.length === 1) {
        select.val(sorted[0]);
    } else if (curVal && unique.has(curVal)) {
        select.val(curVal);
    }
}

function efiledash_initDropdownTahun() {
    var unique = new Set();
    EFILEDASH_CACHE_REKAP.forEach(function(r) { var thn = String(r.tahun || "").trim(); if(thn) unique.add(thn); });
    var sorted = Array.from(unique).sort(function(a, b) {
        var na = parseInt(a, 10), nb = parseInt(b, 10);
        if (!isNaN(na) && !isNaN(nb)) return nb - na;
        return String(b).localeCompare(String(a));
    });
    var select = $('#efiledash_filterTahun'); var curVal = select.val();
    select.empty().append('<option value="SEMUA">- Semua Tahun -</option>');
    sorted.forEach(function(t) { select.append(`<option value="${efiledash_escapeHtml(t)}">${efiledash_escapeHtml(t)}</option>`); });
    if (!EFILEDASH_TAHUN_DEFAULTED && sorted.length > 0) {
        select.val(sorted[0]);
        EFILEDASH_TAHUN_DEFAULTED = true;
    } else if (curVal && (curVal === "SEMUA" || unique.has(curVal))) {
        select.val(curVal);
    }
}

/** Unit yang boleh dilihat operator (filter NPSN dari sheet rekap). */
function efiledash_getUnitSetByNpsn() {
    var units = new Set();
    var npsnUser = String(EFILEDASH_USER_NPSN || "").trim().toUpperCase();
    EFILEDASH_CACHE_REKAP.forEach(function(r) {
        if (String(r.npsn || "").trim().toUpperCase() === npsnUser) {
            var u = String(r.unit || "").trim().toUpperCase();
            if (u) units.add(u);
        }
    });
    return units;
}

function efiledash_rowMatchesUnit(r, fUnitAdmin) {
    if (fUnitAdmin === "SEMUA" || fUnitAdmin === "") {
        if (EFILEDASH_USE_NPSN_FILTER && !EFILEDASH_IS_ADMIN) {
            var npsnUser = String(EFILEDASH_USER_NPSN || "").trim().toUpperCase();
            if (String(r.npsn || "").trim().toUpperCase() === npsnUser) return true;
            var allowed = efiledash_getUnitSetByNpsn();
            return allowed.has(String(r.unit || "").trim().toUpperCase());
        }
        return true;
    }
    
    if (EFILEDASH_USE_NPSN_FILTER && !EFILEDASH_IS_ADMIN) {
        var allowed = efiledash_getUnitSetByNpsn();
        if (!allowed.has(fUnitAdmin)) return false;
    }
    
    return String(r.unit || "").trim().toUpperCase() === fUnitAdmin;
}

/** Saat filter Semua Tahun: kartu metrik pakai tahun terbaru agar tidak double-count. */
function efiledash_getRekapForMetrics(dataRekap, fTahun) {
    if (fTahun !== "SEMUA" && fTahun !== "") return dataRekap;
    var maxTahun = "";
    var maxNum = -Infinity;
    dataRekap.forEach(function(r) {
        var t = String(r.tahun || "").trim();
        var n = parseInt(t, 10);
        if (!isNaN(n)) {
            if (n > maxNum) { maxNum = n; maxTahun = t; }
        } else if (t && (!maxTahun || t.localeCompare(maxTahun) > 0)) {
            maxTahun = t;
        }
    });
    if (!maxTahun) return dataRekap;
    return dataRekap.filter(function(r) { return String(r.tahun || "").trim() === maxTahun; });
}

// =================================================================
// 4. ZERO-BLINK FILTERING
// =================================================================
function efiledash_terapkanFilterLokal() {
    var fUnit = "";
    if (EFILEDASH_IS_ADMIN) {
        fUnit = String($('#efiledash_filterUnit').val() || "").trim().toUpperCase();
    } else if (EFILEDASH_USE_NPSN_FILTER) {
        fUnit = String($('#efiledash_filterUnit').val() || "SEMUA").trim().toUpperCase();
    } else {
        fUnit = String(EFILEDASH_UNIT_TERKUNCI || "").trim().toUpperCase();
    }
    var fTahun = String($('#efiledash_filterTahun').val() || "").trim().toUpperCase();
    
    var filterRekap = EFILEDASH_CACHE_REKAP.filter(function(r) {
        if (!efiledash_rowMatchesUnit(r, fUnit)) return false;
        if (fTahun !== "SEMUA" && fTahun !== "" && String(r.tahun || "").trim().toUpperCase() !== fTahun) return false;
        return true;
    });

    var filterBelum = EFILEDASH_CACHE_BELUM.filter(function(r) {
        if (!efiledash_rowMatchesUnit(r, fUnit)) return false;
        if (fTahun !== "SEMUA" && fTahun !== "" && String(r.tahun || "").trim().toUpperCase() !== fTahun) return false;
        return true;
    });

    efiledash_renderDashboard(filterRekap, filterBelum, fTahun);
}

function efiledash_animateValue(id, end) {
    var obj = document.getElementById(id);
    if(!obj) return;
    var start = 0; 
    var duration = 1000; 
    
    // Cancel any ongoing animation for this element to prevent overlapping flicker
    if (obj.dataset.efiledashAnimId) {
        cancelAnimationFrame(parseInt(obj.dataset.efiledashAnimId, 10));
    }
    
    var startTime = null;
    
    function step(timestamp) {
        if (!startTime) startTime = timestamp;
        var progress = Math.min((timestamp - startTime) / duration, 1);
        obj.innerHTML = Math.floor(progress * (end - start) + start).toLocaleString('id-ID');
        if (progress < 1) {
            var animId = window.requestAnimationFrame(step);
            obj.dataset.efiledashAnimId = animId;
        } else {
            obj.dataset.efiledashAnimId = "";
        }
    }
    var firstAnimId = window.requestAnimationFrame(step);
    obj.dataset.efiledashAnimId = firstAnimId;
}

function efiledash_renderInsight(totAsn, totSudah, totBelum, metricsTahunLabel) {
    var insightHtml = '';
    if (metricsTahunLabel) {
        insightHtml += `
            <div class="sultan-alert alert-soft-info mb-2">
                <i class="fas fa-info-circle mr-3 mt-1" style="font-size: 18px;"></i>
                <div class="small">Kartu ringkasan dihitung untuk <strong>tahun ${efiledash_escapeHtml(metricsTahunLabel)}</strong>. Tabel dan daftar mengikuti filter tahun yang dipilih.</div>
            </div>`;
    }
    var persenTotal = totAsn === 0 ? 0 : Math.round((totSudah / totAsn) * 100);
    
    if (persenTotal >= 90) {
        insightHtml += `
            <div class="sultan-alert alert-soft-success">
                <i class="fas fa-trophy mr-3 mt-1" style="font-size: 20px;"></i>
                <div>
                    <div class="font-weight-bold mb-1">Luar Biasa! 🎉</div>
                    <div class="small">Capaian unggah berkas sudah mencapai <strong>${persenTotal}%</strong>. Pertahankan prestasi ini!</div>
                </div>
            </div>`;
    } else if (persenTotal >= 70) {
        insightHtml += `
            <div class="sultan-alert alert-soft-info">
                <i class="fas fa-chart-line mr-3 mt-1" style="font-size: 20px;"></i>
                <div>
                    <div class="font-weight-bold mb-1">Bagus! 👍</div>
                    <div class="small">Capaian unggah berkas mencapai <strong>${persenTotal}%</strong>. Tetap semangat untuk mencapai target!</div>
                </div>
            </div>`;
    } else if (persenTotal >= 50) {
        insightHtml += `
            <div class="sultan-alert alert-soft-warning">
                <i class="fas fa-exclamation-circle mr-3 mt-1" style="font-size: 20px;"></i>
                <div>
                    <div class="font-weight-bold mb-1">Perlu Perhatian ⚠️</div>
                    <div class="small">Capaian unggah berkas baru <strong>${persenTotal}%</strong>. Segera koordinasikan dengan tim!</div>
                </div>
            </div>`;
    } else {
        insightHtml += `
            <div class="sultan-alert alert-soft-danger">
                <i class="fas fa-fire mr-3 mt-1" style="font-size: 20px;"></i>
                <div>
                    <div class="font-weight-bold mb-1">Butuh Tindakan Segera! 🔥</div>
                    <div class="small">Capaian unggah berkas hanya <strong>${persenTotal}%</strong>. Segera lakukan sosialisasi dan pendampingan!</div>
                </div>
            </div>`;
    }
    
    if (totBelum > 0) {
        insightHtml += `
            <div class="sultan-alert alert-soft-warning mt-2">
                <i class="fas fa-users mr-3 mt-1" style="font-size: 20px;"></i>
                <div>
                    <div class="font-weight-bold mb-1">Masih ada pegawai yang belum unggah (rekap: <strong>${totBelum}</strong>)</div>
                    <div class="small">Silakan cek daftar di bawah dan hubungi mereka untuk segera mengunggah berkas.</div>
                </div>
            </div>`;
    }
    
    $('#efiledash_insightAlerts').html(insightHtml);
}

function efiledash_updateLastUpdate() {
    var now = new Date();
    var options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
    $('#efiledash_lastUpdate').html('<i class="far fa-clock mr-1"></i>Terakhir diperbarui: ' + now.toLocaleDateString('id-ID', options));
}

function efiledash_renderDashboard(dataRekap, dataBelum, fTahun) {
    fTahun = String(fTahun || $('#efiledash_filterTahun').val() || "").trim().toUpperCase();
    var rekapMetrics = efiledash_getRekapForMetrics(dataRekap, fTahun);
    var metricsTahunLabel = "";
    if (fTahun === "SEMUA" && rekapMetrics.length && dataRekap.length > rekapMetrics.length) {
        metricsTahunLabel = String(rekapMetrics[0].tahun || "").trim();
    }

    var totAsn = 0, totSudah = 0, totBelum = 0;
    var dtArray = [];

    rekapMetrics.forEach(function(r) {
        totAsn += parseInt(r.jml) || 0;
        totSudah += parseInt(r.sudah) || 0;
        totBelum += parseInt(r.belum) || 0;
    });

    dataRekap.forEach(function(r) {
        var cAsn = parseInt(r.jml) || 0;
        var cSudah = parseInt(r.sudah) || 0;
        var cBelum = parseInt(r.belum) || 0;

        var persen = cAsn === 0 ? 0 : Math.round((cSudah / cAsn) * 100);
        var bgProgress = persen >= 80 ? 'bg-success' : (persen >= 50 ? 'bg-warning' : 'bg-danger');
        
        var uiPersen = `
            <div class="d-flex align-items-center justify-content-center" style="font-size: 13px;">
                <span class="mr-2 font-weight-bold">${persen}%</span>
                <div class="progress" style="width: 50px; height: 8px; border-radius: 4px;">
                    <div class="progress-bar ${bgProgress}" role="progressbar" style="width: ${persen}%" aria-valuenow="${persen}" aria-valuemin="0" aria-valuemax="100"></div>
                </div>
            </div>`;
        
        var showTahunSub = EFILEDASH_IS_ADMIN || fTahun === "SEMUA";
        var txtUnit = showTahunSub
            ? `<div class="font-weight-bold text-dark text-wrap" style="font-size:13px;">${efiledash_escapeHtml(r.unit)}</div><div class="text-muted" style="font-size:13px;">Tahun ${efiledash_escapeHtml(r.tahun)}</div>`
            : `<div class="font-weight-bold text-dark text-wrap" style="font-size:13px;">${efiledash_escapeHtml(r.unit)}</div>`;

        dtArray.push([
            txtUnit,
            `<span class="badge badge-sultan badge-sultan-light-info px-2" style="font-size: 13px;">${cAsn}</span>`,
            `<span class="badge badge-sultan badge-sultan-light-success px-2" style="font-size: 13px;">${cSudah}</span>`,
            `<span class="badge badge-sultan badge-sultan-light-danger px-2" style="font-size: 13px;">${cBelum}</span>`,
            uiPersen
        ]);
    });

    efiledash_animateValue('efiledash_cardTotalAsn', totAsn);
    efiledash_animateValue('efiledash_cardSudah', totSudah);
    efiledash_animateValue('efiledash_cardBelum', totBelum);
    
    efiledash_renderInsight(totAsn, totSudah, totBelum, metricsTahunLabel);
    efiledash_updateLastUpdate();

    if (EFILEDASH_TABEL_INSTANCE) { EFILEDASH_TABEL_INSTANCE.clear().rows.add(dtArray).draw(false); }

    var uiList = "";
    if (dataBelum.length === 0) {
        uiList = `<li class="list-group-item text-center py-5">
                    <i class="fas fa-check-circle fa-3x text-success mb-3 opacity-50"></i><br>
                    <div class="font-weight-bold text-dark mb-1" style="font-size: 13px;">Luar Biasa!</div>
                    <div class="text-muted" style="font-size: 12px;">Tidak ada pegawai yang belum unggah untuk filter ini.</div>
                  </li>`;
    } else {
        dataBelum.forEach(function(b) {
            uiList += `
            <li class="list-group-item efiledash-item-belum py-2 px-3 hover-sultan" data-unit="${efiledash_escapeHtml(b.unit)}">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <div class="nama-asn font-weight-bold text-dark text-uppercase mb-0" style="font-size: 13px; line-height: 1.2;">${efiledash_escapeHtml(b.nama)}</div>
                        <div class="text-muted" style="font-size: 11px; line-height: 1.2;">${efiledash_escapeHtml(b.nip)}</div>
                        <div class="unit-asn text-danger font-weight-bold mt-1 text-uppercase" style="font-size: 11px; line-height: 1.2;">${efiledash_escapeHtml(b.unit)} <span class="text-muted" style="font-size: 11px;">(${b.tahun})</span></div>
                    </div>
                    <span class="badge badge-danger ml-2 px-2 py-1"><i class="fas fa-exclamation-circle"></i></span>
                </div>
            </li>`;
        });
    }
    $('#efiledash_listBelum').html(uiList); $('#efiledash_inputCariBelum').val(""); 
}

function efiledash_salinKeWA() {
    var listEl = $('.efiledash-item-belum:visible');
    if (listEl.length === 0) { Sultan.notif.info('Tidak ada data pada daftar untuk disalin.'); return; }
    
    var selNamaKat = $('#efiledash_filterKategori option:selected').text();
    var selTahun = $('#efiledash_filterTahun').val() === "SEMUA" ? "Semua Tahun" : $('#efiledash_filterTahun').val();
    var selUnitFilter = (EFILEDASH_IS_ADMIN || EFILEDASH_USE_NPSN_FILTER) ? $('#efiledash_filterUnit').val() : EFILEDASH_UNIT_TERKUNCI;
    var namaUnitDisplay = (selUnitFilter === "SEMUA" || selUnitFilter === "") ? "Seluruh Unit" : selUnitFilter;
    
    var teks = `🚨 *DAFTAR BELUM UNGGAH E-FILE* 🚨\n`;
    teks += `Kategori: ${selNamaKat}\n`;
    teks += `Tahun: ${selTahun}\n`;
    teks += `Filter Unit: ${namaUnitDisplay}\n`;
    teks += `Total Belum Unggah: ${listEl.length} Orang\n\n`;

    var mapUnit = {};
    listEl.each(function() {
        var nama = $(this).find('.nama-asn').text().trim();
        var unitRaw = $(this).attr('data-unit') || $(this).find('.unit-asn').text().split('(')[0].trim();
        if(!mapUnit[unitRaw]) { mapUnit[unitRaw] = []; }
        mapUnit[unitRaw].push(nama);
    });

    var sortedUnits = Object.keys(mapUnit).sort();
    sortedUnits.forEach(function(unitName) {
        teks += `🏢 *${unitName}*\n`; 
        var sortedNames = mapUnit[unitName].sort();
        sortedNames.forEach(function(namaASN, idx) { teks += `  ${idx + 1}. ${namaASN}\n`; });
        teks += `\n`; 
    });

    teks += `Mohon segera mengunggah dokumen elektronik Anda melalui sistem SIKS. Terima kasih. 🙏`;

    navigator.clipboard.writeText(teks).then(function() {
        Sultan.notif.sukses('Daftar berhasil disalin ke Clipboard (Siap Paste di WhatsApp).');
    }).catch(function() { Sultan.alert('error', 'Gagal Menyalin', 'Browser Anda tidak mendukung Clipboard API.'); });
}

function efiledash_escapeHtml(text) { return text ? String(text).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;") : ""; }
</script>

<style>
  /* Enforce 13px font size for all elements in Rekapitulasi per Sekolah table wrapper */
  #admsekolahdash_tabelRekap_wrapper,
  #admsekolahdash_tabelRekap_wrapper .dataTables_length,
  #admsekolahdash_tabelRekap_wrapper .dataTables_length select,
  #admsekolahdash_tabelRekap_wrapper .dataTables_filter,
  #admsekolahdash_tabelRekap_wrapper .dataTables_filter input,
  #admsekolahdash_tabelRekap_wrapper .dataTables_info,
  #admsekolahdash_tabelRekap_wrapper .dataTables_paginate,
  #admsekolahdash_tabelRekap_wrapper .pagination,
  #admsekolahdash_tabelRekap_wrapper .page-item,
  #admsekolahdash_tabelRekap_wrapper .page-link,
  #admsekolahdash_tabelRekap_wrapper table,
  #admsekolahdash_tabelRekap_wrapper table th,
  #admsekolahdash_tabelRekap_wrapper table td,
  #admsekolahdash_tabelRekap_wrapper table tr {
    font-size: 13px !important;
  }
  
  /* Ensure text-muted, badges, and progress bar percentages inside the table are exactly 13px */
  #admsekolahdash_tabelRekap .text-muted,
  #admsekolahdash_tabelRekap .badge,
  #admsekolahdash_tabelRekap .badge-sultan {
    font-size: 13px !important;
  }

  /* Fix Bootstrap 4 card-header flex alignment bug where the pseudo-element ::after acts as a flex child */
  .card-header.d-flex::after {
    display: none !important;
  }

  /* Premium hover effects and micro-animations for Daftar Belum Unggah list items */
  .hover-sultan {
    transition: all 0.25s ease-in-out !important;
  }
  body:not(.dark-mode) .hover-sultan:hover {
    background-color: rgba(128, 0, 0, 0.04) !important;
    transform: translateX(4px);
  }
  body.dark-mode .hover-sultan:hover {
    background-color: rgba(255, 255, 255, 0.05) !important;
    transform: translateX(4px);
  }

  /* Metric Danger Style */
  .metric-danger {
    border-top: 4px solid #dc3545 !important;
    background: linear-gradient(to bottom, rgba(220,53,69,0.02), #ffffff) !important;
    color: #dc3545 !important;
  }
  .dark-mode .metric-danger {
    background: linear-gradient(to bottom, rgba(220,53,69,0.1), #1a1c1e) !important;
    color: #ff8080 !important;
  }
  .metric-danger .inner h3, .metric-danger .inner p {
    color: #dc3545 !important;
  }
  .dark-mode .metric-danger .inner h3, .dark-mode .metric-danger .inner p {
    color: #ff8080 !important;
  }

  /* Metric Warning Style */
  .metric-warning {
    border-top: 4px solid #ffc107 !important;
    background: linear-gradient(to bottom, rgba(255,193,7,0.04), #ffffff) !important;
    color: #856404 !important;
  }
  .dark-mode .metric-warning {
    background: linear-gradient(to bottom, rgba(255,193,7,0.1), #1a1c1e) !important;
    color: #ffdf60 !important;
  }
  .metric-warning .inner h3, .metric-warning .inner p {
    color: #856404 !important;
  }
  .dark-mode .metric-warning .inner h3, .dark-mode .metric-warning .inner p {
    color: #ffdf60 !important;
  }
</style>

                                <h6 class="m-0 font-weight-bold text-danger" style="font-size: 15px;"><i class="fas fa-times-circle mr-2"></i>Belum Unggah</h6>
                                <span class="badge badge-danger px-3 py-1 shadow-sm" id="admsekolahdash_badgeBelum" style="font-size: 13px;">0</span>

                                <div class="input-group input-group-sm">
                                    <div class="input-group-prepend"><span class="input-group-text bg-white border-right-0"><i class="fas fa-search text-muted"></i></span></div>
                                    <input type="text" id="admsekolahdash_inputCariBelum" class="form-control border-left-0" placeholder="Cari NPSN atau nama sekolah...">

<script>
var ADMSEKOLAHDASH_CACHE_REKAP = [];
var ADMSEKOLAHDASH_CACHE_BELUM = [];
var ADMSEKOLAHDASH_KATEGORI_MAP = []; 
var ADMSEKOLAHDASH_TABEL_INSTANCE = null;
var ADMSEKOLAHDASH_PENDING_REQ = 0; 

var ADMSEKOLAHDASH_USER_AKTIF = "";
var ADMSEKOLAHDASH_IS_ADMIN = false;
var ADMSEKOLAHDASH_UNIT_TERKUNCI = ""; 
var ADMSEKOLAHDASH_USER_NPSN = "";
var ADMSEKOLAHDASH_USE_NPSN_FILTER = false;
var ADMSEKOLAHDASH_TAHUN_DEFAULTED = false;

$(document).ready(function() {
    ADMSEKOLAHDASH_TABEL_INSTANCE = null;
    $('#admsekolahdash_dashboardState').hide();
    SultanUI.showLoading('#admsekolahdash_loadingState');
    $('#admsekolahdash_filterContainer').hide();

    try {
        var user = typeof getSesiUser === 'function' ? getSesiUser() : {};
        ADMSEKOLAHDASH_USER_AKTIF = user.nama_lengkap || user.fullname || user.nama || user.username || "User Web";
        var rStr = String(user.role || "").toLowerCase();
        ADMSEKOLAHDASH_IS_ADMIN = (typeof checkUserRoleIsAdmin==='function' && checkUserRoleIsAdmin()) || rStr.includes("admin") || rStr.includes("verifikator");
        ADMSEKOLAHDASH_USER_NPSN = user.npsn || user.unit || user.username || ""; 
    } catch(e) { ADMSEKOLAHDASH_USER_NPSN = ""; ADMSEKOLAHDASH_IS_ADMIN = false; }
    
    $(document).off('click', '#admsekolahdash_btnRefresh').on('click', '#admsekolahdash_btnRefresh', function() {
        var k = $('#admsekolahdash_filterKategori').val();
        if (k !== "" && k != null) admsekolahdash_loadDataKategori(k, true);
    }); 
    
    $(document).off('change', '#admsekolahdash_filterKategori').on('change', '#admsekolahdash_filterKategori', function() {
        var k = $(this).val(); if(k) admsekolahdash_loadDataKategori(k);
    });

    $(document).off('change', '#admsekolahdash_filterSekolah, #admsekolahdash_filterTahun, #admsekolahdash_filterPeriode').on('change', '#admsekolahdash_filterSekolah, #admsekolahdash_filterTahun, #admsekolahdash_filterPeriode', admsekolahdash_terapkanFilterLokal);
    $(document).off('change', '#admsekolahdash_filterJenjang').on('change', '#admsekolahdash_filterJenjang', function() {
        admsekolahdash_initDropdownUnit();
        admsekolahdash_terapkanFilterLokal();
    });
    $(document).off('click', '#admsekolahdash_btnSalinWa').on('click', '#admsekolahdash_btnSalinWa', admsekolahdash_salinKeWA);

    $(document).off('keyup', '#admsekolahdash_inputCariSudah').on('keyup', '#admsekolahdash_inputCariSudah', function() {
        var val = $(this).val().toLowerCase();
        $('.admsekolahdash-item-sudah').filter(function() { $(this).toggle($(this).text().toLowerCase().indexOf(val) > -1); });
    });

    $(document).off('keyup', '#admsekolahdash_inputCariBelum').on('keyup', '#admsekolahdash_inputCariBelum', function() {
        var val = $(this).val().toLowerCase();
        $('.admsekolahdash-item-belum').filter(function() { $(this).toggle($(this).text().toLowerCase().indexOf(val) > -1); });
    });

    admsekolahdash_initMasterAccess();
});

function admsekolahdash_initMasterAccess() {
    var targetNpsn = ""; // Selalu ambil semua sekolah agar user biasa melihat dashboard penuh seperti admin

    $('#admsekolahdash_filterJenjangContainer').show();
    $('#admsekolahdash_filterContainer').show();
    $('#admsekolahdash_filterSekolah').empty().append('<option value="SEMUA">- Semua Sekolah -</option>').prop('disabled', false).removeClass('bg-light text-maroon font-weight-bold');

    if (!ADMSEKOLAHDASH_IS_ADMIN && !ADMSEKOLAHDASH_USER_NPSN) {
        $('#admsekolahdash_loadingState').find('.sultan-loading-text').html('<span class="text-danger"><i class="fas fa-ban mb-2"></i><br>Akses ditolak: Sesi login tidak valid.</span>'); return;
    }

    google.script.run.withSuccessHandler(function(json) {
        var res = JSON.parse(json);
        if(!res.success) { $('#admsekolahdash_loadingState').find('.sultan-loading-text').html('<span class="text-danger"><i class="fas fa-exclamation-triangle mb-2"></i><br>' + admsekolahdash_escapeHtml(res.message) + '</span>'); return; }
        
        // Ambil daftar kategori
        ADMSEKOLAHDASH_KATEGORI_MAP = (res.kategori || []).map(function(k) {
            return { idKat: k.idKat, namaKategori: k.namaKat };
        }).filter(function(k) { return k.idKat; });

        // Setup filter sekolah untuk semua user (admin atau non‑admin) menggunakan data sekolahan
        $('#admsekolahdash_filterContainer').show();
        var sel = $('#admsekolahdash_filterSekolah');
        sel.empty().append('<option value="SEMUA">- Semua Sekolah -</option>');
        var listSekolah = res.sekolah || [];
        listSekolah.forEach(function(s){
            sel.append($('<option>', { value: s.npsn, text: s.nama }));
        });
        sel.prop('disabled', false);
        ADMSEKOLAHDASH_USE_NPSN_FILTER = false;


        if(ADMSEKOLAHDASH_KATEGORI_MAP.length === 0) {
            $('#admsekolahdash_loadingState').find('.sultan-loading-text').html('<span class="text-danger"><i class="fas fa-exclamation-triangle mb-2"></i><br>Belum ada Kategori yang berintegrasi ke Dashboard.</span>'); return;
        }

        var selectKat = $('#admsekolahdash_filterKategori');
        selectKat.empty();
        ADMSEKOLAHDASH_KATEGORI_MAP.forEach(function(k, idx) {
            selectKat.append($('<option>', { value: k.idKat, text: k.namaKategori }));
        });

        admsekolahdash_loadDataKategori($('#admsekolahdash_filterKategori').val());

    }).withFailureHandler(function(err){
        $('#admsekolahdash_loadingState').find('.sultan-loading-text').html('<span class="text-danger"><i class="fas fa-wifi mb-2"></i><br>Koneksi Terputus: ' + admsekolahdash_escapeHtml(err.message) + '</span>');
    }).getAdmSekolahMasterData(targetNpsn);
}

function admsekolahdash_loadDataKategori(idKategori, forceRefresh) {
    if (ADMSEKOLAHDASH_PENDING_REQ > 0) return; 
    ADMSEKOLAHDASH_PENDING_REQ = 1;
    forceRefresh = !!forceRefresh;

    var mapData = ADMSEKOLAHDASH_KATEGORI_MAP.find(k => k.idKat === idKategori);
    if(!mapData) return;

    var btn = $('#admsekolahdash_btnRefresh');
    btn.prop('disabled', true).html('<i class="fas fa-spinner fa-spin text-maroon"></i>');
    $('#admsekolahdash_filterKategori, #admsekolahdash_filterTahun, #admsekolahdash_filterPeriode, #admsekolahdash_filterSekolah').prop('disabled', true);

    $('#admsekolahdash_lblTableKategori').text(mapData.namaKategori);

    var isDashboardVisible = $('#admsekolahdash_dashboardState').is(':visible');

    if (!isDashboardVisible) {
        $('#admsekolahdash_dashboardState').hide();
        SultanUI.showLoading('#admsekolahdash_loadingState', 'Menyinkronkan data dasbor ' + mapData.namaKategori + '...');
    } else {
        var overlayHtml = '<div class="card-loading-overlay d-flex align-items-center justify-content-center" style="position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.7); z-index:10; border-radius:16px;"><i class="fas fa-spinner fa-spin fa-2x text-maroon"></i></div>';
        $('.card-sultan').css('position', 'relative').append(overlayHtml);
    }

    google.script.run.withSuccessHandler(function(jsonStr) {
        ADMSEKOLAHDASH_PENDING_REQ = 0;
        btn.prop('disabled', false).html('<i class="fas fa-sync-alt text-maroon"></i>');
        $('#admsekolahdash_filterKategori, #admsekolahdash_filterTahun, #admsekolahdash_filterPeriode').prop('disabled', false);
        if(ADMSEKOLAHDASH_IS_ADMIN || ADMSEKOLAHDASH_USE_NPSN_FILTER) $('#admsekolahdash_filterSekolah').prop('disabled', false);
        $('.card-loading-overlay').remove();
        
        var data = JSON.parse(jsonStr);
        if (!data.success) { 
            $('#admsekolahdash_loadingState').find('.sultan-loading-text').html('<span class="text-danger"><i class="fas fa-exclamation-triangle mb-2"></i><br>' + admsekolahdash_escapeHtml(data.message) + '</span>'); return; 
        }
        
        ADMSEKOLAHDASH_JENIS_PERIODE = data.jenisPeriode || "TAHUNAN";
        ADMSEKOLAHDASH_CACHE_REKAP = data.rekap || [];
        ADMSEKOLAHDASH_CACHE_BELUM = data.belum || [];
        
        $('#admsekolahdash_lblTableKategori').text(mapData.namaKategori);
        
        if (ADMSEKOLAHDASH_IS_ADMIN || ADMSEKOLAHDASH_USE_NPSN_FILTER) {
            admsekolahdash_initDropdownUnit();
        }
        admsekolahdash_initDropdownTahun();

        admsekolahdash_terapkanFilterLokal();

        SultanUI.hideLoading('#admsekolahdash_loadingState');
        $('#admsekolahdash_dashboardState').show();

    }).withFailureHandler(function(err) {
        ADMSEKOLAHDASH_PENDING_REQ = 0; btn.prop('disabled', false).html('<i class="fas fa-sync-alt text-maroon"></i>');
        $('#admsekolahdash_filterKategori').prop('disabled', false);
        $('.card-loading-overlay').remove();
        $('#admsekolahdash_loadingState').find('.sultan-loading-text').html('<span class="text-danger"><i class="fas fa-wifi mb-2"></i><br>Koneksi Terputus: ' + admsekolahdash_escapeHtml(err.message) + '</span>');
    }).getAdmSekolahDashboardData(idKategori, forceRefresh); 
}

function admsekolahdash_initDropdownUnit() {
    var unique = new Set();
    var npsnUser = String(ADMSEKOLAHDASH_USER_NPSN || "").trim().toUpperCase();
    var filterJenjang = $('#admsekolahdash_filterJenjang').val() || "SEMUA";
    
    ADMSEKOLAHDASH_CACHE_REKAP.forEach(function(r) {
        var unit = String(r.unit || "").trim();
        var jenjang = String(r.jenjang || "").toUpperCase();
        var includeData = true;
        
        if (filterJenjang !== "SEMUA") {
            if (filterJenjang === "PAUD") {
                if (jenjang !== "TK" && jenjang !== "KB" && jenjang !== "SPS" && jenjang !== "TPA" && jenjang !== "PAUD") includeData = false;
            } else if (filterJenjang === "SD") {
                if (jenjang !== "SD") includeData = false;
            }
        }
        
        if (unit && includeData) {
            if (ADMSEKOLAHDASH_IS_ADMIN) {
                unique.add(unit);
            } else if (ADMSEKOLAHDASH_USE_NPSN_FILTER && String(r.npsn || "").trim().toUpperCase() === npsnUser) {
                unique.add(unit);
            }
        }
    });
    var sorted = Array.from(unique).sort();
    var select = $('#admsekolahdash_filterSekolah'); var curVal = select.val();
    
    if (!ADMSEKOLAHDASH_IS_ADMIN && ADMSEKOLAHDASH_UNIT_TERKUNCI) {
        select.empty().append($('<option>', { value: ADMSEKOLAHDASH_USER_NPSN, text: ADMSEKOLAHDASH_UNIT_TERKUNCI }));
        select.val(ADMSEKOLAHDASH_USER_NPSN);
    } else {
        var labelSemua = ADMSEKOLAHDASH_IS_ADMIN ? "- Semua Sekolah -" : "- Semua Sekolah Anda -";
        select.empty().append(`<option value="SEMUA">${labelSemua}</option>`);
        sorted.forEach(function(u) { select.append(`<option value="${admsekolahdash_escapeHtml(u)}">${admsekolahdash_escapeHtml(u)}</option>`); });
        if (sorted.length === 1) {
            select.val(sorted[0]);
        } else if (curVal && unique.has(curVal)) {
            select.val(curVal);
        }
    }
}

function admsekolahdash_initDropdownTahun() {
    var uniqueTahun = new Set();
    var uniquePeriode = new Set();
    var isPermanen = (ADMSEKOLAHDASH_JENIS_PERIODE === "PERMANEN" || ADMSEKOLAHDASH_JENIS_PERIODE === "TMT");
    
    ADMSEKOLAHDASH_CACHE_REKAP.forEach(function(r) { 
        var thn = String(r.tahun || "").trim();
        // Skip kunci internal PERMANEN dari dropdown
        if(thn && thn !== "-" && thn !== "PERMANEN") uniqueTahun.add(thn); 
        var per = String(r.periode || "").trim(); if(per && per !== "-") uniquePeriode.add(per); 
    });
    ADMSEKOLAHDASH_CACHE_BELUM.forEach(function(r) { 
        var thn = String(r.tahun || "").trim();
        if(thn && thn !== "-" && thn !== "PERMANEN") uniqueTahun.add(thn); 
        var per = String(r.periode || "").trim(); if(per && per !== "-") uniquePeriode.add(per); 
    });
    
    // Tampilkan/sembunyikan filter Tahun berdasarkan jenis periode
    if (isPermanen) {
        $('#admsekolahdash_filterTahunContainer').hide();
        $('#admsekolahdash_filterTahun').val("SEMUA");
    } else {
        $('#admsekolahdash_filterTahunContainer').show();
    }
    
    // Tampilkan badge jenis periode
    admsekolahdash_updateJenisPeriodeBadge();
    
    var selTahun = $('#admsekolahdash_filterTahun');
    var curTahun = selTahun.val();
    selTahun.empty().append('<option value="SEMUA">- Semua Tahun -</option>');
    
    var selPeriode = $('#admsekolahdash_filterPeriode');
    var curPeriode = selPeriode.val();
    selPeriode.empty().append('<option value="SEMUA">- Semua Periode -</option>');
    
    // Sort and populate Tahun
    var sortedTahun = Array.from(uniqueTahun);
    sortedTahun.sort(function(a, b) {
        // Tahun Pelajaran (2024/2025) — sort by first year descending
        var splitA = a.split("/"), splitB = b.split("/");
        var na = parseInt(splitA[0], 10), nb = parseInt(splitB[0], 10);
        if (!isNaN(na) && !isNaN(nb)) return nb - na;
        return String(b).localeCompare(String(a));
    });
    
    sortedTahun.forEach(function(t) { selTahun.append(`<option value="${admsekolahdash_escapeHtml(t)}">${admsekolahdash_escapeHtml(t)}</option>`); });
    
    if (isPermanen) {
        // PERMANEN/TMT: selalu SEMUA (tidak relevan filter tahun)
        selTahun.val("SEMUA");
        ADMSEKOLAHDASH_TAHUN_DEFAULTED = true;
    } else if (!ADMSEKOLAHDASH_TAHUN_DEFAULTED && sortedTahun.length > 0) {
        selTahun.val(sortedTahun[0]);
        ADMSEKOLAHDASH_TAHUN_DEFAULTED = true;
    } else if (curTahun && (curTahun === "SEMUA" || uniqueTahun.has(curTahun))) {
        selTahun.val(curTahun);
    }
    
    // Sort and populate Periode
    var sortedPeriode = Array.from(uniquePeriode);
    if (ADMSEKOLAHDASH_JENIS_PERIODE === "BULANAN" || ADMSEKOLAHDASH_JENIS_PERIODE === "PERIODE") {
        var mapBulan = {"Jan":1, "Feb":2, "Mar":3, "Apr":4, "Mei":5, "Jun":6, "Jul":7, "Agu":8, "Sep":9, "Okt":10, "Nov":11, "Des":12};
        sortedPeriode.sort(function(a, b) {
            var bA = mapBulan[a] || 0;
            var bB = mapBulan[b] || 0;
            if (bA && bB) return bB - bA;
            return String(b).localeCompare(String(a));
        });
    } else {
        sortedPeriode.sort(function(a, b) { return String(b).localeCompare(String(a)); });
    }
    
    sortedPeriode.forEach(function(p) { selPeriode.append(`<option value="${admsekolahdash_escapeHtml(p)}">${admsekolahdash_escapeHtml(p)}</option>`); });
    
    // Auto-select behavior for Periode based on rules
    if (ADMSEKOLAHDASH_JENIS_PERIODE === "SEMESTER_TAPEL" || ADMSEKOLAHDASH_JENIS_PERIODE === "SEMESTER_KALENDER" || ADMSEKOLAHDASH_JENIS_PERIODE === "TRIWULAN") {
        if (curPeriode && curPeriode !== "SEMUA" && uniquePeriode.has(curPeriode)) {
            selPeriode.val(curPeriode);
        } else if (sortedPeriode.length > 0) {
            selPeriode.val(sortedPeriode[0]);
        }
    } else {
        if (curPeriode && uniquePeriode.has(curPeriode)) selPeriode.val(curPeriode);
        else selPeriode.val("SEMUA");
    }
    
    var jPeriode = ADMSEKOLAHDASH_JENIS_PERIODE;
    if(jPeriode === "TAHUNAN_TAPEL" || jPeriode === "TAHUNAN_KALENDER" || jPeriode === "PERMANEN" || jPeriode === "TMT") {
        $('#admsekolahdash_filterPeriodeContainer').hide();
    } else {
        $('#admsekolahdash_filterPeriodeContainer').show();
    }
}

function admsekolahdash_getUnitSetByNpsn() {
    var units = new Set();
    var npsnUser = String(ADMSEKOLAHDASH_USER_NPSN || "").trim().toUpperCase();
    ADMSEKOLAHDASH_CACHE_REKAP.forEach(function(r) {
        if (String(r.npsn || "").trim().toUpperCase() === npsnUser) {
            var u = String(r.unit || "").trim().toUpperCase();
            if (u) units.add(u);
        }
    });
    return units;
}

function admsekolahdash_rowMatchesUnit(r, fUnitAdmin) {
    var filterJenjang = $('#admsekolahdash_filterJenjang').val() || "SEMUA";
    var jenjang = String(r.jenjang || "").toUpperCase();
    if (filterJenjang !== "SEMUA") {
        if (filterJenjang === "PAUD") {
            if (jenjang !== "TK" && jenjang !== "KB" && jenjang !== "SPS" && jenjang !== "TPA" && !jenjang.includes("PAUD")) return false;
        } else if (filterJenjang === "SD") {
            if (jenjang !== "SD") return false;
        }
    }

    if (fUnitAdmin === "SEMUA" || fUnitAdmin === "") {
        if (ADMSEKOLAHDASH_USE_NPSN_FILTER && !ADMSEKOLAHDASH_IS_ADMIN) {
            var npsnUser = String(ADMSEKOLAHDASH_USER_NPSN || "").trim().toUpperCase();
            if (String(r.npsn || "").trim().toUpperCase() === npsnUser) return true;
            var allowed = admsekolahdash_getUnitSetByNpsn();
            return allowed.has(String(r.unit || "").trim().toUpperCase());
        }
        return true;
    }
    
    if (ADMSEKOLAHDASH_USE_NPSN_FILTER && !ADMSEKOLAHDASH_IS_ADMIN) {
        var allowed = admsekolahdash_getUnitSetByNpsn();
        if (!allowed.has(fUnitAdmin)) return false;
    }
    
    return String(r.unit || "").trim().toUpperCase() === fUnitAdmin;
}

function admsekolahdash_getRekapForMetrics(dataRekap, fTahun, fPeriode) {
    // PERMANEN/TMT: satu periode universal, kembalikan semua data langsung
    if (ADMSEKOLAHDASH_JENIS_PERIODE === "PERMANEN" || ADMSEKOLAHDASH_JENIS_PERIODE === "TMT") {
        return dataRekap;
    }
    
    if (fTahun !== "SEMUA" && fTahun !== "" && fPeriode !== "SEMUA" && fPeriode !== "") return dataRekap;
    
    // Sort all records to find the most recent
    var sorted = dataRekap.slice();
    var mapBulan = {"Jan":1, "Feb":2, "Mar":3, "Apr":4, "Mei":5, "Jun":6, "Jul":7, "Agu":8, "Sep":9, "Okt":10, "Nov":11, "Des":12};
    
    sorted.sort(function(a, b) {
        var ta = String(a.tahun || "").trim();
        var tb = String(b.tahun || "").trim();
        var pa = String(a.periode || "").trim();
        var pb = String(b.periode || "").trim();
        
        if (ta !== tb) {
            // Handle Tapel format (2024/2025) — sort by first year
            var splitA = ta.split("/"), splitB = tb.split("/");
            var na = parseInt(splitA[0], 10), nb = parseInt(splitB[0], 10);
            if (!isNaN(na) && !isNaN(nb)) return nb - na;
            return tb.localeCompare(ta);
        }
        
        if (ADMSEKOLAHDASH_JENIS_PERIODE === "BULANAN" || ADMSEKOLAHDASH_JENIS_PERIODE === "PERIODE") {
            var bA = mapBulan[pa] || 0;
            var bB = mapBulan[pb] || 0;
            if (bA && bB) return bB - bA;
        }
        
        return pb.localeCompare(pa);
    });
    
    if (sorted.length === 0) return dataRekap;
    var maxTahun = sorted[0].tahun;
    var maxPeriode = sorted[0].periode;
    
    return dataRekap.filter(function(r) { 
        return String(r.tahun || "").trim() === maxTahun && String(r.periode || "").trim() === maxPeriode; 
    });
}

function admsekolahdash_terapkanFilterLokal() {
    var fUnit = "";
    if (ADMSEKOLAHDASH_IS_ADMIN) {
        fUnit = String($('#admsekolahdash_filterSekolah').val() || "").trim().toUpperCase();
    } else if (ADMSEKOLAHDASH_USE_NPSN_FILTER) {
        fUnit = String($('#admsekolahdash_filterSekolah').val() || "SEMUA").trim().toUpperCase();
    } else {
        fUnit = String(ADMSEKOLAHDASH_UNIT_TERKUNCI || "").trim().toUpperCase();
    }
    
    // PERMANEN/TMT: filter tahun tidak relevan, paksa SEMUA
    var isPermanen = (ADMSEKOLAHDASH_JENIS_PERIODE === "PERMANEN" || ADMSEKOLAHDASH_JENIS_PERIODE === "TMT");
    var fTahun = isPermanen ? "SEMUA" : String($('#admsekolahdash_filterTahun').val() || "").trim().toUpperCase();
    var fPeriode = String($('#admsekolahdash_filterPeriode').val() || "").trim().toUpperCase();
    
    var filterRekap = ADMSEKOLAHDASH_CACHE_REKAP.filter(function(r) {
        if (!admsekolahdash_rowMatchesUnit(r, fUnit)) return false;
        // Skip internal PERMANEN key when comparing filter
        var rTahun = String(r.tahun || "").trim().toUpperCase();
        if (!isPermanen && fTahun !== "SEMUA" && fTahun !== "" && rTahun !== fTahun) return false;
        if (fPeriode !== "SEMUA" && fPeriode !== "" && String(r.periode || "").trim().toUpperCase() !== fPeriode) return false;
        return true;
    });

    var filterBelum = ADMSEKOLAHDASH_CACHE_BELUM.filter(function(r) {
        if (!admsekolahdash_rowMatchesUnit(r, fUnit)) return false;
        var rTahun = String(r.tahun || "").trim().toUpperCase();
        if (!isPermanen && fTahun !== "SEMUA" && fTahun !== "" && rTahun !== fTahun) return false;
        if (fPeriode !== "SEMUA" && fPeriode !== "" && String(r.periode || "").trim().toUpperCase() !== fPeriode) return false;
        return true;
    });

    admsekolahdash_renderDashboard(filterRekap, filterBelum, fTahun, fPeriode);
}

function admsekolahdash_animateValue(id, end) {
    var obj = document.getElementById(id);
    if(!obj) return;
    var start = 0; 
    var duration = 1000; 
    
    if (obj.dataset.admsekolahdashAnimId) {
        cancelAnimationFrame(parseInt(obj.dataset.admsekolahdashAnimId, 10));
    }
    
    var startTime = null;
    
    function step(timestamp) {
        if (!startTime) startTime = timestamp;
        var progress = Math.min((timestamp - startTime) / duration, 1);
        obj.innerHTML = Math.floor(progress * (end - start) + start).toLocaleString('id-ID');
        if (progress < 1) {
            var animId = window.requestAnimationFrame(step);
            obj.dataset.admsekolahdashAnimId = animId;
        } else {
            obj.dataset.admsekolahdashAnimId = "";
        }
    }
    var firstAnimId = window.requestAnimationFrame(step);
    obj.dataset.admsekolahdashAnimId = firstAnimId;
}

function admsekolahdash_updateLastUpdate() {
    $('#admsekolahdash_lastUpdate').hide();
}

function admsekolahdash_renderDashboard(dataRekap, dataBelum, fTahun, fPeriode) {
    fTahun = String(fTahun || $('#admsekolahdash_filterTahun').val() || "").trim().toUpperCase();
    fPeriode = String(fPeriode || $('#admsekolahdash_filterPeriode').val() || "").trim().toUpperCase();
    var rekapMetrics = admsekolahdash_getRekapForMetrics(dataRekap, fTahun, fPeriode);
    var metricsTahunLabel = "";
    if (fTahun === "SEMUA" && rekapMetrics.length && dataRekap.length > rekapMetrics.length) {
        metricsTahunLabel = String(rekapMetrics[0].tahun || "").trim();
        var per = String(rekapMetrics[0].periode || "").trim();
        if (per && per !== "-") metricsTahunLabel += " (" + per + ")";
    }

    var totAsn = 0, totSudah = 0, totBelum = 0;
    var totDiproses = 0, totDisetujui = 0, totRevisi = 0, totDitolak = 0;
    var dataSudah = [];
    var dataBelum = [];

    rekapMetrics.forEach(function(r) {
        var cAsn = parseInt(r.jml) || 0;
        var cSudah = parseInt(r.sudah) || 0;
        var cBelum = parseInt(r.belum) || 0;
        
        totAsn += cAsn;
        totSudah += cSudah;
        totBelum += cBelum;

        // Hitung status detil dari field status
        var st = String(r.status || "").toLowerCase();
        if (st) {
            if (st.includes("disetujui") || st.includes("setuju") || st.includes("ok") || st.includes("valid")) {
                totDisetujui++;
            } else if (st.includes("proses") || st.includes("pending") || st.includes("menunggu")) {
                totDiproses++;
            } else if (st.includes("revisi")) {
                totRevisi++;
            } else if (st.includes("tolak") || st.includes("ditolak")) {
                totDitolak++;
            }
        }
        
        if (cSudah > 0) {
            dataSudah.push(r);
        } else if (cBelum > 0) {
            dataBelum.push(r);
        }
    });

    admsekolahdash_animateValue('admsekolahdash_cardTotalSekolah', totAsn);
    admsekolahdash_animateValue('admsekolahdash_cardSudah', totSudah);
    admsekolahdash_animateValue('admsekolahdash_cardBelum', totBelum);
    admsekolahdash_animateValue('admsekolahdash_cardDiproses', totDiproses);
    admsekolahdash_animateValue('admsekolahdash_cardDisetujui', totDisetujui);
    admsekolahdash_animateValue('admsekolahdash_cardRevisi', totRevisi);
    admsekolahdash_animateValue('admsekolahdash_cardDitolak', totDitolak);
    
    var percentage = totAsn > 0 ? Math.round((totSudah / totAsn) * 100) : 0;
    var pBar = $('#admsekolahdash_progressBar');
    pBar.css('width', percentage + '%').attr('aria-valuenow', percentage);
    $('#admsekolahdash_progressText').text(percentage + '% Selesai');
    
    if (percentage < 30) pBar.css('background-color', '#d11a2a');
    else if (percentage < 70) pBar.css('background-color', '#ffc107');
    else pBar.css('background-color', '#28a745');
    
    admsekolahdash_renderInsight(totAsn, totSudah, totBelum, metricsTahunLabel);
    admsekolahdash_updateLastUpdate();

    $('#admsekolahdash_badgeSudah').text(totSudah);
    $('#admsekolahdash_badgeBelum').text(totBelum);

    var uiSudah = "";
    if (dataSudah.length === 0) {
        uiSudah = '<li class="list-group-item text-center py-5">' +
                  '<i class="fas fa-exclamation-triangle fa-3x text-warning mb-3 opacity-50"></i><br>' +
                  '<div class="font-weight-bold text-dark mb-1" style="font-size: 13px;">Belum Ada Data</div>' +
                  '<div class="text-muted" style="font-size: 12px;">Belum ada sekolah yang mengunggah dokumen.</div>' +
                  '</li>';
    } else {
        var isPermanenView = (ADMSEKOLAHDASH_JENIS_PERIODE === "PERMANEN" || ADMSEKOLAHDASH_JENIS_PERIODE === "TMT");
        dataSudah.forEach(function(b) {
            var subInfo = "";
            if (isPermanenView) {
                subInfo = b.thnUpload ? '<span class="badge badge-light border ml-1" style="font-size:10px;">Upload: ' + admsekolahdash_escapeHtml(b.thnUpload) + '</span>' : '';
            } else {
                var tahunTeks = admsekolahdash_escapeHtml(b.tahun) + (b.periode && b.periode !== "-" ? " " + admsekolahdash_escapeHtml(b.periode) : "");
                subInfo = '<div class="unit-asn text-success font-weight-bold mt-1 text-uppercase" style="font-size: 11px; line-height: 1.2;">(' + tahunTeks + ')</div>';
            }
            uiSudah += '<li class="list-group-item admsekolahdash-item-sudah py-2 px-3 hover-sultan" data-unit="' + admsekolahdash_escapeHtml(b.unit) + '">' +
                       '<div class="d-flex justify-content-between align-items-center">' +
                       '<div>' +
                       '<div class="nama-asn font-weight-bold text-dark text-uppercase mb-0" style="font-size: 13px; line-height: 1.2;">' + admsekolahdash_escapeHtml(b.unit) + '</div>' +
                       '<div class="text-muted" style="font-size: 11px; line-height: 1.2;">NPSN: ' + admsekolahdash_escapeHtml(b.npsn) + (isPermanenView ? ' ' + subInfo : '') + '</div>' +
                       (isPermanenView ? '' : subInfo) +
                       '</div>' +
                       '<span class="badge badge-success ml-2 px-2 py-1"><i class="fas fa-check"></i></span>' +
                       '</div>' +
                       '</li>';
        });
    }
    $('#admsekolahdash_listSudah').html(uiSudah); $('#admsekolahdash_inputCariSudah').val("");

    var uiBelum = "";
    if (dataBelum.length === 0) {
        uiBelum = '<li class="list-group-item text-center py-5">' +
                  '<i class="fas fa-check-circle fa-3x text-success mb-3 opacity-50"></i><br>' +
                  '<div class="font-weight-bold text-dark mb-1" style="font-size: 13px;">Luar Biasa!</div>' +
                  '<div class="text-muted" style="font-size: 12px;">Tidak ada sekolah yang belum unggah.</div>' +
                  '</li>';
    } else {
        dataBelum.forEach(function(b) {
            uiBelum += '<li class="list-group-item admsekolahdash-item-belum py-2 px-3 hover-sultan" data-unit="' + admsekolahdash_escapeHtml(b.unit) + '">' +
                       '<div class="d-flex justify-content-between align-items-center">' +
                       '<div>' +
                       '<div class="nama-asn font-weight-bold text-dark text-uppercase mb-0" style="font-size: 13px; line-height: 1.2;">' + admsekolahdash_escapeHtml(b.unit) + '</div>' +
                       '<div class="text-muted" style="font-size: 11px; line-height: 1.2;">NPSN: ' + admsekolahdash_escapeHtml(b.npsn) + '</div>' +
                       '<div class="unit-asn text-danger font-weight-bold mt-1 text-uppercase" style="font-size: 11px; line-height: 1.2;">(' + admsekolahdash_escapeHtml(b.tahun) + (b.periode && b.periode !== "-" ? " " + admsekolahdash_escapeHtml(b.periode) : "") + ')</div>' +
                       '</div>' +
                       '<span class="badge badge-danger ml-2 px-2 py-1"><i class="fas fa-exclamation-circle"></i></span>' +
                       '</div>' +
                       '</li>';
        });
    }
    $('#admsekolahdash_listBelum').html(uiBelum); $('#admsekolahdash_inputCariBelum').val(""); 
}

function admsekolahdash_salinKeWA() {
    var listEl = $('.admsekolahdash-item-belum:visible');
    if (listEl.length === 0) { Sultan.notif.info('Tidak ada data pada daftar belum unggah untuk disalin.'); return; }
    
    var selNamaKat = $('#admsekolahdash_filterKategori option:selected').text();
    var selTahun = $('#admsekolahdash_filterTahun').val() === "SEMUA" ? "Semua Tahun" : $('#admsekolahdash_filterTahun').val();
    var selUnitFilter = (ADMSEKOLAHDASH_IS_ADMIN || ADMSEKOLAHDASH_USE_NPSN_FILTER) ? $('#admsekolahdash_filterSekolah').val() : ADMSEKOLAHDASH_UNIT_TERKUNCI;
    var namaUnitDisplay = (selUnitFilter === "SEMUA" || selUnitFilter === "") ? "Seluruh Sekolah" : selUnitFilter;
    
    var teks = `🚨 *DAFTAR SEKOLAH BELUM UNGGAH* 🚨\n`;
    teks += `Kategori: ${selNamaKat}\n`;
    teks += `Tahun: ${selTahun}\n`;
    teks += `Filter Unit: ${namaUnitDisplay}\n`;
    teks += `Total Belum Unggah: ${listEl.length} Sekolah\n\n`;

    var mapUnit = {};
    listEl.each(function() {
        var nama = $(this).find('.nama-asn').text().trim();
        var unitRaw = $(this).attr('data-unit') || $(this).find('.unit-asn').text().split('(')[0].trim();
        if(!mapUnit[unitRaw]) { mapUnit[unitRaw] = []; }
        mapUnit[unitRaw].push(nama);
    });

    var sortedUnits = Object.keys(mapUnit).sort();
    sortedUnits.forEach(function(unitName) {
        teks += `🏢 *${unitName}*\n`; 
        var sortedNames = mapUnit[unitName].sort();
        sortedNames.forEach(function(namaSekolah, idx) { teks += `  ${idx + 1}. ${namaSekolah}\n`; });
        teks += `\n`; 
    });

    teks += `Mohon segera mengunggah dokumen elektronik sekolah Anda melalui sistem SIKS. Terima kasih. 🙏`;

    navigator.clipboard.writeText(teks).then(function() {
        Sultan.notif.sukses('Daftar berhasil disalin ke Clipboard (Siap Paste di WhatsApp).');
    }).catch(function() { Sultan.alert('error', 'Gagal Menyalin', 'Browser Anda tidak mendukung Clipboard API.'); });
}

function admsekolahdash_escapeHtml(text) { return text ? String(text).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;") : ""; }
</script>



<section class="content">
  <div class="container-fluid">
    <div class="row justify-content-center">
      <div class="col-12">

        <div class="sultan-filter-pill-container shadow-sm mb-4 sultan-page-transition">
          <!-- Filter Tahun -->
          <div class="sultan-filter-item">
            <select id="seragamdash_filterTahun" class="form-control" aria-label="Pilih Tahun">
              <option value="">- Memuat Tahun... -</option>
            </select>
            <i class="fas fa-chevron-down"></i>
          </div>
          <!-- Filter Jenis Seragam -->
          <div class="sultan-filter-item" id="seragamdash_filterJenisContainer">
            <select id="seragamdash_filterJenis" class="form-control" aria-label="Pilih Jenis Seragam">
              <option value="SEMUA">Semua Jenis Seragam</option>
              <option value="Merah Putih">Merah Putih</option>
              <option value="Pramuka">Pramuka</option>
            </select>
            <i class="fas fa-chevron-down"></i>
          </div>
          <div class="divider-vertical d-none d-md-block mx-2"></div>

          <button type="button" id="seragamdash_btnRefresh" class="sultan-btn-refresh" title="Segarkan Data">
            <i class="fas fa-sync-alt"></i>
          </button>
        </div>

        <div id="seragamdash_loadingState"></div>

        <div id="seragamdash_dashboardState">

          <!-- Metric Cards Baris 1 -->
          <div class="row mb-3">
            <div class="col-md-3 col-sm-6 mb-3 mb-md-0">
              <div class="sultan-metric-card metric-info">
                <div class="inner">
                  <h3 id="seragamdash_cardTotalSekolah">0</h3>
                  <p>JUMLAH SASARAN</p>
                </div>
                <div class="icon">
                  <i class="fas fa-school"></i>
                </div>
              </div>
            </div>
            <div class="col-md-3 col-sm-6 mb-3 mb-md-0">
              <div class="sultan-metric-card metric-success">
                <div class="inner">
                  <h3 id="seragamdash_cardSudah">0</h3>
                  <p>SUDAH UNGGAH</p>
                </div>
                <div class="icon">
                  <i class="fas fa-check-circle"></i>
                </div>
              </div>
            </div>
            <div class="col-md-3 col-sm-6 mb-3 mb-md-0">
              <div class="sultan-metric-card metric-danger">
                <div class="inner">
                  <h3 id="seragamdash_cardBelum">0</h3>
                  <p>BELUM UNGGAH</p>
                </div>
                <div class="icon">
                  <i class="fas fa-times-circle"></i>
                </div>
              </div>
            </div>
            <div class="col-md-3 col-sm-6">
              <div class="sultan-metric-card metric-warning">
                <div class="inner">
                  <h3 id="seragamdash_cardPersentase">0%</h3>
                  <p>PERSENTASE PROGRES</p>
                </div>
                <div class="icon">
                  <i class="fas fa-chart-line"></i>
                </div>
              </div>
            </div>
          </div>

          <!-- Progress Bar Global -->
          <div class="card card-sultan shadow-sm mb-4">
            <div class="card-body p-3">
              <div class="d-flex align-items-center justify-content-between mb-2">
                <span class="text-sm font-weight-bold text-muted">PERSENTASE KESELURUHAN SELESAI</span>
                <span id="seragamdash_progressText" class="text-sm font-weight-bold text-maroon">0% Selesai</span>
              </div>
              <div class="progress shadow-inner" style="height: 14px; border-radius: 7px; background-color: rgba(0,0,0,0.05);">
                <div id="seragamdash_progressBar" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%; border-radius: 7px; background-color: #800000;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
              </div>
            </div>
          </div>

          <!-- Dua Kolom: Sudah & Belum Unggah -->
          <div class="row">
            <div class="row w-100 m-0">
              <!-- Kolom Sudah Unggah -->
              <div class="col-md-6 mb-4 px-2 d-flex flex-column">
                <div class="card-sultan flex-fill d-flex flex-column border-success" style="border-width: 2px;">
                  <div class="card-header card-header-sultan-adaptive py-3 d-flex justify-content-between align-items-center" style="background-color: transparent;">
                    <h6 class="m-0 font-weight-bold text-success" style="font-size: 15px;"><i class="fas fa-check-circle mr-2"></i>Sudah Unggah</h6>
                    <span class="badge badge-success px-3 py-1 shadow-sm" id="seragamdash_lblBadgeSudah" style="font-size: 13px;">0</span>
                  </div>
                  <div class="p-2 bg-light border-bottom">
                    <div class="input-group input-group-sm">
                      <div class="input-group-prepend"><span class="input-group-text bg-white border-right-0"><i class="fas fa-search text-muted"></i></span></div>
                      <input type="text" id="seragamdash_inputCariSudah" class="form-control border-left-0" placeholder="Cari NPSN atau nama sekolah...">
                    </div>
                  </div>
                  <div class="card-body p-0" style="height: 400px; overflow-y: auto;">
                    <ul class="list-group list-group-flush" id="seragamdash_listSudah">
                      <li class="list-group-item text-center text-muted py-4"><i class="fas fa-spinner fa-spin mr-2"></i> Memuat daftar...</li>
                    </ul>
                  </div>
                </div>
              </div>

              <!-- Kolom Belum Unggah -->
              <div class="col-md-6 mb-4 px-2 d-flex flex-column">
                <div class="card-sultan flex-fill d-flex flex-column border-danger" style="border-width: 2px;">
                  <div class="card-header card-header-sultan-adaptive py-3 d-flex justify-content-between align-items-center" style="background-color: transparent;">
                    <h6 class="m-0 font-weight-bold text-danger" style="font-size: 15px;"><i class="fas fa-times-circle mr-2"></i>Belum Unggah</h6>
                    <span class="badge badge-danger px-3 py-1 shadow-sm" id="seragamdash_lblBadgeBelum" style="font-size: 13px;">0</span>
                  </div>
                  <div class="p-2 bg-light border-bottom">
                    <div class="input-group input-group-sm">
                      <div class="input-group-prepend"><span class="input-group-text bg-white border-right-0"><i class="fas fa-search text-muted"></i></span></div>
                      <input type="text" id="seragamdash_inputCariBelum" class="form-control border-left-0" placeholder="Cari NPSN atau nama sekolah...">
                      <div class="input-group-append">
                        <button type="button" id="seragamdash_btnSalinWa" class="btn btn-success px-3" title="Salin Daftar ke WhatsApp" style="border-top-right-radius: 4px; border-bottom-right-radius: 4px;">
                          <i class="fab fa-whatsapp mr-1"></i> Salin
                        </button>
                      </div>
                    </div>
                  </div>
                  <div class="card-body p-0" style="height: 400px; overflow-y: auto;">
                    <ul class="list-group list-group-flush" id="seragamdash_listBelum">
                      <li class="list-group-item text-center text-muted py-4"><i class="fas fa-spinner fa-spin mr-2"></i> Memuat daftar...</li>
                    </ul>
                  </div>
                </div>
              </div>
            </div>
          </div>

        </div><!-- /seragamdash_dashboardState -->

      </div>
    </div>
  </div>
</section>

<script>
var SERAGAM_DASH_CACHE_REKAP = [];
var SERAGAM_DASH_CACHE_LAPORAN = [];
var SERAGAM_DASH_PENDING_REQ = 0;
var SERAGAM_DASH_LIST_SUDAH = [];
var SERAGAM_DASH_LIST_BELUM = [];

function seragam_dash_showSkeleton() {
    $('#seragamdash_cardTotalSekolah, #seragamdash_cardSudah, #seragamdash_cardBelum, #seragamdash_cardPersentase')
        .html('<span class="sultan-skeleton" style="width: 50px; height: 22px; display: inline-block; vertical-align: middle;"></span>');
    $('#seragamdash_progressText').html('<span class="sultan-skeleton" style="width: 80px; height: 14px; display: inline-block;"></span>');
    
    var skeletonList = '';
    for (var i = 0; i < 4; i++) {
        skeletonList += '<li class="list-group-item p-3 d-flex align-items-center">' +
            '<div class="w-100">' +
              '<div class="sultan-skeleton mb-1" style="width: 60%; height: 16px;"></div>' +
              '<div class="sultan-skeleton" style="width: 40%; height: 12px;"></div>' +
            '</div>' +
            '</li>';
    }
    $('#seragamdash_listSudah, #seragamdash_listBelum').html(skeletonList);
}

$(document).ready(function() {
    $('#seragamdash_dashboardState').show();
    seragam_dash_showSkeleton();

    $(document).off('click', '#seragamdash_btnRefresh').on('click', '#seragamdash_btnRefresh', function() {
        var thn = $('#seragamdash_filterTahun').val();
        if (thn) seragam_dash_loadData(thn, true);
    });

    $(document).off('change', '#seragamdash_filterTahun').on('change', '#seragamdash_filterTahun', function() {
        var thn = $(this).val();
        if (thn) seragam_dash_loadData(thn);
    });

    $(document).off('change', '#seragamdash_filterJenis').on('change', '#seragamdash_filterJenis', function() {
        seragam_dash_terapkanFilterLokal();
    });

    // Pemicu pencarian lokal
    $(document).on('input', '#seragamdash_inputCariSudah', function() {
        seragam_dash_renderListSudah($(this).val());
    });
    $(document).on('input', '#seragamdash_inputCariBelum', function() {
        seragam_dash_renderListBelum($(this).val());
    });

    // Tombol Salin WA
    $(document).off('click', '#seragamdash_btnSalinWa').on('click', '#seragamdash_btnSalinWa', function() {
        if (SERAGAM_DASH_LIST_BELUM.length === 0) {
            Sultan.alert('info', 'Daftar Kosong', 'Tidak ada sekolah yang belum mengirim laporan.');
            return;
        }
        var thn = $('#seragamdash_filterTahun').val() || '';
        var jns = $('#seragamdash_filterJenis').val() || 'SEMUA';
        var labelJns = jns === 'SEMUA' ? 'Semua Jenis Seragam' : jns;
        
        var txt = '*[SIKS - DAFTAR BELUM UNGGAH LAPORAN SERAGAM GRATIS]*\n' +
                  'Tahun Pelajaran: ' + thn + '\n' +
                  'Jenis Seragam: ' + labelJns + '\n\n' +
                  'Berikut daftar sekolah yang belum mengunggah berkas Laporan Penerimaan:\n';
                  
        SERAGAM_DASH_LIST_BELUM.forEach(function(s, idx) {
            txt += (idx + 1) + '. ' + s.namaSekolah + ' (' + s.npsn + ') - Sasaran: ' + s.jmlPenerima + ' murid\n';
        });
        txt += '\nMohon untuk segera mengunggah Laporan Penerimaan di aplikasi SIKS. Terima kasih.';
        
        var temp = $('<textarea>');
        $('body').append(temp);
        temp.val(txt).select();
        document.execCommand('copy');
        temp.remove();
        
        Sultan.alert('success', 'Berhasil Disalin', 'Daftar sekolah belum unggah telah disalin ke clipboard Anda dalam format WhatsApp.');
    });

    seragam_dash_initYears();
});

function seragam_dash_initYears() {
    google.script.run.withSuccessHandler(function(jsonStr) {
        var res = JSON.parse(jsonStr);
        if (!res.success) {
            Sultan.alert('danger', 'Error', 'Gagal memuat tahun pelajaran: ' + res.message);
            return;
        }
        var select = $('#seragamdash_filterTahun');
        select.empty();
        res.data.forEach(function(yr) {
            select.append('<option value="' + yr + '">' + yr + '</option>');
        });
        if (res.data.length > 0) {
            seragam_dash_loadData(res.data[0]);
        }
    }).seragam_getAvailableYears();
}

function seragam_dash_loadData(tahun, forceRefresh) {
    if (SERAGAM_DASH_PENDING_REQ > 0) return;
    SERAGAM_DASH_PENDING_REQ = 1;
    
    var btn = $('#seragamdash_btnRefresh');
    btn.prop('disabled', true).html('<i class="fas fa-spinner fa-spin text-maroon"></i>');
    $('#seragamdash_filterTahun, #seragamdash_filterJenis').prop('disabled', true);
    
    seragam_dash_showSkeleton();

    google.script.run.withSuccessHandler(function(jsonStr) {
        SERAGAM_DASH_PENDING_REQ = 0;
        btn.prop('disabled', false).html('<i class="fas fa-sync-alt text-maroon"></i>');
        $('#seragamdash_filterTahun, #seragamdash_filterJenis').prop('disabled', false);

        var res = JSON.parse(jsonStr);
        if (!res.success) {
            Sultan.alert('danger', 'Error', 'Gagal memuat data: ' + res.message);
            return;
        }

        SERAGAM_DASH_CACHE_REKAP = res.rekap || [];
        SERAGAM_DASH_CACHE_LAPORAN = res.laporan || [];

        seragam_dash_terapkanFilterLokal();

    }).withFailureHandler(function(err) {
        SERAGAM_DASH_PENDING_REQ = 0;
        btn.prop('disabled', false).html('<i class="fas fa-sync-alt text-maroon"></i>');
        $('#seragamdash_filterTahun, #seragamdash_filterJenis').prop('disabled', false);
        Sultan.alert('danger', 'Koneksi Terputus', 'Gagal memuat data dasbor.');
    }).seragam_getDashboardData(tahun);
}

function seragam_dash_terapkanFilterLokal() {
    var jenisFilt = $('#seragamdash_filterJenis').val() || "SEMUA";

    // Petakan laporan yang masuk per NPSN berdasarkan filter Jenis Seragam
    var mapLap = {}; // NPSN -> { sp, dok, tgl }
    SERAGAM_DASH_CACHE_LAPORAN.forEach(function(l) {
        var matchJenis = false;
        if (jenisFilt === "SEMUA") {
            matchJenis = true; // Dianggap match untuk jenis apapun jika global
        } else {
            matchJenis = String(l.jenis || "").trim().toUpperCase() === jenisFilt.trim().toUpperCase();
        }

        if (matchJenis) {
            // Jika ada banyak laporan, utamakan yang memiliki berkas lengkap
            if (!mapLap[l.npsn] || (!mapLap[l.npsn].sp && l.sp)) {
                mapLap[l.npsn] = { sp: l.sp, dok: l.dok, tgl: l.tgl || "-" };
            }
        }
    });

    // Pilah rekap data sekolah sasaran
    SERAGAM_DASH_LIST_SUDAH = [];
    SERAGAM_DASH_LIST_BELUM = [];

    SERAGAM_DASH_CACHE_REKAP.forEach(function(r) {
        var lap = mapLap[r.npsn];
        var sudahKirim = false;
        var tglUpload = "-";
        
        if (lap && (lap.sp || lap.dok)) {
            sudahKirim = true;
            tglUpload = lap.tgl || "-";
        }

        var item = {
            npsn: r.npsn,
            namaSekolah: r.namaSekolah,
            jmlPenerima: r.jmlPenerima,
            tglUpload: tglUpload,
            sudahKirim: sudahKirim
        };

        if (sudahKirim) {
            SERAGAM_DASH_LIST_SUDAH.push(item);
        } else {
            SERAGAM_DASH_LIST_BELUM.push(item);
        }
    });

    // Hitung ulang metrik lokal
    var totalSek = SERAGAM_DASH_CACHE_REKAP.length;
    var sudah = SERAGAM_DASH_LIST_SUDAH.length;
    var belum = SERAGAM_DASH_LIST_BELUM.length;
    var pct = totalSek > 0 ? Math.round((sudah / totalSek) * 100) : 0;

    // Animasikan Metrik
    seragam_dash_animateValue('seragamdash_cardTotalSekolah', totalSek);
    seragam_dash_animateValue('seragamdash_cardSudah', sudah);
    seragam_dash_animateValue('seragamdash_cardBelum', belum);
    $('#seragamdash_cardPersentase').text(pct + '%');
    
    $('#seragamdash_lblBadgeSudah').text(sudah);
    $('#seragamdash_lblBadgeBelum').text(belum);

    // Progress bar global
    var pBar = $('#seragamdash_progressBar');
    pBar.css('width', pct + '%').attr('aria-valuenow', pct);
    $('#seragamdash_progressText').text(pct + '% Selesai');
    if (pct < 30) pBar.css('background-color', '#dc3545'); 
    else if (pct < 75) pBar.css('background-color', '#ffc107'); 
    else pBar.css('background-color', '#28a745');

    // Kosongkan kolom pencarian & Render
    $('#seragamdash_inputCariSudah').val('');
    $('#seragamdash_inputCariBelum').val('');
    
    seragam_dash_renderListSudah();
    seragam_dash_renderListBelum();
}

function seragam_dash_renderListSudah(query) {
    query = String(query || "").trim().toUpperCase();
    var listEl = $('#seragamdash_listSudah');
    listEl.empty();
    
    var data = SERAGAM_DASH_LIST_SUDAH.filter(function(r) {
        if (!query) return true;
        return String(r.namaSekolah || "").toUpperCase().indexOf(query) !== -1 || String(r.npsn || "").indexOf(query) !== -1;
    });

    if (data.length === 0) {
        listEl.append('<li class="list-group-item text-center text-muted py-4">Tidak ada sekolah ditemukan.</li>');
        return;
    }

    data.forEach(function(r) {
        var li = $('<li class="list-group-item p-3 d-flex align-items-center justify-content-between hover-sultan">');
        var left = $('<div>');
        left.append('<h6 class="m-0 font-weight-bold" style="font-size:14px;">' + seragam_dash_esc(r.namaSekolah) + '</h6>');
        left.append('<small class="text-muted"><i class="fas fa-fingerprint mr-1"></i>NPSN: ' + r.npsn + ' | <i class="fas fa-tshirt mr-1"></i>Sasaran: <b>' + r.jmlPenerima + '</b> murid</small>');
        
        var right = $('<div class="text-right">');
        right.append('<span class="badge badge-success px-2 py-1 mb-1 font-weight-bold" style="font-size:11px;"><i class="fas fa-check-circle mr-1"></i>Sudah Unggah</span>');
        right.append('<div><small class="text-muted text-xs" style="font-size:10px;"><i class="far fa-clock mr-1"></i>' + r.tglUpload + '</small></div>');
        
        li.append(left).append(right);
        listEl.append(li);
    });
}

function seragam_dash_renderListBelum(query) {
    query = String(query || "").trim().toUpperCase();
    var listEl = $('#seragamdash_listBelum');
    listEl.empty();
    
    var data = SERAGAM_DASH_LIST_BELUM.filter(function(r) {
        if (!query) return true;
        return String(r.namaSekolah || "").toUpperCase().indexOf(query) !== -1 || String(r.npsn || "").indexOf(query) !== -1;
    });

    if (data.length === 0) {
        listEl.append('<li class="list-group-item text-center text-muted py-4">Tidak ada sekolah ditemukan.</li>');
        return;
    }

    data.forEach(function(r) {
        var li = $('<li class="list-group-item p-3 d-flex align-items-center justify-content-between hover-sultan">');
        var left = $('<div>');
        left.append('<h6 class="m-0 font-weight-bold text-danger" style="font-size:14px;">' + seragam_dash_esc(r.namaSekolah) + '</h6>');
        left.append('<small class="text-muted"><i class="fas fa-fingerprint mr-1"></i>NPSN: ' + r.npsn + ' | <i class="fas fa-tshirt mr-1"></i>Sasaran: <b>' + r.jmlPenerima + '</b> murid</small>');
        
        var right = $('<div class="text-right">');
        right.append('<span class="badge badge-danger px-2 py-1 font-weight-bold" style="font-size:11px;"><i class="fas fa-times-circle mr-1"></i>Belum Unggah</span>');
        
        li.append(left).append(right);
        listEl.append(li);
    });
}

function seragam_dash_animateValue(id, end) {
    var obj = document.getElementById(id);
    if (!obj) return;
    var start = 0;
    var duration = 400;
    var range = end - start;
    var minTimer = 25;
    var stepTime = Math.abs(Math.floor(duration / range));
    stepTime = Math.max(stepTime, minTimer);
    var startTime = new Date().getTime();
    var endTime = startTime + duration;
    var timer;
    
    function run() {
        var now = new Date().getTime();
        var remaining = Math.max((endTime - now) / duration, 0);
        var value = Math.round(end - (remaining * range));
        obj.innerHTML = value;
        if (value == end) {
            clearInterval(timer);
        }
    }
    timer = setInterval(run, stepTime);
    run();
}

function seragam_dash_esc(t) { return t ? String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;') : ''; }
</script>

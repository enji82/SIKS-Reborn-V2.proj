<style>
  #seragamdash_tabelRekap_wrapper,
  #seragamdash_tabelRekap_wrapper .dataTables_length,
  #seragamdash_tabelRekap_wrapper .dataTables_length select,
  #seragamdash_tabelRekap_wrapper .dataTables_filter,
  #seragamdash_tabelRekap_wrapper .dataTables_filter input,
  #seragamdash_tabelRekap_wrapper .dataTables_info,
  #seragamdash_tabelRekap_wrapper .dataTables_paginate,
  #seragamdash_tabelRekap_wrapper .pagination,
  #seragamdash_tabelRekap_wrapper .page-item,
  #seragamdash_tabelRekap_wrapper .page-link,
  #seragamdash_tabelRekap_wrapper table,
  #seragamdash_tabelRekap_wrapper table th,
  #seragamdash_tabelRekap_wrapper table td,
  #seragamdash_tabelRekap_wrapper table tr { font-size: 13px !important; }
  .card-header.d-flex::after { display: none !important; }
  .hover-sultan { transition: all 0.25s ease-in-out !important; }
  body:not(.dark-mode) .hover-sultan:hover { background-color: rgba(128, 0, 0, 0.04) !important; transform: translateX(4px); }
  body.dark-mode .hover-sultan:hover { background-color: rgba(255, 255, 255, 0.05) !important; transform: translateX(4px); }

  /* Adaptif Header Tabel Rekap Per Sekolah */
  body:not(.dark-mode) #seragamdash_tabelRekap thead th { background-color: #800000 !important; color: #ffffff !important; border-bottom: 3px solid #600000 !important; }
  body.dark-mode #seragamdash_tabelRekap thead th { background-color: #2b2e30 !important; color: #f1f3f5 !important; border-bottom: 3px solid #3e444a !important; }
  
  /* Sembunyikan panah sorting DataTables */
  #seragamdash_tabelRekap th.sorting::before,
  #seragamdash_tabelRekap th.sorting::after,
  #seragamdash_tabelRekap th.sorting_asc::before,
  #seragamdash_tabelRekap th.sorting_asc::after,
  #seragamdash_tabelRekap th.sorting_desc::before,
  #seragamdash_tabelRekap th.sorting_desc::after { display: none !important; }
  #seragamdash_tabelRekap th { padding-right: 8px !important; }

  /* Skeleton Screen Shimmer Effect ala Facebook */
  .sultan-skeleton {
    display: inline-block;
    height: 100%;
    width: 100%;
    background: #f0f2f5;
    background-image: linear-gradient(
      90deg,
      rgba(240, 242, 245, 0) 0%,
      rgba(255, 255, 255, 0.65) 20%,
      rgba(240, 242, 245, 0) 60%
    );
    background-size: 200px 100%;
    background-repeat: no-repeat;
    animation: sultan-shimmer 1.3s infinite linear;
    border-radius: 6px;
    opacity: 0.85;
  }
  body.dark-mode .sultan-skeleton {
    background: #2a2d31;
    background-image: linear-gradient(
      90deg,
      rgba(42, 45, 49, 0) 0%,
      rgba(255, 255, 255, 0.08) 25%,
      rgba(42, 45, 49, 0) 60%
    );
  }
  @keyframes sultan-shimmer {
    0% { background-position: -200px 0; }
    100% { background-position: 200px 0; }
  }
</style>

<section class="content">
  <div class="container-fluid">
    <div class="row justify-content-center">
      <div class="col-12">

        <div class="sultan-filter-pill-container shadow-sm mb-4 sultan-page-transition">
          <!-- Filter Tahun -->
          <div class="sultan-filter-item">
            <select id="seragamdash_filterTahun" class="form-control" aria-label="Pilih Tahun">
              <option value="">- Memuat Tahun... -</option>
            </select>
            <i class="fas fa-chevron-down"></i>
          </div>
          <!-- Filter Jenjang -->
          <div class="sultan-filter-item" id="seragamdash_filterJenjangContainer">
            <select id="seragamdash_filterJenjang" class="form-control" aria-label="Pilih Jenjang">
              <option value="SEMUA">Semua Jenjang</option>
              <option value="SD" selected>Sekolah Dasar (SD)</option>
              <option value="PAUD">PAUD / TK</option>
            </select>
            <i class="fas fa-chevron-down"></i>
          </div>
          <!-- Tombol Refresh -->
          <button id="seragamdash_btnRefresh" class="btn btn-sm btn-icon-sultan shadow-sm ml-auto" title="Segarkan Data" style="width:38px; height:38px; border-radius:12px;">
            <i class="fas fa-sync-alt text-maroon"></i>
          </button>
        </div>

        <div id="seragamdash_loadingState"></div>

        <div id="seragamdash_dashboardState">

          <!-- Metric Cards Baris 1 -->
          <div class="row mb-3">
            <div class="col-md-3 col-sm-6 mb-3 mb-md-0">
              <div class="sultan-metric-card metric-info">
                <div class="inner">
                  <h3 id="seragamdash_cardTotalSekolah">0</h3>
                  <p>JUMLAH SASARAN</p>
                </div>
                <div class="icon">
                  <i class="fas fa-school"></i>
                </div>
              </div>
            </div>
            <div class="col-md-3 col-sm-6 mb-3 mb-md-0">
              <div class="sultan-metric-card metric-success">
                <div class="inner">
                  <h3 id="seragamdash_cardSudah">0</h3>
                  <p>SUDAH UNGGAH</p>
                </div>
                <div class="icon">
                  <i class="fas fa-check-circle"></i>
                </div>
              </div>
            </div>
            <div class="col-md-3 col-sm-6 mb-3 mb-md-0">
              <div class="sultan-metric-card metric-danger">
                <div class="inner">
                  <h3 id="seragamdash_cardBelum">0</h3>
                  <p>BELUM UNGGAH</p>
                </div>
                <div class="icon">
                  <i class="fas fa-times-circle"></i>
                </div>
              </div>
            </div>
            <div class="col-md-3 col-sm-6">
              <div class="sultan-metric-card metric-warning">
                <div class="inner">
                  <h3 id="seragamdash_cardPersentase">0%</h3>
                  <p>PERSENTASE PROGRES</p>
                </div>
                <div class="icon">
                  <i class="fas fa-chart-line"></i>
                </div>
              </div>
            </div>
          </div>

          <!-- Progress Bar Global -->
          <div class="card card-sultan shadow-sm mb-4">
            <div class="card-body p-3">
              <div class="d-flex align-items-center justify-content-between mb-2">
                <span class="text-sm font-weight-bold text-muted">PERSENTASE KESELURUHAN SELESAI</span>
                <span id="seragamdash_progressText" class="text-sm font-weight-bold text-maroon">0% Selesai</span>
              </div>
              <div class="progress shadow-inner" style="height: 14px; border-radius: 7px; background-color: rgba(0,0,0,0.05);">
                <div id="seragamdash_progressBar" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%; border-radius: 7px; background-color: #800000;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
              </div>
            </div>
          </div>

          <!-- Tabel Rekap Per Sekolah -->
          <div class="card card-sultan shadow-sm" id="seragamdash_containerTabelSekolah">
            <div class="card-header border-0 d-flex align-items-center" style="background-color: transparent;">
              <h3 class="card-title font-weight-bold text-maroon m-0"><i class="fas fa-table mr-2"></i>Rekapitulasi Laporan Penerimaan Sekolah</h3>
            </div>
            <div class="card-body p-0">
              <div class="table-responsive p-3">
                <table class="table table-striped table-hover table-valign-middle m-0" id="seragamdash_tabelRekap" style="width:100%;">
                  <thead>
                    <tr>
                      <th>NAMA SEKOLAH</th>
                      <th class="text-center">SASARAN PTK/MURID</th>
                      <th class="text-center">STATUS LAPORAN</th>
                      <th class="text-center">TANGGAL UPLOAD</th>
                    </tr>
                  </thead>
                  <tbody id="seragamdash_bodyTabelRekap">
                    <!-- Dinamis render via JS -->
                  </tbody>
                </table>
              </div>
            </div>
          </div>

        </div><!-- /seragamdash_dashboardState -->

      </div>
    </div>
  </div>
</section>

<script>
var SERAGAM_DASH_CACHE_REKAP = [];
var SERAGAM_DASH_SUMMARY = {};
var SERAGAM_DASH_PENDING_REQ = 0;

function seragam_dash_showSkeleton() {
    $('#seragamdash_cardTotalSekolah, #seragamdash_cardSudah, #seragamdash_cardBelum, #seragamdash_cardPersentase')
        .html('<span class="sultan-skeleton" style="width: 50px; height: 22px; display: inline-block; vertical-align: middle;"></span>');
    $('#seragamdash_progressText').html('<span class="sultan-skeleton" style="width: 80px; height: 14px; display: inline-block;"></span>');
    
    if ($.fn.DataTable.isDataTable('#seragamdash_tabelRekap')) {
        $('#seragamdash_tabelRekap').DataTable().destroy();
    }
    var skeletonTbody = '';
    for (var i = 0; i < 5; i++) {
        skeletonTbody += '<tr>' +
            '<td><span class="sultan-skeleton" style="width: 180px; height: 16px; display: inline-block; vertical-align: middle;"></span></td>' +
            '<td class="text-center"><span class="sultan-skeleton" style="width: 30px; height: 16px; display: inline-block; vertical-align: middle;"></span></td>' +
            '<td class="text-center"><span class="sultan-skeleton" style="width: 80px; height: 16px; display: inline-block; vertical-align: middle;"></span></td>' +
            '<td class="text-center"><span class="sultan-skeleton" style="width: 100px; height: 16px; display: inline-block; vertical-align: middle;"></span></td>' +
            '</tr>';
    }
    $('#seragamdash_bodyTabelRekap').html(skeletonTbody);
}

$(document).ready(function() {
    $('#seragamdash_dashboardState').show();
    seragam_dash_showSkeleton();

    $(document).off('click', '#seragamdash_btnRefresh').on('click', '#seragamdash_btnRefresh', function() {
        var thn = $('#seragamdash_filterTahun').val();
        if (thn) seragam_dash_loadData(thn, true);
    });

    $(document).off('change', '#seragamdash_filterTahun').on('change', '#seragamdash_filterTahun', function() {
        var thn = $(this).val();
        if (thn) seragam_dash_loadData(thn);
    });

    $(document).off('change', '#seragamdash_filterJenjang').on('change', '#seragamdash_filterJenjang', function() {
        seragam_dash_terapkanFilterLokal();
    });

    seragam_dash_initYears();
});

function seragam_dash_initYears() {
    SultanUI.showLoading('#seragamdash_loadingState', 'Mengambil daftar tahun pelajaran...');
    google.script.run.withSuccessHandler(function(jsonStr) {
        var res = JSON.parse(jsonStr);
        if (!res.success) {
            $('#seragamdash_loadingState').find('.sultan-loading-text').html('<span class="text-danger"><i class="fas fa-exclamation-triangle mb-2"></i><br>Gagal memuat tahun.</span>');
            return;
        }
        var select = $('#seragamdash_filterTahun');
        select.empty();
        res.data.forEach(function(yr) {
            select.append('<option value="' + yr + '">' + yr + '</option>');
        });
        if (res.data.length > 0) {
            seragam_dash_loadData(res.data[0]);
        }
    }).seragam_getAvailableYears();
}

function seragam_dash_loadData(tahun, forceRefresh) {
    if (SERAGAM_DASH_PENDING_REQ > 0) return;
    SERAGAM_DASH_PENDING_REQ = 1;
    
    var btn = $('#seragamdash_btnRefresh');
    btn.prop('disabled', true).html('<i class="fas fa-spinner fa-spin text-maroon"></i>');
    $('#seragamdash_filterTahun, #seragamdash_filterJenjang').prop('disabled', true);
    
    seragam_dash_showSkeleton();

    google.script.run.withSuccessHandler(function(jsonStr) {
        SERAGAM_DASH_PENDING_REQ = 0;
        btn.prop('disabled', false).html('<i class="fas fa-sync-alt text-maroon"></i>');
        $('#seragamdash_filterTahun, #seragamdash_filterJenjang').prop('disabled', false);

        var res = JSON.parse(jsonStr);
        if (!res.success) {
            $('#seragamdash_loadingState').find('.sultan-loading-text').html('<span class="text-danger"><i class="fas fa-exclamation-triangle mb-2"></i><br>' + res.message + '</span>');
            return;
        }

        SERAGAM_DASH_CACHE_REKAP = res.rekap || [];
        SERAGAM_DASH_SUMMARY = res.summary || {};

        seragam_dash_terapkanFilterLokal();
        SultanUI.hideLoading('#seragamdash_loadingState');

    }).withFailureHandler(function(err) {
        SERAGAM_DASH_PENDING_REQ = 0;
        btn.prop('disabled', false).html('<i class="fas fa-sync-alt text-maroon"></i>');
        $('#seragamdash_filterTahun, #seragamdash_filterJenjang').prop('disabled', false);
        $('#seragamdash_loadingState').find('.sultan-loading-text').html('<span class="text-danger"><i class="fas fa-wifi mb-2"></i><br>Koneksi Terputus.</span>');
    }).seragam_getDashboardData(tahun);
}

function seragam_dash_terapkanFilterLokal() {
    var jenjangFilt = $('#seragamdash_filterJenjang').val() || "SEMUA";
    
    var filteredData = SERAGAM_DASH_CACHE_REKAP.filter(function(r) {
        if (jenjangFilt !== "SEMUA") {
            var jj = String(r.jenjang || "").toUpperCase();
            if (jenjangFilt === "PAUD") {
                return (jj === "TK" || jj === "KB" || jj === "SPS" || jj === "TPA" || jj.includes("PAUD"));
            }
            if (jenjangFilt === "SD") {
                return (jj === "SD" || jj === "SDS");
            }
        }
        return true;
    });

    // Hitung ulang metrik lokal berdasarkan filter jenjang
    var totalSek = filteredData.length;
    var sudah = 0;
    var belum = 0;
    
    filteredData.forEach(function(r) {
        if (r.sudahKirim) sudah++;
        else belum++;
    });
    
    var pct = totalSek > 0 ? Math.round((sudah / totalSek) * 100) : 0;

    // Animasikan Metrik
    seragam_dash_animateValue('seragamdash_cardTotalSekolah', totalSek);
    seragam_dash_animateValue('seragamdash_cardSudah', sudah);
    seragam_dash_animateValue('seragamdash_cardBelum', belum);
    $('#seragamdash_cardPersentase').text(pct + '%');

    // Progress bar global
    var pBar = $('#seragamdash_progressBar');
    pBar.css('width', pct + '%').attr('aria-valuenow', pct);
    $('#seragamdash_progressText').text(pct + '% Selesai');
    if (pct < 30) pBar.css('background-color', '#dc3545'); 
    else if (pct < 75) pBar.css('background-color', '#ffc107'); 
    else pBar.css('background-color', '#28a745');

    // Hancurkan datatabel lama
    if ($.fn.DataTable.isDataTable('#seragamdash_tabelRekap')) {
        $('#seragamdash_tabelRekap').DataTable().destroy();
    }

    // Render body table rekap
    var tbodyHtml = '';
    filteredData.forEach(function(r) {
        var statusBadge = r.sudahKirim 
            ? '<span class="badge font-weight-bold px-2 py-1" style="font-size:11px; background-color:#28a745 !important; color:#ffffff !important;"><i class="fas fa-check-circle mr-1"></i>Sudah Kirim</span>'
            : '<span class="badge font-weight-bold px-2 py-1" style="font-size:11px; background-color:#dc3545 !important; color:#ffffff !important;"><i class="fas fa-exclamation-triangle mr-1"></i>Belum Kirim</span>';
            
        tbodyHtml += '<tr>' +
            '<td><b>' + seragam_dash_esc(r.namaSekolah) + '</b></td>' +
            '<td class="text-center font-weight-bold">' + r.jmlPenerima + '</td>' +
            '<td class="text-center">' + statusBadge + '</td>' +
            '<td class="text-center text-muted">' + seragam_dash_esc(r.tglUpload) + '</td>' +
            '</tr>';
    });

    if (tbodyHtml === '') {
        tbodyHtml = '<tr><td colspan="4" class="text-center text-muted">Tidak ada data untuk filter saat ini.</td></tr>';
    }
    $('#seragamdash_bodyTabelRekap').html(tbodyHtml);

    if (filteredData.length > 0) {
        $('#seragamdash_tabelRekap').DataTable({
            "paging": true,
            "lengthChange": true,
            "searching": true,
            "ordering": true,
            "order": [[2, "asc"]], // Urutkan default berdasarkan Belum Kirim agar admin mudah menindaklanjuti
            "info": true,
            "autoWidth": false,
            "responsive": true,
            "pageLength": 10,
            "language": {
                "search": "Cari:",
                "lengthMenu": "Tampilkan _MENU_ data",
                "info": "Menampilkan _START_ sampai _END_ dari _TOTAL_ sekolah",
                "infoEmpty": "Tidak ada data sekolah",
                "paginate": {
                    "first": "Pertama",
                    "last": "Terakhir",
                    "next": "Lanjut",
                    "previous": "Kembali"
                }
            }
        });
    }
}

function seragam_dash_animateValue(id, end) {
    var obj = document.getElementById(id);
    if (!obj) return;
    var start = 0;
    var duration = 400;
    var range = end - start;
    var minTimer = 25;
    var stepTime = Math.abs(Math.floor(duration / range));
    stepTime = Math.max(stepTime, minTimer);
    var startTime = new Date().getTime();
    var endTime = startTime + duration;
    var timer;
    
    function run() {
        var now = new Date().getTime();
        var remaining = Math.max((endTime - now) / duration, 0);
        var value = Math.round(end - (remaining * range));
        obj.innerHTML = value;
        if (value == end) {
            clearInterval(timer);
        }
    }
    timer = setInterval(run, stepTime);
    run();
}

function seragam_dash_esc(t) { return t ? String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;') : ''; }
</script>

<script>
    /* =================================================================
       ISOLASI VARIABEL GLOBAL & PENGAMAN SINTAKSIS (ES5 BULLETPROOF)
       ================================================================= */
    // ISOLASI STATE KE WINDOW (Tetap bertahan saat re-injeksi)
    window.DASHSK_CHART_INSTANCE = window.DASHSK_CHART_INSTANCE || null;
    window.DASHSK_LIST_BELUM_CACHE = window.DASHSK_LIST_BELUM_CACHE || [];
    window.DASHSK_IS_FETCHING = window.DASHSK_IS_FETCHING || false;
    window.DASHSK_LAST_FETCH_TIME = window.DASHSK_LAST_FETCH_TIME || 0;
    window.DASHSK_CACHE_DATA = window.DASHSK_CACHE_DATA || null;
    window.DASHSK_LAST_INIT = window.DASHSK_LAST_INIT || 0;

    var DASHSK_USER_IS_ADMIN = false;
    var DASHSK_IS_INIT = true; 

    $(document).ready(function () {
        // PENGAMAN STARTUP: Cegah pemanggilan data ganda jika ready terpicu berkali-kali dalam < 1 detik
        var now = new Date().getTime();
        var isRecentInit = (window.DASHSK_LAST_INIT && (now - window.DASHSK_LAST_INIT < 1000));
        window.DASHSK_LAST_INIT = now;

        console.log("SIKS-LOG: Inisialisasi UI Dashboard SK...");

        // Render filter bar secara dinamis (VAKSINASI COMPLIANCE)
        var filtersConfig = [
            { id: 'dashsk_filterTahun', placeholder: '- Memuat TA... -', disabled: true },
            { id: 'dashsk_filterSemester', placeholder: '- Memuat Semester... -', disabled: true }
        ];
        var extraButtons = `
            <div class="divider-vertical d-none d-md-block mx-3" style="width: 2px; height: 26px; background-color: currentColor; opacity: 0.2; border-radius: 10px;"></div>
            <button type="button" id="dashsk_btnRefresh" class="sultan-btn-refresh" title="Refresh Data" disabled>
                <i class="fas fa-sync-alt"></i>
            </button>
            <div class="ml-auto d-none d-md-block"></div>
        `;
        $('#dashsk_filterBarArea').html(SultanUI.renderFilterBar(filtersConfig, extraButtons));

        try {
            var user = typeof getSesiUser === 'function' ? getSesiUser() : {};
            DASHSK_USER_IS_ADMIN = (user.role || "").toLowerCase().indexOf("admin") !== -1;
        } catch (e) { DASHSK_USER_IS_ADMIN = false; }

        // LANGKAH 1: Selalu isi filter (karena DOM mungkin baru)
        dashsk_initFilterDefault();
        
        // LANGKAH 2: Manajemen Load Data (Smart Cache & Session-Aware)
        if (window.DASHSK_IS_FETCHING) {
            console.log("SIKS-LOG: Request berjalan, memasang spinner...");
            dashsk_applyLoadingUI(); 
        } else if (window.DASHSK_CACHE_DATA && isRecentInit) {
            console.log("SIKS-LOG: Menggunakan data cache (Mencegah Flash 0).");
            dashsk_renderDashboard(window.DASHSK_CACHE_DATA);
        } else {
            dashsk_loadDataDashboard();
        }

        // LANGKAH 3: Pasang event listener lainnya (non-filter)
        $(document).off('click', '#dashsk_btnRefresh').on('click', '#dashsk_btnRefresh', function (e) {
            e.preventDefault();
            dashsk_loadDataDashboard();
        });

        $(document).off('keyup', '#dashsk_inputCariSudah').on('keyup', '#dashsk_inputCariSudah', dashsk_filterSudah);
        $(document).off('keyup', '#dashsk_inputCariBelum').on('keyup', '#dashsk_inputCariBelum', dashsk_filterBelum);
        $(document).off('keyup', '#dashsk_inputCariBelumModal').on('keyup', '#dashsk_inputCariBelumModal', dashsk_filterBelumModal);
        $(document).off('click', '#dashsk_btnSalinDaftar, #dashsk_btnSalinDaftarModal').on('click', '#dashsk_btnSalinDaftar, #dashsk_btnSalinDaftarModal', dashsk_copyListBelum);
        $(document).off('click', '#dashsk_btnModalBelum').on('click', '#dashsk_btnModalBelum', function() {
            dashsk_showModalBelum();
        });

        // No charts to refresh on dark mode toggle anymore
        $(document).off('change.dashskTheme', '#sultan_darkModeToggle');
    });

    // Fungsi Global untuk memasang listener filter (dipanggil setelah load pertama sukses)
    function dashsk_attachFilterListeners() {
        var loadTimeout;
        $(document).off('change', '#dashsk_filterTahun, #dashsk_filterSemester').on('change', '#dashsk_filterTahun, #dashsk_filterSemester', function() {
            clearTimeout(loadTimeout);
            loadTimeout = setTimeout(function () {
                dashsk_loadDataDashboard();
            }, 200);
        });
    }

    function dashsk_initFilterDefault() {
        var now = new Date();
        var curMonth = now.getMonth();
        var curYear = now.getFullYear();

        var htmlTahun = '';
        for (var y = 2021; y <= curYear + 1; y++) {
            var ta = y + "/" + (y + 1);
            htmlTahun += '<option value="' + ta + '">' + ta + '</option>';
        }
        $('#dashsk_filterTahun').html(htmlTahun).prop('disabled', false);

        var htmlSmt = `
            <option value="">Semua Semester</option>
            <option value="Semester 1">Semester 1</option>
            <option value="Semester 2">Semester 2</option>
        `;
        $('#dashsk_filterSemester').html(htmlSmt).prop('disabled', false);

        var defSemester = (curMonth >= 6) ? "Semester 1" : "Semester 2";
        var defTahun = (curMonth >= 6) ? curYear + "/" + (curYear + 1) : (curYear - 1) + "/" + curYear;

        $('#dashsk_filterSemester').val(defSemester);
        if ($('#dashsk_filterTahun option[value="' + defTahun + '"]').length > 0) {
            $('#dashsk_filterTahun').val(defTahun);
        }
    }

    /* =================================================================
       FETCH DATA SERVER DENGAN PENGAMAN DOUBLE LOAD
       ================================================================= */
    function dashsk_loadDataDashboard() {
        if (window.DASHSK_IS_FETCHING) return;

        var currentTime = new Date().getTime();
        if (currentTime - window.DASHSK_LAST_FETCH_TIME < 2000) {
            console.log("SIKS-LOG: Blokir Double Load (Jeda < 2s).");
            return;
        }
        window.DASHSK_LAST_FETCH_TIME = currentTime;

        console.log("SIKS-LOG: Menjalankan request server...");
        window.DASHSK_IS_FETCHING = true;
        
        dashsk_applyLoadingUI();

        var th = $('#dashsk_filterTahun').val();
        var sm = $('#dashsk_filterSemester').val();

        google.script.run
            .withSuccessHandler(function (data) {
                window.DASHSK_CACHE_DATA = data; // Simpan ke cache global
                window.DASHSK_IS_FETCHING = false;
                dashsk_removeLoadingUI();

                // Pastikan teks tengah donut terupdate di sini juga sebagai pengaman
                if (data.totalMasuk !== undefined) {
                    $('#dashsk_chartTotalCenter').text(data.totalMasuk);
                }

                dashsk_renderDashboard(data);
                
                // LANGKAH TERAKHIR: Pasang listener filter hanya setelah sukses pertama kali
                dashsk_attachFilterListeners();
            })
            .withFailureHandler(function (err) {
                window.DASHSK_IS_FETCHING = false;
                dashsk_removeLoadingUI();
                Sultan.alert('error', 'Koneksi Terputus', err.message);
            })
            .getDashboardSK(th, sm);
    }

    // Fungsi Baru: Pasang UI Loading ke DOM
    // Fungsi Baru: Pasang UI Loading ke DOM
    function dashsk_applyLoadingUI() {
        if (typeof SultanUI !== 'undefined') {
            var selLottery = '#dashsk_cardTotalSekolah, #dashsk_cardSudahUnggah, #dashsk_cardBelumUnggah, #dashsk_cardProgress, ' +
                             '#dashsk_cardTotalDokumen, #dashsk_cardDiproses, #dashsk_cardDisetujui, #dashsk_cardRevisi, #dashsk_cardDitolak';
            SultanUI.startLottery(selLottery, 3);
        }

        // List Container Spinner
        var listLoading = `<li class="list-group-item text-center text-muted py-4"><i class="fas fa-spinner fa-spin mr-2"></i> Memuat daftar...</li>`;
        $('#dashsk_listSudah').html(listLoading);
        $('#dashsk_listBelumBody').html(listLoading);

        $('.card-sultan').css('opacity', '0.85');
        $('#dashsk_btnRefresh').prop('disabled', true).html('<i class="fas fa-spinner fa-spin"></i>');
    }

    // Fungsi Baru: Bersihkan UI Loading dari DOM
    function dashsk_removeLoadingUI() {
        DASHSK_IS_INIT = false;
        $('.card-sultan').css('opacity', '1');
        $('#dashsk_btnRefresh').prop('disabled', false).html('<i class="fas fa-sync-alt"></i>');
    }

    function dashsk_renderDashboard(data) {
        if (data.error) { Sultan.notif.gagal(data.error); return; }

        var totalSekolah = data.totalSekolah || 0;
        var belumLaporCount = data.belumLaporCount || 0;
        var sudahUnggah = totalSekolah - belumLaporCount;
        if (sudahUnggah < 0) sudahUnggah = 0;

        // Animate Statistik Utama (Row 1)
        dashsk_animateValue("dashsk_cardTotalSekolah", totalSekolah);
        dashsk_animateValue("dashsk_cardSudahUnggah", sudahUnggah);
        dashsk_animateValue("dashsk_cardBelumUnggah", belumLaporCount);
        dashsk_animateValue("dashsk_cardProgress", data.progress, "%");

        // Animate Status Cards (Row 2)
        dashsk_animateValue("dashsk_cardTotalDokumen", data.totalMasuk || 0);
        dashsk_animateValue("dashsk_cardDiproses", data.proses || data.diproses || 0);
        dashsk_animateValue("dashsk_cardDisetujui", data.disetujui || 0);
        dashsk_animateValue("dashsk_cardRevisi", data.revisi || 0);
        dashsk_animateValue("dashsk_cardDitolak", data.ditolak || 0);

        // Update Progress Bar (Row 3)
        $('#dashsk_progressBar').css('width', data.progress + '%');
        $('#dashsk_progressText').text(data.progress + '% Selesai');

        // Update lists (Row 4)
        DASHSK_LIST_BELUM_CACHE = data.belumLaporList || [];
        $('#dashsk_badgeBelum').text(DASHSK_LIST_BELUM_CACHE.length);
        dashsk_renderBelumList(DASHSK_LIST_BELUM_CACHE);

        var sudahList = data.sudahLaporList || [];
        $('#dashsk_badgeSudah').text(sudahList.length);
        dashsk_renderSudahList(sudahList);
    }

    function dashsk_renderBelumList(list) {
        var elBody = $('#dashsk_listBelumBody');
        var elModal = $('#dashsk_listBelumBodyModal');
        elBody.empty(); elModal.empty();

        if (list.length === 0) {
            var msgHtml = '<li class="list-group-item bg-transparent text-center text-success py-5 font-weight-bold"><i class="fas fa-check-circle fa-2x mb-2"></i><br>Nihil! Semua Sudah Lapor.</li>';
            elBody.html(msgHtml);
            var trHtml = '<tr><td class="text-center p-5 text-success font-weight-bold bg-adaptive-sultan"><i class="fas fa-check-circle fa-3x mb-2"></i><br>Nihil! Semua Sudah Lapor.</td></tr>';
            elModal.html(trHtml);
            return;
        }

        var html = "";
        list.forEach(function (nama, i) {
            html += `
                <li class="list-group-item bg-transparent px-3 py-3 border-0 border-bottom animated fadeIn" style="animation-delay: ${i * 15}ms">
                    <div class="d-flex align-items-center">
                        <div class="bg-soft-maroon text-maroon rounded-circle mr-3 d-flex align-items-center justify-content-center shadow-sm" style="width: 32px; height: 32px; min-width: 32px; background: rgba(128,0,0,0.05);">
                            <span class="font-weight-bold" style="font-size: 0.75rem;">${i + 1}</span>
                        </div>
                        <div class="w-100 overflow-hidden">
                            <h6 class="mb-0 font-weight-bold text-adaptive-sultan text-truncate" style="font-size: 0.9rem;" title="${nama}">${nama}</h6>
                            <small class="text-danger font-weight-bold" style="font-size: 0.7rem; letter-spacing: 0.5px;">
                                <i class="fas fa-clock mr-1"></i> BELUM UNGGAH
                            </small>
                        </div>
                    </div>
                </li>`;
        });
        elBody.html(html);

        var modalHtml = "";
        list.forEach(function (nama, i) {
            modalHtml += `<tr class="animated fadeIn border-bottom bg-transparent" style="border-bottom: 1px solid var(--dm-border) !important;">
                <td class="px-4 py-2 align-middle text-center" style="width: 70px; min-width: 70px;">
                    <div class="d-inline-flex align-items-center justify-content-center bg-adaptive-sultan border rounded-circle font-weight-bold text-muted shadow-xs" style="width:28px; height:28px; font-size: 11px;">${i + 1}</div>
                </td>
                <td class="py-2 align-middle pr-4">
                    <h6 class="text-adaptive-sultan font-weight-bold mb-0" style="font-size: 0.85rem; line-height: 1.2;">${nama}</h6>
                </td>
            </tr>`;
        });
        elModal.html(modalHtml);
    }

    function dashsk_renderSudahList(list) {
        var elBody = $('#dashsk_listSudah');
        elBody.empty();

        if (list.length === 0) {
            var msgHtml = '<li class="list-group-item bg-transparent text-center text-muted py-5">Belum ada sekolah yang mengunggah berkas.</li>';
            elBody.html(msgHtml);
            return;
        }

        var html = "";
        list.forEach(function (nama, i) {
            html += `
                <li class="list-group-item bg-transparent px-3 py-3 border-0 border-bottom animated fadeIn" style="animation-delay: ${i * 15}ms">
                    <div class="d-flex align-items-center">
                        <div class="bg-soft-success text-success rounded-circle mr-3 d-flex align-items-center justify-content-center shadow-sm" style="width: 32px; height: 32px; min-width: 32px; background: rgba(40,167,69,0.05);">
                            <span class="font-weight-bold" style="font-size: 0.75rem;">${i + 1}</span>
                        </div>
                        <div class="w-100 overflow-hidden">
                            <h6 class="mb-0 font-weight-bold text-adaptive-sultan text-truncate" style="font-size: 0.9rem;" title="${nama}">${nama}</h6>
                            <small class="text-success font-weight-bold" style="font-size: 0.7rem; letter-spacing: 0.5px;">
                                <i class="fas fa-check-circle mr-1"></i> SUDAH UNGGAH
                            </small>
                        </div>
                    </div>
                </li>`;
        });
        elBody.html(html);
    }

    function dashsk_filterSudah() {
        var val = $('#dashsk_inputCariSudah').val().toLowerCase();
        $("#dashsk_listSudah .list-group-item").filter(function () {
            $(this).toggle($(this).text().toLowerCase().indexOf(val) > -1);
        });
    }

        var val = $('#dashsk_inputCariBelum').val().toLowerCase();
        $("#dashsk_listBelumBody .list-group-item").filter(function () {
            $(this).toggle($(this).text().toLowerCase().indexOf(val) > -1);
        });
    }

    function dashsk_filterBelumLangsung() {
        var val = $('#dashsk_cariBelumLangsung').val().toLowerCase();
        $("#dashsk_listBelumBody .list-group-item").filter(function () {

    function dashsk_filterBelumModal() {
        var val = $('#dashsk_inputCariBelumModal').val().toLowerCase();
        $("#dashsk_listBelumBodyModal tr").filter(function () {

    function dashsk_showModalBelum() {
        var th = $('#dashsk_filterTahun').val() || "Semua Tahun";
        var sm = $('#dashsk_filterSemester').val() || "Semua Semester";
        $('#dashsk_lblPeriodeBelum').text(sm + " - TA " + th);
        $('#dashsk_inputCariBelumModal').val("");
        dashsk_filterBelumModal();
        $('#dashsk_modalBelumLapor').modal('show');
    }

    function dashsk_renderTimeline(list) {
        var el = $('#dashsk_timelineContainer');
        el.empty();

        if (!list || list.length === 0) {
            el.html('<div class="text-center p-5 text-muted small"><i class="fas fa-inbox fa-3x mb-2 opacity-30"></i><br>Belum ada aktivitas.</div>');
            return;
        }

        list.forEach(function (item, idx) {
            var icon = 'check-circle'; var color = 'success';
            var s = String(item.status).toLowerCase();

            if (s.indexOf('revisi') !== -1) { icon = 'sync-alt'; color = 'info'; }
            if (s.indexOf('tolak') !== -1) { icon = 'times-circle'; color = 'danger'; }
            if (s.indexOf('proses') !== -1) { icon = 'clock'; color = 'warning'; }

            var statusClass = 'badge-sultan-' + s.replace(' ', '-');
            if (s.indexOf('revisi') !== -1) statusClass = 'badge-sultan-revisi';
            if (s.indexOf('tolak') !== -1) statusClass = 'badge-sultan-ditolak';
            if (s.indexOf('proses') !== -1) statusClass = 'badge-sultan-diproses';
            if (s.indexOf('setuju') !== -1 || s.indexOf('aman') !== -1) statusClass = 'badge-sultan-disetujui';

            var statusProper = String(item.status).charAt(0).toUpperCase() + String(item.status).slice(1).toLowerCase();

            var html = '<div class="list-group-item px-3 py-3 border-0 border-bottom bg-transparent animated fadeIn" style="animation-delay: ' + (idx * 50) + 'ms">' +
                '<div class="d-flex flex-wrap align-items-center w-100">' +
                '<!-- Bagian 1: Nama Sekolah (Aligned Column) -->' +
                '<div class="mb-1 mb-md-0" style="flex: 0 0 55%; max-width: 55%; min-width: 150px;">' +
                '<h6 class="mb-0 font-weight-bold text-adaptive-sultan text-truncate" style="font-size: 0.85rem; line-height: 1.4;" title="' + (item.sekolah || item.nama_sekolah) + '">' + (item.sekolah || item.nama_sekolah) + '</h6>' +
                '</div>' +
                '<!-- Bagian 2: Status (Aligned Column) -->' +
                '<div class="mb-1 mb-md-0" style="flex: 0 0 20%; min-width: 100px;">' +
                '<span class="' + statusClass + '" style="font-size: 0.75rem; text-transform: none !important; font-weight: 700; white-space: nowrap;">' +
                '<i class="fas fa-' + icon + ' mr-1"></i> ' + statusProper + '</span>' +
                '</div>' +
                '<!-- Bagian 3: Waktu (Mendorong ke kanan) -->' +
                '<div class="ml-auto text-right" style="flex: 0 0 20%; min-width: 110px;">' +
                '<small class="text-muted" style="font-size: 0.7rem; white-space: nowrap;"><i class="far fa-clock mr-1"></i>' + (item.waktu || item.tanggal) + '</small>' +
                '</div>' +
                '</div>' +
                '</div>';
            el.append(html);
        });
    }

    function dashsk_renderChart(data) {
        if (typeof Chart === 'undefined') return;

        var ctx = document.getElementById('dashsk_chartStatus').getContext('2d');
        if (window.DASHSK_CHART_INSTANCE) window.DASHSK_CHART_INSTANCE.destroy();

        var isDM = $('body').hasClass('dark-mode');
        var totalData = data.disetujui + data.diproses + data.revisi + data.ditolak;
        var emptyColor = isDM ? '#343a40' : '#e9ecef';
        var finalData = totalData === 0 ? [0.1, 0, 0, 0] : [data.disetujui, data.diproses, data.revisi, data.ditolak];
        var finalColors = totalData === 0 ? [emptyColor, '#ffc107', '#17a2b8', '#dc3545'] : ['#28a745', '#ffc107', '#17a2b8', '#dc3545'];

        window.DASHSK_CHART_INSTANCE = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Disetujui', 'Diproses', 'Revisi', 'Ditolak'],
                datasets: [{
                    data: finalData,
                    backgroundColor: finalColors,
                    borderWidth: 0,
                    hoverOffset: 8
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                cutout: '70%',
                plugins: {
                    legend: { display: false },
                    tooltip: { enabled: (totalData > 0) }
                },
                animation: { animateScale: true, animateRotate: true }
            }
        });
    }

    function dashsk_copyListBelum() {
        if (DASHSK_LIST_BELUM_CACHE.length === 0) { Sultan.notif.info("Tidak ada data untuk disalin."); return; }

        var th = $('#dashsk_filterTahun').val() || "-";
        var sm = $('#dashsk_filterSemester').val() || "-";
        var txt = "*DAFTAR SEKOLAH BELUM KIRIM SK PEMBAGIAN TUGAS*\nPeriode: " + th + " (" + sm + ")\nKriteria: AWAL SEMESTER\n\n";

        DASHSK_LIST_BELUM_CACHE.forEach(function (nama, i) {
            txt += (i + 1) + ". " + nama + "\n";
        });

        txt += "\n_Mohon segera mengunggah melalui SIKS-Reborn._";

        navigator.clipboard.writeText(txt).then(function () {
            Sultan.notif.sukses('Daftar berhasil disalin!');
        });
    }

    function dashsk_animateValue(id, endValue, suffix = "") {
        if (typeof SultanUI !== 'undefined') {
            SultanUI.stopLottery('#' + id);
        }
        var obj = document.getElementById(id);
        if (!obj) return;
        var start = 0; var end = parseInt(endValue);
        if (isNaN(end)) end = 0;

        if (end === 0) { obj.innerHTML = "0" + (suffix ? `<small class="ml-1">${suffix}</small>` : ''); return; }

        var duration = 1200;
        var startTime = null;

        function step(timestamp) {
            if (!startTime) startTime = timestamp;
            var progress = Math.min((timestamp - startTime) / duration, 1);
            var curVal = Math.floor(progress * (end - start) + start);
            obj.innerHTML = curVal + (suffix ? `<small class="ml-1">${suffix}</small>` : '');
            if (progress < 1) {
                window.requestAnimationFrame(step);
            }
        }
        window.requestAnimationFrame(step);
    }
</script>

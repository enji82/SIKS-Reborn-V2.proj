<div class="content-header pb-0">
  <div class="container-fluid">
    <div class="row">
      <div class="col-sm-12">
        <div class="sultan-page-header">
          <h5 class="m-0 font-weight-bold text-uppercase">
          <i class="fas fa-paper-plane text-maroon mr-2"></i>Unggah Surat Perjalanan Dinas (SPT)
        </h5>
        <hr class="style-sultan-solid">
        </div>
      </div>
    </div>
  </div>
</div>

<section class="content">
  <div class="container-fluid">
    <div class="row">
      <div class="col-12">

        <div id="skeleton-loader" class="card-sultan p-4">
          <div class="sultan-form-scroll-wrapper">
            <div class="form-grid">
              <div class="form-group"><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-input"></div></div>
              <div class="form-group"><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-input"></div></div>
            </div>
            <div class="form-footer"><div class="skeleton skeleton-button" style="width: 150px;"></div></div>
          </div>
        </div>

        <form id="dinasUnggahForm" style="display: none;" class="card-sultan">
          <div id="dinas-scroll-wrapper" class="sultan-form-scroll-wrapper" class="card-body">
            <h6 class="text-maroon font-weight-bold text-uppercase mb-3 border-bottom pb-2">
              <i class="fas fa-file-alt mr-2"></i>Data SPT
            </h6>
        
              <label class="small font-weight-bold text-muted text-uppercase mb-1">Jenis PD</label>
              <select id="jenisPD" name="jenisPD" class="form-control form-control-sultan border-maroon" required>
                <option value="" disabled selected>-- Pilih --</option>
                <option value="DD">Dinas Dalam (DD)</option>
                <option value="DL">Dinas Luar (DL)</option>
              </select>
            </div>
          </div>
          <div class="col-md-8">
            <div class="form-group">
              <label class="small font-weight-bold text-muted text-uppercase mb-1">Nomor SPT</label>
              <input type="text" id="nomorSPT" name="nomorSPT" class="form-control form-control-sultan" placeholder="Masukkan nomor SPT..." required>
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-md-4">
            <div class="form-group">
              <label class="small font-weight-bold text-muted text-uppercase mb-1">Tanggal SPT</label>
              <input type="date" id="tanggalSPT" name="tanggalSPT" class="form-control form-control-sultan" required>
            </div>
          </div>
          <div class="col-md-4">
            <div class="form-group">
              <label class="small font-weight-bold text-muted text-uppercase mb-1">Tanggal Mulai</label>
              <input type="date" id="tanggalMulai" name="tanggalMulai" class="form-control form-control-sultan" required>
            </div>
          </div>
          <div class="col-md-4">
            <div class="form-group">
              <label class="small font-weight-bold text-muted text-uppercase mb-1">Tanggal Selesai</label>
              <input type="date" id="tanggalSelesai" name="tanggalSelesai" class="form-control form-control-sultan" required>
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-12">
            <div class="form-group">
              <label class="small font-weight-bold text-muted text-uppercase mb-1">Lokasi Tujuan</label>
              <input type="text" id="lokasi" name="lokasi" class="form-control form-control-sultan" placeholder="Contoh: Gedung Sate, Bandung" required>
            </div>
          </div>
        </div>
        
        <div class="row">
          <div class="col-12">
            <div class="form-group">
              <label class="small font-weight-bold text-muted text-uppercase mb-1">Kegiatan</label>
              <input type="text" id="kegiatan" name="kegiatan" class="form-control form-control-sultan" placeholder="Masukkan nama kegiatan..." required>
            </div>
          </div>
        </div>

        <h6 class="text-maroon font-weight-bold text-uppercase mb-3 border-bottom pb-2 mt-4">
          <i class="fas fa-users mr-2"></i>Pelaksana Tugas
        </h6>

        <div class="row">
            <div class="col-md-8">
                <div class="form-group">
                  <label class="small font-weight-bold text-muted text-uppercase mb-1">Unit Kerja</label>
                  <select id="unitKerjaDinas" name="unitKerja" class="form-control form-control-sultan" required>
                    <option value="" disabled selected>-- Memuat... --</option>
                  </select>
                </div>
            </div>
            <div class="col-md-4">
                <div class="form-group">
                  <label class="small font-weight-bold text-muted text-uppercase mb-1">Peserta (Orang)</label>
                  <select id="jumlahPeserta" name="peserta" class="form-control form-control-sultan border-maroon" required disabled>
                    </select>
                </div>
            </div>
        </div>

        <div id="peserta-wrapper"></div>

        <h6 class="text-maroon font-weight-bold text-uppercase mb-3 border-bottom pb-2 mt-4">
          <i class="fas fa-file-pdf mr-2"></i>Dokumen Lampiran
        </h6>
        
        <div class="row">
          <div class="col-md-6">
            <div class="form-group">
              <label class="small font-weight-bold text-muted text-uppercase mb-1">Unggah File SPT (PDF, Maks. 200 KB)</label>
              <div class="custom-file">
                <input type="file" id="fileSPT" name="fileData" class="custom-file-input" accept=".pdf" required>
                <label class="custom-file-label border-maroon" for="fileSPT">Pilih File...</label>
              </div>
            </div>
          </div>
          <div class="col-md-6">
            <div class="form-group">
              <label class="small font-weight-bold text-muted text-uppercase mb-1">Jenis Dokumen</label>
              <select id="jenisDokumen" name="jenisDokumen" class="form-control form-control-sultan" required>
                <option value="" disabled selected>-- Pilih Jenis --</option>
                <option value="Sementara">Sementara</option>
                <option value="Final">Final</option>
              </select>
            </div>
          </div>
        </div>

        <div class="alert alert-info py-2 shadow-sm border-0 mb-4 mt-2">
          <small class="font-weight-bold"><i class="fas fa-info-circle mr-1"></i> Pastikan dokumen yang diunggah terbaca dengan jelas.</small>
        </div>

        <div class="text-right border-top pt-4">
          <button type="submit" class="btn btn-maroon rounded-pill px-5 py-2 font-weight-bold shadow-sm text-uppercase" id="submitBtnDinas">
            <i class="fas fa-paper-plane mr-2"></i>Kirim Usulan SPT
          </button>
        </div>

    </div>
  </form>
</div>
</div>
</section>
</main>

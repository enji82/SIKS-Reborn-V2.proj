        <tr><td class="font-weight-bold text-muted">Kategori</td><td class="font-weight-bold text-primary" id="admptk_kelola_p_kategori">-</td></tr>
        <tr><td class="font-weight-bold text-muted">Catatan Admin</td><td class="font-weight-bold text-danger bg-white p-2 rounded border border-danger" id="admptk_kelola_p_catatan">-</td></tr>

      <button type="button" id="admptk_kelola_btnSimpanPerbaiki" class="modal-btn-perbarui"><i class="fas fa-edit mr-2"></i>PERBARUI</button>

  <!-- Form Verifikasi -->
  <form id="admptk_kelola_formVerif" class="d-flex flex-column flex-grow-1 overflow-hidden m-0 p-0" novalidate>
    <div class="px-4 pb-4 flex-grow-1 overflow-auto" style="padding-top: 15px !important;">
      <input type="hidden" id="admptk_kelola_v_rowid">
      <h6 class="modal-verifikasi-section-title"><i class="fas fa-list-alt mr-2"></i> Detail Dokumen</h6>
      <div class="sultan-detail-container mb-4">
        <div class="sultan-detail-item"><label class="sultan-detail-label">NAMA PTK</label><div class="sultan-detail-value text-uppercase" id="admptk_kelola_v_nama">-</div></div>
        <div class="sultan-detail-item"><label class="sultan-detail-label">NIP</label><div class="sultan-detail-value font-weight-bold" id="admptk_kelola_v_nip">-</div></div>
        <div class="sultan-detail-item"><label class="sultan-detail-label">KATEGORI</label><div class="sultan-detail-value text-maroon" id="admptk_kelola_v_kategori">-</div></div>
        <div class="sultan-detail-item"><label class="sultan-detail-label">TAHUN</label><div class="sultan-detail-value font-weight-bold" id="admptk_kelola_v_tahun">-</div></div>
        <div class="sultan-detail-item" id="admptk_kelola_v_periode_wrapper"><label class="sultan-detail-label">PERIODE</label><div class="sultan-detail-value font-weight-bold text-primary" id="admptk_kelola_v_periode">-</div></div>
      </div>
      <h6 class="modal-verifikasi-section-title"><i class="fas fa-check-circle mr-2"></i> Verifikasi</h6>

        <select class="modal-verifikasi-select font-weight-bold" id="admptk_kelola_v_status" required>
          <option value="">-- Pilih Keputusan --</option>
          <option value="Disetujui">Disetujui</option>
          <option value="Revisi">Revisi</option>
          <option value="Ditolak">Ditolak</option>
        </select>
      </div>
      <div class="form-group mb-0">
        <label class="modal-verifikasi-form-label">Catatan Admin <span id="admptk_kelola_reqCatatan" class="text-danger" style="display:none;">*</span></label>
        <textarea class="modal-verifikasi-textarea" id="admptk_kelola_v_catatan" rows="3" placeholder="Wajib diisi jika ditolak / direvisi..."></textarea>

      <button type="submit" id="admptk_kelola_btnVerifikasi" class="modal-verifikasi-btn-verifikasi" form="admptk_kelola_formVerif"><i class="fas fa-check-double mr-2"></i>VERIFIKASI</button>
    </div>

</div><!-- /templates -->

<script>
var ADMPTK_KELOLA_CACHE_DATA = [], ADMPTK_KELOLA_MASTER_PTK = [], ADMPTK_KELOLA_MASTER_KAT = [], ADMPTK_KELOLA_TABEL_INSTANCE = null;
var ADMPTK_KELOLA_USER_AKTIF = "", ADMPTK_KELOLA_IS_ADMIN = false, ADMPTK_KELOLA_NPSN_TERKUNCI = "", ADMPTK_KELOLA_SELECTED_PTK_FILES = [];
window.ADMPTK_KELOLA_MASTER_SEK = [];

$(document).ready(function() {
    $('#admptk_kelola_tableState').hide(); SultanUI.showLoading('#admptk_kelola_loadingState');
    try {
        var user = typeof getSesiUser === 'function' ? getSesiUser() : {};
        ADMPTK_KELOLA_USER_AKTIF = user.nama_lengkap || user.username || "User Web";
        
        // Memakai checkUserRoleIsAdmin() global secara ketat
        ADMPTK_KELOLA_IS_ADMIN = (typeof checkUserRoleIsAdmin === 'function' && checkUserRoleIsAdmin());
        
        // NPSN terkunci: jika admin biarkan kosong agar bisa melihat semua sekolah, jika user sekolah ambil dari user.username (NPSN) / user.unit
        ADMPTK_KELOLA_NPSN_TERKUNCI = ADMPTK_KELOLA_IS_ADMIN ? "" : (user.npsn || user.username || user.unit || "");
    } catch(e) { ADMPTK_KELOLA_NPSN_TERKUNCI = ""; ADMPTK_KELOLA_IS_ADMIN = false; }

    $(document).off('click', '#admptk_kelola_btnRefresh').on('click', '#admptk_kelola_btnRefresh', admptk_kelola_tarikDataServer);
    $(document).off('click', '#admptk_kelola_btnTambah').on('click', '#admptk_kelola_btnTambah', admptk_kelola_bukaModalTambah);
    $(document).off('change', '#admptk_kelola_filterStatus, #admptk_kelola_filterKategori').on('change', '#admptk_kelola_filterStatus, #admptk_kelola_filterKategori', admptk_kelola_terapkanFilterLokal);
    if (ADMPTK_KELOLA_IS_ADMIN) $(document).off('change', '#admptk_kelola_filterSekolah').on('change', '#admptk_kelola_filterSekolah', admptk_kelola_terapkanFilterLokal);
    $(document).off('click', '.admptk_kelola-btn-catatan').on('click', '.admptk_kelola-btn-catatan', function() { var pesan = $(this).attr('data-pesan'); if (pesan) Sultan.alert('info','Catatan Admin','<div class="alert alert-warning text-dark"><i class="fas fa-exclamation-circle mr-2"></i>' + admptk_kelola_esc(pesan) + '</div>'); });

    // Pilih Jenjang → Isi dropdown PTK
    $(document).off('change', '#admptk_kelola_in_jenjang').on('change', '#admptk_kelola_in_jenjang', function() {
        var jenjang = $(this).val(); var $ptk = $('#admptk_kelola_in_ptk');
        $ptk.empty().append('<option value="">- Pilih PTK -</option>');
        if (jenjang) {
            var filtered = ADMPTK_KELOLA_MASTER_PTK.filter(function(p) {
                var jj = String(p.jenjang || "").toUpperCase();
                if (jenjang === "PAUD") return jj === "TK" || jj === "KB" || jj === "SPS" || jj === "TPA" || jj.includes("PAUD");
                if (jenjang === "SD") return jj === "SD" || jj.includes("SD");
                return jj === jenjang;
            });
            filtered.forEach(function(p) { $ptk.append($('<option>', { value: p.id, text: p.nama + (p.nip ? ' (' + p.nip + ')' : ''), 'data-nip': p.nip, 'data-npsn': p.npsn, 'data-folderkey': p.folderKey })); });
            $ptk.prop('disabled', false);
        } else { $ptk.prop('disabled', true); }
        $('#admptk_kelola_uploadContainer').html('<div class="text-center text-muted p-3" id="admptk_kelola_msgPilihPtk"><i class="fas fa-info-circle mr-1"></i> Pilih PTK terlebih dahulu.</div>');
        $('#admptk_kelola_btnAddRow, #admptk_kelola_btnSimpan').prop('disabled', true);
    });

    $(document).off('change', '#admptk_kelola_in_ptk').on('change', '#admptk_kelola_in_ptk', function() {
        var idPtk = $(this).val();
        if (idPtk) {
            ADMPTK_KELOLA_SELECTED_PTK_FILES = ADMPTK_KELOLA_CACHE_DATA.filter(r => String(r.id_ptk).trim() === String(idPtk).trim());
            $('#admptk_kelola_uploadContainer').empty();
            $('#admptk_kelola_btnAddRow, #admptk_kelola_btnSimpan').prop('disabled', false);
            admptk_kelola_createUploadRowContext($('#admptk_kelola_uploadContainer'));
        } else {
            $('#admptk_kelola_uploadContainer').html('<div class="text-center text-muted p-3" id="admptk_kelola_msgPilihPtk"><i class="fas fa-info-circle mr-1"></i> Pilih PTK terlebih dahulu.</div>');
            $('#admptk_kelola_btnAddRow, #admptk_kelola_btnSimpan').prop('disabled', true);
        }
    });

    $(document).off('click', '#admptk_kelola_btnAddRow').on('click', '#admptk_kelola_btnAddRow', admptk_kelola_createUploadRow);
    $(document).off('click', '.admptk_kelola-btn-del-row').on('click', '.admptk_kelola-btn-del-row', function() { $(this).closest('.admptk_kelola-upload-row').slideUp(200, function(){ $(this).remove(); }); });

    // Perubahan kategori dalam baris upload
    $(document).off('change', '.admptk_kelola-kategori-select').on('change', '.admptk_kelola-kategori-select', function() {
        var val = String($(this).val() || "").trim(); var katData = ADMPTK_KELOLA_MASTER_KAT.find(k => String(k.idKat).trim() === val);
        var row = $(this).closest('.admptk_kelola-upload-row');
        var fileIn = row.find('.admptk_kelola-file-input'); var fText = row.find('.admptk_kelola-format-text'); var fIcon = row.find('.admptk_kelola-format-icon');
        var pWrap = row.find('.admptk_kelola-periode-wrapper'); var pLabel = row.find('.admptk_kelola-periode-label'); var pInput = row.find('.admptk_kelola-periode-input');
        var katWrapEl = row.find('.admptk_kelola-kat-wrapper'); var thnWrapEl = row.find('.admptk_kelola-tahun-wrapper'); var thnInput = row.find('.admptk_kelola-tahun-input');
        fileIn.val('').next('.custom-file-label').html('Pilih file...').removeClass('text-success font-weight-bold');
        if (katData) {
            var fmt = String(katData.format).toUpperCase(); var ukuran = katData.ukuran || "2";
            if (fmt.includes('IMG') || fmt.includes('JPG') || fmt.includes('PNG')) { fileIn.attr('accept','image/jpeg,image/png,image/jpg'); fText.text('JPG/PNG (Maks '+ukuran+'MB)'); fIcon.removeClass('fa-file-pdf fa-file-upload fa-file-excel').addClass('fa-file-image'); }
            else if (fmt.includes('ALL') || fmt.includes('BEBAS')) { fileIn.attr('accept','application/pdf,image/jpeg,image/png,image/jpg'); fText.text('PDF/JPG/PNG (Maks '+ukuran+'MB)'); fIcon.removeClass('fa-file-pdf fa-file-image fa-file-excel').addClass('fa-file-upload'); }
            else if (fmt.includes('EXCEL')) { fileIn.attr('accept','application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel'); fText.text('EXCEL (Maks '+ukuran+'MB)'); fIcon.removeClass('fa-file-image fa-file-upload fa-file-pdf').addClass('fa-file-excel'); }
            else { fileIn.attr('accept','application/pdf'); fText.text('PDF (Maks '+ukuran+'MB)'); fIcon.removeClass('fa-file-image fa-file-upload fa-file-excel').addClass('fa-file-pdf'); }
            fileIn.attr('data-max-size', ukuran * 1024 * 1024);
            var jPeriode = String(katData.jenisPeriode).toUpperCase();
            var isTapel = jPeriode.includes("TAHUN PELAJARAN") || jPeriode.includes("TAPEL");
            var bulanOpts = '<option value="">-</option><option>Jan</option><option>Feb</option><option>Mar</option><option>Apr</option><option>Mei</option><option>Jun</option><option>Jul</option><option>Agu</option><option>Sep</option><option>Okt</option><option>Nov</option><option>Des</option>';

            // 1. Tentukan Input Tahun (Tahun Kalender / Tahun Pelajaran)
            if (isTapel) {
                thnWrapEl.find('.form-label-sultan').html('Thn Pelajaran <span class="text-danger">*</span>');
                row.find('.admptk_kelola-tahun-input').replaceWith('<select class="form-control form-control-sultan border-maroon admptk_kelola-tahun-input" required>' + admptk_kelola_generateTapelOptions() + '</select>');
            } else {
                thnWrapEl.find('.form-label-sultan').html('Tahun <span class="text-danger">*</span>');
                row.find('.admptk_kelola-tahun-input').replaceWith('<select class="form-control form-control-sultan border-maroon admptk_kelola-tahun-input" required>' + admptk_kelola_generateTahunKalenderOptions() + '</select>');
            }

            // 2. Tentukan Tampilan Periode
            if (jPeriode.includes("TMT")) {
                katWrapEl.removeClass('col-md-5').addClass('col-md-3'); pWrap.show(); pLabel.text("TMT");
                pInput.replaceWith('<input type="date" class="form-control form-control-sultan border-maroon admptk_kelola-periode-input" required>');
                row.find('.admptk_kelola-periode-input').prop("required",true).val("");
            } else if (jPeriode === "BULANAN") {
                katWrapEl.removeClass('col-md-5').addClass('col-md-3');
                pWrap.show(); pLabel.text("Bulan");
                pInput.replaceWith('<select class="form-control form-control-sultan border-maroon admptk_kelola-periode-input" required>' + bulanOpts.replace('<option value="">-</option>', '<option value="">- Pilih Bulan -</option>') + '</select>');
            } else if (jPeriode.includes("PERIODE")) {
                katWrapEl.removeClass('col-md-5').addClass('col-md-3');
                pWrap.show(); pLabel.text("Periode (Bln)");
                pInput.replaceWith('<div class="d-flex align-items-center admptk_kelola-periode-input" style="gap:4px;"><select class="form-control form-control-sultan border-maroon admptk_kelola-periode-mulai" required style="min-width:65px;padding:2px 4px;height:31px;font-size:12px;">'+bulanOpts+'</select><span class="font-weight-bold text-muted px-1" style="font-size:12px;">&ndash;</span><select class="form-control form-control-sultan border-maroon admptk_kelola-periode-akhir" required style="min-width:65px;padding:2px 4px;height:31px;font-size:12px;">'+bulanOpts+'</select></div>');
            } else if (jPeriode.includes("SEMESTER")) {
                katWrapEl.removeClass('col-md-5').addClass('col-md-3'); pWrap.show(); pLabel.text("Semester");
                if (isTapel) {
                    pInput.replaceWith('<select class="form-control form-control-sultan border-maroon admptk_kelola-periode-input" required><option value="">- Pilih -</option><option value="Semester 1">Semester 1 (Ganjil)</option><option value="Semester 2">Semester 2 (Genap)</option></select>');
                } else {
                    pInput.replaceWith('<select class="form-control form-control-sultan border-maroon admptk_kelola-periode-input" required><option value="">- Pilih -</option><option value="Semester 1">Semester 1 (Jan - Jun)</option><option value="Semester 2">Semester 2 (Jul - Des)</option></select>');
                }
            } else if (jPeriode.includes("TRIWULAN")) {
                katWrapEl.removeClass('col-md-5').addClass('col-md-3'); pWrap.show(); pLabel.text("Triwulan");

function admptk_kelola_initMasterData() {
    if (ADMPTK_KELOLA_IS_ADMIN) { $('#admptk_kelola_filterContainer').show(); $('#admptk_kelola_filterSekolah').empty().append('<option value="SEMUA">- Semua Sekolah -</option>').prop('disabled', false).removeClass('bg-light text-maroon font-weight-bold'); }
    else if (!ADMPTK_KELOLA_NPSN_TERKUNCI) { $('#admptk_kelola_loadingState').find('.sultan-loading-text').html('<span class="text-danger"><i class="fas fa-ban mb-2"></i><br>Akses ditolak.</span>'); return; }

    google.script.run.withSuccessHandler(function(json) {
        var res = JSON.parse(json); if (!res.success) { $('#admptk_kelola_loadingState').find('.sultan-loading-text').html('<span class="text-danger"><i class="fas fa-exclamation-triangle mb-2"></i><br>' + admptk_kelola_esc(res.message) + '</span>'); return; }
        ADMPTK_KELOLA_MASTER_KAT = res.kategori || []; ADMPTK_KELOLA_MASTER_PTK = res.ptk || [];
        // Cache daftar sekolah untuk Admin dan populate dropdown filter
        if (ADMPTK_KELOLA_IS_ADMIN && res.sekolah) { 
            window.ADMPTK_KELOLA_MASTER_SEK = res.sekolah; 
            var $fSek = $('#admptk_kelola_filterSekolah');
            $fSek.empty().append('<option value="SEMUA">- Semua Sekolah -</option>');
            res.sekolah.forEach(function(s) {
                $fSek.append($('<option>', {value: s.npsn, text: s.nama}));
            });
        }
        // Koreksi NPSN_TERKUNCI dari data PTK yang dikembalikan server (untuk user yang unit-nya berupa nama, bukan NPSN)
        if (!ADMPTK_KELOLA_IS_ADMIN && ADMPTK_KELOLA_MASTER_PTK.length > 0 && ADMPTK_KELOLA_MASTER_PTK[0].npsn) {
            ADMPTK_KELOLA_NPSN_TERKUNCI = ADMPTK_KELOLA_MASTER_PTK[0].npsn;
        }
        console.log('ADMPTK initMasterData OK: PTK=' + ADMPTK_KELOLA_MASTER_PTK.length + ', SEK=' + (window.ADMPTK_KELOLA_MASTER_SEK||[]).length + ', NPSN=' + ADMPTK_KELOLA_NPSN_TERKUNCI);
        if (!ADMPTK_KELOLA_IS_ADMIN && ADMPTK_KELOLA_MASTER_PTK.length > 0) { $('#admptk_kelola_filterContainer').show(); var unitName = ADMPTK_KELOLA_MASTER_PTK[0] ? ADMPTK_KELOLA_MASTER_PTK[0].unit : ADMPTK_KELOLA_NPSN_TERKUNCI; $('#admptk_kelola_filterSekolah').empty().append($('<option>', {value: ADMPTK_KELOLA_NPSN_TERKUNCI, text: unitName})).prop('disabled', true); }
        var hk = '<option value="SEMUA">- Semua Kategori -</option>'; ADMPTK_KELOLA_MASTER_KAT.forEach(function(k) { hk += '<option value="' + k.idKat + '">' + k.namaKat + '</option>'; }); $('#admptk_kelola_filterKategori').html(hk);
        $('#admptk_kelola_btnTambah').prop('disabled', false); admptk_kelola_tarikDataServer();
    }).withFailureHandler(function(){ $('#admptk_kelola_loadingState').find('.sultan-loading-text').html('<span class="text-danger"><i class="fas fa-wifi mb-2"></i><br>Koneksi Terputus.</span>'); }).getAdmPtkMasterData(ADMPTK_KELOLA_IS_ADMIN ? "SEMUA" : ADMPTK_KELOLA_NPSN_TERKUNCI);
}

function admptk_kelola_tarikDataServer() {
    var btn = $('#admptk_kelola_btnRefresh'); btn.prop('disabled', true).html('<i class="fas fa-spinner fa-spin text-maroon"></i>');
    if (!$.fn.DataTable.isDataTable('#admptk_kelola_tabelUtama')) { $('#admptk_kelola_tableState').hide(); SultanUI.showLoading('#admptk_kelola_loadingState'); }
    google.script.run.withSuccessHandler(function(json) {
        btn.prop('disabled', false).html('<i class="fas fa-sync-alt text-maroon"></i>'); var res = JSON.parse(json);
        if (!res.success) { $('#admptk_kelola_loadingState').find('.sultan-loading-text').html('<span class="text-danger"><i class="fas fa-exclamation-triangle mb-2"></i><br>' + admptk_kelola_esc(res.message) + '</span>'); return; }
        ADMPTK_KELOLA_CACHE_DATA = res.data || [];
        if (!$.fn.DataTable.isDataTable('#admptk_kelola_tabelUtama')) admptk_kelola_initDataTables();
        admptk_kelola_terapkanFilterLokal(); SultanUI.hideLoading('#admptk_kelola_loadingState'); $('#admptk_kelola_tableState').show();
        if (ADMPTK_KELOLA_TABEL_INSTANCE) setTimeout(function() { ADMPTK_KELOLA_TABEL_INSTANCE.columns.adjust(); }, 150);
    }).withFailureHandler(function(){ btn.prop('disabled', false).html('<i class="fas fa-sync-alt text-maroon"></i>'); }).getAdmPtkData(ADMPTK_KELOLA_IS_ADMIN ? "" : ADMPTK_KELOLA_NPSN_TERKUNCI);
}

function admptk_kelola_terapkanFilterLokal() {
    if (!ADMPTK_KELOLA_TABEL_INSTANCE) return;
    var fS = $('#admptk_kelola_filterStatus').val().toLowerCase(); var fK = $('#admptk_kelola_filterKategori').val(); var fN = ADMPTK_KELOLA_IS_ADMIN ? $('#admptk_kelola_filterSekolah').val() : "";
    var hasil = ADMPTK_KELOLA_CACHE_DATA.filter(function(r) {
        var st = String(r.status || "").toLowerCase(); var rn = String(r.npsn || "");
        if (ADMPTK_KELOLA_IS_ADMIN && fN !== "SEMUA" && fN !== "" && rn !== fN) return false;
        if (fK !== "SEMUA" && fK !== "" && String(r.id_kategori) !== fK) return false;
        if (fS !== "semua" && fS !== "") { var ns = "diproses"; if (st.includes('setuju') || st.includes('ok')) ns = "disetujui"; else if (st.includes('revisi')) ns = "revisi"; else if (st.includes('tolak')) ns = "ditolak"; if (ns !== fS) return false; }
        return true;
    }); admptk_kelola_renderTabel(hasil);
}

function admptk_kelola_renderTabel(dataRows) {
    var dtArray = [];
    dataRows.forEach(function(r) {
        var id = r.rowId; var st = String(r.status || "").toLowerCase(); var isDisetujui = st.includes('setuju') || st.includes('ok');
        var btnV = ""; if (ADMPTK_KELOLA_IS_ADMIN) btnV = '<button type="button" class="sultan-btn-aksi sultan-btn-aksi-primary admptk_kelola-btn-verif" data-id="' + id + '" title="Verifikasi"><i class="fas fa-clipboard-check"></i></button>';
        var btnP = '<button type="button" class="sultan-btn-aksi sultan-btn-aksi-warning admptk_kelola-btn-perbaiki" data-id="' + id + '" ' + (isDisetujui ? 'disabled style="opacity:0.5;" title="Tidak dapat diedit, status Disetujui"' : 'title="Edit Berkas"') + '><i class="fas fa-edit"></i></button>';
        var btnH = '<button type="button" class="sultan-btn-aksi sultan-btn-aksi-maroon admptk_kelola-btn-hapus" data-id="' + id + '" ' + (isDisetujui ? 'disabled style="opacity:0.5;"' : '') + ' title="Hapus Berkas"><i class="fas fa-trash-alt"></i></button>';
        var aksi = '<div class="d-flex flex-nowrap justify-content-center" style="gap:5px;">' + btnV + btnP + btnH + '</div>';
        var namaSekolah = "-";
        if (window.ADMPTK_KELOLA_MASTER_SEK) {
            var sek = window.ADMPTK_KELOLA_MASTER_SEK.find(function(s) { return String(s.npsn).trim() === String(r.npsn || "").trim(); });
            if (sek) namaSekolah = sek.nama;
        }
        if (namaSekolah === "-" && ADMPTK_KELOLA_MASTER_PTK) {
            var ptk = ADMPTK_KELOLA_MASTER_PTK.find(function(p) { return String(p.id).trim() === String(r.id_ptk || "").trim(); });
            if (ptk) namaSekolah = ptk.unit;
        }
        var txtPtk = '<div class="text-maroon font-weight-bold text-uppercase text-wrap" style="font-size:13px; line-height:1.2;">' + admptk_kelola_esc(r.nama_ptk) + '</div>' +
                     '<div class="text-dark font-weight-bold" style="font-size:13px; line-height:1.2;">' + admptk_kelola_esc(r.nip || '-') + '</div>' +
                     '<div class="text-muted" style="font-size:12px; line-height:1.2;">' + admptk_kelola_esc(namaSekolah) + '</div>';
        var txtKat = '<div class="font-weight-bold text-primary text-wrap" style="font-size:13px;">' + admptk_kelola_esc(r.nama_kategori) + '</div>';
        var fn = String(r.file_name || "").toLowerCase(); var fi = "fa-file-pdf text-danger";
        if (fn.endsWith('.jpg') || fn.endsWith('.png') || fn.endsWith('.jpeg')) fi = "fa-file-image text-success";
        if (fn.endsWith('.xlsx') || fn.endsWith('.xls')) fi = "fa-file-excel text-success";
        var btnFile = '<button type="button" class="sultan-btn-pdf admptk_kelola-btn-preview" data-url="' + r.url + '" style="font-size:13px;"><i class="fas ' + fi + ' mr-1"></i> LIHAT</button>';
        var badge = admptk_kelola_buildBadgeStatus(r.status, r.catatan);
        var teksPeriode = r.periode || "-"; if (teksPeriode.match(/^\d{4}-\d{2}-\d{2}$/)) { teksPeriode = Sultan.format.tanggal(teksPeriode); }
        var metaW = '<div style="line-height:1.2;font-size:13px;"><span class="d-block font-weight-bold text-dark">' + r.tgl_upload + '</span><span class="d-block text-muted">' + admptk_kelola_esc(r.uploader) + '</span></div>';
        var metaE = '<div style="line-height:1.2;font-size:13px;"><span class="d-block font-weight-bold text-dark">' + (r.tgl_edit || "-") + '</span><span class="d-block text-muted text-uppercase">' + admptk_kelola_esc(r.user_edit || "-") + '</span></div>';
        var metaV = '<div style="line-height:1.2;font-size:13px;"><span class="d-block font-weight-bold text-dark">' + (r.tgl_verif || "-") + '</span><span class="d-block text-muted text-uppercase">' + admptk_kelola_esc(r.verifikator || "-") + '</span></div>';
        dtArray.push([aksi, badge, txtPtk, txtKat, r.tahun, teksPeriode, btnFile, metaW, metaE, metaV]);
    });
    ADMPTK_KELOLA_TABEL_INSTANCE.clear().rows.add(dtArray).draw(false);
}

            if (cached.length > 0) {
                cached.forEach(function(p) {
                    $ptk.append($('<option>', { value: p.id, text: p.nama + (p.nip ? ' (' + p.nip + ')' : ''), 'data-nip': p.nip, 'data-npsn': p.npsn, 'data-folderkey': p.folderKey }));
                });
                $ptk.prop('disabled', false);
            } else {
                // Tidak ada di cache → panggil server khusus NPSN ini
                $ptk.prop('disabled', true);
                $ptk.empty().append('<option value="">Memuat data guru...</option>');
                google.script.run.withSuccessHandler(function(json) {
                    var res = JSON.parse(json);
                    console.log('ADMPTK reload PTK NPSN=' + npsn + ', result ptk count=' + (res.ptk ? res.ptk.length : 0));
                    if (res.success && res.ptk && res.ptk.length > 0) {
                        // Tambahkan ke cache global
                        res.ptk.forEach(function(np) {
                            if (!ADMPTK_KELOLA_MASTER_PTK.find(function(xp) { return xp.id === np.id; })) {
                                ADMPTK_KELOLA_MASTER_PTK.push(np);
                            }
                        });
                        $ptk.empty().append('<option value="">- Pilih PTK -</option>');
                        res.ptk.forEach(function(p) {
                            $ptk.append($('<option>', { value: p.id, text: p.nama + (p.nip ? ' (' + p.nip + ')' : ''), 'data-nip': p.nip, 'data-npsn': p.npsn, 'data-folderkey': p.folderKey }));
                        });
                        $ptk.prop('disabled', false);
                    } else {
                        $ptk.empty().append('<option value="">- Tidak ada data PTK -</option>');
                    }
                }).withFailureHandler(function(e) {
                    console.error('ADMPTK reload PTK error:', e);
                    $ptk.empty().append('<option value="">- Gagal memuat -</option>');
                }).getAdmPtkMasterData(npsn);
            }
        });
    }
}

function admptk_kelola_createUploadRowContext($c) {
    if ($c.find('.admptk_kelola-upload-row').length >= 10) { Sultan.notif.info('Maksimal 10 dokumen.'); return; }
    
    var $ptkOpt = $('#admptk_kelola_in_ptk option:selected');
    var idPtk = $('#admptk_kelola_in_ptk').val();
    if (!idPtk) return;
    
    // Temukan data profil PTK dari cache master
    var ptkProfile = ADMPTK_KELOLA_MASTER_PTK.find(p => String(p.id).trim() === String(idPtk).trim());
    if (!ptkProfile) return;
    
    // Filter Kategori Dokumen berdasarkan profil PTK
    var filteredKat = ADMPTK_KELOLA_MASTER_KAT.filter(function(k) {
        var ruleJ = k.klasifikasiJenjang || "SEMUA";
        var ruleK = k.klasifikasiKepegawaian || "SEMUA";
        var ruleT = k.klasifikasiTugas || "SEMUA";
        
        // 1. Filter Jenjang
        if (ruleJ !== "SEMUA" && ruleJ.trim() !== "") {
            var arrJ = ruleJ.split(",").map(x => x.trim().toUpperCase());
            var pJenjang = String(ptkProfile.jenjang || "").toUpperCase();
            var matchJ = arrJ.indexOf(pJenjang) !== -1;
            if (pJenjang === "SDS" && arrJ.indexOf("SD") !== -1) matchJ = true;
            if (!matchJ) return false;
        }
        
        // 2. Filter Kepegawaian
        if (ruleK !== "SEMUA" && ruleK.trim() !== "") {
            var arrK = ruleK.split(",").map(x => x.trim().toUpperCase());
            var pKepeg = String(ptkProfile.status_peg || "").toUpperCase();
            if (arrK.indexOf(pKepeg) === -1) return false;
        }
        
        // 3. Filter Tugas
        if (ruleT !== "SEMUA" && ruleT.trim() !== "") {
            var arrT = ruleT.split(",").map(x => x.trim().toUpperCase());
            var pTugas = String(ptkProfile.tugas || "").toUpperCase();
            if (arrT.indexOf(pTugas) === -1) return false;
        }
        
        return true;
    });
    
    ADMPTK_KELOLA_ROW_COUNT++; var rId = "uprow_admptk_" + ADMPTK_KELOLA_ROW_COUNT;
    var htmlKat = '<option value="">- Pilih Kategori -</option>'; 
    filteredKat.forEach(k => htmlKat += '<option value="' + k.idKat + '">' + k.namaKat + '</option>');
    
    var delBtn = ADMPTK_KELOLA_ROW_COUNT > 1 ? '<button type="button" class="btn btn-sm btn-danger px-3 admptk_kelola-btn-del-row" style="height:38px;"><i class="fas fa-trash"></i></button>' : '<div style="width:42px;"></div>';
    var htmlRow = '<div class="admptk_kelola-upload-row bg-white border p-3 mb-3 rounded shadow-sm position-relative" id="' + rId + '" style="display:none;"><span class="position-absolute badge badge-maroon shadow-sm" style="top:-10px;left:15px;font-size:12px;">Dokumen #' + ($c.find('.admptk_kelola-upload-row').length + 1) + '</span><div class="row align-items-end"><div class="col-md-5 mb-2 mb-md-0 admptk_kelola-kat-wrapper"><label class="form-label-sultan small text-muted text-uppercase mb-1">Kategori <span class="text-danger">*</span></label><select class="form-control form-control-sultan border-maroon admptk_kelola-kategori-select" required>' + htmlKat + '</select></div><div class="col-md-2 mb-2 mb-md-0 admptk_kelola-tahun-wrapper"><label class="form-label-sultan small text-muted text-uppercase mb-1">Tahun <span class="text-danger">*</span></label><select class="form-control form-control-sultan border-maroon admptk_kelola-tahun-input" required>' + admptk_kelola_generateTahunKalenderOptions() + '</select></div><div class="col-md-2 mb-2 mb-md-0 admptk_kelola-periode-wrapper" style="display:none;"><label class="form-label-sultan small text-muted text-uppercase mb-1"><span class="admptk_kelola-periode-label">Periode</span> <span class="text-danger">*</span></label><input type="text" class="form-control form-control-sultan border-maroon admptk_kelola-periode-input"></div><div class="col-md-4 mb-2 mb-md-0 admptk_kelola-file-wrapper"><label class="form-label-sultan small text-muted text-uppercase mb-1"><i class="fas fa-file-pdf text-danger mr-1 admptk_kelola-format-icon"></i> <span class="admptk_kelola-format-text">File PDF (2MB)</span> <span class="text-danger">*</span></label><div class="custom-file"><input type="file" class="custom-file-input border-maroon admptk_kelola-file-input" accept="application/pdf" required><label class="custom-file-label text-truncate">Pilih file...</label></div></div><div class="col-md-1 text-right d-flex justify-content-end">' + delBtn + '</div></div><div class="admptk_kelola-kat-keterangan alert-soft-info rounded small px-2 py-1 mt-2 mb-0" style="display:none;font-size:11px;"></div></div>';
    $c.append(htmlRow); $c.find('#' + rId).slideDown(200);
}

function admptk_kelola_submitBatchUpload(e) {
    e.preventDefault(); var $form = $(this);
    var $ptkOpt = $('#admptk_kelola_in_ptk option:selected');
    var idPtk = String($('#admptk_kelola_in_ptk').val() || "").trim();
    if (!idPtk) { Sultan.alert('warning','Pilih PTK','Anda belum memilih PTK.'); return; }
    if (!$form[0].checkValidity()) { $form.addClass('was-validated'); return; }

    var namaPtk = $ptkOpt.text().replace(/\s*\(.*?\)\s*$/, '').trim();
    var nip      = $ptkOpt.attr('data-nip') || '';
    var npsn     = $ptkOpt.attr('data-npsn') || ADMPTK_KELOLA_NPSN_TERKUNCI;
    var folderKey = $ptkOpt.attr('data-folderkey') || (nip ? namaPtk + ' - ' + nip : namaPtk);

    var filePromises = []; var rowEls = $form.find('.admptk_kelola-upload-row'); var tracker = {}; var hasDup = false; var dupMsg = "";
    rowEls.each(function() {
        if (hasDup) return;
        var idKat  = String($(this).find('.admptk_kelola-kategori-select').val() || "").trim();
        var thn    = String($(this).find('.admptk_kelola-tahun-input').val() || "").trim();
        var pWrap  = $(this).find('.admptk_kelola-periode-wrapper'); var per = "-";
        if (pWrap.is(':visible')) { var pMulai = $(this).find('.admptk_kelola-periode-mulai'); if (pMulai.length > 0) { per = (pMulai.val() && $(this).find('.admptk_kelola-periode-akhir').val()) ? (pMulai.val() + " - " + $(this).find('.admptk_kelola-periode-akhir').val()) : ""; } else { per = String($(this).find('.admptk_kelola-periode-input').val() || "").trim(); } }
        var fIn = $(this).find('.admptk_kelola-file-input')[0];
        if (!idKat || !thn || fIn.files.length === 0) return;
        var katData = ADMPTK_KELOLA_MASTER_KAT.find(k => String(k.idKat).trim() === idKat) || { namaKat: "Dokumen" };
        var uni = idPtk + "_" + idKat + "_" + thn + "_" + per.toLowerCase();
        if (tracker[uni]) { hasDup = true; dupMsg = "Anda mengunggah <b>" + katData.namaKat + "</b> periode <b>" + thn + " " + per + "</b> lebih dari satu kali!"; return; }
        tracker[uni] = true;
        var inDb = ADMPTK_KELOLA_SELECTED_PTK_FILES.find(f => String(f.id_ptk).trim() === idPtk && String(f.id_kategori).trim() === idKat && String(f.tahun).trim() === thn && String(f.periode || "-").toLowerCase().trim() === per.toLowerCase());
        if (inDb) { hasDup = true; dupMsg = "Dokumen <b>" + katData.namaKat + "</b> periode <b>" + thn + " " + per + "</b> sudah ada (Status: " + inDb.status + ")."; return; }
        var p = new Promise(function(resolve, reject) {
            var reader = new FileReader();
            reader.onload = function(ev) {
                var ext = fIn.files[0].name.split('.').pop().toLowerCase();
                var nf = katData.namaKat + " - " + thn + (per !== "-" ? " - " + per : "") + "." + ext;
                resolve({ id_ptk: idPtk, nama_ptk: namaPtk, nip: nip, npsn: npsn, folder_key: folderKey, id_kategori: idKat, nama_kategori: katData.namaKat, tahun: thn, periode: per, nama_file: nf, mimeType: fIn.files[0].type, fileBase64: ev.target.result.split(',')[1], user_login: ADMPTK_KELOLA_USER_AKTIF });
            };
            reader.onerror = function() { reject("Gagal baca file."); }; reader.readAsDataURL(fIn.files[0]);
        });
        filePromises.push(p);
    });
    if (hasDup) { Sultan.alert('warning','Duplikasi', dupMsg); return; }
    var btn = $('#admptk_kelola_btnSimpan'); var txt = btn.html(); btn.prop('disabled', true).html('<i class="fas fa-spinner fa-spin mr-2"></i> MENGUNGGAH...');
    Promise.all(filePromises).then(function(batch) {
        if (batch.length === 0) { btn.prop('disabled', false).html(txt); return; }
        google.script.run.withSuccessHandler(function(json) {
            btn.prop('disabled', false).html(txt); var res = JSON.parse(json);
            if (res.success) { Sultan.modal.tutupForm(); setTimeout(function(){ Sultan.notif.crud.simpan(false); admptk_kelola_tarikDataServer(); }, 400); } else { Sultan.notif.crud.gagal(res.message); }
        }).withFailureHandler(function(err){ btn.prop('disabled', false).html(txt); Sultan.notif.crud.gagal(err.message); }).simpanAdmPtkBatch(batch);
    }).catch(function(err) { btn.prop('disabled', false).html(txt); Sultan.notif.crud.gagal(err); });
}

function admptk_kelola_submitPerbaiki(e) {

    var idRow = $('#admptk_kelola_p_rowid').val(); var idPtk = $('#admptk_kelola_p_idptk').val(); var npsn = $('#admptk_kelola_p_npsn').val();
    var thn = $('#admptk_kelola_p_tahun_input').val(); var per = $('#admptk_kelola_p_periode_wrapper').is(':visible') ? $('#admptk_kelola_p_periode_input').val() : "-";
    var fIn = $('#admptk_kelola_p_file')[0];
    var pData = ADMPTK_KELOLA_CACHE_DATA.find(r => String(r.rowId) === String(idRow)); if (!pData) return;
    var nip = pData.nip || "";
    var folderKey = nip ? pData.nama_ptk + " - " + nip : pData.nama_ptk;

    var proc = function(fObj) {
        var payload = { rowId: idRow, id_ptk: idPtk, nama_ptk: pData.nama_ptk, nip: nip, npsn: npsn, folder_key: folderKey, nama_kategori: pData.nama_kategori, tahun: thn, periode: per, file: fObj, user_login: ADMPTK_KELOLA_USER_AKTIF };

        google.script.run.withSuccessHandler(function(json) {

            if (res.success) { Sultan.modal.tutupForm(); setTimeout(function(){ Sultan.notif.crud.simpan(true); admptk_kelola_tarikDataServer(); }, 400); } else { Sultan.notif.crud.gagal(res.message); }
        }).withFailureHandler(function(err){ btn.prop('disabled', false).html(txt); Sultan.notif.crud.gagal(err.message); }).perbaikiAdmPtkData(payload, fObj);
    };
    if (fIn.files.length > 0) {
        var reader = new FileReader();
        reader.onload = function(ev) { var ext = fIn.files[0].name.split('.').pop().toLowerCase(); proc({ nama_file: pData.nama_kategori + " - " + thn + (per !== "-" ? " - " + per : "") + "." + ext, mimeType: fIn.files[0].type, data: ev.target.result.split(',')[1] }); };

    } else { proc(null); }
}

    if (st.includes('setuju') || st.includes('ok') || st.includes('valid')) { $('#admptk_kelola_v_status').val('Disetujui'); }
    else if (st.includes('revisi')) { $('#admptk_kelola_v_status').val('Revisi'); }
    else if (st.includes('tolak')) { $('#admptk_kelola_v_status').val('Ditolak'); }
    if ($('#admptk_kelola_v_status').val() === 'Revisi' || $('#admptk_kelola_v_status').val() === 'Ditolak') { $('#admptk_kelola_reqCatatan').show(); $('#admptk_kelola_v_catatan').prop('required', true); }
    Sultan.modal.verifikasi({ title: 'VERIFIKASI BERKAS ADMINISTRASI PTK', url: data.url || "", isImage: (data.url || "").toLowerCase().endsWith('.jpg') || (data.url || "").toLowerCase().endsWith('.png') || (data.url || "").toLowerCase().endsWith('.jpeg') });
    $('#admptk_kelola_formVerif').appendTo('#global_verifikasiFormArea'); $('#admptk_kelola_verifFooter').appendTo('#global_verifikasiFooterArea'); $('#global_verifikasiFooterArea').show();
    $('#global_modalVerifikasi').off('hidden.bs.modal').on('hidden.bs.modal.admptkverif', function() { $('#admptk_kelola_verifFooter').appendTo('#admptk_kelola_formVerif'); $('#admptk_kelola_formVerif').appendTo('#admptk_kelola_templates'); $('#global_verifikasiFooterArea').hide().empty(); });
}

function admptk_kelola_submitVerif(e) {
    e.preventDefault(); var $form = $(this); if (!$form[0].checkValidity()) { $form.addClass('was-validated'); return; }
    var payload = { rowId: $('#admptk_kelola_v_rowid').val(), status: $('#admptk_kelola_v_status').val(), catatan: $('#admptk_kelola_v_catatan').val(), verifikator: ADMPTK_KELOLA_USER_AKTIF };
    var btn = $('#admptk_kelola_btnVerifikasi'); var txt = btn.html(); btn.prop('disabled', true).html('<i class="fas fa-spinner fa-spin mr-2"></i> MEMPROSES...');
    google.script.run.withSuccessHandler(function(json) {
        btn.prop('disabled', false).html(txt); var res = JSON.parse(json);
        if (res.success) { $('#global_modalVerifikasi').modal('hide'); Sultan.notif.crud.simpan(true); admptk_kelola_tarikDataServer(); } else { Sultan.notif.crud.gagal(res.message); }
    }).withFailureHandler(function(err){ btn.prop('disabled', false).html(txt); Sultan.notif.crud.gagal(err.message); }).verifikasiAdmPtk(payload);
}

function admptk_kelola_bukaPreview(url) {
    if (!url) { Sultan.notif.info("URL tidak tersedia."); return; }
    var finalUrl = url; var downloadUrl = ""; var isGoogleDrive = url.indexOf('drive.google.com') > -1;
    var isImage = url.toLowerCase().endsWith('.jpg') || url.toLowerCase().endsWith('.png') || url.toLowerCase().endsWith('.jpeg');
    if (isGoogleDrive) { var match = url.match(/\/d\/([a-zA-Z0-9_-]+)/); if (match && match[1]) { finalUrl = 'https://drive.google.com/file/d/' + match[1] + '/preview'; downloadUrl = 'https://drive.google.com/uc?export=download&id=' + match[1]; } } else { downloadUrl = url; }
    Sultan.modal.preview({ url: finalUrl, title: 'Pratinjau Dokumen Administrasi PTK', downloadUrl: downloadUrl, isImage: isImage });
}

function admptk_kelola_buildBadgeStatus(status, catatan) {
    var s = String(status || "").toLowerCase(); var c = 'badge-sultan-diproses'; var i = 'clock'; var l = status || 'Diproses';
    if (s.includes('setuju') || s.includes('ok') || s.includes('valid')) { c = 'badge-sultan-disetujui'; i = 'check-circle'; l = 'Disetujui'; }
    else if (s.includes('revisi')) { c = 'badge-sultan-revisi'; i = 'sync-alt'; l = 'Revisi'; }
    else if (s.includes('tolak')) { c = 'badge-sultan-ditolak'; i = 'times-circle'; l = 'Ditolak'; }
    var b = '<span class="badge ' + c + '"><i class="fas fa-' + i + ' mr-1"></i>' + admptk_kelola_esc(l) + '</span>';
    if (catatan && catatan.trim().length > 2) return b + '<div class="mt-2"><button type="button" class="sultan-btn-note admptk_kelola-btn-catatan" data-pesan="' + admptk_kelola_esc(catatan) + '"><i class="fas fa-comment-dots mr-1"></i> BACA CATATAN</button></div>';
    return b;
}
function admptk_kelola_esc(t) { return t ? String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;') : ''; }

function admptk_kelola_generateTapelOptions() {
    var now = new Date();
    var currentYear = now.getFullYear();
    var currentMonth = now.getMonth(); // 0-11
    
    // Tahun Pelajaran baru biasanya dimulai bulan Juli (index 6)
    var startYear = (currentMonth >= 6) ? currentYear : currentYear - 1;
    
    var options = '';
    // Pilihan dari 2 tahun pelajaran ke belakang sampai 1 tahun pelajaran ke depan
    for (var i = -2; i <= 1; i++) {
        var y1 = startYear + i;
        var y2 = y1 + 1;
        var val = y1 + '/' + y2;
        var selected = (i === 0) ? ' selected' : '';
        options += '<option value="' + val + '"' + selected + '>' + val + '</option>';
    }
    return options;
}

function admptk_kelola_generateTahunKalenderOptions() {
    var now = new Date();
    var currentYear = now.getFullYear();
    var options = '';
    // Pilihan dari 2 tahun ke belakang sampai 1 tahun ke depan
    for (var i = -2; i <= 1; i++) {
        var y = currentYear + i;
        var selected = (i === 0) ? ' selected' : '';
        options += '<option value="' + y + '"' + selected + '>' + y + '</option>';
    }
    return options;
}
</script>

<section class="content" id="efileviewer_fullscreenArea">
  <div class="container-fluid" style="font-size:13px;">
    
    <div class="position-relative">
        <div class="sultan-filter-pill-container shadow-sm mb-4" style="overflow: visible !important;">
            <div class="sultan-filter-item mr-2" style="flex: 1; max-width: 450px;">
                <i class="fas fa-search mr-2 text-maroon" style="font-size: 1rem; opacity: 0.7;"></i>
                <input type="text" id="efileviewer_inputSearch" class="form-control" placeholder="Cari NIP atau Nama PTK..." autocomplete="off" style="padding: 0 !important; font-weight: bold; width: 100% !important; font-size:13px;">
            </div>

            <div class="d-flex align-items-center" style="gap: 8px;">
                <button type="button" class="sultan-btn sultan-btn-compact sultan-btn-aksi-batal" id="efileviewer_btnResetPtk" style="display:none; font-size:13px;">
                    <i class="fas fa-times mr-1"></i> BATAL
                </button>
                <button type="button" class="sultan-btn-refresh" id="efileviewer_btnRefresh" title="Segarkan Data">
                    <i class="fas fa-sync-alt"></i>
                </button>
                <div class="divider-vertical d-none d-md-block mx-1"></div>
                <button type="button" class="sultan-btn sultan-btn-compact sultan-btn-outline-maroon d-none d-md-flex" id="efileviewer_btnFullscreen" style="border: 1.5px solid var(--warna-maroon); color: var(--warna-maroon); background: transparent; font-size:13px;">
                    <i class="fas fa-expand mr-1"></i> FULLSCREEN
                </button>
            </div>
        </div>
        
        <!-- Move Results List here for better Z-Index handling -->
        <div id="efileviewer_ptk_results" class="list-group shadow-lg mt-n3 mb-4 text-left border-maroon" style="display:none; position: absolute; z-index: 99999; max-height: 350px; overflow-y: auto; border-radius: 12px; width: 450px; left: 16px; top: 100%; background: #fff; font-size:13px;"></div>
    </div>

    <div class="row">
        
        <div class="col-lg-4 col-md-5 mb-3">
            <div class="card-sultan h-100 shadow-sm border-0 d-flex flex-column overflow-hidden">
                <div class="card-header sultan-header-aksi-utama py-3">
                    <h6 class="m-0 font-weight-bold text-uppercase" style="font-size:13px;"><i class="fas fa-list-ul mr-2"></i>Daftar Berkas Riwayat</h6>
                </div>
                
                <div class="card-body p-0 flex-grow-1 position-relative sultan-scroll-premium" style="height: 65vh; overflow-y: auto; font-size:13px;">
                    
                    <div id="efileviewer_treeInitial" class="d-flex h-100 flex-column justify-content-center align-items-center text-muted p-4 text-center position-absolute w-100" style="top:0; left:0;">
                        <i class="fas fa-folder-open fa-4x mb-3 opacity-25"></i>
                        <h6 class="font-weight-bold">Gunakan Kotak Pencarian</h6>
                        <p class="small">Ketik Nama atau NIP di atas untuk memuat riwayat berkas elektronik.</p>
                    </div>

                    <div id="efileviewer_treeLoading" class="d-none h-100 flex-column justify-content-center align-items-center text-maroon p-4 text-center position-absolute w-100" style="top:0; left:0; background: #fff; z-index: 5;">
                        <i class="fas fa-circle-notch fa-spin fa-3x mb-3"></i>
                        <h6 class="font-weight-bold">Membuka Brankas Digital...</h6>
                    </div>

                    <div id="efileviewer_treeContent" class="w-100 pb-3" style="position: relative; z-index: 2; font-size:13px;"></div>

                </div>
            </div>
        </div>

        <div class="col-lg-8 col-md-7 mb-3">
            <div class="card-sultan h-100 shadow-sm border-0 position-relative d-flex flex-column overflow-hidden">
                <div class="card-header sultan-header-aksi-dark py-3 px-3 d-flex justify-content-between align-items-center bg-dark text-white">
                    <span class="font-weight-bold text-uppercase small" id="efileviewer_lblJudulFile" style="font-size:13px;">
                        <i class="fas fa-eye mr-2 text-info"></i>Pratinjau Dokumen
                    </span>
                    
                    <div class="d-flex align-items-center" style="gap: 8px;">
                        <a href="#" id="efileviewer_btnDownloadValid" target="_blank" class="sultan-btn-aksi-preview d-none" style="padding: 4px 12px; font-size:13px;">
                            <i class="fas fa-download mr-1"></i> UNDUH
                        </a>
                        <a href="#" id="efileviewer_btnUnduhDirect" target="_blank" class="sultan-btn sultan-btn-compact sultan-btn-outline-white d-none" style="font-size:13px;">
                            <i class="fas fa-external-link-alt mr-1"></i> TAB BARU
                        </a>
                    </div>
                </div>

                <div class="card-body p-0 flex-grow-1 position-relative bg-dark" style="height: 65vh;">
                    <div id="efileviewer_iframeLoading" class="d-none h-100 align-items-center justify-content-center text-white-50 position-absolute w-100" style="top:0; left:0; z-index:10; pointer-events:none;">
                        <div class="text-center">
                            <div class="sultan-spinner-icon mb-3"><i class="fas fa-circle-notch fa-spin"></i></div>
                            <p class="font-weight-bold">Memuat dari Google Drive...</p>
                        </div>
                    </div>

                    <div id="efileviewer_iframeInitial" class="d-flex h-100 flex-column justify-content-center align-items-center text-white-50 p-4 text-center position-absolute w-100" style="top:0; left:0;">
                        <i class="fas fa-file-invoice fa-5x mb-4 opacity-25"></i>
                        <h6 class="font-weight-bold">Pilih dokumen dari daftar di sebelah kiri untuk melihat pratinjau.</h6>
                    </div>

                    <iframe id="efileviewer_iframe" class="w-100 h-100 border-0 d-none" src="" style="background-color: #1a1c1e;"></iframe>
                </div>
            </div>
        </div>

    </div>

  </div>
</section>

<!-- CSS tersentralisasi di css_sultan.html Section 18.21 -->

<script>
// ======================================================================
// ISOLASI VARIABEL GLOBAL
// ======================================================================
var EFILEVIEWER_USER_AKTIF = "";
var EFILEVIEWER_IS_ADMIN = false;
var EFILEVIEWER_NPSN_TERKUNCI = "";
var EFILEVIEWER_MASTER_PTK = [];

// =================================================================
// 1. INITIALIZATION & DELEGATION
// =================================================================
$(document).ready(function() {
    try {
        var user = typeof getSesiUser === 'function' ? getSesiUser() : {};
        EFILEVIEWER_USER_AKTIF = user.nama_lengkap || user.fullname || user.nama || user.username || "User Web";
        var roleStr = String(user.role || "").toLowerCase();
        EFILEVIEWER_IS_ADMIN = (typeof checkUserRoleIsAdmin === 'function' && checkUserRoleIsAdmin()) || roleStr.includes("admin") || roleStr.includes("verifikator");
        EFILEVIEWER_NPSN_TERKUNCI = user.npsn || user.unit || user.username || ""; 
    } catch(e) { EFILEVIEWER_NPSN_TERKUNCI = ""; EFILEVIEWER_IS_ADMIN = false; }

    efileviewer_initMasterData();

    $(document).off('keyup input focus', '#efileviewer_inputSearch').on('keyup input focus', '#efileviewer_inputSearch', efileviewer_searchPtkLocal);
    $(document).off('click', '.efileviewer-ptk-item').on('click', '.efileviewer-ptk-item', efileviewer_pilihPtk);
    $(document).off('click', '#efileviewer_btnResetPtk').on('click', '#efileviewer_btnResetPtk', efileviewer_resetPtk);

    $(document).off('click', '#efileviewer_btnRefresh').on('click', '#efileviewer_btnRefresh', function(){ 
        var c = $('#efileviewer_inputSearch').val();
        if(c && $('#efileviewer_inputSearch').attr('readonly')) {
            var id = $('#efileviewer_btnResetPtk').attr('data-id');
            if(id) efileviewer_loadPtkData(id);
        }
    });
    
    $(document).off('click', '.efile-tree-folder').on('click', '.efile-tree-folder', function() {
        $(this).toggleClass('folder-open');
        $(this).next('.efile-tree-content').slideToggle(200);
        var icon = $(this).find('.fa-folder, .fa-folder-open');
        if($(this).hasClass('folder-open')) { icon.removeClass('fa-folder').addClass('fa-folder-open text-warning'); }
        else { icon.removeClass('fa-folder-open').addClass('fa-folder text-warning'); }
    });

    $(document).off('click', '.efile-tree-item-file').on('click', '.efile-tree-item-file', function() {
        $('.efile-tree-item-file').removeClass('active-file');
        $(this).addClass('active-file'); 
        var url = $(this).attr('data-url');
        var namaFile = $(this).attr('data-nama');
        efileviewer_loadIframe(url, namaFile);
    });

    $(document).off('click', '#efileviewer_btnFullscreen').on('click', '#efileviewer_btnFullscreen', function() {
        $('body').toggleClass('efile-fullscreen-mode');
        var isFS = $('body').hasClass('efile-fullscreen-mode');
        if(isFS) { $(this).html('<i class="fas fa-compress mr-1"></i> Tutup Layar'); $('#efileviewer_treeArea, #efileviewer_iframe').closest('.flex-grow-1').css('height', '85vh'); }
        else { $(this).html('<i class="fas fa-expand mr-1"></i> Full Screen'); $('#efileviewer_treeArea, #efileviewer_iframe').closest('.flex-grow-1').css('height', '65vh'); }
    });
});

// =================================================================
// 2. FETCH DATA MASTER & AUTOCOMPLETE
// =================================================================
function efileviewer_initMasterData() {
    var targetFilter = EFILEVIEWER_IS_ADMIN ? "" : EFILEVIEWER_NPSN_TERKUNCI;
    $('#efileviewer_inputSearch').prop('placeholder', 'Menyiapkan database pegawai...').prop('disabled', true);
    
    google.script.run.withSuccessHandler(function(json) {
        var res = JSON.parse(json);
        if(res.success) { EFILEVIEWER_MASTER_PTK = res.ptk || []; }
        $('#efileviewer_inputSearch').prop('placeholder', 'Cari NIP atau Nama PTK...').prop('disabled', false);
    }).getEfileMasterData(targetFilter);
}

function efileviewer_searchPtkLocal() {
    if ($('#efileviewer_inputSearch').attr('readonly')) return;

    var k = $(this).val().toLowerCase();
    var box = $('#efileviewer_ptk_results');

    if(k.length < 3) { box.empty().hide(); return; }

    var hasil = EFILEVIEWER_MASTER_PTK.filter(function(p) {
        var gabungan = (String(p.nip || "") + " " + String(p.nama)).toLowerCase();
        return gabungan.includes(k);
    });

    box.empty();
    if(hasil.length === 0) {
        box.append('<div class="p-2 text-center text-danger small font-weight-bold bg-white">Tidak ada kecocokan data.</div>').show();
        return;
    }

    var lim = hasil.length > 10 ? 10 : hasil.length;
    for(var i=0; i<lim; i++) {
        var p = hasil[i];
        var viewNip = p.nip && String(p.nip).trim() !== "" ? p.nip : '-';
        box.append(`
            <a href="#" class="list-group-item list-group-item-action py-2 px-3 efileviewer-ptk-item" data-id="${p.id_ptk}" data-nama="${efileviewer_escapeHtml(p.nama)}" data-nip="${efileviewer_escapeHtml(viewNip)}">
                <div class="font-weight-bold text-dark text-uppercase">${efileviewer_escapeHtml(p.nama)}</div>
                <div class="small text-muted"><i class="fas fa-id-badge mr-1"></i> NIP: ${viewNip} | ${p.status}</div>
            </a>
        `);
    }
    box.show(); 
}

function efileviewer_pilihPtk(e) {
    e.preventDefault();
    var id = $(this).attr('data-id');
    var nama = $(this).attr('data-nama');
    var nip = $(this).attr('data-nip') || '-';

    $('#efileviewer_inputSearch').val(`${nama} [NIP: ${nip}]`)
        .attr('readonly', 'readonly')
        .addClass('text-maroon font-weight-bold bg-white');
        
    $('#efileviewer_ptk_results').hide();
    $('#efileviewer_btnResetPtk').show().attr('data-id', id);
    
    efileviewer_loadPtkData(id);
}

function efileviewer_resetPtk() {
    $('#efileviewer_inputSearch').val('')
        .removeAttr('readonly')
        .removeClass('text-maroon font-weight-bold bg-white')
        .focus();
        
    $('#efileviewer_btnResetPtk').hide().removeAttr('data-id');
    $('#efileviewer_ptk_results').empty().hide();
    
    $('#efileviewer_treeContent').empty();
    $('#efileviewer_treeInitial').removeClass('d-none').addClass('d-flex'); 
    $('#efileviewer_iframeInitial').removeClass('d-none').addClass('d-flex');
    $('#efileviewer_iframe').addClass('d-none').attr('src', '');
    $('#efileviewer_lblJudulFile').html('<i class="fas fa-eye mr-2 text-info"></i>Pratinjau Dokumen');
    
    // Matikan tombol saat reset
    $('#efileviewer_btnUnduhDirect').addClass('d-none');
    $('#efileviewer_btnDownloadValid').addClass('d-none');
}

// =================================================================
// 3. ENGINE TARIK DATA VIEWER
// =================================================================
function efileviewer_loadPtkData(id_ptk) {
    $('#efileviewer_treeInitial').removeClass('d-flex').addClass('d-none');
    $('#efileviewer_treeContent').empty();
    $('#efileviewer_treeLoading').removeClass('d-none').addClass('d-flex');
    
    $('#efileviewer_iframeInitial').removeClass('d-none').addClass('d-flex');
    $('#efileviewer_iframe').addClass('d-none').attr('src', '');
    $('#efileviewer_lblJudulFile').html('<i class="fas fa-eye mr-2 text-info"></i>Pratinjau Dokumen');
    
    $('#efileviewer_btnUnduhDirect').addClass('d-none');
    $('#efileviewer_btnDownloadValid').addClass('d-none');

    var targetNpsn = EFILEVIEWER_IS_ADMIN ? "" : EFILEVIEWER_NPSN_TERKUNCI;

    google.script.run.withSuccessHandler(function(json) {
        $('#efileviewer_treeLoading').removeClass('d-flex').addClass('d-none');
        
        var res = JSON.parse(json);
        if(!res.success) {
            $('#efileviewer_treeInitial').removeClass('d-none').addClass('d-flex');
            Sultan.alert('warning', 'Tidak Ditemukan', res.message);
            return;
        }

        efileviewer_buildTree(res.categories, res.files, res.ptk.status);

    }).withFailureHandler(function(err){
        $('#efileviewer_treeLoading').removeClass('d-flex').addClass('d-none');
        $('#efileviewer_treeInitial').removeClass('d-none').addClass('d-flex');
        Sultan.alert('error', 'Koneksi Terputus', err.message);
    }).getEfileViewerData(id_ptk, targetNpsn);
}

// =================================================================
// 4. TREE BUILDER ALGORITHM (PERBAIKAN NAMA FILE DITAMPILKAN)
// =================================================================
function efileviewer_buildTree(categories, files, statusPegawai) {
    var treeHtml = '';

    categories.forEach(function(kat) {
        // Filter kategori berdasarkan status pegawai
        var isRelevant = true;
        if(kat.statusPegawaiWajib && kat.statusPegawaiWajib.trim() !== "") {
            var statusList = kat.statusPegawaiWajib.split(',').map(function(s) { return s.trim().toLowerCase(); });
            isRelevant = statusList.includes(statusPegawai.toLowerCase());
        }
        
        if(!isRelevant) return; // Skip kategori yang tidak relevan
        
        var catFiles = files.filter(f => String(f.id_kategori).trim() === String(kat.idKat).trim());
        var countAda = catFiles.length;
        var countKosong = countAda > 0 ? 0 : 1; 

        var badgeAdaClass = countAda > 0 ? 'badge-info' : 'badge-secondary';
        var badgeKsgClass = countKosong > 0 ? 'badge-danger' : 'badge-secondary';

        treeHtml += `
        <div class="tree-node border-bottom border-light">
            <div class="efile-tree-folder d-flex align-items-center py-2 px-3">
                <i class="fas fa-chevron-right mr-3 text-maroon efile-icon-rotate" style="font-size: 0.9rem; width: 15px; text-align: center;"></i>
                <span class="font-weight-bold text-dark small"><i class="fas fa-folder text-warning mr-2"></i> ${efileviewer_escapeHtml(kat.namaKat)}</span>
                <div class="ml-auto">
                    <span class="badge ${badgeAdaClass} badge-pill shadow-sm" style="font-size:10px;" title="File Tersedia">${countAda}</span>
                    <span class="badge ${badgeKsgClass} badge-pill shadow-sm ml-1" style="font-size:10px;" title="File Kosong">${countKosong}</span>
                </div>
            </div>
            <div class="efile-tree-content">
        `;

        if(countAda > 0) {
            catFiles.forEach(function(f) {
                var ext = String(f.file_name).split('.').pop().toLowerCase();
                var faIcon = "fa-file-pdf text-danger";
                if (ext === 'jpg' || ext === 'jpeg' || ext === 'png') { faIcon = "fa-file-image text-success"; }

                // VAKSIN UI: Menampilkan nama file asli hasil Auto-Rename (Tanpa "Dokumen" kaku)
                var displayNama = efileviewer_escapeHtml(f.file_name);
                var badgeStatus = efileviewer_buildBadgeStatus(f.status);

                treeHtml += `
                <div class="efile-tree-item efile-tree-item-file font-weight-bold d-flex justify-content-between align-items-center" data-url="${f.url}" data-nama="${displayNama}">
                    <span><i class="fas ${faIcon} mr-2"></i> ${displayNama}</span>
                    ${badgeStatus}
                </div>`;
            });
        } else {
            treeHtml += `
            <div class="efile-tree-item efile-tree-item-empty font-weight-bold">
                <i class="fas fa-exclamation-triangle mr-2"></i> [!] Dokumen Kosong
            </div>`;
        }
        
        treeHtml += `</div></div>`;
    });

    $('#efileviewer_treeContent').html(treeHtml);
}

// =================================================================
// 5. ZERO-BLINK IFRAME INJECTOR DENGAN DOWNLOAD API
// =================================================================
function efileviewer_loadIframe(url, namaFile) {
    if (!url) return;
    
    $('#efileviewer_iframeInitial').removeClass('d-flex').addClass('d-none');
    $('#efileviewer_iframe').addClass('d-none').attr('src', '');
    $('#efileviewer_iframeLoading').removeClass('d-none').addClass('d-flex');
    
    var ext = namaFile.split('.').pop().toLowerCase();
    var faIcon = "fa-file-pdf text-danger";
    if (ext === 'jpg' || ext === 'jpeg' || ext === 'png') { faIcon = "fa-file-image text-success"; }

    $('#efileviewer_lblJudulFile').html(`<i class="fas ${faIcon} mr-2"></i>${namaFile}`);

    var previewUrl = url;
    var directUrl = url;
    if (url.includes('drive.google.com')) {
        var match = url.match(/\/d\/([a-zA-Z0-9_-]+)/) || url.match(/id=([a-zA-Z0-9_-]+)/);
        if (match && match[1]) {
            previewUrl = 'https://drive.google.com/file/d/' + match[1] + '/preview';
            directUrl = 'https://drive.google.com/uc?export=download&id=' + match[1]; // API Unduh Langsung Google
        } else {
            previewUrl = url.replace(/\/view.*/, '/preview');
        }
    }
    
    // VAKSIN TOMBOL GANDA
    $('#efileviewer_btnUnduhDirect').attr('href', url).removeClass('d-none');
    $('#efileviewer_btnDownloadValid').attr('href', directUrl).removeClass('d-none');

    setTimeout(function() {
        $('#efileviewer_iframe').attr('src', previewUrl);
        
        $('#efileviewer_iframe').off('load').on('load', function() {
            $('#efileviewer_iframeLoading').removeClass('d-flex').addClass('d-none');
            $(this).removeClass('d-none');
        });

        setTimeout(function() {
            $('#efileviewer_iframeLoading').removeClass('d-flex').addClass('d-none');
            $('#efileviewer_iframe').removeClass('d-none');
        }, 3000);
    }, 150);
}

function efileviewer_escapeHtml(text) { 
    if (!text) return ""; 
    return String(text).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;"); 
}

function efileviewer_buildBadgeStatus(st) {
    if (!st || String(st).toLowerCase() === 'undefined' || String(st).trim() === "") return "";
    var s = String(st).toLowerCase();
    var c = 'badge-sultan-diproses';
    if (s.includes('setuju') || s.includes('ok')) c = 'badge-sultan-disetujui';
    else if (s.includes('revisi')) c = 'badge-sultan-revisi';
    else if (s.includes('tolak')) c = 'badge-sultan-ditolak';
    return `<span class="badge ${c} ml-2" style="font-size: 13px; text-transform: uppercase;">${st}</span>`;
}
</script>

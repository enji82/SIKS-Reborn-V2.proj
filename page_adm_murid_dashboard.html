<script>
  var ADMMURIDDASH_CACHE_DATA = null;
  var ADMMURIDDASH_TABEL_REKAP = null;
  var ADMMURIDDASH_BELUM_UNGGAH_LIST = [];

  $(document).ready(function () {
    var userLogin = typeof getSesiUser === 'function' ? getSesiUser() : {};

    // Inisialisasi Filter Tahun Ajaran secara dinamis
    var now = new Date(); var curYear = now.getFullYear(); var curMonth = now.getMonth();
    var currentTahunAjaran = (curMonth >= 6) ? curYear + "/" + (curYear + 1) : (curYear - 1) + "/" + curYear;

    var htmlTahun = '<option value="SEMUA">- Semua Tahun -</option>';
    for (var y = 2023; y <= curYear + 1; y++) {
        var ta = y + "/" + (y + 1);
        htmlTahun += '<option value="' + ta + '">' + ta + '</option>';
    }
    $('#admmuriddash_filterTahun').html(htmlTahun).val(currentTahunAjaran);
    
    // Inisialisasi filter sekolah
    if (userLogin.role !== "Admin") {
      $('#admmuriddash_filterContainer').show();
      var activeNpsn = userLogin.npsn || userLogin.username || "";
      $('#admmuriddash_filterSekolah').html('<option value="' + activeNpsn + '">' + userLogin.unit + '</option>').prop('disabled', true);
    } else {
      $('#admmuriddash_filterContainer').show();
      $('#admmuriddash_filterSekolah').prop('disabled', false);
    }

    // Bind events
    $('#admmuriddash_btnRefresh').click(function () {
      loadDashboardData(true);
    });

    $('#admmuriddash_filterTahun, #admmuriddash_filterSubmenu, #admmuriddash_filterSekolah').change(function () {
      if (ADMMURIDDASH_CACHE_DATA) {
        admmuriddash_terapkanFilterLokal();
      } else {
        loadDashboardData();
      }
    });

    $(document).off('click', '#admmuriddash_btnSalinWa').on('click', '#admmuriddash_btnSalinWa', admmuriddash_salinKeWA);

    // Load Data awal
    loadDashboardData();

    function loadDashboardData(forceRefresh) {
      var btn = $('#admmuriddash_btnRefresh');
      btn.prop('disabled', true).html('<i class="fas fa-spinner fa-spin text-maroon"></i>');
      
      // Tampilkan overlay di atas dashboard secara utuh tanpa menyembunyikannya
      $('#admmuriddash_dashboardState').show();
      $('.card-loading-overlay').remove(); // bersihkan overlay yang lama
      var ov = '<div class="card-loading-overlay d-flex align-items-center justify-content-center" style="position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.6);backdrop-filter:blur(1px);z-index:100;border-radius:16px;"><i class="fas fa-spinner fa-spin fa-3x text-maroon"></i></div>';
      $('#admmuriddash_dashboardState').css('position','relative').append(ov);

      var activeNpsn = (userLogin.role !== "Admin") ? (userLogin.npsn || userLogin.username || "") : "SEMUA";
      var tahun = $('#admmuriddash_filterTahun').val();

      google.script.run.withSuccessHandler(function (resRaw) {
        btn.prop('disabled', false).html('<i class="fas fa-sync-alt"></i>');
        $('.card-loading-overlay').remove();
        
        var res = JSON.parse(resRaw);
        if (res.success) {
          ADMMURIDDASH_CACHE_DATA = res;

          // Inisialisasi list dropdown sekolah jika admin
          if (userLogin.role === "Admin") {
            var selSekolah = $('#admmuriddash_filterSekolah');
            var curVal = selSekolah.val() || "SEMUA";
            selSekolah.empty().append('<option value="SEMUA">- Semua Sekolah -</option>');
            res.detailSekolah.forEach(function (s) {
              selSekolah.append($('<option>', { value: s.npsn, text: s.nama }));
            });
            selSekolah.val(curVal);
          }

          admmuriddash_terapkanFilterLokal();
        } else {
          Sultan.notif.gagal(res.message || "Gagal memuat data dashboard.");
        }
      }).withFailureHandler(function (err) {
        btn.prop('disabled', false).html('<i class="fas fa-sync-alt"></i>');
        $('.card-loading-overlay').remove();
        Sultan.notif.gagal("Koneksi gagal: " + err.message);
      }).admMurid_getDashboardData(activeNpsn, tahun);
    }
  });

  function admmuriddash_animateValue(id, end, formatPercent) {
    var obj = document.getElementById(id);
    if(!obj) return;
    var start = 0; 
    var duration = 800; 
    
    if (obj.dataset.animId) {
        cancelAnimationFrame(parseInt(obj.dataset.animId, 10));
    }
    
    var startTime = null;
    
    function step(timestamp) {
        if (!startTime) startTime = timestamp;
        var progress = Math.min((timestamp - startTime) / duration, 1);
        var val = Math.floor(progress * (end - start) + start);
        obj.innerHTML = val.toLocaleString('id-ID') + (formatPercent ? '%' : '');
        if (progress < 1) {
            var animId = window.requestAnimationFrame(step);
            obj.dataset.animId = animId;
        } else {
            obj.dataset.animId = "";
        }
    }
    var firstAnimId = window.requestAnimationFrame(step);
    obj.dataset.animId = firstAnimId;
  }

  function admmuriddash_terapkanFilterLokal() {
    if (!ADMMURIDDASH_CACHE_DATA) return;

    var submenu = $('#admmuriddash_filterSubmenu').val(); // "SPMB" atau "IJAZAH"
    var fSekolah = $('#admmuriddash_filterSekolah').val() || "SEMUA";
    
    // Set table title
    if (submenu === "SPMB") {
        $('#admmuriddash_tableTitle').html('<i class="fas fa-table mr-2"></i>Rekapitulasi Jumlah Murid Kelas 1');
    } else {
        $('#admmuriddash_tableTitle').html('<i class="fas fa-table mr-2"></i>Rekapitulasi Jumlah Cetak Ijazah');
    }

    // Filter detailSekolah
    var schools = ADMMURIDDASH_CACHE_DATA.detailSekolah.filter(function (s) {
      return fSekolah === "SEMUA" || s.npsn === fSekolah;
    });

    // Sort schools alphabetically by name (A-Z)
    schools.sort(function (a, b) {
      return String(a.nama || "").localeCompare(String(b.nama || ""));
    });

    // Hitung statistik
    var totSekolah = schools.length;
    var sudah = 0;
    var belum = 0;
    var diproses = 0;
    var disetujui = 0;
    var revisi = 0;
    var ditolak = 0;
    
    var jmlDokumen = 0;
    var sumRombel = 0;
    var sumL = 0;
    var sumP = 0;
    var sumTotal = 0;

    ADMMURIDDASH_BELUM_UNGGAH_LIST = [];
    var dtArray = [];

    schools.forEach(function (s) {
      var doc = (submenu === "SPMB") ? s.spmb : s.ijazah;
      var status = doc.status || "Belum Unggah";

      // 1. Hitung Sasaran & Status
      if (status === "Belum Unggah") {
        belum++;
        ADMMURIDDASH_BELUM_UNGGAH_LIST.push({ nama: s.nama, npsn: s.npsn });
      } else {
        sudah++;
        var statKey = status.toLowerCase();
        if (statKey === "disetujui") disetujui++;
        else if (statKey === "diproses") diproses++;
        else if (statKey === "revisi") revisi++;
        else if (statKey === "ditolak") ditolak++;

        // Hitung Jml Dokumen
        if (submenu === "SPMB") {
          jmlDokumen++;
        } else {
          if (doc.fileUrl) jmlDokumen++;
          if (doc.fileUrlTranskrip) jmlDokumen++;
        }
      }

      // 2. Kumpulkan Detail data untuk Tabel
      var r = 0;
      var l = 0;
      var p = 0;
      var t = 0;

      if (doc.detail) {
        r = (submenu === "SPMB") ? (parseInt(doc.detail.rombel) || 0) : 0;
        l = parseInt(doc.detail.muridL || 0);
        p = parseInt(doc.detail.muridP || 0);
        t = parseInt(doc.detail.total || 0);
      }

      sumRombel += r;
      sumL += l;
      sumP += p;
      sumTotal += t;

      var sekolahCell = '<div class="sultan-table-primary">' + s.nama + '</div>' +
                        '<div class="sultan-table-secondary">' + s.npsn + '</div>';

      var badgeClass = "badge-secondary";
      var statLabel = status;
      if (status !== "Belum Unggah") {
        if (status.toLowerCase() === "disetujui") badgeClass = "badge-success";
        else if (status.toLowerCase() === "diproses") badgeClass = "badge-warning";
        else if (status.toLowerCase() === "revisi") badgeClass = "badge-info";
        else if (status.toLowerCase() === "ditolak") badgeClass = "badge-danger";
        statLabel = '<i class="fas fa-check-circle mr-1"></i>' + status;
      } else {
        statLabel = '<i class="fas fa-exclamation-circle mr-1"></i>Belum Unggah';
      }
      var statusBadge = '<span class="badge ' + badgeClass + ' px-2 py-1">' + statLabel + '</span>';

      var formatZero = function(val) {
        var n = parseInt(val) || 0;
        return n === 0 ? '<span class="text-muted opacity-50">-</span>' : n.toLocaleString('id-ID');
      };

      dtArray.push([
        sekolahCell,
        formatZero(l),
        formatZero(p),
        t > 0 ? '<span class="font-weight-bold text-maroon">' + t.toLocaleString('id-ID') + '</span>' : '<span class="text-muted opacity-50">-</span>'
      ]);
    });

    // Render Metrics
    admmuriddash_animateValue('admmuriddash_cardTotalSekolah', totSekolah);
    admmuriddash_animateValue('admmuriddash_cardSudah', sudah);
    admmuriddash_animateValue('admmuriddash_cardBelum', belum);
    
    var percentage = totSekolah > 0 ? Math.round((sudah / totSekolah) * 100) : 0;
    admmuriddash_animateValue('admmuriddash_cardProgress', percentage, true);

    admmuriddash_animateValue('admmuriddash_cardTotalDokumen', jmlDokumen);
    admmuriddash_animateValue('admmuriddash_cardDiproses', diproses);
    admmuriddash_animateValue('admmuriddash_cardDisetujui', disetujui);
    admmuriddash_animateValue('admmuriddash_cardRevisi', revisi);
    admmuriddash_animateValue('admmuriddash_cardDitolak', ditolak);

    // Progress Bar
    var pBar = $('#admmuriddash_progressBar');
    pBar.css('width', percentage + '%').attr('aria-valuenow', percentage);
    $('#admmuriddash_progressText').text(percentage + '% Selesai');
    
    if (percentage < 30) pBar.css('background-color', '#d11a2a');
    else if (percentage < 70) pBar.css('background-color', '#ffc107');
    else pBar.css('background-color', '#28a745');

    // Insight Alert
    var insightHtml = "";
    if (percentage >= 90) {
        insightHtml = '<div class="sultan-alert alert-soft-success">' +
                       '<i class="fas fa-trophy mr-3 mt-1" style="font-size: 20px;"></i>' +
                       '<div>' +
                       '<div class="font-weight-bold mb-1">Luar Biasa! 🎉</div>' +
                       '<div class="small">Capaian unggah berkas ' + (submenu === "SPMB" ? "Laporan SPMB" : "Cetak Ijazah") + ' sudah mencapai <strong>' + percentage + '%</strong>. Pertahankan prestasi ini!</div>' +
                       '</div>' +
                       '</div>';
    } else if (percentage >= 50) {
        insightHtml = '<div class="sultan-alert alert-soft-info">' +
                       '<i class="fas fa-chart-line mr-3 mt-1" style="font-size: 20px;"></i>' +
                       '<div>' +
                       '<div class="font-weight-bold mb-1">Bagus! 👍</div>' +
                       '<div class="small">Capaian unggah berkas ' + (submenu === "SPMB" ? "Laporan SPMB" : "Cetak Ijazah") + ' mencapai <strong>' + percentage + '%</strong>. Tetap semangat untuk mencapai target!</div>' +
                       '</div>' +
                       '</div>';
    } else {
        insightHtml = '<div class="sultan-alert alert-soft-warning">' +
                       '<i class="fas fa-exclamation-circle mr-3 mt-1" style="font-size: 20px;"></i>' +
                       '<div>' +
                       '<div class="font-weight-bold mb-1">Perlu Perhatian ⚠️</div>' +
                       '<div class="small">Capaian unggah berkas ' + (submenu === "SPMB" ? "Laporan SPMB" : "Cetak Ijazah") + ' baru <strong>' + percentage + '%</strong>. Segera koordinasikan dengan sekolah!</div>' +
                       '</div>' +
                       '</div>';
    }
    $('#admmuriddash_insightAlerts').html(insightHtml);

    // Render JQuery DataTable Rekap
    if ($.fn.DataTable.isDataTable('#admmuriddash_tabelRekap')) {
        ADMMURIDDASH_TABEL_REKAP = $('#admmuriddash_tabelRekap').DataTable();
    } else {
        ADMMURIDDASH_TABEL_REKAP = SultanTable.init('#admmuriddash_tabelRekap', {
            destroy: true, ordering: false, pageLength: 10, autoWidth: false, deferRender: true,
            dom: "<'row mb-2'<'col-sm-12 col-md-6'l><'col-sm-12 col-md-6'f>>" +
                 "<'row'<'col-sm-12'<'table-responsive sultan-scroll'tr>>>" +
                 "<'row mt-2'<'col-sm-12 col-md-5'i><'col-sm-12 col-md-7'p>>",
            columnDefs: [
                { targets: 0, className: "text-left align-middle" },
                { targets: [1, 2, 3], className: "text-center align-middle" }
            ],
            language: { url: "//cdn.datatables.net/plug-ins/1.10.25/i18n/Indonesian.json", emptyTable: "Tidak ada data." }
        });
    }

    ADMMURIDDASH_TABEL_REKAP.clear().rows.add(dtArray).draw(false);

    // Update Footer Totals
    var formatTotal = function(val) {
      return val === 0 ? "-" : val.toLocaleString('id-ID');
    };
    $('#admmuriddash_totalMuridL').text(formatTotal(sumL));
    $('#admmuriddash_totalMuridP').text(formatTotal(sumP));
    $('#admmuriddash_totalMuridAll').text(formatTotal(sumTotal));
  }

  function admmuriddash_salinKeWA() {
    if (ADMMURIDDASH_BELUM_UNGGAH_LIST.length === 0) { Sultan.notif.info('Semua sekolah sudah mengunggah dokumen.'); return; }
    
    var submenu = $('#admmuriddash_filterSubmenu').val();
    var selSub = (submenu === "SPMB") ? "Laporan SPMB" : "Cetak Ijazah";
    var selTahun = $('#admmuriddash_filterTahun').val() === "SEMUA" ? "Semua Tahun" : $('#admmuriddash_filterTahun').val();
    
    var teks = `🚨 *DAFTAR SEKOLAH BELUM UNGGAH* 🚨\n`;
    teks += `Menu: Administrasi Murid (${selSub})\n`;
    teks += `Tahun Ajaran: ${selTahun}\n`;
    teks += `Total Belum Unggah: ${ADMMURIDDASH_BELUM_UNGGAH_LIST.length} Sekolah SD\n\n`;

    ADMMURIDDASH_BELUM_UNGGAH_LIST.forEach(function(item, idx) {
        teks += `${idx + 1}. ${item.nama} (NPSN: ${item.npsn})\n`;
    });

    teks += `\nMohon segera mengunggah dokumen elektronik sekolah Anda melalui sistem SIKS. Terima kasih. 🙏`;

    navigator.clipboard.writeText(teks).then(function() {
        Sultan.notif.sukses('Daftar belum unggah berhasil disalin ke Clipboard (Siap Paste di WhatsApp).');
    }).catch(function() { Sultan.alert('error', 'Gagal Menyalin', 'Browser Anda tidak mendukung Clipboard API.'); });
  }
</script>

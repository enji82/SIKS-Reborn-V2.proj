<style>
/* Style Khusus Kolom Aksi Sticky Agar Adaptif Sesuai Mode */
#efilemaster_tabel td.col-sticky-left {
  background-color: #ffffff !important;
  color: var(--warna-maroon) !important;
}
.dark-mode #efilemaster_tabel td.col-sticky-left {
  background-color: var(--dm-bg-card) !important;
  color: var(--dm-text-main) !important;
}
#efilemaster_tabel thead th.col-sticky-left {
  background-color: #fff4d4 !important;
  color: var(--warna-maroon) !important;
  z-index: 10 !important;
}
.dark-mode #efilemaster_tabel thead th.col-sticky-left {
  background-color: var(--dm-bg-card) !important;
  color: var(--warna-emas-soft) !important;
  z-index: 10 !important;
}
</style>

<section class="content">
  <div class="container-fluid">
    <div class="row justify-content-center">
      <div class="col-12">

        <!-- Guard Non-Admin -->
        <div id="efilemaster_aksesDitolak" style="display:none;">
          <div class="sultan-alert alert-soft-danger text-center py-5">
            <i class="fas fa-ban fa-3x mb-3 d-block"></i>
            <h5 class="font-weight-bold">Akses Ditolak</h5>
            <p class="small">Halaman ini hanya dapat diakses oleh Administrator.</p>
          </div>
        </div>

        <div id="efilemaster_mainContent" style="display:none;">


          <div class="sultan-filter-pill-container shadow-sm mb-4">
            <div class="sultan-filter-item">
              <select id="efilemaster_filterAktif" class="form-control">
                <option value="SEMUA">- Semua Status -</option>
                <option value="AKTIF" selected>Aktif</option>
                <option value="NONAKTIF">Nonaktif</option>
              </select>
              <i class="fas fa-chevron-down"></i>
            </div>
            <div class="sultan-filter-item">
              <select id="efilemaster_filterPeriode" class="form-control">
                <option value="SEMUA">- Semua Jenis Periode -</option>
                <option value="TAHUNAN">Tahunan</option>
                <option value="PERIODE">Per Periode</option>
                <option value="PERMANEN">Permanen</option>
                <option value="TMT">Dengan TMT</option>
              </select>
              <i class="fas fa-chevron-down"></i>
            </div>
            <div class="divider-vertical d-none d-md-block mx-2"></div>
            <button type="button" id="efilemaster_btnRefresh" class="sultan-btn-refresh" title="Segarkan Data">
              <i class="fas fa-sync-alt"></i>
            </button>
            <div class="ml-auto d-none d-md-block"></div>
            <button type="button" id="efilemaster_btnTambah" class="sultan-btn-tambah">
              <i class="fas fa-plus"></i> TAMBAH KATEGORI
            </button>
          </div>

          <div class="card-sultan w-100 overflow-hidden">
            <div class="card-body p-3 w-100">
              <div id="efilemaster_loadingState"></div>
              <div id="efilemaster_tableState" style="display:none;">
                <table id="efilemaster_tabel" class="table table-hover table-premium table-sultan-compact text-nowrap mb-0 w-100" style="font-size: 13px;">
                  <thead class="thead-sultan-premium text-uppercase font-weight-bold">
                    <tr>
                      <th class="col-sticky-left text-center align-middle">AKSI</th>
                      <th class="text-center align-middle">STATUS</th>
                      <th class="text-left align-middle" style="min-width:60px;">ID</th>
                      <th class="text-left align-middle" style="min-width:200px;">NAMA DOKUMEN</th>
                      <th class="text-left align-middle">GRUP</th>
                      <th class="text-center align-middle">FORMAT</th>
                      <th class="text-center align-middle">JENIS PERIODE</th>
                      <th class="text-center align-middle">WAJIB UNTUK</th>
                      <th class="text-left align-middle" style="min-width:180px;">KETERANGAN / PANDUAN</th>
                    </tr>
                  </thead>
                  <tbody></tbody>
                </table>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>
</section>

<!-- TEMPLATE MODAL FORM -->
<div id="efilemaster_templates" style="display:none;">
  <form id="efilemaster_formSimpan" novalidate>
    <div class="modal-body modal-body-sultan p-4">
      <input type="hidden" id="efilemaster_f_rowid">
      <div class="row mb-3">
        <div class="col-md-4">
          <label class="form-label-sultan small font-weight-bold text-muted text-uppercase">ID Kategori <span class="text-danger">*</span></label>
          <input type="text" id="efilemaster_f_id" class="form-control form-control-sultan border-maroon font-weight-bold text-dark" placeholder="K01, K02, ..." maxlength="10" required>
          <small class="text-muted">Kode unik, tidak bisa diubah setelah tersimpan.</small>
        </div>
        <div class="col-md-8">
          <label class="form-label-sultan small font-weight-bold text-muted text-uppercase">Nama Dokumen <span class="text-danger">*</span></label>
          <input type="text" id="efilemaster_f_nama" class="form-control form-control-sultan border-maroon" placeholder="Nama lengkap berkas/dokumen..." maxlength="100" required>
        </div>
      </div>
      <div class="row mb-3">
        <div class="col-md-6">
          <label class="form-label-sultan small font-weight-bold text-muted text-uppercase">Grup / Parent</label>
          <input type="text" id="efilemaster_f_parent" class="form-control form-control-sultan" placeholder="Misal: Kepegawaian, Akademik...">
        </div>
        <div class="col-md-6">
          <label class="form-label-sultan small font-weight-bold text-muted text-uppercase">Format File</label>
          <select id="efilemaster_f_format" class="form-control form-control-sultan">
            <option value="PDF">PDF</option>
            <option value="IMG">JPG / PNG (Foto)</option>
            <option value="ALL">PDF / JPG / PNG (Bebas)</option>
          </select>
        </div>
      </div>
      <div class="row mb-3">
        <div class="col-md-6">
          <label class="form-label-sultan small font-weight-bold text-muted text-uppercase">Jenis Periode</label>
          <select id="efilemaster_f_periode" class="form-control form-control-sultan">
            <option value="">- Tidak Ada (Tahunan Default) -</option>
            <option value="TAHUNAN">Tahunan</option>
            <option value="PERIODE">Per Periode (Bulan Bebas)</option>
            <option value="PERMANEN">Permanen (Upload Sekali)</option>
            <option value="TMT">Dengan TMT (Tgl Mulai)</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label-sultan small font-weight-bold text-muted text-uppercase d-block mb-2">Wajib Untuk (Bisa Pilih > 1)</label>
          <div class="border rounded p-2 bg-light d-flex flex-wrap" style="gap:10px; min-height: 38px;">
            <div class="custom-control custom-checkbox mr-2">
              <input type="checkbox" class="custom-control-input efilemaster-f-wajib-cb" id="efilemaster_cb_cpns" value="CPNS">
              <label class="custom-control-label small font-weight-bold" for="efilemaster_cb_cpns">CPNS</label>
            </div>
            <div class="custom-control custom-checkbox mr-2">
              <input type="checkbox" class="custom-control-input efilemaster-f-wajib-cb" id="efilemaster_cb_pns" value="PNS">
              <label class="custom-control-label small font-weight-bold" for="efilemaster_cb_pns">PNS</label>
            </div>
            <div class="custom-control custom-checkbox mr-2">
              <input type="checkbox" class="custom-control-input efilemaster-f-wajib-cb" id="efilemaster_cb_pppk" value="PPPK">
              <label class="custom-control-label small font-weight-bold" for="efilemaster_cb_pppk">PPPK</label>
            </div>
            <div class="custom-control custom-checkbox mr-2">
              <input type="checkbox" class="custom-control-input efilemaster-f-wajib-cb" id="efilemaster_cb_pppkpw" value="PPPK Paruh Waktu">
              <label class="custom-control-label small font-weight-bold" for="efilemaster_cb_pppkpw">PPPK Paruh Waktu</label>
            </div>
            <div class="custom-control custom-checkbox mr-2">
              <input type="checkbox" class="custom-control-input efilemaster-f-wajib-cb" id="efilemaster_cb_nonasn" value="Tenaga Non ASN">
              <label class="custom-control-label small font-weight-bold" for="efilemaster_cb_nonasn">Tenaga Non ASN</label>
            </div>
          </div>
        </div>
      </div>
      <div class="form-group mb-3">
        <label class="form-label-sultan small font-weight-bold text-muted text-uppercase">Keterangan / Panduan untuk Pegawai</label>
        <textarea id="efilemaster_f_keterangan" class="form-control form-control-sultan" rows="2" maxlength="200" placeholder="Misal: Diunggah setahun sekali di awal tahun ajaran..."></textarea>
        <small class="text-muted">Ditampilkan sebagai panduan di form upload pegawai.</small>
      </div>
      <div class="row mb-3">
        <div class="col-md-6">
          <label class="form-label-sultan small font-weight-bold text-muted text-uppercase">Status Aktif</label>
          <div class="d-flex align-items-center mt-1" style="gap:12px;">
            <div class="custom-control custom-radio">
              <input type="radio" id="efilemaster_f_aktif_ya" name="efilemaster_f_aktif" class="custom-control-input" value="true" checked>
              <label class="custom-control-label text-success font-weight-bold" for="efilemaster_f_aktif_ya">Aktif</label>
            </div>
            <div class="custom-control custom-radio">
              <input type="radio" id="efilemaster_f_aktif_tidak" name="efilemaster_f_aktif" class="custom-control-input" value="false">
              <label class="custom-control-label text-muted font-weight-bold" for="efilemaster_f_aktif_tidak">Nonaktif</label>
            </div>
          </div>
        </div>
        <div class="col-md-6">
          <label class="form-label-sultan small font-weight-bold text-muted text-uppercase">Integrasi Dashboard</label>
          <div class="custom-control custom-checkbox mt-2">
            <input type="checkbox" class="custom-control-input" id="efilemaster_f_dashboard" checked>
            <label class="custom-control-label small font-weight-bold text-dark" for="efilemaster_f_dashboard">Tampilkan di Dashboard Rekapitulasi</label>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-footer modal-footer-tambah-edit justify-content-between">
      <button type="button" class="modal-btn-batal" data-dismiss="modal"><i class="fas fa-times mr-2"></i>BATAL</button>
      <button type="button" id="efilemaster_btnSimpan" class="modal-btn-simpan"><i class="fas fa-save mr-2"></i>SIMPAN</button>
    </div>
  </form>
</div>

<script>
var EFILEMASTER_CACHE_DATA = [];
var EFILEMASTER_TABEL_INSTANCE = null;
var EFILEMASTER_IS_ADMIN = false;
var EFILEMASTER_USER_AKTIF = "";

$(document).ready(function() {
  try {
    var user = typeof getSesiUser === 'function' ? getSesiUser() : {};
    EFILEMASTER_USER_AKTIF = user.nama_lengkap || user.username || "User Web";
    var rStr = String(user.role || "").toLowerCase();
    EFILEMASTER_IS_ADMIN = (typeof checkUserRoleIsAdmin === 'function' && checkUserRoleIsAdmin())
      || rStr.includes("admin") || rStr.includes("verifikator");
  } catch(e) { EFILEMASTER_IS_ADMIN = false; }

  if (!EFILEMASTER_IS_ADMIN) {
    $('#efilemaster_loadingState').hide();
    $('#efilemaster_aksesDitolak').show();
    $('#efilemaster_mainContent').show();
    return;
  }
  $('#efilemaster_mainContent').show();

  $(document).off('click.em', '#efilemaster_btnRefresh').on('click.em', '#efilemaster_btnRefresh', efilemaster_tarikData);
  $(document).off('click.em', '#efilemaster_btnTambah').on('click.em', '#efilemaster_btnTambah', efilemaster_bukaModalTambah);
  $(document).off('click.em', '#efilemaster_btnSimpan').on('click.em', '#efilemaster_btnSimpan', function() { $('#efilemaster_formSimpan').submit(); });
  $(document).off('submit.em', '#efilemaster_formSimpan').on('submit.em', '#efilemaster_formSimpan', efilemaster_submitSimpan);
  $(document).off('change.em', '#efilemaster_filterAktif, #efilemaster_filterPeriode').on('change.em', '#efilemaster_filterAktif, #efilemaster_filterPeriode', efilemaster_terapkanFilter);
  $(document).off('click.em', '.efilemaster-btn-edit').on('click.em', '.efilemaster-btn-edit', function() { efilemaster_bukaModalEdit($(this).attr('data-id')); });
  $(document).off('click.em', '.efilemaster-btn-toggle').on('click.em', '.efilemaster-btn-toggle', function() { efilemaster_toggleAktif($(this).attr('data-id'), $(this).attr('data-aktif') === 'true'); });

  efilemaster_tarikData();
});

function efilemaster_tarikData() {
  var btn = $('#efilemaster_btnRefresh');
  btn.prop('disabled', true).html('<i class="fas fa-spinner fa-spin text-maroon"></i>');
  if (!$.fn.DataTable.isDataTable('#efilemaster_tabel')) {
    $('#efilemaster_tableState').hide();
    SultanUI.showLoading('#efilemaster_loadingState', "Memuat Master Kategori...");
  }
  google.script.run.withSuccessHandler(function(json) {
    btn.prop('disabled', false).html('<i class="fas fa-sync-alt text-maroon"></i>');
    var res = JSON.parse(json);
    if (!res.success) {
      $('#efilemaster_loadingState').html('<div class="text-center text-danger py-5"><i class="fas fa-exclamation-triangle fa-3x mb-3"></i><br>' + efilemaster_esc(res.message) + '</div>');
      return;
    }
    EFILEMASTER_CACHE_DATA = res.data || [];
    if (!$.fn.DataTable.isDataTable('#efilemaster_tabel')) { efilemaster_initTable(); }
    efilemaster_terapkanFilter();
    SultanUI.hideLoading('#efilemaster_loadingState');
    $('#efilemaster_tableState').show();
    if (EFILEMASTER_TABEL_INSTANCE) setTimeout(function() { EFILEMASTER_TABEL_INSTANCE.columns.adjust(); }, 150);
  }).withFailureHandler(function(err) {
    btn.prop('disabled', false).html('<i class="fas fa-sync-alt text-maroon"></i>');
    $('#efilemaster_loadingState').html('<div class="text-center text-danger py-5"><i class="fas fa-wifi fa-3x mb-3"></i><br>Koneksi: ' + efilemaster_esc(err.message) + '</div>');
  }).getEfileMasterKategoriAdmin();
}

function efilemaster_initTable() {
  EFILEMASTER_TABEL_INSTANCE = SultanTable.init('#efilemaster_tabel', {
    "destroy": true, "ordering": false, "pageLength": 25, "autoWidth": false,
    "dom": "<'row mb-2'<'col-sm-12 col-md-6'l><'col-sm-12 col-md-6'f>>" +
           "<'row'<'col-sm-12'<'table-responsive sultan-scroll'tr>>>" +
           "<'row mt-2'<'col-sm-12 col-md-5'i><'col-sm-12 col-md-7'p>>",
    "columnDefs": [
      { "targets": 0, "width": "1%", "className": "col-sticky-left align-middle text-center text-nowrap" },
      { "targets": 1, "width": "1%", "className": "text-center align-middle text-nowrap" },
      { "targets": 2, "width": "1%", "className": "text-center align-middle font-weight-bold" },
      { "targets": [3,4,8], "width": "auto", "className": "text-left align-middle text-wrap" },
      { "targets": [5,6,7], "width": "1%", "className": "text-center align-middle text-nowrap" }
    ],
    "language": { "emptyTable": "Belum ada kategori yang sesuai filter." }
  });
}

function efilemaster_terapkanFilter() {
  if (!EFILEMASTER_TABEL_INSTANCE) return;
  var fAktif = $('#efilemaster_filterAktif').val();
  var fPeriode = ($('#efilemaster_filterPeriode').val() || '').toUpperCase();
  var hasil = EFILEMASTER_CACHE_DATA.filter(function(d) {
    if (fAktif === 'AKTIF' && !d.aktif) return false;
    if (fAktif === 'NONAKTIF' && d.aktif) return false;
    if (fPeriode !== 'SEMUA') {
      var jp = String(d.jenisPeriode || "").toUpperCase();
      if (!jp.includes(fPeriode)) return false;
    }
    return true;
  });
  efilemaster_renderTabel(hasil);
}

function efilemaster_renderTabel(data) {
  var dtArr = [];
  data.forEach(function(d) {
    var isAktif = d.aktif;
    var btnEdit = '<button type="button" class="sultan-btn-aksi sultan-btn-aksi-warning efilemaster-btn-edit" data-id="' + efilemaster_esc(d.idKat) + '" title="Edit Kategori"><i class="fas fa-edit"></i></button>';
    var toggleIco = isAktif ? '<i class="fas fa-toggle-on text-success"></i>' : '<i class="fas fa-toggle-off text-muted"></i>';
    var btnToggle = '<button type="button" class="sultan-btn-aksi efilemaster-btn-toggle" data-id="' + efilemaster_esc(d.idKat) + '" data-aktif="' + isAktif + '" title="' + (isAktif ? 'Nonaktifkan' : 'Aktifkan') + '" style="font-size:18px;background:transparent;border:none;padding:4px 8px;">' + toggleIco + '</button>';
    var aksi = '<div class="d-flex flex-nowrap justify-content-center" style="gap:4px;">' + btnEdit + btnToggle + '</div>';

    var badgeAktif = isAktif
      ? '<span class="badge badge-sultan-disetujui"><i class="fas fa-check-circle mr-1"></i>Aktif</span>'
      : '<span class="badge badge-secondary"><i class="fas fa-pause-circle mr-1"></i>Nonaktif</span>';

    var jp = String(d.jenisPeriode || "").toUpperCase();
    var badgePeriode = "";
    if (jp.includes("PERMANEN")) {
      badgePeriode = '<span class="font-weight-bold text-success"><i class="fas fa-infinity mr-1"></i>Permanen</span>';
    } else if (jp.includes("PERIODE")) {
      badgePeriode = '<span class="font-weight-bold text-primary"><i class="fas fa-calendar-alt mr-1"></i>Per Periode</span>';
    } else if (jp.includes("TMT")) {
      badgePeriode = '<span class="font-weight-bold text-info"><i class="fas fa-calendar-day mr-1"></i>Dgn TMT</span>';
    } else if (jp.includes("TAHUNAN")) {
      badgePeriode = '<span class="font-weight-bold text-secondary"><i class="fas fa-calendar-check mr-1"></i>Tahunan</span>';
    } else {
      badgePeriode = '<span class="text-muted">—</span>';
    }

    var fmt = String(d.format || "PDF").toUpperCase();
    var badgeFmt = "";
    if (fmt.includes("IMG") || fmt.includes("JPG")) {
      badgeFmt = '<span class="font-weight-bold text-success"><i class="fas fa-image mr-1"></i>JPG/PNG</span>';
    } else if (fmt.includes("ALL") || fmt.includes("BEBAS")) {
      badgeFmt = '<span class="font-weight-bold text-warning"><i class="fas fa-file-upload mr-1"></i>PDF/JPG</span>';
    } else {
      badgeFmt = '<span class="font-weight-bold text-danger"><i class="fas fa-file-pdf mr-1"></i>PDF</span>';
    }

    var wajib = (d.statusPegawaiWajib && d.statusPegawaiWajib.trim()) ? efilemaster_esc(d.statusPegawaiWajib) : '<span class="text-muted">Semua</span>';
    var ket = d.keterangan ? '<span class="text-muted font-italic" style="font-size:12px;">' + efilemaster_esc(d.keterangan) + '</span>' : '<span class="text-muted">—</span>';

    dtArr.push([
      aksi, badgeAktif,
      '<span class="badge badge-secondary font-weight-bold" style="font-size:12px;">' + efilemaster_esc(d.idKat) + '</span>',
      '<div class="font-weight-bold text-dark text-wrap" style="font-size:13px;">' + efilemaster_esc(d.namaKat) + '</div>',
      efilemaster_esc(d.parent) || '<span class="text-muted">—</span>',
      badgeFmt, badgePeriode, wajib, ket
    ]);
  });
  EFILEMASTER_TABEL_INSTANCE.clear().rows.add(dtArr).draw(false);
}

function efilemaster_bukaModalTambah() {
  var $form = $('#efilemaster_formSimpan');
  $form[0].reset(); $form.removeClass('was-validated');
  $('.efilemaster-f-wajib-cb').prop('checked', false);
  $('#efilemaster_f_rowid').val('');
  $('#efilemaster_f_id').prop('readonly', false).val('');
  $('input[name="efilemaster_f_aktif"][value="true"]').prop('checked', true);
  $('#efilemaster_f_dashboard').prop('checked', true);
  efilemaster_bukaModal('tambah', 'Tambah Kategori E-File Baru');
}

function efilemaster_bukaModalEdit(idKat) {
  var d = EFILEMASTER_CACHE_DATA.find(function(x) { return x.idKat === idKat; });
  if (!d) return;
  var $form = $('#efilemaster_formSimpan');
  $form[0].reset(); $form.removeClass('was-validated');
  $('.efilemaster-f-wajib-cb').prop('checked', false);

  $('#efilemaster_f_rowid').val(d.rowId);
  $('#efilemaster_f_id').prop('readonly', true).val(d.idKat);
  $('#efilemaster_f_nama').val(d.namaKat);
  $('#efilemaster_f_parent').val(d.parent);
  $('#efilemaster_f_format').val(d.format || 'PDF');
  $('#efilemaster_f_periode').val(d.jenisPeriode || '');
  
  if (d.statusPegawaiWajib) {
    var arrWajib = d.statusPegawaiWajib.split(',').map(function(s) { return s.trim(); });
    $('.efilemaster-f-wajib-cb').each(function() {
      if (arrWajib.indexOf($(this).val()) > -1) {
        $(this).prop('checked', true);
      }
    });
  }

  $('#efilemaster_f_keterangan').val(d.keterangan || '');
  $('input[name="efilemaster_f_aktif"][value="' + (d.aktif ? 'true' : 'false') + '"]').prop('checked', true);
  $('#efilemaster_f_dashboard').prop('checked', d.dashboard !== false);
  efilemaster_bukaModal('edit', 'Edit Kategori: ' + d.namaKat);
}

function efilemaster_bukaModal(tipe, judul) {
  var isEdit = tipe === 'edit';
  $('#global_modalFormSize').removeClass('modal-xl modal-lg').addClass('modal-lg');
  $('#global_modalFormHeader').removeClass('modal-header-sultan-primary modal-header-sultan-warning modal-header-sultan-danger modal-header-sultan-success modal-header-sultan-info modal-header-sultan-dark modal-header-edit modal-header-tambah-edit modal-header-hapus').addClass(isEdit ? 'modal-header-sultan-warning' : 'modal-header-tambah-edit');
  $('#global_modalFormTitle').html('<i class="fas fa-' + (isEdit ? 'edit' : 'plus') + ' mr-2"></i>' + efilemaster_esc(judul));
  $('#global_modalFormBody, #global_modalFormFooter').hide();
  $('#efilemaster_formSimpan').appendTo('#global_modalFormSize .modal-content');
  $('#global_modalForm').off('hidden.bs.modal.efilemaster').on('hidden.bs.modal.efilemaster', function() {
    $('#efilemaster_formSimpan').appendTo('#efilemaster_templates');
    $('#global_modalFormBody, #global_modalFormFooter').show();
  });
  $('#global_modalForm').modal('show');
  if (!isEdit) setTimeout(function() { $('#efilemaster_f_id').focus(); }, 150);
}

function efilemaster_submitSimpan(e) {
  e.preventDefault();
  var $form = $(this);
  if (!$form[0].checkValidity()) { $form.addClass('was-validated'); return; }

  var selectedWajib = [];
  $('.efilemaster-f-wajib-cb:checked').each(function() {
    selectedWajib.push($(this).val());
  });

  var payload = {
    rowId:              $('#efilemaster_f_rowid').val() || null,
    idKat:              $('#efilemaster_f_id').val().trim(),
    namaKat:            $('#efilemaster_f_nama').val().trim(),
    parent:             $('#efilemaster_f_parent').val().trim(),
    format:             $('#efilemaster_f_format').val(),
    jenisPeriode:       $('#efilemaster_f_periode').val(),
    statusPegawaiWajib: selectedWajib.join(','),
    keterangan:         $('#efilemaster_f_keterangan').val().trim(),
    aktif:              $('input[name="efilemaster_f_aktif"]:checked').val() !== 'false',
    dashboard:          $('#efilemaster_f_dashboard').is(':checked')
  };
  var btn = $('#efilemaster_btnSimpan'); var txt = btn.html();
  btn.prop('disabled', true).html('<i class="fas fa-spinner fa-spin mr-2"></i>MENYIMPAN...');
  google.script.run.withSuccessHandler(function(json) {
    btn.prop('disabled', false).html(txt);
    var res = JSON.parse(json);
    if (res.success) {
      Sultan.modal.tutupForm();
      setTimeout(function() { Sultan.notif.crud.simpan(!!payload.rowId); efilemaster_tarikData(); }, 400);
    } else { Sultan.notif.crud.gagal(res.message); }
  }).withFailureHandler(function(err) {
    btn.prop('disabled', false).html(txt);
    Sultan.notif.crud.gagal(err.message);
  }).simpanMasterKategori(payload);
}

function efilemaster_toggleAktif(idKat, isAktifSekarang) {
  var $modal = $('#global_modalHapus');
  var $header = $modal.find('.modal-header');
  var $icon = $modal.find('.text-danger i');
  var $securityBox = $modal.find('#global_hapusKodePengaman').closest('.bg-adaptive-sultan');
  var $btnConfirm = $('#global_btnConfirmHapus');
  var $btnBatal = $modal.find('.modal-btn-batal');

  // 1. Kustomisasi Dynamic Visual agar Identik dengan Kode Sultan
  $header.removeClass('modal-header-sultan-danger').addClass('modal-header-sultan-warning');
  $icon.removeClass('fa-trash-alt fa-exclamation-triangle text-danger').addClass('fa-exclamation-circle text-warning');
  $modal.find('.text-danger').removeClass('text-danger').addClass('text-warning');
  
  // Sembunyikan box input kode keamanan (karena ini bukan hapus permanen)
  $securityBox.hide();
  $modal.find('#global_hapusKodePengaman').prop('required', false).val('BYPASS_FOR_STATUS'); // isi dummy
  
  // Ubah Teks & Tombol
  $('#global_modalHapusTitle').html('<i class="fas fa-exclamation-circle mr-2"></i>Konfirmasi Perubahan Status');
  $('#global_hapusTeksUtama').text('Apakah Anda yakin ingin ' + (isAktifSekarang ? 'nonaktifkan' : 'aktifkan') + ' kategori ini?');
  
  var detailAksi = isAktifSekarang 
    ? 'Kategori tidak akan muncul lagi di dropdown upload baru pegawai, namun data berkas lama tetap aman.' 
    : 'Kategori akan kembali muncul di dropdown upload baru pegawai.';
  $('#global_hapusTeksSub').text(detailAksi);
  
  $btnConfirm.removeClass('modal-btn-hapus btn-danger').addClass('modal-btn-simpan btn-warning text-dark font-weight-bold')
    .html('<i class="fas fa-check mr-2"></i>YA, UBAH STATUS');

  // Render Detail Data Dinamis agar identik
  var detailArea = $('#global_hapusDetailArea');
  detailArea.empty().hide();
  var html = '<div class="sultan-detail-item border-0 mb-0">';
  html += '  <label class="sultan-detail-label">ID KATEGORI</label>';
  html += '  <div class="sultan-detail-value text-uppercase font-weight-bold text-maroon">' + idKat + '</div>';
  html += '</div>';
  detailArea.html(html).show();

  // 2. Submit Handler
  $('#global_formHapus').off('submit').on('submit', function (e) {
    e.preventDefault();
    $btnConfirm.prop('disabled', true).html('<i class="fas fa-spinner fa-spin mr-2"></i>MEMPROSES...');
    
    google.script.run.withSuccessHandler(function(json) {
      $modal.modal('hide');
      var res = JSON.parse(json);
      if (res.success) { 
        Sultan.notif.crud.sukses(res.message); 
        efilemaster_tarikData(); 
      } else { 
        Sultan.notif.crud.gagal(res.message); 
      }
    }).withFailureHandler(function(err) {
      $modal.modal('hide');
      Sultan.notif.crud.gagal(err.message);
    }).toggleAktifMasterKategori(idKat, !isAktifSekarang);
  });

  // 3. Reset state saat modal ditutup (kembalikan ke default Hapus Permanen)
  $modal.off('hidden.bs.modal.efilemaster').on('hidden.bs.modal.efilemaster', function () {
    $header.removeClass('modal-header-sultan-warning').addClass('modal-header-sultan-danger');
    $icon.removeClass('fa-exclamation-circle text-warning').addClass('fa-exclamation-triangle text-danger');
    $modal.find('.text-warning').removeClass('text-warning').addClass('text-danger');
    $securityBox.show();
    $modal.find('#global_hapusKodePengaman').prop('required', true).val('');
    $btnConfirm.removeClass('modal-btn-simpan btn-warning text-dark font-weight-bold').addClass('modal-btn-hapus')
      .html('<i class="fas fa-trash-alt mr-2"></i>HAPUS');
  });

  $modal.modal('show');
}

function efilemaster_esc(t) {
  return t ? String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;') : '';
}
</script>

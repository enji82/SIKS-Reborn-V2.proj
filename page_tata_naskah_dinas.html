<script>
var PERATURAN_TND_TABEL_INSTANCE = null;

$(document).ready(function() {
    loadPeraturanTNDFiles();
});

function loadPeraturanTNDFiles() {
    google.script.run
        .withSuccessHandler(function(resStr) {
            try {
                var res = JSON.parse(resStr);
                if (res.status === 'success') {
                    renderTablePeraturanTND(res.data);
                } else {
                    Swal.fire('Gagal', 'Gagal memuat dokumen: ' + res.message, 'error');
                }
            } catch (e) {
                Swal.fire('Error', 'Kesalahan format data: ' + e.message, 'error');
            }
        })
        .withFailureHandler(function(err) {
            Swal.fire('Error', 'Kesalahan server: ' + err.message, 'error');
        })
        .getPeraturanTNDFiles();
}

function renderTablePeraturanTND(data) {
    var dtArray = [];
    
    if (data && data.length > 0) {
        data.forEach(function(item, index) {
            var downloadUrl = 'https://drive.google.com/uc?export=download&id=' + item.id;
            var cleanName = item.name.replace(/\.[^/.]+$/, ""); // Hapus ekstensi
            var fileIcon = item.name.toLowerCase().endsWith('.pdf') ? '<i class="fas fa-file-pdf mr-2 text-danger"></i>' : '<i class="fas fa-file-word mr-2" style="color: #2b579a;"></i>';
            
            var aksiHtml = `
                <div class="d-flex justify-content-center">
                    <button type="button" class="sultan-btn-pdf" onclick="Sultan.modal.preview({url: '${item.url}', title: '${item.name}', downloadUrl: '${downloadUrl}'})" title="Lihat Dokumen">
                        <i class="fas fa-eye mr-1"></i> Lihat
                    </button>
                </div>
            `;
            
            var rowData = [
                `<span class="font-weight-bold text-maroon">${index + 1}</span>`,
                `${fileIcon}<span class="font-weight-bold text-dark">${cleanName}</span>`,
                aksiHtml
            ];
            dtArray.push(rowData);
        });
    }

    if (!$.fn.DataTable.isDataTable('#table-peraturan-tnd')) {
        PERATURAN_TND_TABEL_INSTANCE = SultanTable.init('#table-peraturan-tnd', {
            "data": dtArray,
            "destroy": true,
            "ordering": false,
            "pageLength": 10,
            "autoWidth": false,
            "deferRender": true,
            "columnDefs": [
                { "targets": 0, "className": "align-middle text-center" },
                { "targets": 1, "className": "align-middle text-left" },
                { "targets": 2, "className": "align-middle text-center" }
            ]
        });
    } else {
        if (PERATURAN_TND_TABEL_INSTANCE) {
            PERATURAN_TND_TABEL_INSTANCE.clear().rows.add(dtArray).draw(false);
        } else {
            $('#table-peraturan-tnd').DataTable().clear().rows.add(dtArray).draw(false);
        }
        
        if (dtArray.length === 0) {
            $('#table-peraturan-tnd .dataTables_empty').html('Tidak ada dokumen peraturan.');
        }
    }
}
</script>

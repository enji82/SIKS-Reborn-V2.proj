<section class="content sultan-page-transition">
    <div class="container-fluid">
        <div class="row justify-content-center">
            <div class="col-12">



                <div class="card-sultan">
                    <div class="card-body p-3">
                        
                            <table class="table table-hover table-premium table-sultan-compact mb-0 w-100 border-0" id="table-peraturan">
                                <thead class="thead-sultan-premium text-maroon text-uppercase">
                                    <tr>
                                        <th style="width: 10%;" class="align-middle text-center">No.</th>
                                        <th style="width: 60%;" class="align-middle text-left">Nama Dokumen</th>
                                        <th style="width: 30%;" class="align-middle text-center">Aksi</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td colspan="3" class="text-center text-muted py-4">
                                            <i class="fas fa-spinner fa-spin mr-2"></i> Memuat data dokumen...
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>



            </div>
        </div>
    </div>
</section>

<script>
var PERATURAN_TABEL_INSTANCE = null;

$(document).ready(function() {
    loadPeraturanFiles();
});

function loadPeraturanFiles() {
    google.script.run
        .withSuccessHandler(function(resStr) {
            try {
                var res = JSON.parse(resStr);
                if (res.status === 'success') {
                    renderTablePeraturan(res.data);
                } else {
                    Swal.fire('Gagal', 'Gagal memuat dokumen: ' + res.message, 'error');
                }
            } catch (e) {
                Swal.fire('Error', 'Kesalahan format data: ' + e.message, 'error');
            }
        })
        .withFailureHandler(function(err) {
            Swal.fire('Error', 'Kesalahan server: ' + err.message, 'error');
        })
        .getPeraturanFiles();
}

function renderTablePeraturan(data) {
    var dtArray = [];
    
    if (data && data.length > 0) {
        data.forEach(function(item, index) {
            var downloadUrl = 'https://drive.google.com/uc?export=download&id=' + item.id;
            
            var aksiHtml = `
                <div class="d-flex justify-content-center">
                    <button type="button" class="sultan-btn-pdf mr-2" onclick="Sultan.modal.preview({url: '${item.url}', title: '${item.name}'})" title="Lihat Dokumen">
                        <i class="fas fa-eye mr-1"></i> Lihat
                    </button>
                    <a href="${downloadUrl}" target="_blank" class="sultan-btn-pdf" title="Unduh Dokumen" style="text-decoration: none;">
                        <i class="fas fa-download mr-1"></i> Unduh
                    </a>
                </div>
            `;
            
            var rowData = [
                index + 1,
                `<span class="font-weight-bold text-dark">${item.name}</span>`,
                aksiHtml
            ];
            dtArray.push(rowData);
        });
    }

    // VAKSIN INISIASI: Buat tabel hanya 1x seumur hidup
    if (!$.fn.DataTable.isDataTable('#table-peraturan')) {
        PERATURAN_TABEL_INSTANCE = SultanTable.init('#table-peraturan', {
            "data": dtArray,
            "destroy": true,
            "ordering": false,
            "pageLength": 10,
            "autoWidth": false,
            "deferRender": true,
            "columnDefs": [
                { "targets": 0, "className": "align-middle text-center" },
                { "targets": 1, "className": "align-middle text-left" },
                { "targets": 2, "className": "align-middle text-center" }
            ]
        });
    } else {
        // VAKSIN ANTI-GLITZ: Murni update data tanpa adjust columns berulang-ulang
        if (PERATURAN_TABEL_INSTANCE) {
            PERATURAN_TABEL_INSTANCE.clear().rows.add(dtArray).draw(false);
        } else {
            // Fallback jika instance hilang
            $('#table-peraturan').DataTable().clear().rows.add(dtArray).draw(false);
        }
        
        // Timpa teks kosong jika benar-benar tidak ada data
        if (dtArray.length === 0) {
            $('#table-peraturan .dataTables_empty').html('Tidak ada dokumen peraturan.');
        }
    }
}
</script>

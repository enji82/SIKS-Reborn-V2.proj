<section class="content sultan-page-transition">
    <div class="container-fluid">
        
        <!-- Filter dan Ringkasan Informasi -->
        <div class="row justify-content-center mb-4">
            <div class="col-lg-10">
                <div class="card-sultan shadow-sm p-4 border-left-maroon">
                    <div class="d-flex align-items-center">
                        <div class="icon-circle mr-3 bg-soft-maroon" style="width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                            <i class="fas fa-gavel text-maroon" style="font-size: 20px;"></i>
                        </div>
                        <div>
                            <h6 class="font-weight-bold text-dark mb-1">Landasan Hukum & Regulasi</h6>
                            <p class="text-muted mb-0 small">Daftar peraturan perundang-undangan resmi yang menjadi dasar hukum penyusunan SK Pembagian Tugas Sekolah.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Grid Cards Dokumen -->
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="row" id="peraturan-cards-container">
                    <!-- Skeleton Loader saat Loading -->
                    <div class="col-md-6 mb-4 skeleton-card-peraturan">
                        <div class="card-sultan p-4 shadow-sm h-100">
                            <div class="d-flex align-items-center mb-3">
                                <div class="sultan-skeleton sultan-skeleton-circle mr-3" style="width: 44px; height: 44px; flex-shrink: 0;"></div>
                                <div style="flex: 1;">
                                    <div class="sultan-skeleton sultan-skeleton-text" style="width: 85%;"></div>
                                    <div class="sultan-skeleton sultan-skeleton-text" style="width: 40%; height: 0.9rem;"></div>
                                </div>
                            </div>
                            <div class="d-flex justify-content-end gap-2 mt-4 pt-3 border-top border-light">
                                <div class="sultan-skeleton mr-2" style="width: 90px; height: 32px; border-radius: 50px;"></div>
                                <div class="sultan-skeleton" style="width: 90px; height: 32px; border-radius: 50px;"></div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6 mb-4 skeleton-card-peraturan">
                        <div class="card-sultan p-4 shadow-sm h-100">
                            <div class="d-flex align-items-center mb-3">
                                <div class="sultan-skeleton sultan-skeleton-circle mr-3" style="width: 44px; height: 44px; flex-shrink: 0;"></div>
                                <div style="flex: 1;">
                                    <div class="sultan-skeleton sultan-skeleton-text" style="width: 75%;"></div>
                                    <div class="sultan-skeleton sultan-skeleton-text" style="width: 50%; height: 0.9rem;"></div>
                                </div>
                            </div>
                            <div class="d-flex justify-content-end gap-2 mt-4 pt-3 border-top border-light">
                                <div class="sultan-skeleton mr-2" style="width: 90px; height: 32px; border-radius: 50px;"></div>
                                <div class="sultan-skeleton" style="width: 90px; height: 32px; border-radius: 50px;"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</section>

<script>
$(document).ready(function() {
    loadPeraturanFiles();
});

function loadPeraturanFiles() {
    google.script.run
        .withSuccessHandler(function(resStr) {
            try {
                var res = JSON.parse(resStr);
                if (res.status === 'success') {
                    renderCardsPeraturan(res.data);
                } else {
                    Swal.fire('Gagal', 'Gagal memuat dokumen: ' + res.message, 'error');
                }
            } catch (e) {
                Swal.fire('Error', 'Kesalahan format data: ' + e.message, 'error');
            }
        })
        .withFailureHandler(function(err) {
            Swal.fire('Error', 'Kesalahan server: ' + err.message, 'error');
        })
        .getPeraturanFiles();
}

function renderCardsPeraturan(data) {
    var $container = $('#peraturan-cards-container');
    $container.empty();
    
    if (!data || data.length === 0) {
        $container.html(`
            <div class="col-12 text-center py-5">
                <div class="icon-circle mb-3 bg-soft-maroon mx-auto" style="width: 80px; height: 80px; font-size: 32px; line-height: 80px; border-radius: 20px; display: flex; align-items: center; justify-content: center;">
                    <i class="fas fa-folder-open text-maroon"></i>
                </div>
                <h5 class="font-weight-bold text-dark mb-1">Belum Ada Dokumen</h5>
                <p class="text-muted small">Tidak ada dokumen peraturan perundang-undangan yang ditemukan.</p>
            </div>
        `);
        return;
    }
    
    data.forEach(function(item) {
        var downloadUrl = 'https://drive.google.com/uc?export=download&id=' + item.id;
        var cleanName = item.name.replace(/\.[^/.]+$/, ""); // Hapus ekstensi
        
        // Deteksi Tipe & Ekstensi File
        var isPdf = item.name.toLowerCase().endsWith('.pdf');
        var accentColor = isPdf ? 'var(--warna-maroon)' : '#2b579a';
        var iconHtml = isPdf ? '<i class="fas fa-file-pdf text-danger"></i>' : '<i class="fas fa-file-word" style="color: #2b579a;"></i>';
        var iconBgClass = isPdf ? 'bg-soft-danger' : 'bg-soft-primary';
        
        // Deteksi Jenis Dokumen untuk Tagging
        var tagText = 'PERATURAN';
        var badgeStyle = 'background: rgba(108, 117, 125, 0.1); color: #6c757d;';
        var nameLower = item.name.toLowerCase();
        
        if (nameLower.includes('perbup') || nameLower.includes('bupati')) {
            tagText = 'PERBUP';
            badgeStyle = 'background: rgba(128, 0, 0, 0.1); color: var(--warna-maroon);';
        } else if (nameLower.includes('permendikbud') || nameLower.includes('menteri')) {
            tagText = 'PERMENDIKBUD';
            badgeStyle = 'background: rgba(23, 162, 184, 0.1); color: #17a2b8;';
        } else if (nameLower.includes('sk') || nameLower.includes('keputusan')) {
            tagText = 'SK KEPALA';
            badgeStyle = 'background: rgba(40, 167, 69, 0.1); color: #28a745;';
        } else if (nameLower.includes('uu') || nameLower.includes('undang')) {
            tagText = 'UNDANG-UNDANG';
            badgeStyle = 'background: rgba(255, 193, 7, 0.15); color: #b38600;';
        }

        var cardHtml = `
            <div class="col-md-6 mb-4 sultan-page-transition">
                <div class="card-sultan h-100 shadow-sm border-left-sultan-accent" style="border-left: 4px solid ${accentColor} !important; transition: transform 0.2s ease, box-shadow 0.2s ease;">
                    <div class="card-body p-4 d-flex flex-column h-100 justify-content-between" style="min-height: 175px;">
                        <div class="d-flex align-items-start mb-3">
                            <div class="icon-circle mr-3 ${iconBgClass}" style="width: 44px; height: 44px; font-size: 18px; line-height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                                ${iconHtml}
                            </div>
                            <div style="flex: 1; min-width: 0;">
                                <h6 class="font-weight-bold text-dark mb-2" style="font-size: 0.92rem; line-height: 1.45; word-wrap: break-word; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; text-overflow: ellipsis; height: 2.9em;">
                                    ${cleanName}
                                </h6>
                                <span class="badge px-2 py-1 rounded-pill" style="font-size: 10px; font-weight: 700; letter-spacing: 0.3px; ${badgeStyle}">
                                    ${tagText}
                                </span>
                            </div>
                        </div>
                        
                        <div class="d-flex justify-content-end gap-2 mt-auto pt-3" style="border-top: 1px solid rgba(0,0,0,0.05) !important;">
                            <button type="button" class="btn btn-outline-maroon btn-sm rounded-pill px-3 mr-2 font-weight-bold shadow-sm" 
                                onclick="Sultan.modal.preview({url: '${item.url}', title: '${item.name}', downloadUrl: '${downloadUrl}'})" 
                                style="font-size: 11px; letter-spacing: 0.5px;">
                                <i class="fas fa-eye mr-1"></i> LIHAT
                            </button>
                            <a href="${downloadUrl}" class="btn btn-maroon btn-sm rounded-pill px-3 font-weight-bold shadow-sm" 
                                style="font-size: 11px; letter-spacing: 0.5px;">
                                <i class="fas fa-cloud-download-alt mr-1"></i> UNDUH
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        `;
        $container.append(cardHtml);
    });
}
</script>

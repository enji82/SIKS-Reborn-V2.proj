<section class="content sultan-page-transition">
    <div class="container-fluid">
        <div class="row justify-content-center">
            <div class="col-12">



                <div class="card-sultan">
                    <div class="card-body p-3">
                        
                        <div class="table-responsive">
                            <table class="table table-hover table-premium table-sultan-compact mb-0 w-100 border-0" id="table-peraturan">
                                <thead class="thead-sultan-premium text-maroon text-uppercase">
                                    <tr>
                                        <th style="width: 10%;" class="align-middle text-center">No.</th>
                                        <th style="width: 60%;" class="align-middle text-left">Nama Dokumen</th>
                                        <th style="width: 30%;" class="align-middle text-center">Aksi</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td colspan="3" class="text-center text-muted py-4">
                                            <i class="fas fa-spinner fa-spin mr-2"></i> Memuat data dokumen...
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                    </div>
                </div>



            </div>
        </div>
    </div>
</section>

<script>
$(document).ready(function() {
    loadPeraturanFiles();
});

function loadPeraturanFiles() {
    google.script.run
        .withSuccessHandler(function(resStr) {
            try {
                var res = JSON.parse(resStr);
                if (res.status === 'success') {
                    renderTablePeraturan(res.data);
                } else {
                    Swal.fire('Gagal', 'Gagal memuat dokumen: ' + res.message, 'error');
                }
            } catch (e) {
                Swal.fire('Error', 'Kesalahan format data: ' + e.message, 'error');
            }
        })
        .withFailureHandler(function(err) {
            Swal.fire('Error', 'Kesalahan server: ' + err.message, 'error');
        })
        .getPeraturanFiles();
}

function renderTablePeraturan(data) {
    var tbody = $('#table-peraturan tbody');
    tbody.empty();
    
    if (!data || data.length === 0) {
        tbody.append('<tr><td colspan="3" class="text-center text-muted py-4">Tidak ada dokumen yang ditemukan.</td></tr>');
        return;
    }
    
    data.forEach(function(item, index) {
        // Download URL menggunakan format ID
        var downloadUrl = 'https://drive.google.com/uc?export=download&id=' + item.id;
        
        var aksiHtml = `
            <div class="d-flex justify-content-center">
                <button type="button" class="sultan-btn-pdf mr-2" onclick="previewPDF('${item.url}')" title="Lihat Dokumen">
                    <i class="fas fa-eye mr-1"></i> Lihat
                </button>
                <a href="${downloadUrl}" target="_blank" class="sultan-btn-pdf bg-success text-white border-success" title="Unduh Dokumen" style="text-decoration: none;">
                    <i class="fas fa-download mr-1"></i> Unduh
                </a>
            </div>
        `;
        
        var row = `
            <tr>
                <td class="text-center align-middle">${index + 1}</td>
                <td class="align-middle font-weight-bold text-dark">${item.name}</td>
                <td class="align-middle">${aksiHtml}</td>
            </tr>
        `;
        tbody.append(row);
    });
    
    if (typeof SultanTable !== 'undefined') {
        SultanTable.init('#table-peraturan', {
            "ordering": false,
            "pageLength": 10,
            "dom": "<'row mb-2'<'col-sm-12 col-md-6'l><'col-sm-12 col-md-6'f>>" +
                   "<'row'<'col-sm-12'<'table-responsive'tr>>>" +
                   "<'row mt-3'<'col-sm-12 col-md-5 text-muted'i><'col-sm-12 col-md-7'p>>",
        });
    } else {
        if ($.fn.DataTable.isDataTable('#table-peraturan')) {
            $('#table-peraturan').DataTable().destroy();
        }
        $('#table-peraturan').DataTable({
            "language": {
                "url": "//cdn.datatables.net/plug-ins/1.10.25/i18n/Indonesian.json",
                "search": "", "searchPlaceholder": "Cari dokumen..."
            },
            "pageLength": 10,
            "ordering": false,
            "lengthChange": false,
            "info": true
        });
    }
}
</script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;600;800&display=swap');

  :root {
    --warna-maroon: #800000;
    --warna-maroon-tua: #4a0000;
    --maroon-glow: rgba(128, 0, 0, 0.3);
  }

  .login-screen-wrapper {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at center, #5e0a0a 0%, #1a0000 100%);
    z-index: 9999;
    overflow: hidden;
    font-family: 'Outfit', sans-serif;

  /* Animated Background Icons */
  .edu-bg-icons {
    position: absolute;
    width: 100%;
    height: 100%;
    z-index: 1;
    pointer-events: none;
  }
  .edu-bg-icons i {
    position: absolute;
    color: rgba(255, 255, 255, 0.07);
    font-size: 35px;
    animation: floatingIcons 15s linear infinite;
    opacity: 0;
  }
  .edu-bg-icons i:nth-child(1) { top: 10%; left: 10%; animation-duration: 20s; }
  .edu-bg-icons i:nth-child(2) { top: 70%; left: 15%; animation-duration: 25s; animation-delay: -5s; }
  .edu-bg-icons i:nth-child(3) { top: 40%; left: 85%; animation-duration: 18s; animation-delay: -2s; }
  .edu-bg-icons i:nth-child(4) { top: 20%; left: 70%; animation-duration: 22s; animation-delay: -10s; }
  .edu-bg-icons i:nth-child(5) { top: 85%; left: 50%; animation-duration: 20s; animation-delay: -15s; }
  .edu-bg-icons i:nth-child(6) { top: 60%; left: 5%;  animation-duration: 25s; animation-delay: -7s; }
  .edu-bg-icons i:nth-child(7) { top: 15%; left: 90%; animation-duration: 18s; animation-delay: -3s; }
  .edu-bg-icons i:nth-child(8) { top: 90%; left: 80%; animation-duration: 22s; animation-delay: -12s; }

  @keyframes floatingIcons {
    0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    20% { opacity: 0.6; }
    80% { opacity: 0.6; }
    100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
  }

  .login-box {
    width: 100%;
    max-width: 440px;
    padding: 20px;
    position: relative;
    z-index: 10;
  }

  .card-glass {
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.4);
    border-radius: 30px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.4);
    overflow: hidden;
    animation: sultanCardIn 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  @keyframes sultanCardIn {
    from { opacity: 0; transform: translateY(30px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .card-header-premium {
    background: linear-gradient(135deg, var(--warna-maroon) 0%, var(--warna-maroon-tua) 100%);
    padding: 45px 30px;
    text-align: center;
    position: relative;
    border-bottom: 4px solid #FFD700;
  }

  .logo-container {
    width: 90px;
    height: 90px;
    background: white;
    border-radius: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.3);
    transition: all 0.5s ease;
  }
  .logo-container i { color: var(--warna-maroon); }

  .login-body {
    padding: 40px 35px;
  }

  .input-wrapper {
    position: relative;
    margin-bottom: 22px;
  }

  .input-wrapper i {
    position: absolute;
    left: 20px;
    top: 50%;
    transform: translateY(-50%);
    color: #a0a0a0;
    font-size: 19px;
    transition: all 0.3s;
  }

  .form-control-premium {
    width: 100%;
    padding: 16px 20px 16px 55px;
    border: 2px solid #eef0f2;
    border-radius: 16px;
    background: #f8fafc;
    font-size: 15px;
    font-weight: 600;
    color: #2d3436;
    transition: all 0.3s ease;
    outline: none;
  }

  .form-control-premium:focus {
    background: white;
    border-color: var(--warna-maroon);
    box-shadow: 0 8px 20px rgba(128, 0, 0, 0.08);
  }

  .form-control-premium:focus + i {
    color: var(--warna-maroon);
    transform: translateY(-50%) scale(1.1);
  }

  .btn-premium {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 16px;
    background: linear-gradient(to right, var(--warna-maroon), #a30000);
    color: white;
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 1.5px;
    cursor: pointer;
    box-shadow: 0 10px 25px var(--maroon-glow);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    margin-top: 10px;
    text-transform: uppercase;
  }

  .btn-premium:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 30px var(--maroon-glow);
    filter: brightness(1.1);
  }

  .btn-premium:active {
    transform: translateY(-1px);
  }

  .login-footer {
    text-align: center;
    margin-top: 35px;
    color: #888;
    font-size: 12px;
    line-height: 1.6;
    font-weight: 500;
  }

  /* View Success State */
  #viewSuccess {
    display: none;
    text-align: center;
    padding: 10px 0;
  }

  .success-avatar {
    width: 110px;
    height: 110px;
    border-radius: 35px;
    border: 5px solid white;
    box-shadow: 0 15px 35px rgba(0,0,0,0.15);
    margin-bottom: 25px;
    animation: sultanAvatarPulse 2s infinite;
  }

  @keyframes sultanAvatarPulse {
    0% { transform: scale(1); box-shadow: 0 15px 35px rgba(0,0,0,0.15); }
    50% { transform: scale(1.05); box-shadow: 0 20px 45px rgba(128, 0, 0, 0.2); }
    100% { transform: scale(1); box-shadow: 0 15px 35px rgba(0,0,0,0.15); }
  }

  .welcome-text {
    font-size: 26px;
    font-weight: 800;
    color: var(--warna-maroon);
    margin-bottom: 8px;
    font-family: 'Inter', sans-serif;
  }

  .user-name {
    font-size: 18px;
    color: #4a4a4a;
    font-weight: 600;
    margin-bottom: 25px;
  }

  .loading-bar {
    width: 100%;
    height: 8px;
    background: #edf2f7;
    border-radius: 20px;
    overflow: hidden;
    margin: 20px 0 10px;
  }

  .loading-progress {
    width: 0%;
    height: 100%;
    background: linear-gradient(to right, var(--warna-maroon), #ff4d4d);
    border-radius: 20px;
    animation: loadingAnim 2.5s cubic-bezier(0.65, 0, 0.35, 1) forwards;
  }

  @keyframes loadingAnim {
    0% { width: 0%; }
    100% { width: 100%; }
  }

  .shake-effect {
    animation: sultanShake 0.5s cubic-bezier(.36,.07,.19,.97) both;
  }

  @keyframes sultanShake {
    10%, 90% { transform: translate3d(-1px, 0, 0); }
    20%, 80% { transform: translate3d(2px, 0, 0); }
    30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
    40%, 60% { transform: translate3d(4px, 0, 0); }
  }

  @media (max-width: 480px) {
    .login-box { padding: 15px; }
    .card-header-premium { padding: 35px 20px; }
    .login-body { padding: 30px 25px; }
  }
</style>


  <div class="login-box">
    <div class="card-glass" id="mainCard">
      
      <div class="card-header-premium" id="cardHeader">
        <div class="logo-container" id="logoBox">
          <i class="fa-brands fa-gg fa-3x text-warning" style="transform: rotate(90deg) scaleX(-1); display: inline-block; -webkit-text-stroke: 1.5px #ffc107; filter: drop-shadow(0 0 8px rgba(255, 193, 7, 0.5));"></i>
        </div>
        <div id="headerText">
            <h2 class="font-weight-bold text-white mb-0" style="font-size: 24px; letter-spacing: 2px;">SIKS-REBORN</h2>
            <p></p>
            <p class="text-white-50 small mt-1 text-uppercase" style="letter-spacing: 1px;">SISTEM INFORMASI KORWIL SECANG<br>-<br>
            Ruang Edukasi dan Layanan Berbasis Online Terintegrasi</p>
        </div>
      </div>

      <div class="login-body">
        
        <div id="viewForm">
            <form id="formLogin" onsubmit="handleLoginExec(event)">
              <div class="input-wrapper">
                <input type="text" id="username" name="username" class="form-control-premium" placeholder="NPSN / Username" required autocomplete="off">
                <i class="fas fa-user-circle"></i>
              </div>
              <div class="input-wrapper">
                <input type="password" id="password" name="password" class="form-control-premium" placeholder="Kata Sandi" required>
                <i class="fas fa-lock"></i>
                <i class="fas fa-eye" id="togglePass" style="left: auto; right: 15px; font-size: 16px; cursor: pointer; z-index:5;" onclick="togglePassword()"></i>
              </div>
              <button type="submit" id="tombolLogin" class="btn-premium">
                <i class="fas fa-sign-in-alt mr-2"></i> MASUK APLIKASI
              </button>
            </form>
            <div class="login-footer">
              <strong>Layanan Pendidikan Terintegrasi</strong><br>
              &copy; 2026 Korwil Disdikbud Kecamatan Secang
            </div>
        </div>

        <div id="viewSuccess">
            <img src="https://ui-avatars.com/api/?name=User&background=random" id="userAvatar" class="success-avatar">
            <h3 class="welcome-text">Selamat Datang!</h3>
            <p class="user-name" id="welcomeName">Administrator</p>
            
            <div class="loading-bar mt-3">
                <div class="loading-progress"></div>
            </div>
            <p class="small text-muted mt-2">Menyiapkan Dashboard...</p>
        </div>

      </div>
    </div>
  </div>
</div>

<div id="confetti-wrapper"></div>

<script>
  console.log("🔥 Login Page Loaded v3 (In-Card).");

  function togglePassword() {
    var x = document.getElementById("password");
    var icon = document.getElementById("togglePass");
    if (x.type === "password") {
      x.type = "text"; icon.classList.remove("fa-eye"); icon.classList.add("fa-eye-slash"); icon.style.color = "#800000";
    } else {
      x.type = "password"; icon.classList.remove("fa-eye-slash"); icon.classList.add("fa-eye"); icon.style.color = "#999";
    }
  }

  function runFireworks() {
    if(typeof confetti !== 'undefined'){
       var duration = 3000; var animationEnd = Date.now() + duration;
       var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 2147483647 };
       var interval = setInterval(function() {
         var timeLeft = animationEnd - Date.now();
         if (timeLeft <= 0) { return clearInterval(interval); }
         var particleCount = 50 * (timeLeft / duration);
         confetti(Object.assign({}, defaults, { particleCount, origin: { x: Math.random(), y: Math.random() - 0.2 }, colors: ['#FFD700', '#800000'] }));
       }, 250);
    }
  }

  function handleLoginExec(e) {
    e.preventDefault(); 
    var u = $('#username').val();
    var p = $('#password').val();
    var btn = $('#tombolLogin');
    var box = $('.login-box');

    // UI Loading Button
    btn.prop('disabled', true).html('<i class="fas fa-spinner fa-spin mr-2"></i> MEMERIKSA...');
    
    google.script.run
      .withSuccessHandler(function(res) {
        if (res && res.status === 'success') {
          // --- SUKSES: JANGAN PAKAI ALERT, GANTI TAMPILAN KARTU ---
          console.log("✅ Login Sukses");
          
          // 1. Simpan Session
          var fullName = "User";
          if (res.userData) {
             fullName = res.userData.nama_lengkap || res.userData.username;
             if(!res.userData.nama_lengkap) res.userData.nama_lengkap = res.userData.username;
             res.userData.loginTimestamp = Date.now();
             localStorage.setItem("siksUser", JSON.stringify(res.userData));
          }

          // 2. Jalankan Kembang Api
          runFireworks();

          // 3. TRANSISI UI (FADE OUT FORM -> FADE IN SUCCESS)
          // Siapkan data tampilan sukses
          $('#welcomeName').text(fullName);
          var avatarUrl = "https://ui-avatars.com/api/?name=" + encodeURIComponent(fullName) + "&background=800000&color=fff&bold=true";
          if(res.userData.photo && res.userData.photo.startsWith("http")) avatarUrl = res.userData.photo;
          else if(res.userData.photo) avatarUrl = "https://drive.google.com/thumbnail?id=" + res.userData.photo + "&sz=200";
          $('#userAvatar').attr('src', avatarUrl);

          // Animasi Header (Menyusut sedikit biar elegan)
          $('#logoBox').css('transform', 'scale(0.8)');
          $('#headerText').slideUp(300); // Sembunyikan teks judul biar fokus ke user
          $('.card-header-premium').css('padding-bottom', '20px');

          // Ganti Konten Body
          $('#viewForm').fadeOut(300, function() {
              $('#viewSuccess').fadeIn(500);
          });

          // 4. TRANSISI KE DASHBOARD (Setelah 2 detik menikmati animasi)
          setTimeout(function(){
            // Gunakan updateNavbarUI global jika ada
            if(typeof updateNavbarUI === 'function' && res.userData) {
                updateNavbarUI(res.userData);
            }
            
            // Fade Out Login Screen
            $('.login-screen-wrapper').fadeOut(600, function(){
                $('#konten-aplikasi').fadeIn(600); // Tampilkan Dashboard
                if (typeof inisialisasiAplikasi === 'function') {
                    inisialisasiAplikasi();
                } else if(typeof loadContent === 'function') {
                    loadContent('home'); 
                }
                $(window).trigger('resize');
            });
          }, 2000);

        } else {
          // --- GAGAL (TETAP PAKAI TOAST) ---
          console.log("⛔ Login Gagal: " + res.message);
          btn.prop('disabled', false).html('<i class="fas fa-sign-in-alt mr-2"></i> MASUK APLIKASI');
          
          box.addClass('shake-effect');
          setTimeout(() => box.removeClass('shake-effect'), 500);
          
          if(typeof Sultan !== 'undefined' && Sultan.alert){
              Sultan.alert('error', 'Login Gagal', res.message || "Username atau Password salah.");
          } else if(typeof Swal !== 'undefined'){
              Swal.fire({
                icon: 'error',
                title: '<span style="color:#800000; font-weight:bold;">Login Gagal</span>',
                text: res.message || "Username atau Password salah.",
                confirmButtonColor: '#800000',
                background: '#fff',
                customClass: { popup: 'card-sultan' }
              });
          } else {
              alert("LOGIN GAGAL: " + (res.message || "Username/Password Salah"));
          }
        }
      })
      .withFailureHandler(function(err) {
        btn.prop('disabled', false).html('<i class="fas fa-sign-in-alt mr-2"></i> MASUK APLIKASI');
        alert("Koneksi Server Terputus!");
      })
      .processLogin({username: u, password: p});
  }
</script>

<section class="content">
    <div class="container-fluid">

        <!-- FILTER BAR -->
        <div class="sultan-filter-pill-container shadow-sm mb-4">
            <div class="sultan-filter-item">
                <select id="dashAduan_filterTahun" class="form-control"></select>
                <i class="fas fa-chevron-down"></i>
            </div>
            <div class="sultan-filter-item">
                <select id="dashAduan_filterBulan" class="form-control">
                    <option value="">- Semua Bulan -</option>
                    <option value="Januari">Januari</option>
                    <option value="Februari">Februari</option>
                    <option value="Maret">Maret</option>
                    <option value="April">April</option>
                    <option value="Mei">Mei</option>
                    <option value="Juni">Juni</option>
                    <option value="Juli">Juli</option>
                    <option value="Agustus">Agustus</option>
                    <option value="September">September</option>
                    <option value="Oktober">Oktober</option>
                    <option value="November">November</option>
                    <option value="Desember">Desember</option>
                </select>
                <i class="fas fa-chevron-down"></i>
            </div>
            <div class="divider-vertical d-none d-md-block"></div>
            <button type="button" id="dashAduan_btnRefresh" class="sultan-btn-refresh" title="Segarkan Data">
                <i class="fas fa-sync-alt"></i>
            </button>
        </div>

        <!-- KARTU METRIK STATUS (6 Kartu Metrik Utama yang Dikelompokkan dengan Rapi) -->
        <div class="row mb-4">
            <!-- Total Masuk -->
            <div class="col-xl-2 col-lg-4 col-md-6 mb-3">
                <div class="sultan-metric-card metric-navy" style="min-height: 100px; padding: 12px;">
                    <div class="inner">
                        <h3 id="dashAduan_valTotal" style="font-size: 1.8rem; font-weight: bold; margin-bottom: 2px;">0</h3>
                        <p style="font-size: 11px; font-weight: bold; margin-bottom: 0;">Total Aduan</p>
                    </div>
                    <div class="icon" style="font-size: 50px; right: 10px; top: 10px;"><i class="fas fa-bullhorn"></i></div>
                </div>
            </div>

            <!-- Diproses -->
            <div class="col-xl-2 col-lg-4 col-md-6 mb-3">
                <div class="sultan-metric-card metric-info" style="min-height: 100px; padding: 12px;">
                    <div class="inner">
                        <h3 id="dashAduan_valDiproses" style="font-size: 1.8rem; font-weight: bold; margin-bottom: 2px;">0</h3>
                        <p style="font-size: 11px; font-weight: bold; margin-bottom: 0;">Menunggu</p>
                    </div>
                    <div class="icon" style="font-size: 50px; right: 10px; top: 10px;"><i class="fas fa-clock"></i></div>
                </div>
            </div>

            <!-- Ditinjau -->
            <div class="col-xl-2 col-lg-4 col-md-6 mb-3">
                <div class="sultan-metric-card metric-gold" style="min-height: 100px; padding: 12px;">
                    <div class="inner">
                        <h3 id="dashAduan_valDitinjau" style="font-size: 1.8rem; font-weight: bold; margin-bottom: 2px;">0</h3>
                        <p style="font-size: 11px; font-weight: bold; margin-bottom: 0;">Ditinjau</p>
                    </div>
                    <div class="icon" style="font-size: 50px; right: 10px; top: 10px;"><i class="fas fa-search"></i></div>
                </div>
            </div>

            <!-- Selesai -->
            <div class="col-xl-2 col-lg-4 col-md-6 mb-3">
                <div class="sultan-metric-card metric-success" style="min-height: 100px; padding: 12px;">
                    <div class="inner">
                        <h3 id="dashAduan_valSelesai" style="font-size: 1.8rem; font-weight: bold; margin-bottom: 2px;">0</h3>
                        <p style="font-size: 11px; font-weight: bold; margin-bottom: 0;">Selesai</p>
                    </div>
                    <div class="icon" style="font-size: 50px; right: 10px; top: 10px;"><i class="fas fa-check-circle"></i></div>
                </div>
            </div>

            <!-- Ditolak -->
            <div class="col-xl-2 col-lg-4 col-md-6 mb-3">
                <div class="sultan-metric-card metric-maroon" style="min-height: 100px; padding: 12px;">
                    <div class="inner">
                        <h3 id="dashAduan_valDitolak" style="font-size: 1.8rem; font-weight: bold; margin-bottom: 2px;">0</h3>
                        <p style="font-size: 11px; font-weight: bold; margin-bottom: 0;">Ditolak</p>
                    </div>
                    <div class="icon" style="font-size: 50px; right: 10px; top: 10px;"><i class="fas fa-times-circle"></i></div>
                </div>
            </div>

            <!-- Realisasi Penyelesaian -->
            <div class="col-xl-2 col-lg-4 col-md-6 mb-3">
                <div class="sultan-metric-card metric-primary" style="min-height: 100px; padding: 12px;">
                    <div class="inner">
                        <h3 id="dashAduan_valRealisasi" style="font-size: 1.8rem; font-weight: bold; margin-bottom: 2px;">0%</h3>
                        <p style="font-size: 11px; font-weight: bold; margin-bottom: 0;">Realisasi</p>
                    </div>
                    <div class="icon" style="font-size: 50px; right: 10px; top: 10px;"><i class="fas fa-chart-pie"></i></div>
                </div>
            </div>
        </div>

        <!-- BARIS BAWAH: Progress Bar Realisasi & Tabel Rekap Kategori -->
        <div class="row">
            <!-- Detail Informasi Metrik & Progress -->
            <div class="col-lg-4 mb-4">
                <div class="card card-sultan shadow-sm border-0 h-100">
                    <div class="card-header py-2 px-3">
                        <h6 class="mb-0 font-weight-bold"><i class="fas fa-info-circle mr-2 text-maroon"></i>Persentase Tindak Lanjut</h6>
                    </div>
                    <div class="card-body d-flex flex-column justify-content-center p-3">
                        <div class="text-center mb-3">
                            <span class="display-4 font-weight-bold text-dark" id="dashAduan_valRealisasiBig">0%</span>
                            <div class="text-muted small mt-1">Aduan Berhasil Diselesaikan</div>
                        </div>
                        <div class="progress mb-2 bg-adaptive-sultan" style="height:12px; border-radius:10px;">
                            <div id="dashAduan_progressBar" class="progress-bar bg-success progress-bar-striped progress-bar-animated" style="width:0%; border-radius:10px;"></div>
                        </div>
                        <div class="text-muted text-center" style="font-size:10px;">
                            *Rumus Realisasi: Selesai ÷ (Total − Ditolak)
                        </div>
                    </div>
                </div>
            </div>

            <!-- Rekap per Kategori -->
            <div class="col-lg-8 mb-4">
                <div class="card card-sultan shadow-sm border-0 h-100">
                    <div class="card-header py-2 px-3">
                        <h6 class="mb-0 font-weight-bold"><i class="fas fa-tags mr-2 text-maroon"></i>Rekap per Kategori</h6>
                    </div>
                    <div class="card-body p-0">
                        <div id="dashAduan_loadKategori" class="text-center py-4">
                            <i class="fas fa-spinner fa-spin text-maroon"></i>
                        </div>
                        <div class="table-responsive" id="dashAduan_tabelKategoriWrap" style="display:none;">
                            <table class="table table-sm table-hover mb-0">
                                <thead class="thead-sultan-premium">
                                    <tr>
                                        <th>KATEGORI</th>
                                        <th class="text-center">TOTAL</th>
                                        <th class="text-center">SELESAI</th>
                                        <th class="text-center">PENDING</th>
                                    </tr>
                                </thead>
                                <tbody id="dashAduan_tabelKategoriBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</section>

<script>
(function() {
    var DASH_ADUAN_CACHE = [];
    var DASH_CACHE_THN = "";
    var DASH_CACHE_BLN = "";

    function initFilters() {
        var tahunSekarang = new Date().getFullYear();
        var $sel = $('#dashAduan_filterTahun').empty();
        for (var t = tahunSekarang; t >= tahunSekarang - 3; t--) {
            $sel.append('<option value="' + t + '">' + t + '</option>');
        }
        var namaBulan = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
        $('#dashAduan_filterBulan').val(namaBulan[new Date().getMonth()]);
    }

    function muatDashboard(forceRefresh) {
        var tahun = $('#dashAduan_filterTahun').val();
        var bulan = $('#dashAduan_filterBulan').val();

        if (!forceRefresh && tahun === DASH_CACHE_THN && bulan === DASH_CACHE_BLN && DASH_ADUAN_CACHE.length > 0) {
            renderDashboard(DASH_ADUAN_CACHE);
            return;
        }

        $('#dashAduan_btnRefresh').prop('disabled', true).html('<i class="fas fa-spinner fa-spin text-maroon"></i>');
        if (typeof SultanUI !== 'undefined') {
            SultanUI.startLottery('#dashAduan_valTotal, #dashAduan_valDiproses, #dashAduan_valDitinjau, #dashAduan_valSelesai, #dashAduan_valDitolak', 3);
            SultanUI.startLottery('#dashAduan_valRealisasi, #dashAduan_valRealisasiBig', 2, '%');
        }
        $('#dashAduan_loadKategori').show();
        $('#dashAduan_tabelKategoriWrap').hide();

        google.script.run
            .withSuccessHandler(function(resJson) {
                $('#dashAduan_btnRefresh').prop('disabled', false).html('<i class="fas fa-sync-alt text-maroon"></i>');
                var data = [];
                try { data = JSON.parse(resJson); } catch(e) {}
                DASH_ADUAN_CACHE = data;
                DASH_CACHE_THN = tahun;
                DASH_CACHE_BLN = bulan;
                renderDashboard(data);
            })
            .withFailureHandler(function(err) {
                $('#dashAduan_btnRefresh').prop('disabled', false).html('<i class="fas fa-sync-alt text-maroon"></i>');
                $('#dashAduan_loadKategori').html('<span class="text-danger small"><i class="fas fa-wifi mr-1"></i>Gagal memuat data.</span>');
            })
            .getDaftarAduan(tahun, bulan);
    }

    function renderDashboard(data) {
        var total = data.length;
        var diproses = 0, ditinjau = 0, selesai = 0, ditolak = 0;

        // Rekap per kategori
        var kategoriMap = {};

        data.forEach(function(row) {
            var st = String(row.status || 'Diproses').toLowerCase();
            if (st.includes('tinjau'))       ditinjau++;
            else if (st.includes('selesai') || st.includes('setuju')) selesai++;
            else if (st.includes('tolak'))   ditolak++;
            else                             diproses++;

            var kat = row.kategori || 'Lainnya';
            if (!kategoriMap[kat]) kategoriMap[kat] = { total: 0, selesai: 0, pending: 0 };
            kategoriMap[kat].total++;
            if (st.includes('selesai') || st.includes('setuju')) kategoriMap[kat].selesai++;
            else if (!st.includes('tolak'))                      kategoriMap[kat].pending++;
        });

        // Update kartu metrik dengan count-up & lottery stop
        dashAduan_animateValue('dashAduan_valTotal', total);
        dashAduan_animateValue('dashAduan_valDiproses', diproses);
        dashAduan_animateValue('dashAduan_valDitinjau', ditinjau);
        dashAduan_animateValue('dashAduan_valSelesai', selesai);
        dashAduan_animateValue('dashAduan_valDitolak', ditolak);

        var denominator = total - ditolak;
        var pct = denominator > 0 ? Math.round((selesai / denominator) * 100) : 0;
        dashAduan_animateValue('dashAduan_valRealisasi', pct, true);
        dashAduan_animateValue('dashAduan_valRealisasiBig', pct, true);
        $('#dashAduan_progressBar').css('width', pct + '%');

        // Render tabel kategori
        var html = '';
        Object.keys(kategoriMap).sort().forEach(function(kat) {
            var k = kategoriMap[kat];
            html += '<tr>' +
                '<td class="font-weight-bold">' + kat + '</td>' +
                '<td class="text-center">' + k.total + '</td>' +
                '<td class="text-center text-success font-weight-bold">' + k.selesai + '</td>' +
                '<td class="text-center text-warning font-weight-bold">' + k.pending + '</td>' +
            '</tr>';
        });
        if (!html) html = '<tr><td colspan="4" class="text-center text-muted py-3">Tidak ada data</td></tr>';

        $('#dashAduan_tabelKategoriBody').html(html);
        $('#dashAduan_loadKategori').hide();
        $('#dashAduan_tabelKategoriWrap').show();
    }

    function dashAduan_animateValue(id, end, formatPercent) {
        if (typeof SultanUI !== 'undefined') {
            SultanUI.stopLottery('#' + id);
        }
        var obj = document.getElementById(id);
        if (!obj) return;
        var start = 0;
        var duration = 400;
        var range = end - start;
        if (range === 0) {
            obj.innerHTML = end.toLocaleString('id-ID') + (formatPercent ? '%' : '');
            return;
        }
        var minTimer = 25;
        var stepTime = Math.abs(Math.floor(duration / range));
        stepTime = Math.max(stepTime, minTimer);
        var startTime = new Date().getTime();
        var endTime = startTime + duration;
        var timer;
        
        function run() {
            var now = new Date().getTime();
            var remaining = Math.max((endTime - now) / duration, 0);
            var value = Math.round(end - (remaining * range));
            obj.innerHTML = value.toLocaleString('id-ID') + (formatPercent ? '%' : '');
            if (value == end) {
                clearInterval(timer);
            }
        }
        timer = setInterval(run, stepTime);
        run();
    }

    // Event Bindings
    $(document).off('change', '#dashAduan_filterTahun, #dashAduan_filterBulan').on('change', '#dashAduan_filterTahun, #dashAduan_filterBulan', function() {
        muatDashboard(true);
    });
    $(document).off('click', '#dashAduan_btnRefresh').on('click', '#dashAduan_btnRefresh', function() {
        DASH_ADUAN_CACHE = [];
        muatDashboard(true);
    });

    $(document).ready(function() {
        setTimeout(function() {
            initFilters();
            muatDashboard(false);
        }, 150);
    });
})();
</script>

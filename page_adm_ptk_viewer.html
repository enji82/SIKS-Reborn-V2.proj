<style>
  .admptk-tree-title { color: #1a1c1e; }
  .dark-mode .admptk-tree-title { color: #f1f3f5 !important; }
  .dark-mode .tree-node { border-bottom-color: #2d2d2d !important; }
  .sultan-badge-count-success { background-color: #28a745 !important; color: #ffffff !important; padding: 3px 8px !important; border-radius: 10px !important; font-weight: bold; }
  .sultan-badge-count-secondary { background-color: #6c757d !important; color: #ffffff !important; padding: 3px 8px !important; border-radius: 10px !important; font-weight: bold; }
  .dark-mode .sultan-badge-count-secondary { background-color: #3e444a !important; color: #adb5bd !important; }
</style>

<section class="content" id="admptk_viewer_fullscreenArea">
  <div class="container-fluid" style="font-size:13px;">

    <div class="position-relative">
      <div class="sultan-filter-pill-container shadow-sm mb-4" style="overflow: visible !important;">

        <!-- Filter Jenjang (Hanya Admin) -->
        <div class="sultan-filter-item mr-2" id="admptk_viewer_filterJenjangContainer" style="display: none; width: auto;">
          <select id="admptk_viewer_filterJenjang" aria-label="Pilih Jenjang" style="padding-right: 25px !important;">
            <option value="SEMUA">- Semua Jenjang -</option>
            <option value="PAUD">PAUD</option>
            <option value="SD" selected>SD</option>
          </select>
          <i class="fas fa-chevron-down"></i>
        </div>

        <!-- Filter PTK -->
        <div class="sultan-filter-item mr-2" id="admptk_viewer_filterPtkContainer" style="display: none; width: auto; max-width: 100%;">
          <select id="admptk_viewer_filterPtk" aria-label="Pilih PTK" style="width: auto; min-width: 220px; padding-right: 25px !important;">
            <option value="">- Memvalidasi Akses... -</option>
          </select>
          <i class="fas fa-chevron-down"></i>
        </div>

        <div class="d-flex align-items-center" style="gap: 8px;">
          <div class="divider-vertical d-none d-md-block mx-1"></div>
          <button type="button" class="sultan-btn-refresh" id="admptk_viewer_btnRefresh" title="Segarkan Data">
            <i class="fas fa-sync-alt"></i>
          </button>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-lg-4 col-md-5 mb-3">
        <div class="card-sultan h-100 shadow-sm border-0 d-flex flex-column overflow-hidden">
          <div class="card-header sultan-header-aksi-utama py-3">
            <h6 class="m-0 font-weight-bold text-uppercase" style="font-size:13px;"><i class="fas fa-list-ul mr-2"></i>Daftar Berkas Administrasi PTK</h6>
          </div>
          <div class="card-body p-0 flex-grow-1 position-relative sultan-scroll-premium" style="height: 65vh; overflow-y: auto; font-size:13px;">
            <div id="admptk_viewer_treeInitial" class="d-flex h-100 flex-column justify-content-center align-items-center text-muted p-4 text-center position-absolute w-100" style="top:0; left:0;">
              <i class="fas fa-user-tie fa-4x mb-3 opacity-25"></i>
              <h6 class="font-weight-bold">Pilih PTK Terlebih Dahulu</h6>
              <p class="small">Pilih nama PTK di atas untuk memuat riwayat dokumen administrasi.</p>
            </div>
            <div id="admptk_viewer_treeLoading" class="d-none h-100 flex-column justify-content-center align-items-center text-maroon p-4 text-center position-absolute w-100" style="top:0; left:0; z-index: 5;">
              <i class="fas fa-circle-notch fa-spin fa-3x mb-3"></i>
              <h6 class="font-weight-bold">Membuka Dokumen PTK...</h6>
            </div>
            <div id="admptk_viewer_treeContent" class="w-100 pb-3" style="position: relative; z-index: 2; font-size:13px;"></div>
          </div>
        </div>
      </div>

      <div class="col-lg-8 col-md-7 mb-3">
        <div class="card-sultan h-100 shadow-sm border-0 position-relative d-flex flex-column overflow-hidden">
          <div class="card-header sultan-header-aksi-dark py-3 px-3 d-flex justify-content-between align-items-center bg-dark text-white">
            <span class="font-weight-bold text-uppercase small" id="admptk_viewer_lblJudulFile" style="font-size:13px;">
              <i class="fas fa-eye mr-2 text-info"></i>Pratinjau Dokumen
            </span>
            <div class="d-flex align-items-center" style="gap: 8px;">
              <a href="#" id="admptk_viewer_btnDownloadValid" target="_blank" class="sultan-btn sultan-btn-compact sultan-btn-aksi-preview d-none">
                <i class="fas fa-download mr-1"></i> UNDUH
              </a>
              <a href="#" id="admptk_viewer_btnUnduhDirect" target="_blank" class="sultan-btn sultan-btn-compact sultan-btn-outline-white d-none">
                <i class="fas fa-external-link-alt mr-1"></i> TAB BARU
              </a>
            </div>
          </div>
          <div class="card-body p-0 flex-grow-1 position-relative bg-dark" style="height: 65vh;">
            <div id="admptk_viewer_iframeLoading" class="d-none h-100 align-items-center justify-content-center text-white-50 position-absolute w-100" style="top:0; left:0; z-index:10; pointer-events:none;">
              <div class="text-center">
                <div class="sultan-spinner-icon mb-3"><i class="fas fa-circle-notch fa-spin"></i></div>
                <p class="font-weight-bold">Memuat dari Google Drive...</p>
              </div>
            </div>
            <div id="admptk_viewer_iframeInitial" class="d-flex h-100 flex-column justify-content-center align-items-center text-white-50 p-4 text-center position-absolute w-100" style="top:0; left:0;">
              <i class="fas fa-file-invoice fa-5x mb-4 opacity-25"></i>
              <h6 class="font-weight-bold">Pilih dokumen dari daftar di sebelah kiri untuk melihat pratinjau.</h6>
            </div>
            <iframe id="admptk_viewer_iframe" class="w-100 h-100 border-0 d-none" src="" style="background-color: #1a1c1e;"></iframe>
          </div>
        </div>
      </div>
    </div>

  </div>
</section>

<script>
var ADMPTK_VIEWER_IS_ADMIN = false;
var ADMPTK_VIEWER_NPSN_TERKUNCI = "";
var ADMPTK_VIEWER_MASTER_PTK = [];
var ADMPTK_VIEWER_CATEGORIES = [];

$(document).ready(function() {
    try {
        var user = typeof getSesiUser === 'function' ? getSesiUser() : {};
        var roleStr = String(user.role || "").toLowerCase();
        ADMPTK_VIEWER_IS_ADMIN = (typeof checkUserRoleIsAdmin === 'function' && checkUserRoleIsAdmin()) || roleStr.includes("admin") || roleStr.includes("verifikator");
        ADMPTK_VIEWER_NPSN_TERKUNCI = user.npsn || user.unit || user.username || "";
    } catch(e) { ADMPTK_VIEWER_NPSN_TERKUNCI = ""; ADMPTK_VIEWER_IS_ADMIN = false; }

    admptk_viewer_init();

    $(document).off('change', '#admptk_viewer_filterJenjang').on('change', '#admptk_viewer_filterJenjang', admptk_viewer_populatePtk);
    $(document).off('change', '#admptk_viewer_filterPtk').on('change', '#admptk_viewer_filterPtk', function() {
        var idPtk = $(this).val();
        if (idPtk) admptk_viewer_loadPtkData(idPtk);
    });
    $(document).off('click', '#admptk_viewer_btnRefresh').on('click', '#admptk_viewer_btnRefresh', function() {
        var idPtk = ADMPTK_VIEWER_IS_ADMIN ? $('#admptk_viewer_filterPtk').val() : null;
        if (ADMPTK_VIEWER_IS_ADMIN && idPtk) admptk_viewer_loadPtkData(idPtk);
        else if (!ADMPTK_VIEWER_IS_ADMIN) admptk_viewer_init();
    });
    $(document).off('click', '.admptk-tree-folder').on('click', '.admptk-tree-folder', function() {
        var isOpening = !$(this).hasClass('folder-open');
        $('.admptk-tree-folder').not(this).removeClass('folder-open').next('.admptk-tree-content').slideUp(200);
        $('.admptk-tree-folder').not(this).find('.fa-folder, .fa-folder-open').removeClass('fa-folder-open').addClass('fa-folder text-warning');
        $(this).toggleClass('folder-open', isOpening);
        $(this).next('.admptk-tree-content').slideToggle(200);
        var icon = $(this).find('.fa-folder, .fa-folder-open');
        if ($(this).hasClass('folder-open')) { icon.removeClass('fa-folder').addClass('fa-folder-open text-warning'); }
        else { icon.removeClass('fa-folder-open').addClass('fa-folder text-warning'); }
    });
    $(document).off('click', '.admptk-tree-item-file').on('click', '.admptk-tree-item-file', function() {
        $('.admptk-tree-item-file').removeClass('active-file');
        $(this).addClass('active-file');
        admptk_viewer_loadIframe($(this).attr('data-url'), $(this).attr('data-nama'));
    });
});

function admptk_viewer_init() {
    var npsnFilter = ADMPTK_VIEWER_IS_ADMIN ? "" : ADMPTK_VIEWER_NPSN_TERKUNCI;
    if (ADMPTK_VIEWER_IS_ADMIN) {
        $('#admptk_viewer_filterJenjangContainer').show();
        $('#admptk_viewer_filterPtkContainer').show();
    }
    google.script.run.withSuccessHandler(function(json) {
        var res = JSON.parse(json);
        if (res.success) {
            ADMPTK_VIEWER_CATEGORIES = res.categories || [];
            ADMPTK_VIEWER_MASTER_PTK = res.ptk || [];
            if (ADMPTK_VIEWER_IS_ADMIN) {
                // Set default jenjang SD lalu populate
                $('#admptk_viewer_filterJenjang').val('SD');
                admptk_viewer_populatePtk();
            } else {
                // User biasa: pilih PTK dari sekolahnya sendiri
                var $sel = $('#admptk_viewer_filterPtk');
                $sel.empty().append('<option value="">- Pilih PTK -</option>');
                ADMPTK_VIEWER_MASTER_PTK.forEach(function(p) {
                    $sel.append('<option value="' + p.id + '">' + admptk_viewer_esc(p.nama) + (p.nip ? ' (' + p.nip + ')' : '') + '</option>');
                });
                $sel.prop('disabled', false);
                $('#admptk_viewer_filterPtkContainer').show();
            }
        }
    }).getAdmPtkViewerInit(npsnFilter);
}

function admptk_viewer_populatePtk() {
    var fJ = $('#admptk_viewer_filterJenjang').val();
    var $sel = $('#admptk_viewer_filterPtk');
    $sel.empty().append('<option value="">- Pilih PTK -</option>');
    var filtered = ADMPTK_VIEWER_MASTER_PTK.filter(function(p) {
        if (fJ === "SEMUA") return true;
        var jj = String(p.jenjang || "").toUpperCase();
        if (fJ === "PAUD") return jj === "PAUD" || jj === "TK" || jj === "KB" || jj === "SPS" || jj === "TPA";
        if (fJ === "SD") return jj === "SD";
        return true;
    });
    filtered.forEach(function(p) {
        $sel.append('<option value="' + p.id + '">' + admptk_viewer_esc(p.nama) + (p.nip ? ' - ' + p.nip : '') + '</option>');
    });
    $sel.prop('disabled', false);
    // Reset viewer
    $('#admptk_viewer_treeContent').empty();
    $('#admptk_viewer_treeInitial').removeClass('d-none').addClass('d-flex');
    $('#admptk_viewer_iframeInitial').removeClass('d-none').addClass('d-flex');
    $('#admptk_viewer_iframe').addClass('d-none').attr('src', '');
    $('#admptk_viewer_btnUnduhDirect, #admptk_viewer_btnDownloadValid').addClass('d-none');
}

function admptk_viewer_loadPtkData(idPtk) {
    $('#admptk_viewer_treeInitial').removeClass('d-flex').addClass('d-none');
    $('#admptk_viewer_treeContent').empty();
    $('#admptk_viewer_treeLoading').removeClass('d-none').addClass('d-flex');
    $('#admptk_viewer_iframeInitial').removeClass('d-none').addClass('d-flex');
    $('#admptk_viewer_iframe').addClass('d-none').attr('src', '');
    $('#admptk_viewer_lblJudulFile').html('<i class="fas fa-eye mr-2 text-info"></i>Pratinjau Dokumen');
    $('#admptk_viewer_btnUnduhDirect, #admptk_viewer_btnDownloadValid').addClass('d-none');

    var npsnFilter = ADMPTK_VIEWER_IS_ADMIN ? "" : ADMPTK_VIEWER_NPSN_TERKUNCI;
    google.script.run.withSuccessHandler(function(json) {
        $('#admptk_viewer_treeLoading').removeClass('d-flex').addClass('d-none');
        var res = JSON.parse(json);
        if (!res.success) { $('#admptk_viewer_treeInitial').removeClass('d-none').addClass('d-flex'); Sultan.alert('warning','Tidak Ditemukan', res.message); return; }
        admptk_viewer_buildTree(res.categories, res.files);
    }).withFailureHandler(function(err){
        $('#admptk_viewer_treeLoading').removeClass('d-flex').addClass('d-none');
        $('#admptk_viewer_treeInitial').removeClass('d-none').addClass('d-flex');
        Sultan.alert('error','Koneksi Terputus', err.message);
    }).getAdmPtkViewerData(idPtk, npsnFilter);
}

function admptk_viewer_buildTree(categories, files) {
    var treeHtml = '';
    categories.forEach(function(kat) {
        var catFiles = files.filter(f => String(f.id_kategori).trim() === String(kat.idKat).trim());
        var countAda = catFiles.length;
        var badgeClass = countAda > 0 ? 'sultan-badge-count-success' : 'sultan-badge-count-secondary';
        treeHtml += '<div class="tree-node" style="border-bottom: 1px solid var(--dm-border, rgba(0,0,0,0.05));">';
        treeHtml += '<div class="admptk-tree-folder efile-tree-folder d-flex align-items-center py-2 px-3">';
        treeHtml += '<i class="fas fa-chevron-right mr-3 text-maroon efile-icon-rotate" style="font-size: 0.9rem; width: 15px; text-align: center;"></i>';
        treeHtml += '<span class="font-weight-bold admptk-tree-title" style="font-size: 13px;"><i class="fas fa-folder text-warning mr-2"></i>' + admptk_viewer_esc(kat.namaKat) + '</span>';
        treeHtml += '<div class="ml-auto d-flex align-items-center"><span class="' + badgeClass + ' shadow-sm" style="font-size: 10px;">' + countAda + '</span></div>';
        treeHtml += '</div><div class="admptk-tree-content" style="display:none;">';
        if (countAda > 0) {
            catFiles.forEach(function(f) {
                var ext = String(f.file_name).split('.').pop().toLowerCase();
                var faIcon = (ext === 'jpg' || ext === 'jpeg' || ext === 'png') ? 'fa-file-image text-success' : 'fa-file-pdf text-danger';
                var displayNama = admptk_viewer_esc(f.file_name);
                var badgeStatus = admptk_viewer_buildBadgeStatus(f.status);
                treeHtml += '<div class="efile-tree-item admptk-tree-item-file font-weight-bold d-flex justify-content-between align-items-center" data-url="' + f.url + '" data-nama="' + displayNama + '" style="font-size:13px;">';
                treeHtml += '<span><i class="fas ' + faIcon + ' mr-2"></i>' + displayNama + '</span>' + badgeStatus + '</div>';
            });
        } else {
            treeHtml += '<div class="efile-tree-item admptk-tree-item-empty font-weight-bold" style="font-size:13px;"><i class="fas fa-exclamation-triangle mr-2"></i>[!] Dokumen Kosong</div>';
        }
        treeHtml += '</div></div>';
    });
    $('#admptk_viewer_treeContent').html(treeHtml);
}

function admptk_viewer_loadIframe(url, namaFile) {
    if (!url) return;
    $('#admptk_viewer_iframeInitial').removeClass('d-flex').addClass('d-none');
    $('#admptk_viewer_iframe').addClass('d-none').attr('src', '');
    $('#admptk_viewer_iframeLoading').removeClass('d-none').addClass('d-flex');
    var ext = namaFile.split('.').pop().toLowerCase();
    var faIcon = (ext === 'jpg' || ext === 'jpeg' || ext === 'png') ? 'fa-file-image text-success' : 'fa-file-pdf text-danger';
    $('#admptk_viewer_lblJudulFile').html('<i class="fas ' + faIcon + ' mr-2"></i>' + namaFile);
    var previewUrl = url, directUrl = url;
    if (url.includes('drive.google.com')) {
        var match = url.match(/\/d\/([a-zA-Z0-9_-]+)/) || url.match(/id=([a-zA-Z0-9_-]+)/);
        if (match && match[1]) { previewUrl = 'https://drive.google.com/file/d/' + match[1] + '/preview'; directUrl = 'https://drive.google.com/uc?export=download&id=' + match[1]; }
        else { previewUrl = url.replace(/\/view.*/, '/preview'); }
    }
    $('#admptk_viewer_btnUnduhDirect').attr('href', url).removeClass('d-none');
    $('#admptk_viewer_btnDownloadValid').attr('href', directUrl).removeClass('d-none');
    setTimeout(function() {
        $('#admptk_viewer_iframe').attr('src', previewUrl);
        $('#admptk_viewer_iframe').off('load').on('load', function() { $('#admptk_viewer_iframeLoading').removeClass('d-flex').addClass('d-none'); $(this).removeClass('d-none'); });
        setTimeout(function() { $('#admptk_viewer_iframeLoading').removeClass('d-flex').addClass('d-none'); $('#admptk_viewer_iframe').removeClass('d-none'); }, 3000);
    }, 150);
}

function admptk_viewer_esc(text) { if (!text) return ""; return String(text).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;"); }
function admptk_viewer_buildBadgeStatus(st) {
    if (!st || String(st).trim() === "") return "";
    var s = String(st).toLowerCase();
    if (s.includes('setuju') || s.includes('ok') || s.includes('valid')) return '<i class="fas fa-check-circle text-success ml-2" style="font-size:1.1rem;" title="Disetujui"></i>';
    else if (s.includes('revisi')) return '<i class="fas fa-exclamation-triangle text-warning ml-2" style="font-size:1.1rem;" title="Revisi"></i>';
    else if (s.includes('tolak')) return '<i class="fas fa-times-circle text-danger ml-2" style="font-size:1.1rem;" title="Ditolak"></i>';
    else return '<i class="fas fa-hourglass-half text-warning ml-2" style="font-size:1.1rem;" title="Diproses"></i>';
}
</script>

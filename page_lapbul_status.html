<div class="content-header pb-0 sultan-page-header">
  <div class="container-fluid">
    <div class="row">
      <div class="col-sm-12">
        <h5 class="font-weight-bold text-uppercase">
          <i class="fas fa-chart-bar text-sultan-utama mr-2"></i>Status Pengiriman Laporan
        </h5>
        <hr class="style-sultan-solid">
        <div id="lapbulstatus_lastUpdateArea" class="mt-n2 mb-3 text-right" style="display: none;">
            <small class="text-dark opacity-75 font-weight-bold">
                <i class="fas fa-clock mr-1"></i> Terakhir Diperbarui: 
                <span id="lapbulstatus_txtLastUpdate" class="text-sultan-utama">-</span>
            </small>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
    /* AUTO-EXPANDING MATRIX SYSTEM (CLEAN & STABLE) */
    #lapbulstatus_tabelUtama {
        table-layout: auto !important;
        width: 100% !important;
        border-collapse: collapse !important;
    }

    /* Kolom 1 (Nama Sekolah): Target Spesifik */
    #lapbulstatus_tabelUtama thead tr:first-child th:first-child,
    #lapbulstatus_tabelUtama tbody td:nth-child(1) {
        min-width: 250px !important;
        max-width: 450px !important;
        white-space: normal !important;
        word-wrap: break-word;
        padding-left: 15px !important;
        text-align: left !important;
    }

    /* Kolom Bulan: Semua kolom data setelah Nama Sekolah */
    #lapbulstatus_tabelUtama thead tr:nth-child(2) th,
    #lapbulstatus_tabelUtama tbody td:not(:nth-child(1)) {
        min-width: 65px !important;
        max-width: 100px !important;
        text-align: center !important;
        white-space: nowrap !important;
    }

    /* Perhalus tampilan teks nama sekolah */
    #lapbulstatus_tabelUtama .sultan-table-primary {
        white-space: normal !important;
        line-height: 1.2 !important;
        margin-bottom: 2px;
    }
</style>

<section class="content">
  <div class="container-fluid">
    <div class="row justify-content-center">
      <div class="col-12">

        <div class="sultan-info-card">
          <div class="card-body">
            <div class="info-header" data-toggle="collapse" data-target="#lapbulstatus_infoCollapse" aria-expanded="false">
              <div class="info-title">
                <div class="info-icon-circle"><i class="fas fa-info"></i></div>
                <span>INFORMASI</span>
              </div>
              <i class="fas fa-chevron-up"></i>
            </div>
            <div id="lapbulstatus_infoCollapse" class="collapse">
              <div class="mt-2 pt-2 border-top small text-muted">
                <ul class="mb-0 pl-3 sultan-table-secondary mt-2">
                    <li>Halaman ini merupakan ceklist rekapitulasi pengiriman laporan bulan.</li>
                    <li>Arahkan kursor (*hover*) pada ikon di tabel untuk melihat keterangan status laporan Anda.</li>
                </ul>
              </div>
            </div>
          </div>
        </div>

        <div class="sultan-filter-pill-container shadow-sm mb-4">
            <!-- Filter Tahun -->
            <div class="sultan-filter-item">
                <select id="lapbulstatus_filterTahun" class="form-control"></select>
                <i class="fas fa-chevron-down"></i>
            </div>

            <!-- Filter Jenjang (Hanya Admin) -->
            <div class="sultan-filter-item d-none" id="lapbulstatus_boxJenjang">
                <select id="lapbulstatus_filterJenjang" class="form-control">
                    <option value="SEMUA">Semua Jenjang</option>
                    <option value="SD">SD</option>
                    <option value="TK">TK</option>
                    <option value="KB">KB</option>
                </select>
                <i class="fas fa-chevron-down"></i>
            </div>

            <!-- Filter Unit Kerja -->
            <div class="sultan-filter-item" style="min-width: 250px;">
                <select id="lapbulstatus_filterSekolah" class="form-control" disabled>
                    <option value="">- Memvalidasi Akses... -</option>
                </select>
                <i class="fas fa-chevron-down"></i>
            </div>

            <div class="divider-vertical d-none d-md-block mx-2"></div>

            <button type="button" id="lapbulstatus_btnRefresh" class="sultan-btn-refresh" title="Refresh Data" disabled>
                    <i class="fas fa-sync-alt"></i>
                </button>
        </div>

        <div class="card-sultan">
            <div class="card-body p-3">
                <div id="lapbulstatus_loadingState">
                    <!-- Spinner Otomatis via SultanUI.showLoading -->
                </div>

                <div id="lapbulstatus_tableState" style="display: none;">
                  <table id="lapbulstatus_tabelUtama" class="table table-hover table-premium table-sultan-compact mb-0 w-100 text-nowrap">
                      <thead class="thead-sultan-premium text-sultan-utama text-uppercase">
                          <tr>
                              <th class="col-sticky-left text-left px-3 align-middle">NAMA SEKOLAH</th>
                              <th class="text-center align-middle">JAN</th>
                              <th class="text-center align-middle">FEB</th>
                              <th class="text-center align-middle">MAR</th>
                              <th class="text-center align-middle">APR</th>
                              <th class="text-center align-middle">MEI</th>
                              <th class="text-center align-middle">JUN</th>
                              <th class="text-center align-middle">JUL</th>
                              <th class="text-center align-middle">AGU</th>
                              <th class="text-center align-middle">SEP</th>
                              <th class="text-center align-middle">OKT</th>
                              <th class="text-center align-middle">NOV</th>
                              <th class="text-center align-middle">DES</th>
                          </tr>
                      </thead>
                      <tbody></tbody>
                  </table>
                                </div>

            </div>
        </div>

      </div>
    </div>
  </div>
</section>

<script>
// ======================================================================
// ISOLASI VARIABEL GLOBAL
// ======================================================================
var LAPBULSTATUS_CACHE_DATA = [];
var LAPBULSTATUS_CACHE_TAHUN = "";
var LAPBULSTATUS_TABEL_INSTANCE = null;

var LAPBULSTATUS_USER_AKTIF = "";
var LAPBULSTATUS_IS_ADMIN = false;
var LAPBULSTATUS_USER_NPSN = "";
var LAPBULSTATUS_UNIT_TERKUNCI = "";
var LAPBULSTATUS_IS_INIT = true; // FLAG PENGAMAN STARTUP

$(document).ready(function() {
    LAPBULSTATUS_TABEL_INSTANCE = null;
    $('#lapbulstatus_tableState').hide();
    SultanUI.showLoading('#lapbulstatus_loadingState');

    try {
        var user = (typeof getSesiUser === 'function') ? getSesiUser() : {};
        LAPBULSTATUS_USER_AKTIF = user.nama_lengkap || user.fullname || user.nama || user.username || "User Web";
        LAPBULSTATUS_IS_ADMIN = (user.role || "").toLowerCase().includes("admin");
        LAPBULSTATUS_USER_NPSN = user.npsn || user.username || ""; 
    } catch(e) { LAPBULSTATUS_USER_NPSN = ""; LAPBULSTATUS_IS_ADMIN = false; }

    $(document).off('change', '#lapbulstatus_filterJenjang').on('change', '#lapbulstatus_filterJenjang', function() { 
        if (LAPBULSTATUS_IS_INIT) return;
        lapbulstatus_updateDropdownSekolah(); 
        lapbulstatus_terapkanFilterLokal(); 
    });
    $(document).off('change', '#lapbulstatus_filterSekolah').on('change', '#lapbulstatus_filterSekolah', function() {
        if (LAPBULSTATUS_IS_INIT) return;
        lapbulstatus_terapkanFilterLokal();
    });
    $(document).off('change', '#lapbulstatus_filterTahun').on('change', '#lapbulstatus_filterTahun', function() {
        if (LAPBULSTATUS_IS_INIT) return;
        lapbulstatus_prosesCariData();
    });
    $(document).off('click', '#lapbulstatus_btnRefresh').on('click', '#lapbulstatus_btnRefresh', function(e) {
        e.preventDefault();
        lapbulstatus_tarikDataServer();
    });

    lapbulstatus_initFilters();
});

function lapbulstatus_initFilters() {
    var thn = new Date().getFullYear();
    var $sel = $('#lapbulstatus_filterTahun').empty();
    for(var i = thn - 5; i <= thn + 1; i++){ 
        var selected = (i === thn) ? 'selected' : '';
        $sel.append('<option value="' + i + '" ' + selected + '>' + i + '</option>'); 
    }
    
    $('#lapbulstatus_filterTahun').prop('disabled', false);
    lapbulstatus_validasiAksesUser(); 
}

function lapbulstatus_validasiAksesUser() {
    SultanUI.showLoading('#lapbulstatus_loadingState', 'Mempersiapkan Akses...');

    if (LAPBULSTATUS_IS_ADMIN) {
        $('#lapbulstatus_boxJenjang').removeClass('d-none');
        $('#lapbulstatus_filterSekolah').empty().append('<option value="SEMUA">- Memuat Database... -</option>').prop('disabled', false);
        $('#lapbulstatus_btnRefresh').prop('disabled', false);
        
        lapbulstatus_tarikDataServer(); 
    } else {
        $('#lapbulstatus_boxJenjang').addClass('d-none');
        
        if (!LAPBULSTATUS_USER_NPSN) {
            $('#lapbulstatus_filterSekolah').empty().append('<option value="">AKSES DITOLAK (NPSN KOSONG)</option>');
            $('#lapbulstatus_loadingState').html('<div class="text-center text-danger p-5"><i class="fas fa-ban fa-2x mb-2"></i><br>Akses ditolak: Sesi login tidak valid.</div>');
            return;
        }

        google.script.run
            .withSuccessHandler(function(resUnit) {
                var dataUnit = JSON.parse(resUnit);
                if (dataUnit.error) {
                    $('#lapbulstatus_filterSekolah').empty().append('<option value="">AKSES DITOLAK</option>');
                    $('#lapbulstatus_loadingState').html('<div class="text-center text-danger p-5"><i class="fas fa-exclamation-triangle fa-2x mb-2"></i><br>' + lapbulstatus_escapeHtml(dataUnit.error) + '</div>');
                    return;
                }

                LAPBULSTATUS_UNIT_TERKUNCI = dataUnit.unitKerja;
                $('#lapbulstatus_filterSekolah').empty().append($('<option>', {value: LAPBULSTATUS_UNIT_TERKUNCI, text: LAPBULSTATUS_UNIT_TERKUNCI})).prop('disabled', true);
                
                lapbulstatus_tarikDataServer();
            })
            .withFailureHandler(function(err) {
                $('#lapbulstatus_filterSekolah').empty().append('<option value="">ERROR SERVER</option>');
                $('#lapbulstatus_loadingState').html('<div class="text-center text-danger p-5"><i class="fas fa-wifi fa-2x mb-2"></i><br>Koneksi Terputus: ' + lapbulstatus_escapeHtml(err.message) + '</div>');
            })
            .getUnitKerjaByNpsnPTK(LAPBULSTATUS_USER_NPSN); 
    }
}

function lapbulstatus_updateDropdownSekolah() {
    if (!LAPBULSTATUS_IS_ADMIN) return;

    var selectedJenjang = String($('#lapbulstatus_filterJenjang').val() || "").trim().toUpperCase();
    var unique = new Set();
    
    LAPBULSTATUS_CACHE_DATA.forEach(function(row) {
        var unit = String(row[0] || "").trim();
        var jenjang = String(row[2] || "").trim().toUpperCase();
        
        if (unit) {
            if (selectedJenjang === "SEMUA" || selectedJenjang === "" || jenjang === selectedJenjang) {
                unique.add(unit);
            }
        }
    });
    
    var sortedUnits = Array.from(unique).sort();
    var select = $('#lapbulstatus_filterSekolah');
    var currentVal = select.val();
    
    select.empty().append('<option value="SEMUA">- Semua Sekolah -</option>');
    sortedUnits.forEach(function(u) { select.append('<option value="' + lapbulstatus_escapeHtml(u) + '">' + lapbulstatus_escapeHtml(u) + '</option>'); });
    
    if(currentVal && unique.has(currentVal)) { 
        select.val(currentVal); 
    } else {
        select.val("SEMUA");
    }
}

function lapbulstatus_prosesCariData() {
    var valTahun = $('#lapbulstatus_filterTahun').val();
    if (!valTahun) { Sultan.notif.info('Pilih Tahun terlebih dahulu.'); return; }
    
    if (valTahun === LAPBULSTATUS_CACHE_TAHUN && LAPBULSTATUS_CACHE_DATA.length > 0) { 
        lapbulstatus_terapkanFilterLokal(); 
    } else { 
        lapbulstatus_tarikDataServer(); 
    }
}

function lapbulstatus_tarikDataServer() {
    var valTahun = $('#lapbulstatus_filterTahun').val();
    if(!valTahun) return;

    var btn = $('#lapbulstatus_btnRefresh');
    btn.prop('disabled', true).html('<i class="fas fa-sync-alt fa-spin text-sultan-utama"></i>');
    
    if (!$.fn.DataTable.isDataTable('#lapbulstatus_tabelUtama')) {
        $('#lapbulstatus_tableState').hide();
        SultanUI.showLoading('#lapbulstatus_loadingState', 'Menyinkronkan data server...');
    }

    google.script.run
        .withSuccessHandler(function(res) {
            btn.prop('disabled', false).html('<i class="fas fa-sync-alt text-sultan-utama"></i>');
            LAPBULSTATUS_IS_INIT = false; // BUKA KUNCI SETELAH DATA TIBA
            
            if (res.error) {
                $('#lapbulstatus_tableState').hide();
                $('#lapbulstatus_loadingState').html('<div class="text-center text-danger p-5"><i class="fas fa-exclamation-triangle fa-2x mb-2"></i><br>' + lapbulstatus_escapeHtml(res.error) + '</div>');
                return;
            }

            try {
                LAPBULSTATUS_CACHE_DATA = res.rows || [];
                LAPBULSTATUS_CACHE_TAHUN = valTahun; 
                
                if (LAPBULSTATUS_IS_ADMIN) lapbulstatus_updateDropdownSekolah();
                
                // Aktifkan Deteksi Waktu Terakhir (Global SultanUI)
                SultanUI.autoDetectLastUpdate(LAPBULSTATUS_CACHE_DATA, '#lapbulstatus_txtLastUpdate', '#lapbulstatus_lastUpdateArea');

                lapbulstatus_terapkanFilterLokal(); 

            } catch(e) { 
                $('#lapbulstatus_tableState').hide();
                $('#lapbulstatus_loadingState').html('<div class="text-center text-danger p-5"><i class="fas fa-exclamation-triangle fa-2x mb-2"></i><br>Gagal merakit tabel: ' + lapbulstatus_escapeHtml(e.message) + '</div>'); 
            }
        })
        .withFailureHandler(function(err) {
            btn.prop('disabled', false).html('<i class="fas fa-sync-alt text-sultan-utama"></i>');
            $('#lapbulstatus_tableState').hide();
            $('#lapbulstatus_loadingState').html('<div class="text-center text-danger p-5"><i class="fas fa-wifi fa-2x mb-2"></i><br>Koneksi Terputus: ' + lapbulstatus_escapeHtml(err.message) + '</div>');
        })
        .getRekapLapbulStatus(valTahun); 
}

function lapbulstatus_terapkanFilterLokal() {
    var reqTahun = String($('#lapbulstatus_filterTahun').val() || "").trim();
    var reqJenjang = LAPBULSTATUS_IS_ADMIN ? String($('#lapbulstatus_filterJenjang').val() || "").trim().toUpperCase() : "";
    var tAdminUnit = LAPBULSTATUS_IS_ADMIN ? String($('#lapbulstatus_filterSekolah').val() || "").toUpperCase() : "";
    var tUnitUser  = String(LAPBULSTATUS_UNIT_TERKUNCI || "").trim().toUpperCase();

    var hasil = LAPBULSTATUS_CACHE_DATA.filter(function(row) {
        var rUnit = String(row[0] || "").trim().toUpperCase(); 
        var rJenjang = String(row[2] || "").trim().toUpperCase();
        var rTahun = String(row[3] || "").trim();
        
        var passUnit = false;
        if (LAPBULSTATUS_IS_ADMIN) {
            passUnit = (tAdminUnit === "SEMUA" || tAdminUnit === "" || rUnit === tAdminUnit);
        } else {
            passUnit = (rUnit === tUnitUser);
        }
        if (!passUnit) return false;

        if (reqTahun && rTahun !== reqTahun) return false;
        if (reqJenjang && reqJenjang !== "SEMUA" && rJenjang !== reqJenjang) return false;

        return true;
    });

    lapbulstatus_renderTabel(hasil);
}

function lapbulstatus_renderTabel(rows) {
    var isFirstLoad = !$.fn.DataTable.isDataTable('#lapbulstatus_tabelUtama');
    var dtArray = [];
    
    if (rows && rows.length > 0) {
        dtArray = rows.map(function(row) {
            var newRow = [];
            
            var safeNama = lapbulstatus_escapeHtml(row[0]);
            var safeNpsn = lapbulstatus_escapeHtml(row[1] || "-");
            newRow.push('<div class="sultan-table-primary">' + safeNama + '</div><div class="sultan-table-secondary">' + safeNpsn + '</div>');
            
            // SKIP INDEX 2 & 3 (Jenjang & Other internal)
            // Bulan dimulai dari index 4
            for (var i = 4; i <= 15; i++) {
                newRow.push(lapbulstatus_buildBadgeSultan(row[i]));
            }
            
            return newRow;
        });
    }

    SultanUI.hideLoading('#lapbulstatus_loadingState');
    $('#lapbulstatus_tableState').show(); 

    if (isFirstLoad) {
        LAPBULSTATUS_TABEL_INSTANCE = SultanTable.init('#lapbulstatus_tabelUtama', {
            "data": dtArray,       
            "ordering": false, 
            "pageLength": 10, 
            "autoWidth": false, 
            "destroy": true,
            "deferRender": true, 
            "dom": "<'row mb-2'<'col-sm-12 col-md-6'l><'col-sm-12 col-md-6'f>>" +
                   "<'row'<'col-sm-12'<'table-responsive sultan-scroll'tr>>>" + 
                   "<'row mt-3'<'col-sm-12 col-md-5 small text-muted'i><'col-sm-12 col-md-7'p>>",
            "language": {
                "url": "//cdn.datatables.net/plug-ins/1.10.25/i18n/Indonesian.json", 
                "search": "", "searchPlaceholder": "Cari Data...",
                "emptyTable": '<div class="py-5 text-center text-muted"><div class="mb-3"><i class="fas fa-clipboard-list fa-3x text-gray-300" style="opacity: 0.6;"></i></div><h6 class="font-weight-bold text-dark mb-1">Belum Ada Laporan</h6><p class="small mb-0">Tidak ada pengiriman laporan bulan untuk filter tersebut.</p></div>' 
            }, 
            "columnDefs": [ 
                { "targets": 0, "width": "auto", "className": "col-sticky-left align-middle text-left" },
                { "targets": "_all", "className": "text-center align-middle px-2" }
            ]
        }); 
        
        setTimeout(function() { LAPBULSTATUS_TABEL_INSTANCE.columns.adjust(); }, 100);
    } else {
        LAPBULSTATUS_TABEL_INSTANCE.clear().rows.add(dtArray).draw(false);
        setTimeout(function() { LAPBULSTATUS_TABEL_INSTANCE.columns.adjust(); }, 50);
    }
}

// =================================================================
// 5. HELPER UTILITIES: PEMBERSIH XSS
// =================================================================
function lapbulstatus_escapeHtml(text) { 
    if (!text) return ""; 
    return String(text).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;"); 
}

function lapbulstatus_escapeJs(str) {
    if (!str) return "";
    return String(str).replace(/\\/g, "\\\\").replace(/'/g, "\\'").replace(/"/g, "&quot;").replace(/(\r\n|\n|\r)/gm, "<br>");
}

// =================================================================
// 6. RENDER ICON SULTAN (TOOLTIP HOVER ONLY)
// =================================================================
function lapbulstatus_lihatCatatanSultan(pesan) {
    Sultan.alert('info', 'Catatan Admin', pesan);
}

function lapbulstatus_buildBadgeSultan(statusString) {
    if (!statusString || statusString === "-" || statusString === "") {
        return "";
    }
    
    var parts = String(statusString).split('|');
    var rawStatus = String(parts[0]).trim();
    var ket = parts.length > 1 ? String(parts[1]).trim() : "";
    var stLower = rawStatus.toLowerCase();
    
    var iconHtml = "";

    if (stLower.includes('revisi') || stLower.includes('perbaiki')) {
        if (ket.length > 2) {
            var safeKet = lapbulstatus_escapeJs(ket);
            iconHtml = `<button type="button" class="btn-icon-sultan btn-icon-sultan-warning border-0" onclick="lapbulstatus_lihatCatatanSultan('${safeKet}')"><i class="fas fa-sync-alt"></i></button>`;
        } else {
            iconHtml = '<div class="btn-icon-sultan btn-icon-sultan-warning" title="Revisi"><i class="fas fa-sync-alt"></i></div>';
        }
    }
    else if (stLower.includes('tolak') || stLower.includes('x') || stLower.includes('salah')) {
        if (ket.length > 2) {
            var safeKet = lapbulstatus_escapeJs(ket);
            iconHtml = `<button type="button" class="btn-icon-sultan btn-icon-sultan-danger border-0" onclick="lapbulstatus_lihatCatatanSultan('${safeKet}')"><i class="fas fa-times"></i></button>`;
        } else {
            iconHtml = '<div class="btn-icon-sultan btn-icon-sultan-danger" title="Ditolak"><i class="fas fa-times"></i></div>';
        }
    }
    else if (stLower.includes('verif') || stLower.includes('setuju') || stLower.includes('ok') || stLower.includes('valid')) {
        iconHtml = '<div class="btn-icon-sultan btn-icon-sultan-success" title="Disetujui"><i class="fas fa-check"></i></div>';
    }
    else if (stLower.includes('proses') || stLower.includes('tunggu') || rawStatus.length > 5) {
        iconHtml = '<div class="btn-icon-sultan btn-icon-sultan-info" title="Sedang Diproses"><i class="fas fa-clock"></i></div>';
    }
    else {
        iconHtml = '<span class="text-dark font-weight-bold" title="' + lapbulstatus_escapeHtml(rawStatus) + '">' + lapbulstatus_escapeHtml(rawStatus) + '</span>';
    }

    return iconHtml;
}
</script>

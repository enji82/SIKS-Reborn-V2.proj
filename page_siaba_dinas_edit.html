<div class="content-header pb-0">
  <div class="container-fluid">
    <div class="row">
      <div class="col-sm-12">
        <div class="sultan-page-header">
          <h5 class="m-0 font-weight-bold text-uppercase">
          <i class="fas fa-edit text-maroon mr-2"></i>Perbaikan Dokumen SPT
        </h5>
        <hr class="style-sultan-solid">
        </div>
      </div>
    </div>
  </div>
</div>

<section class="content">
  <div class="container-fluid">
    <div class="row">
      <div class="col-12">

        <div id="skeleton-loader" class="card-sultan p-4">
          <div class="sultan-form-scroll-wrapper">
            <div class="form-grid">
              <div class="form-group"><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-input"></div></div>
              <div class="form-group"><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-input"></div></div>
            </div>
            <div class="form-footer"><div class="skeleton skeleton-button" style="width: 150px;"></div></div>
          </div>
        </div>

        <form id="dinasEditForm" style="display: none;" class="card-sultan">
          <div id="dinas-scroll-wrapper" class="sultan-form-scroll-wrapper" class="card-body">
            
            <input type="hidden" name="rowIndex" id="rowIndex">
            <input type="hidden" name="idSpt" id="idSpt">
            <input type="hidden" name="existingFileUrl" id="existingFileUrl">

            <h6 class="text-maroon font-weight-bold text-uppercase mb-3 border-bottom pb-2">
              <i class="fas fa-file-alt mr-2"></i>Data SPT
            </h6>
        
              <label class="small font-weight-bold text-muted text-uppercase mb-1">Jenis PD</label>
              <select id="jenisPDEdit" name="jenisPD" class="form-control form-control-sultan border-maroon" required>
                <option value="DD">Dinas Dalam (DD)</option>
                <option value="DL">Dinas Luar (DL)</option>
              </select>
            </div>
          </div>
          <div class="col-md-8">
            <div class="form-group">
              <label class="small font-weight-bold text-muted text-uppercase mb-1">Nomor SPT</label>
              <input type="text" id="nomorSPTEdit" name="nomorSPT" class="form-control form-control-sultan" required>
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-md-4">
            <div class="form-group">
              <label class="small font-weight-bold text-muted text-uppercase mb-1">Tanggal SPT</label>
              <input type="date" id="tanggalSPTEdit" name="tanggalSPT" class="form-control form-control-sultan" required>
            </div>
          </div>
          <div class="col-md-4">
            <div class="form-group">
              <label class="small font-weight-bold text-muted text-uppercase mb-1">Tanggal Mulai</label>
              <input type="date" id="tanggalMulaiEdit" name="tanggalMulai" class="form-control form-control-sultan" required>
            </div>
          </div>
          <div class="col-md-4">
            <div class="form-group">
              <label class="small font-weight-bold text-muted text-uppercase mb-1">Tanggal Selesai</label>
              <input type="date" id="tanggalSelesaiEdit" name="tanggalSelesai" class="form-control form-control-sultan" required>
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-12">
            <div class="form-group">
              <label class="small font-weight-bold text-muted text-uppercase mb-1">Lokasi Tujuan</label>
              <input type="text" id="lokasiEdit" name="lokasi" class="form-control form-control-sultan" required>
            </div>
          </div>
        </div>
        
        <div class="row">
          <div class="col-12">
            <div class="form-group">
              <label class="small font-weight-bold text-muted text-uppercase mb-1">Kegiatan</label>
              <input type="text" id="kegiatanEdit" name="kegiatan" class="form-control form-control-sultan" required>
            </div>
          </div>
        </div>

        <h6 class="text-maroon font-weight-bold text-uppercase mb-3 border-bottom pb-2 mt-4">
          <i class="fas fa-users mr-2"></i>Pelaksana Tugas
        </h6>

        <div class="row">
            <div class="col-md-8">
                <div class="form-group">
                  <label class="small font-weight-bold text-muted text-uppercase mb-1">Unit Kerja</label>
                  <select id="unitKerjaDinasEdit" name="unitKerja" class="form-control form-control-sultan" required>
                    </select>
                </div>
            </div>
            <div class="col-md-4">
                <div class="form-group">
                  <label class="small font-weight-bold text-muted text-uppercase mb-1">Peserta (Orang)</label>
                  <select id="jumlahPesertaEdit" name="peserta" class="form-control form-control-sultan border-maroon" required>
                    </select>
                </div>
            </div>
        </div>

        <div id="peserta-wrapper-edit"></div>

        <h6 class="text-maroon font-weight-bold text-uppercase mb-3 border-bottom pb-2 mt-4">
          <i class="fas fa-file-pdf mr-2"></i>Dokumen & Status
        </h6>
        
        <div class="row">
          <div class="col-md-12 mb-3">
            <label class="small font-weight-bold text-muted text-uppercase mb-1">Dokumen Saat Ini</label>
            <div id="currentDocLink" class="bg-light p-2 rounded border shadow-sm"></div>
          </div>
          
          <div class="col-md-6">
            <div class="form-group">
              <label class="small font-weight-bold text-muted text-uppercase mb-1">Ganti File SPT (Opsional - PDF, Maks 200 KB)</label>
              <div class="custom-file">
                <input type="file" id="fileRevisi" name="fileData" class="custom-file-input" accept=".pdf">
                <label class="custom-file-label border-maroon" for="fileRevisi">Pilih File Baru...</label>
              </div>
            </div>
          </div>

          <div class="col-md-6">
            <div class="form-group">
              <label class="small font-weight-bold text-muted text-uppercase mb-1">Jenis Dokumen</label>
              <select id="jenisDokumenEdit" name="jenisDokumen" class="form-control form-control-sultan" required>
                <option value="Sementara">Sementara</option>
                <option value="Final">Final</option>
              </select>
              <small class="text-info font-italic mt-1 d-block"><i class="fas fa-info-circle mr-1"></i> Pilih "Final" jika data sudah benar.</small>
            </div>
          </div>
        </div>

        <div class="text-right border-top pt-4 d-flex justify-content-between">
          <button type="button" class="btn btn-light border rounded-pill px-4 font-weight-bold text-uppercase" onclick="App.loadPage(null, 'siaba_dinas_cek')">
            <i class="fas fa-times mr-1"></i> Batal
          </button>
          <button type="submit" id="btnSimpanRevisi" class="btn btn-maroon rounded-pill px-5 font-weight-bold shadow-sm text-uppercase">
            <i class="fas fa-save mr-1"></i> Simpan Perubahan
          </button>
        </div>

    </div>
  </form>
</div>
</div>
</section>
</main>

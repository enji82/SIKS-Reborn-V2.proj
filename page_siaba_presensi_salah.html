<script>
    // ======================================================================
    // ISOLASI VARIABEL GLOBAL (MASTER BLUEPRINT V8)
    // ======================================================================
    var SALAH_DATA_MASTER = {};
    var SALAH_DB_PEGAWAI = [];
    var SALAH_CACHE_DATA = [];
    var SALAH_CACHE_THN = "";
    var SALAH_CACHE_BLN = "";
    var SALAH_TABEL_INSTANCE = null;

    var SALAH_USER_AKTIF = "";
    var SALAH_IS_ADMIN = false;
    var SALAH_UNIT_TERKUNCI = "";
    var SALAH_USER_NPSN = "";

    // =================================================================
    // 1. INITIALIZATION & SPA VACCINE
    // =================================================================
    $(document).ready(function () {
        function salah_refreshData() {
            SultanUI.showLoading('#salah_loadingState', 'Memuat data Salah Presensi...');
            $('#salah_tableState').hide();
        }

        SALAH_TABEL_INSTANCE = null;
        $('#salah_tableState').hide();
        SultanUI.showLoading('#salah_loadingState');

        try {
            var user = (typeof getSesiUser === 'function') ? getSesiUser() : {};
            SALAH_USER_AKTIF = user.nama_lengkap || user.fullname || user.nama || user.username || "User Web";
            SALAH_IS_ADMIN = (user.role || "").toLowerCase().includes("admin");
            SALAH_USER_NPSN = user.npsn || user.username || "";
        } catch (e) { SALAH_USER_NPSN = ""; SALAH_IS_ADMIN = false; }

        // VAKSINASI EVENT SPA DELEGATION
        $(document).off('change', '#salah_filterTahun, #salah_filterBulan, #salah_filterStatus').on('change', '#salah_filterTahun, #salah_filterBulan, #salah_filterStatus', salah_prosesCariData);
        $(document).off('change', '#salah_filterUnit').on('change', '#salah_filterUnit', salah_terapkanFilterLokal);

        $(document).off('click', '#salah_btnRefresh').on('click', '#salah_btnRefresh', salah_tarikDataServer);
        $(document).off('click', '#salah_btnTambah').on('click', '#salah_btnTambah', salah_bukaModalTambah);

        // Event Modal Forms
        $(document).off('submit', '#salah_formUtama').on('submit', '#salah_formUtama', salah_submitFormUtama);
        $(document).off('submit', '#salah_formVerif').on('submit', '#salah_formVerif', salah_submitVerifikasi);
        $(document).off('change', '#salah_verifStatus').on('change', '#salah_verifStatus', function() {
            salah_cekStatusVerif($(this).val());
        });

        // Event Form Inputs
        $(document).off('change', '#salah_inputUnit').on('change', '#salah_inputUnit', salah_filterDropdownNama);
        $(document).off('change', '#salah_inputNama').on('change', '#salah_inputNama', salah_filterDropdownNip);

        // Event Aksi Tabel Dinamis
        $(document).off('click', '.salah-btn-verif').on('click', '.salah-btn-verif', function () { salah_bukaModalVerif($(this).data('id')); });
        $(document).off('click', '.salah-btn-edit').on('click', '.salah-btn-edit', function () { salah_bukaModalEdit($(this).data('id')); });
        $(document).off('click', '.salah-btn-hapus').on('click', '.salah-btn-hapus', function () { salah_bukaModalHapus($(this).data('id')); });
        $(document).off('click', '.salah-btn-catatan').on('click', '.salah-btn-catatan', function () { salah_lihatCatatanSultan($(this).data('pesan')); });

        // Inisiasi Waktu Dropdown
        var thn = new Date().getFullYear();
        var $selThn = $('#salah_filterTahun').empty();
        for (var i = thn - 3; i <= thn + 1; i++) { $selThn.append('<option value="' + i + '">' + i + '</option>'); }
        $selThn.val(thn);
        $('#salah_filterBulan').val('');
        $('#salah_filterStatus').val('');

        salah_validasiAksesUser();
        
        // Cek Parameter URL untuk notifikasi
        var urlParams = new URLSearchParams(window.location.search);
        var barisId = urlParams.get('id');
        if (barisId) {
            salah_tandaiDibaca(barisId);
        }
    });

    /**
     * Membantu membersihkan notifikasi secara lokal dan server
     */
    function salah_tandaiDibaca(rowId) {
        try {
            var user = (typeof getSesiUser === 'function') ? getSesiUser() : {};
            if (!user) return;
            
            // 1. Bersihkan di Bell Dropdown secara aman
            $('#nav-notif-list a').each(function() {
                var oc = $(this).attr('onclick') || "";
                if (oc.indexOf("'SALAH'") > -1 && oc.indexOf("'" + rowId + "'") > -1) {
                    if (!$(this).hasClass('bg-light')) {
                        $(this).trigger('click');
                    }
                }
            });
            
            // 2. Paksa backend secara async agar tidak menghambat UI
            google.script.run.tandaiNotifSalahDibaca(rowId, user.role || "User");
        } catch (e) { console.error("Salah Notif Error:", e); }
    }

    // =================================================================
    // 2. GATEKEEPER & CHAINED FETCH
    // =================================================================
    function salah_validasiAksesUser() {
        if (SALAH_IS_ADMIN) {
            SultanUI.showLoading('#salah_loadingState', 'Mempersiapkan Database Admin...');

            // VAKSIN DROPDOWN: Isi dari DROPDOWN_STATIS dulu sebagai fallback cepat
            if (typeof DROPDOWN_STATIS !== 'undefined' && DROPDOWN_STATIS.UnitKerjaSiaba) {
                var optS = '<option value="SEMUA">- Semua Unit Kerja -</option>';
                var optI = '<option value="">- Pilih Unit -</option>';
                DROPDOWN_STATIS.UnitKerjaSiaba.forEach(u => {
                    optS += '<option value="' + salah_escapeHtml(u) + '">' + salah_escapeHtml(u) + '</option>';
                    optI += '<option value="' + salah_escapeHtml(u) + '">' + salah_escapeHtml(u) + '</option>';
                });
                $('#salah_filterUnit').html(optS).prop('disabled', false);
                $('#salah_inputUnit').html(optI).prop('disabled', false);
            }

            google.script.run.withSuccessHandler(function (data) {
                if (Array.isArray(data)) {
                    SALAH_DB_PEGAWAI = data;
                    var unikUnit = [...new Set(SALAH_DB_PEGAWAI.map(item => String(item.unit).trim()))].sort();
                    
                    // Jika data dari DB Pegawai lebih akurat/lengkap, update dropdown
                    if (unikUnit.length > 0) {
                        var optFilter = '<option value="SEMUA">- Semua Unit Kerja -</option>';
                        var optInput = '<option value="">- Pilih Unit -</option>';
                        unikUnit.forEach(function (u) {
                            if (u) {
                                optFilter += '<option value="' + salah_escapeHtml(u) + '">' + salah_escapeHtml(u) + '</option>';
                                optInput += '<option value="' + salah_escapeHtml(u) + '">' + salah_escapeHtml(u) + '</option>';
                            }
                        });
                        $('#salah_filterUnit').html(optFilter);
                        $('#salah_inputUnit').html(optInput);
                    }
                }

                $('#salah_btnRefresh, #salah_btnTambah').prop('disabled', false);
                salah_tarikDataServer();
            }).getDatabasePegawai();

        } else {
            if (!SALAH_USER_NPSN) {
                $('#salah_filterUnit').empty().append('<option value="">AKSES DITOLAK</option>');
                SultanUI.showLoading('#salah_loadingState', '<span class="text-danger"><i class="fas fa-ban mb-2"></i><br>Akses ditolak: Sesi login tidak valid.</span>');
                return;
            }

            google.script.run
                .withSuccessHandler(function (resUnit) {
                    var dataUnit = JSON.parse(resUnit);
                    if (dataUnit && dataUnit.error) {
                        $('#salah_filterUnit').empty().append('<option value="">AKSES DITOLAK</option>');
                        SultanUI.showLoading('#salah_loadingState', '<span class="text-danger"><i class="fas fa-exclamation-triangle mb-2"></i><br>' + salah_escapeHtml(dataUnit.error) + '</span>');
                        return;
                    }

                    SALAH_UNIT_TERKUNCI = dataUnit.unitKerja;
                    $('#salah_filterUnit').empty().append('<option value="' + salah_escapeHtml(SALAH_UNIT_TERKUNCI) + '">' + salah_escapeHtml(SALAH_UNIT_TERKUNCI) + '</option>').prop('disabled', true);
                    $('#salah_inputUnit').html('<option value="' + salah_escapeHtml(SALAH_UNIT_TERKUNCI) + '">' + salah_escapeHtml(SALAH_UNIT_TERKUNCI) + '</option>').prop('disabled', true);

                    google.script.run.withSuccessHandler(function (data) {
                        if (Array.isArray(data)) SALAH_DB_PEGAWAI = data;
                        salah_filterDropdownNama();
                        $('#salah_btnRefresh, #salah_btnTambah').prop('disabled', false);
                        salah_tarikDataServer();
                    }).getDatabasePegawai();

                })
                .withFailureHandler(function (err) {
                    SultanUI.showLoading('#salah_loadingState', '<span class="text-danger"><i class="fas fa-wifi mb-2"></i><br>Koneksi Terputus: ' + salah_escapeHtml(err.message) + '</span>');
                    $('#salah_btnTambah, #salah_btnRefresh').prop('disabled', true);
                })
                .getUnitKerjaByNPSN(SALAH_USER_NPSN);
        }
    }

    // =================================================================
    // 3. FETCH DATA TABEL (PENERAPAN BAB VIII - SMART CACHE)
    // =================================================================
    function salah_prosesCariData() {
        var th = $('#salah_filterTahun').val();
        var bl = $('#salah_filterBulan').val();
        if (!th) { Sultan.notif.info('Tahun harus dipilih.'); return; }

        if (th === SALAH_CACHE_THN && SALAH_CACHE_DATA.length > 0) {
            if (bl === SALAH_CACHE_BLN || SALAH_CACHE_BLN === "") {
                salah_terapkanFilterLokal();
                return;
            }
        }

        salah_tarikDataServer();
    }

    function salah_tarikDataServer() {
        var th = $('#salah_filterTahun').val();
        var bl = $('#salah_filterBulan').val();
        if (!th) return;

        var btn = $('#salah_btnRefresh');
        btn.prop('disabled', true).html('<i class="fas fa-spinner fa-spin text-maroon"></i>');

        if (!$.fn.DataTable.isDataTable('#salah_tabelUtama')) {
            $('#salah_tableState').hide();
            SultanUI.showLoading('#salah_loadingState', 'Mempersiapkan Database Admin...');
        }

        google.script.run
            .withSuccessHandler(function (res) {
                btn.prop('disabled', false).html('<i class="fas fa-sync-alt text-maroon"></i>');
                var hasil = [];
                try { hasil = JSON.parse(res); } catch (e) { console.error("Parse Error:", res); }

                if (hasil && hasil.error) {
                    SultanUI.showLoading('#salah_loadingState', '<span class="text-danger">' + salah_escapeHtml(hasil.error) + '</span>');
                    return;
                }

                SALAH_CACHE_DATA = Array.isArray(hasil) ? hasil : [];
                SALAH_CACHE_THN = th;
                SALAH_CACHE_BLN = bl;

                if (!$.fn.DataTable.isDataTable('#salah_tabelUtama')) {
                    SALAH_TABEL_INSTANCE = SultanTable.init('#salah_tabelUtama', {
                        "destroy": true, "ordering": false, "pageLength": 10, "autoWidth": false,
                        "deferRender": true,
                        "dom": "<'row mb-2'<'col-sm-12 col-md-6'l><'col-sm-12 col-md-6'f>>" +
                               "<'row'<'col-sm-12'<'sultan-scroll-container sultan-scroll'tr>>>" +
                               "<'row mt-2'<'col-sm-12 col-md-5'i><'col-sm-12 col-md-7'p>>",
                        "columnDefs": [
                            { "targets": 0, "width": "1%", "className": "text-center align-middle text-nowrap sultan-sticky-col" },
                            { "targets": 1, "className": "text-left align-middle" },
                            { "targets": 2, "className": "text-left align-middle" },
                            { "targets": [3, 4, 5], "width": "1%", "className": "text-center align-middle text-nowrap" },
                            { "targets": [6, 7, 8], "width": "15%", "className": "text-left align-middle" }
                        ],
                        "language": { "url": "//cdn.datatables.net/plug-ins/1.10.25/i18n/Indonesian.json", "emptyTable": "Tidak ada riwayat Salah Presensi." }
                    });
                }

                salah_terapkanFilterLokal();

                SultanUI.hideLoading('#salah_loadingState');
                $('#salah_tableState').show();
                if (SALAH_TABEL_INSTANCE) {
                    setTimeout(function () { SALAH_TABEL_INSTANCE.columns.adjust(); }, 100);
                }
            })
            .withFailureHandler(function (err) {
                btn.prop('disabled', false).html('<i class="fas fa-sync-alt text-maroon"></i>');
                SultanUI.showLoading('#salah_loadingState', '<span class="text-danger"><i class="fas fa-wifi mb-2"></i><br>Koneksi Server Terputus.</span>');
            }).getDaftarSalahPresensi(th, bl);
    }

    function salah_terapkanFilterLokal() {
        if (!SALAH_TABEL_INSTANCE) return;

        var st = $('#salah_filterStatus').val();
        var tStat = (st && st !== "") ? String(st).trim().toUpperCase() : "";

        var bl = $('#salah_filterBulan').val();
        var tBulan = (bl && bl !== "") ? String(bl).trim().toLowerCase() : "";

        var tAdminUnit = SALAH_IS_ADMIN ? $('#salah_filterUnit').val().toUpperCase() : "";
        var tNpsnUser = String(SALAH_USER_NPSN).trim().toUpperCase();
        var tUnitUser = String(SALAH_UNIT_TERKUNCI).trim().toUpperCase();

        var hasil = SALAH_CACHE_DATA.filter(function (row) {
            var rNpsn = String(row.npsn || "").trim().toUpperCase();
            var rUnit = String(row.unit || "").trim().toUpperCase();
            var rStat = String(row.status || "").trim().toUpperCase();

            var rBulanRaw = "";
            var rawTgl = String(row.tanggal || "").replace(/'/g, "").trim();
            if (rawTgl !== "" && rawTgl !== "-") {
                var parts = rawTgl.split('-');
                if (parts.length === 3) {
                    var mIdx = parts[0].length === 4 ? parts[1] : parts[1];
                    var mNames = ["", "januari", "februari", "maret", "april", "mei", "juni", "juli", "agustus", "september", "oktober", "november", "desember"];
                    rBulanRaw = mNames[parseInt(mIdx, 10)] || "";
                }
            }

            var pSekolah = false;
            if (SALAH_IS_ADMIN) {
                if (tAdminUnit === "SEMUA" || rUnit === tAdminUnit) pSekolah = true;
            } else {
                if (tNpsnUser !== "" && rNpsn === tNpsnUser) pSekolah = true;
                else if (tUnitUser !== "" && rUnit === tUnitUser) pSekolah = true;
            }

            var pStat = true;
            if (tStat !== "") {
                if (tStat === "DIPROSES") pStat = (rStat === "" || rStat === "DIPROSES");
                else pStat = rStat.includes(tStat);
            }

            var pBulan = true;
            if (tBulan !== "") {
                pBulan = (rBulanRaw === tBulan);
            }

            return pSekolah && pStat && pBulan;
        });

        hasil.sort(function (a, b) { return Math.max(salah_parseDateLogic(b.tglKirim), salah_parseDateLogic(b.tglEdit), salah_parseDateLogic(b.tglVerif)) - Math.max(salah_parseDateLogic(a.tglKirim), salah_parseDateLogic(a.tglEdit), salah_parseDateLogic(a.tglVerif)); });

        salah_renderTabel(hasil);
    }

    function salah_formatTanggalIndo(tglStr) { if (!tglStr) return '-'; var parts = tglStr.split('-'); if (parts.length !== 3) return tglStr; var thn = parts[0].length === 4 ? parts[0] : parts[2]; var bln = parts[0].length === 4 ? parts[1] : parts[1]; var tgl = parts[0].length === 4 ? parts[2] : parts[0]; var namaBulan = ["", "Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"]; return parseInt(tgl, 10) + " " + namaBulan[parseInt(bln, 10)] + " " + thn; }

    function salah_filterDropdownNama() {
        var $selNama = $('#salah_inputNama').empty().append('<option value="">- Pilih Nama -</option>').prop('disabled', true);
        var $selNip = $('#salah_inputNip').empty().append('<option value="">- Otomatis -</option>').prop('disabled', true);

        var unitTerpilih = String($('#salah_inputUnit').val() || "").trim();
        if (SALAH_IS_ADMIN && !unitTerpilih) return;

        // VAKSIN GATEKEEPER NAMA: Gunakan NPSN jika non-admin agar kebal dari perbedaan format nama sekolah
        var filtered = SALAH_IS_ADMIN 
            ? SALAH_DB_PEGAWAI.filter(x => String(x.unit).trim().toUpperCase() === unitTerpilih.toUpperCase())
            : SALAH_DB_PEGAWAI.filter(x => String(x.npsn).trim() === String(SALAH_USER_NPSN).trim());

        // Fallback jika filtered kosong (misal data NPSN kosong di DB pegawai, atau Admin salah pilih)
        if (filtered.length === 0 && !SALAH_IS_ADMIN && typeof SALAH_UNIT_TERKUNCI !== 'undefined' && SALAH_UNIT_TERKUNCI) {
            filtered = SALAH_DB_PEGAWAI.filter(x => {
                var dbUnit = String(x.unit).toLowerCase().replace(/[^a-z0-9]/g, '').replace(/negeri/g, 'n').replace(/sdn/g, 'sdn');
                var userUnit = String(SALAH_UNIT_TERKUNCI).toLowerCase().replace(/[^a-z0-9]/g, '').replace(/negeri/g, 'n').replace(/sdn/g, 'sdn');
                return dbUnit.indexOf(userUnit) > -1 || userUnit.indexOf(dbUnit) > -1;
            });
        }

        var unikNama = [...new Set(filtered.map(item => String(item.nama).trim()))].sort();

        if (unikNama.length > 0) {
            unikNama.forEach(nama => {
                if (nama) $selNama.append('<option value="' + salah_escapeHtml(nama) + '">' + salah_escapeHtml(nama) + '</option>');
            });
            $selNama.prop('disabled', false);
        }
    }

    function salah_filterDropdownNip() {
        var unitTerpilih = String($('#salah_inputUnit').val() || "").trim();
        var nama = String($('#salah_inputNama').val() || "").trim();
        var $selNip = $('#salah_inputNip').empty();

        if (!nama) {
            $selNip.append('<option value="">- Otomatis -</option>').prop('disabled', true);
            return;
        }

        // VAKSIN GATEKEEPER NIP: Gunakan NPSN jika non-admin
        var kandidat = SALAH_IS_ADMIN
            ? SALAH_DB_PEGAWAI.filter(x => String(x.unit).trim().toUpperCase() === unitTerpilih.toUpperCase() && String(x.nama).trim() === nama)
            : SALAH_DB_PEGAWAI.filter(x => String(x.npsn).trim() === String(SALAH_USER_NPSN).trim() && String(x.nama).trim() === nama);

        // Fallback jika tidak ditemukan
        if (kandidat.length === 0 && !SALAH_IS_ADMIN && typeof SALAH_UNIT_TERKUNCI !== 'undefined' && SALAH_UNIT_TERKUNCI) {
            kandidat = SALAH_DB_PEGAWAI.filter(x => {
                if (String(x.nama).trim() !== nama) return false;
                var dbUnit = String(x.unit).toLowerCase().replace(/[^a-z0-9]/g, '').replace(/negeri/g, 'n').replace(/sdn/g, 'sdn');
                var userUnit = String(SALAH_UNIT_TERKUNCI).toLowerCase().replace(/[^a-z0-9]/g, '').replace(/negeri/g, 'n').replace(/sdn/g, 'sdn');
                return dbUnit.indexOf(userUnit) > -1 || userUnit.indexOf(dbUnit) > -1;
            });
        }

        if (kandidat.length === 1) {
            var cNip = String(kandidat[0].nip).trim();
            $selNip.append('<option value="' + salah_escapeHtml(cNip) + '" selected>' + salah_escapeHtml(cNip) + '</option>').prop('disabled', true);
        } else if (kandidat.length > 1) {
            $selNip.append('<option value="">- Pilih NIP -</option>');
            kandidat.forEach(x => {
                var mNip = String(x.nip).trim();
                $selNip.append('<option value="' + salah_escapeHtml(mNip) + '">' + salah_escapeHtml(mNip) + '</option>');
            });
            $selNip.prop('disabled', false);
        } else {
            $selNip.append('<option value="">- NIP Tdk Ditemukan -</option>').prop('disabled', true);
        }
    }

    function salah_cleanText(text) { if (!text) return ""; return String(text).replace(/(\r\n|\n|\r)/gm, " ").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;"); }
    function salah_escapeHtml(text) { if (!text) return ""; return String(text).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;"); }
    function salah_parseDateLogic(str) {
        if (!str || str.length < 5) return 0;
        var clean = String(str).replace(/'/g, "").trim();
        if (clean === "-" || clean === "") return 0;
        try {
            var parts = clean.split(/\s+/);
            var d = parts[0].split(/[-/]/);
            if (d.length !== 3) return 0;
            var t = (parts[1] || "00:00:00").split(":");

            // VAKSIN DETEKSI FORMAT: YYYY-MM-DD vs DD-MM-YYYY
            var y = (d[0].length === 4) ? parseInt(d[0], 10) : parseInt(d[2], 10);
            var m = parseInt(d[1], 10) - 1;
            var dt = (d[0].length === 4) ? parseInt(d[2], 10) : parseInt(d[0], 10);

            return new Date(y, m, dt, parseInt(t[0] || 0, 10), parseInt(t[1] || 0, 10), parseInt(t[2] || 0, 10)).getTime();
        } catch (e) { return 0; }
    }

    function salah_escapeJs(str) {
        if (!str) return "";
        return String(str).replace(/\\/g, "\\\\").replace(/'/g, "\\'").replace(/"/g, "&quot;").replace(/(\r\n|\n|\r)/gm, "<br>");
    }

    function salah_lihatCatatanSultan(pesan) {
        Sultan.alert('info', 'Catatan Verifikasi', pesan);
    }

    function salah_toProperCase(str) {
        if (!str) return "";
        return str.replace(/\w\S*/g, function(txt) {
            return txt.charAt(0).toUpperCase() + txt.substr(1).toLowerCase();
        });
    }

    function salah_buildBadgeStatus(status, ket) {
        var s = String(status || "").toLowerCase();
        var style = 'badge-sultan-diproses';
        var icon = 'clock';
        var labelStatus = status ? salah_toProperCase(status) : 'Diproses';

        if (s.includes('ok') || s.includes('setuju')) { style = 'badge-sultan-disetujui'; icon = 'check-circle'; }
        else if (s.includes('revisi')) { style = 'badge-sultan-revisi'; icon = 'sync-alt'; }
        else if (s.includes('tolak')) { style = 'badge-sultan-ditolak'; icon = 'times-circle'; }

        var badgeHtml = '<span class="' + style + '"><i class="fas fa-' + icon + ' mr-1"></i>' + salah_escapeHtml(labelStatus) + '</span>';

        if (ket && String(ket).trim().length > 2) {
            var safeKet = btoa(salah_escapeHtml(String(ket).trim())); // Enkripsi Base64
            var btnCatatan = '<div class="mt-2"><button type="button" class="sultan-btn-note salah-btn-catatan" data-pesan="' + safeKet + '"><i class="fas fa-comment-dots mr-1"></i> Baca Catatan</button></div>';
            return badgeHtml + btnCatatan;
        }

        return badgeHtml;
    }

    $(document).ready(function() {
        setTimeout(function() {
            var $scrollContainer = $('.sultan-scroll-container');
            if ($scrollContainer.length > 0) {
                $scrollContainer.on('wheel touchmove', function(e) {
                    var container = this;
                    var scrollLeft = container.scrollLeft;
                    var scrollWidth = container.scrollWidth;
                    var clientWidth = container.clientWidth;
                    var isAtStart = scrollLeft <= 1;
                    var isAtEnd = scrollLeft >= scrollWidth - clientWidth - 1;
                    
                    if (e.type === 'wheel') {
                        var deltaX = e.originalEvent.deltaX;
                        if ((isAtStart && deltaX < 0) || (isAtEnd && deltaX > 0)) {
                            e.preventDefault();
                        }
                    } else if (e.type === 'touchmove') {
                        var touch = e.originalEvent.touches[0];
                        var lastTouchX = $(this).data('lastTouchX');
                        if (lastTouchX !== undefined) {
                            var deltaX = touch.clientX - lastTouchX;
                            if ((isAtStart && deltaX > 0) || (isAtEnd && deltaX < 0)) {
                                e.preventDefault();
                            }
                        }
                        $(this).data('lastTouchX', touch.clientX);
                    }
                });
                
                $scrollContainer.on('touchend', function() {
                    $(this).removeData('lastTouchX');
                });
            }
        }, 500);
    });
</script>

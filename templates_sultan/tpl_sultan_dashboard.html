<script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>

<div class="content-header pb-0 sultan-page-header">
  <div class="container-fluid">
    <div class="row">
      <div class="col-sm-12">
        <h5 class="font-weight-bold text-uppercase">
          <i class="fas fa-tachometer-alt text-maroon mr-2"></i>[JUDUL_DASHBOARD_ANDA]
        </h5>
        <hr class="style-sultan-solid">
      </div>
    </div>
  </div>
</div>

<section class="content">
  <div class="container-fluid">
    
    <!-- 1. FILTER BAR SULTAN -->
    <div class="sultan-filter-pill-container shadow-sm mb-4">
        <div class="sultan-filter-item">
            <select id="dash_filterTahun" class="form-control"></select>
            <i class="fas fa-chevron-down"></i>
        </div>
        
        <div class="divider-vertical d-none d-md-block mx-2"></div>
        
        <button type="button" id="dash_btnRefresh" class="btn btn-maroon rounded-pill px-4 shadow-sm font-weight-bold">
            <i class="fas fa-sync-alt mr-2"></i> REFRESH DATA
        </button>
        <div class="ml-2">
            <small class="text-muted d-block" style="font-size: 10px; line-height: 1;">Terakhir diperbarui:</small>
            <small id="dash_lastUpdate" class="text-maroon font-weight-bold" style="font-size: 11px;">-</small>
        </div>
    </div>

    <!-- 2. MAIN STATS CARDS -->
    <div class="row mb-4">
        <div class="col-lg-3 col-md-6 mb-4">
            <div class="card-sultan h-100 p-4">
                <div class="d-flex justify-content-between align-items-start mb-3">
                    <div class="icon-box-modern bg-soft-grey"><i class="fas fa-database text-maroon"></i></div>
                    <div class="text-right">
                        <h2 class="font-weight-bold mb-0 dash-count-up" id="dash_valTotal">0</h2>
                        <small class="text-muted font-weight-bold text-uppercase small-caps">Total Data</small>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-lg-3 col-md-6 mb-4">
            <div class="card-sultan h-100 p-4">
                <div class="d-flex justify-content-between align-items-start mb-3">
                    <div class="icon-box-modern bg-soft-success"><i class="fas fa-check-circle text-success"></i></div>
                    <div class="text-right">
                        <h2 class="font-weight-bold mb-0 dash-count-up" id="dash_valSuccess">0</h2>
                        <small class="text-muted font-weight-bold text-uppercase small-caps">Berhasil</small>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-lg-3 col-md-6 mb-4">
            <div class="card-sultan h-100 p-4">
                <div class="d-flex justify-content-between align-items-start mb-3">
                    <div class="icon-box-modern bg-soft-info"><i class="fas fa-tasks text-info"></i></div>
                    <div class="text-right">
                        <h2 class="font-weight-bold mb-0"><span class="dash-count-up" id="dash_valProgress">0</span>%</h2>
                        <small class="text-muted font-weight-bold text-uppercase small-caps">Progress</small>
                    </div>
                </div>
                <div class="progress mb-1" style="height: 6px; border-radius: 10px;">
                    <div id="dash_progressBar" class="progress-bar bg-info" style="width: 0%;"></div>
                </div>
            </div>
        </div>
        <div class="col-lg-3 col-md-6 mb-4">
            <div class="card-sultan h-100 p-4">
                <div class="d-flex justify-content-between align-items-start mb-3">
                    <div class="icon-box-modern bg-soft-danger"><i class="fas fa-exclamation-triangle text-danger"></i></div>
                    <div class="text-right">
                        <h2 class="font-weight-bold mb-0 text-danger dash-count-up" id="dash_valPending">0</h2>
                        <small class="text-muted font-weight-bold text-uppercase small-caps">Tunda/Gagal</small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 2.1 PROGRESS BAR FULL WIDTH -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="progress" style="height: 10px; border-radius: 5px; background-color: #fce4e4;">
                <div id="dash_progressBarFull" class="progress-bar" role="progressbar" style="width: 0%; background-color: #d11a2a;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
            </div>
            <div class="d-flex justify-content-between mt-1">
                <small class="text-muted font-weight-bold" id="dash_progressText">0% Selesai</small>
                <small class="text-muted" id="dash_lastUpdateFull">-</small>
            </div>
        </div>
    </div>

    <!-- 3. CHARTS & LISTS -->
    <div class="row mb-4">
        <!-- PROPORSI DATA (Chart) -->
        <div class="col-lg-4 d-flex">
            <div class="card-sultan shadow-sm w-100 h-100">
                <div class="p-3 border-bottom bg-white d-flex align-items-center" style="height: 55px;">
                    <h6 class="font-weight-bold text-dark mb-0 uppercase-tracking">
                        <i class="fas fa-chart-pie mr-2 text-maroon"></i> PROPORSI STATUS
                    </h6>
                </div>
                <div class="card-body p-4 d-flex align-items-center justify-content-center" style="min-height: 300px;">
                    <div class="position-relative" style="width: 200px; height: 200px;">
                        <canvas id="dash_chartMain"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- PRIORITAS TINDAK LANJUT -->
        <div class="col-lg-4 d-flex">
            <div class="card-sultan shadow-sm w-100 h-100 overflow-hidden">
                <div class="p-3 border-bottom bg-white d-flex align-items-center" style="height: 55px;">
                    <h6 class="font-weight-bold text-dark mb-0 uppercase-tracking">
                        <i class="fas fa-bullhorn mr-2 text-maroon"></i> PRIORITAS TINDAK LANJUT
                    </h6>
                </div>
                <div class="card-body p-0">
                    <div id="dash_listPriority" class="list-group list-group-flush sultan-scroll" style="max-height: 400px; overflow-y: auto;">
                        <div class="text-center p-5 text-muted small">Memuat data...</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- AKTIVITAS TERBARU -->
        <div class="col-lg-4 d-flex">
            <div class="card-sultan shadow-sm w-100 h-100">
                <div class="p-3 border-bottom bg-white d-flex align-items-center" style="height: 55px;">
                    <h6 class="font-weight-bold text-dark mb-0 uppercase-tracking">
                        <i class="fas fa-history mr-2 text-maroon"></i> AKTIVITAS TERBARU
                    </h6>
                </div>
                <div class="card-body p-0">
                    <div id="dash_listTimeline" class="list-group list-group-flush sultan-scroll" style="max-height: 400px; overflow-y: auto;">
                        <div class="text-center p-5 text-muted small">Memuat data...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
  </div>
</section>

<!-- CSS tersentralisasi di css_sultan.html -->

<script>
    var DASH_CHART_INSTANCE = null;

    $(document).ready(function() {
        dash_initFilters();
        $(document).off('click', '#dash_btnRefresh').on('click', '#dash_btnRefresh', dash_loadData);
        dash_loadData();
    });

    function dash_initFilters() {
        var html = '<option value="' + new Date().getFullYear() + '">' + new Date().getFullYear() + '</option>';
        $('#dash_filterTahun').html(html);
    }

    function dash_loadData() {
        $('#dash_btnRefresh').prop('disabled', true).html('<i class="fas fa-sync fa-spin mr-2"></i> Sinkron...');
        
        // SKELETON & LOTTERY ANIMATION SIMULATION
        if (typeof SultanUI !== 'undefined') {
            SultanUI.startLottery('#dash_valTotal, #dash_valSuccess, #dash_valPending', 3);
            SultanUI.startLottery('#dash_valProgress', 2, '%');
        } else {
            $('.dash-count-up').html('---');
        }
        $('#dash_progressText').html('<span class="sultan-skeleton" style="width: 80px; height: 14px; display: inline-block;"></span>');
        
        // google.script.run.withSuccessHandler(dash_render).getDashboardData();
        
        // SIMULASI DATA
        setTimeout(function() {
            var mockData = { total: 100, success: 85, progress: 85, pending: 15 };
            dash_render(mockData);
            $('#dash_btnRefresh').prop('disabled', false).html('<i class="fas fa-sync-alt mr-2"></i> REFRESH DATA');
            var timeString = new Date().toLocaleTimeString('id-ID') + " WIB";
            $('#dash_lastUpdate').text(timeString);
            $('#dash_lastUpdateFull').text(timeString);
        }, 1200);
    }

    function dash_render(data) {
        dash_animateValue("dash_valTotal", data.total);
        dash_animateValue("dash_valSuccess", data.success);
        dash_animateValue("dash_valProgress", data.progress);
        dash_animateValue("dash_valPending", data.pending);
        
        // Update local progress card
        $('#dash_progressBar').css('width', data.progress + '%');
        
        // Update full width progress bar
        if (typeof SultanUI !== 'undefined') {
            SultanUI.stopLottery('#dash_progressBarFull');
        }
        var pBar = $('#dash_progressBarFull');
        pBar.css('width', data.progress + '%');
        $('#dash_progressText').text(data.progress + '% Selesai');
        
        if (data.progress < 30) pBar.css('background-color', '#d11a2a');
        else if (data.progress < 70) pBar.css('background-color', '#ffc107');
        else pBar.css('background-color', '#28a745');
        
        dash_renderChart(data);
    }

    function dash_renderChart(data) {
        if (typeof Chart === 'undefined') return;
        var ctx = document.getElementById('dash_chartMain').getContext('2d');
        if (DASH_CHART_INSTANCE) DASH_CHART_INSTANCE.destroy();
        
        DASH_CHART_INSTANCE = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Berhasil', 'Tunda'],
                datasets: [{
                    data: [data.success, data.pending],
                    backgroundColor: ['#28a745', '#dc3545'],
                    borderWidth: 0
                }]
            },
            options: { cutout: '75%', plugins: { legend: { display: false } } }
        });
    }

    function dash_animateValue(id, end) {
        if (typeof SultanUI !== 'undefined') {
            SultanUI.stopLottery('#' + id);
        }
        var obj = document.getElementById(id);
        if(!obj) return;
        var start = 0; var duration = 1000; var startTime = null;
        function step(timestamp) {
            if (!startTime) startTime = timestamp;
            var progress = Math.min((timestamp - startTime) / duration, 1);
            obj.innerHTML = Math.floor(progress * (end - start) + start);
            if (progress < 1) window.requestAnimationFrame(step);
        }
        window.requestAnimationFrame(step);
    }
</script>

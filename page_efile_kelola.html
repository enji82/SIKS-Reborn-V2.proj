<section class="content">
  <div class="container-fluid">
    <div class="row justify-content-center">
      <div class="col-12">
        
        <div class="sultan-filter-pill-container shadow-sm mb-4">
            <div class="sultan-filter-item">
                <select id="efilekelola_filterStatus" class="form-control">
                    <option value="SEMUA">- Semua Status -</option>
                    <option value="diproses">Diproses</option>
                    <option value="disetujui">Disetujui</option>
                    <option value="revisi">Revisi</option>
                    <option value="ditolak">Ditolak</option>
                </select>
                <i class="fas fa-chevron-down"></i>
            </div>

            <div class="sultan-filter-item">
                <select id="efilekelola_filterKategori" class="form-control">
                    <option value="SEMUA">- Semua Kategori -</option>
                </select>
                <i class="fas fa-chevron-down"></i>
            </div>

            <div class="sultan-filter-item" id="efilekelola_filterContainer" style="display: none;">
                <select id="efilekelola_filterUnit" class="form-control" disabled>
                    <option value="">- Memvalidasi Akses... -</option>
                </select>
                <i class="fas fa-chevron-down"></i>
            </div>

            <div class="divider-vertical d-none d-md-block mx-2"></div>

            <button type="button" id="efilekelola_btnRefresh" class="sultan-btn-refresh" title="Segarkan Data" >
                <i class="fas fa-sync-alt"></i>
            </button>

            <div class="ml-auto d-none d-md-block"></div>
            
            <button type="button" id="efilekelola_btnTambah" class="sultan-btn-tambah" disabled>
                <i class="fas fa-upload"></i> UNGGAH BERKAS
            </button>
        </div>

        <div class="card-sultan w-100 overflow-hidden">
          <div class="card-body p-3 w-100">
            <div id="efilekelola_loadingState"><div class="d-flex flex-column justify-content-center align-items-center" style="min-height: 50vh;"><div class="sultan-loading-container text-center"><i class="fas fa-spinner fa-spin fa-3x text-maroon mb-3"></i><h6 class="text-muted font-weight-bold mt-3" id="efilekelola_loadingText">Mempersiapkan Engine E-File...</h6></div></div></div>
            <div id="efilekelola_tableState" style="display: none;">
                <table id="efilekelola_tabelUtama" class="table table-hover table-premium table-sultan-compact text-nowrap mb-0 w-100" style="font-size: 13px;">
                    <thead class="bg-light text-maroon text-uppercase font-weight-bold">
                      <tr>
                        <th class="col-sticky-left text-center align-middle" style="z-index: 5; border-bottom: 3px solid #85144b !important;">AKSI</th>
                        <th class="text-center align-middle" style="border-bottom: 3px solid #85144b !important;">STATUS</th>
                        <th class="text-left align-middle" style="min-width: 200px; border-bottom: 3px solid #85144b !important;">IDENTITAS PTK</th>
                        <th class="text-left align-middle" style="border-bottom: 3px solid #85144b !important;">KATEGORI BERKAS</th>
                        <th class="text-center align-middle" style="border-bottom: 3px solid #85144b !important;">TAHUN</th>
                        <th class="text-center align-middle" style="border-bottom: 3px solid #85144b !important;">PERIODE/TMT</th>
                        <th class="text-center align-middle" style="border-bottom: 3px solid #85144b !important;">DOKUMEN</th>
                        <th class="text-left align-middle" style="border-bottom: 3px solid #85144b !important;">WAKTU UPLOAD</th>
                        <th class="text-left align-middle" style="border-bottom: 3px solid #85144b !important;">WAKTU EDIT</th>
                        <th class="text-left align-middle" style="border-bottom: 3px solid #85144b !important;">VERIFIKASI</th>
                      </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</section>

<!-- CONTAINER TEMPLATE MODAL FORM & VERIFIKASI -->
<div id="efilekelola_templates" style="display:none;">
    <!-- Form Upload (Tambah) -->
    <form id="efilekelola_formUpload" novalidate>
        <div class="modal-body modal-body-sultan p-4">
            <div class="form-group mb-4 position-relative" id="efilekelola_pilih_ptk_container">
                <label class="form-label-sultan small font-weight-bold text-muted text-uppercase">Pilih Pegawai <span class="text-danger">*</span></label>
                <div class="d-flex flex-wrap gap-2 align-items-center" style="gap:8px;">
                    <div style="flex:0 1 auto; min-width:180px; max-width:100%;" id="efilekelola_unit_container">
                        <select id="efilekelola_in_unit" class="form-control form-control-sultan border-maroon font-weight-bold text-dark w-auto" style="max-width: 100%;" required>
                            <option value="">- Pilih Unit Kerja -</option>
                        </select>
                    </div>
                    <div style="flex:1 1 auto; min-width:200px;">
                        <select id="efilekelola_in_ptk" class="form-control form-control-sultan border-maroon font-weight-bold text-dark" required disabled>
                            <option value="">- Pilih Pegawai -</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="d-flex justify-content-between align-items-center mb-2 border-bottom pb-2">
                <h6 class="font-weight-bold text-dark m-0"><i class="fas fa-layer-group mr-1 text-primary"></i> Daftar Berkas Baru</h6>
                <button type="button" id="efilekelola_btnAddRow" class="btn btn-sm btn-outline-primary font-weight-bold rounded-pill px-3 shadow-sm" disabled><i class="fas fa-plus mr-1"></i> Tambah Berkas</button>
            </div>
            <div id="efilekelola_uploadContainer" class="mt-3"><div class="text-center text-muted p-3" id="efilekelola_msgPilihPtk"><i class="fas fa-info-circle mr-1"></i> Pilih pegawai terlebih dahulu.</div></div>
        </div>
        <div class="modal-footer modal-footer-tambah-edit justify-content-between">
            <button type="button" class="modal-btn-batal" data-dismiss="modal">
                <i class="fas fa-times mr-2"></i>BATAL
            </button>
            <button type="button" id="efilekelola_btnSimpan" class="modal-btn-simpan" disabled>
                <i class="fas fa-cloud-upload-alt mr-2"></i>UNGGAH
            </button>
        </div>
    </form>

    <!-- Form Perbaiki (Edit) -->
    <form id="efilekelola_formPerbaiki" novalidate>
        <div class="modal-body modal-body-sultan p-4">
            <input type="hidden" id="efilekelola_p_rowid"><input type="hidden" id="efilekelola_p_idptk">
            <table class="table table-sm table-borderless text-sm mb-2">
                <tr><td class="font-weight-bold text-muted w-25">Pegawai</td><td class="font-weight-bold text-dark text-uppercase" id="efilekelola_p_nama">-</td></tr>
                <tr><td class="font-weight-bold text-muted">Kategori</td><td class="font-weight-bold text-primary" id="efilekelola_p_kategori">-</td></tr>
                <tr><td class="font-weight-bold text-muted">Catatan Admin</td><td class="font-weight-bold text-danger bg-white p-2 rounded border border-danger" id="efilekelola_p_catatan">-</td></tr>
            </table>

            <!-- Keterangan Kategori Modal Edit (Lebar penuh, 13px) -->
            <div class="row mb-3" id="efilekelola_p_keterangan_row" style="display:none;">
                <div class="col-12">
                    <div class="alert alert-soft-info rounded px-3 py-2 m-0" id="efilekelola_p_keterangan" style="font-size:13px; line-height:1.5;"></div>
                </div>
            </div>
            
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label-sultan small font-weight-bold text-muted text-uppercase">Tahun <span class="text-danger">*</span></label>
                    <input type="number" id="efilekelola_p_tahun_input" class="form-control form-control-sultan border-warning" required>
                </div>
                <div class="col-md-6" id="efilekelola_p_periode_wrapper" style="display:none;">
                    <label class="form-label-sultan small font-weight-bold text-muted text-uppercase"><span id="efilekelola_p_periode_label">Periode</span> <span class="text-danger">*</span></label>
                    <input type="text" id="efilekelola_p_periode_input" class="form-control form-control-sultan border-warning">
                </div>
            </div>
            
            <div class="form-group mb-0 border p-3 bg-white rounded shadow-sm">
                <label class="form-label-sultan small font-weight-bold text-muted text-uppercase"><i class="fas fa-file-upload text-danger mr-1" id="efilekelola_p_iconFormat"></i> <span id="efilekelola_p_lblFormat">Dokumen (Maks 1MB)</span></label> 
                <div class="small text-muted mb-2 font-italic">Biarkan kosong jika tidak ingin mengubah file asli.</div>
                <div class="custom-file"><input type="file" class="custom-file-input border-warning efilekelola-file-input" id="efilekelola_p_file"><label class="custom-file-label text-truncate">Pilih file baru...</label></div>
            </div>
        </div>
        <div class="modal-footer modal-footer-tambah-edit justify-content-between">
            <button type="button" class="modal-btn-batal" data-dismiss="modal">
                <i class="fas fa-times mr-2"></i>BATAL
            </button>
            <button type="button" id="efilekelola_btnSimpanPerbaiki" class="modal-btn-perbarui">
                <i class="fas fa-edit mr-2"></i>PERBARUI
            </button>
        </div>
    </form>

    <!-- Form Verifikasi -->
    <form id="efilekelola_formVerif" class="d-flex flex-column flex-grow-1 overflow-hidden m-0 p-0" novalidate>
        <div class="px-4 pb-4 flex-grow-1 overflow-auto" style="padding-top: 15px !important;">
            <input type="hidden" id="efilekelola_v_rowid">

            <h6 class="modal-verifikasi-section-title"><i class="fas fa-list-alt mr-2"></i> Detail Berkas</h6>

            <div class="sultan-detail-container mb-4">
                <div class="sultan-detail-item">
                    <label class="sultan-detail-label">NAMA PEGAWAI</label>
                    <div class="sultan-detail-value text-uppercase" id="efilekelola_v_nama">-</div>
                </div>
                <div class="sultan-detail-item">
                    <label class="sultan-detail-label">KATEGORI</label>
                    <div class="sultan-detail-value text-maroon" id="efilekelola_v_kategori">-</div>
                </div>
                <div class="sultan-detail-item">
                    <label class="sultan-detail-label">TAHUN</label>
                    <div class="sultan-detail-value">
                        <span id="efilekelola_v_tahun"></span> <span id="efilekelola_v_periode" class="ml-2 badge badge-info"></span>
                    </div>
                </div>
            </div>

            <h6 class="modal-verifikasi-section-title"><i class="fas fa-check-circle mr-2"></i> Verifikasi</h6>

            <div class="form-group mb-3">
                <label class="modal-verifikasi-form-label">Keputusan Verifikasi <span class="text-danger">*</span></label>
                <select class="modal-verifikasi-select font-weight-bold" id="efilekelola_v_status" required>
                    <option value="">-- Pilih Keputusan --</option>
                    <option value="Disetujui">Disetujui</option>
                    <option value="Revisi">Revisi</option>
                    <option value="Ditolak">Ditolak</option>
                </select>
            </div>

            <div class="form-group mb-0">
                <label class="modal-verifikasi-form-label">Catatan Admin <span id="efilekelola_reqCatatan" class="text-danger" style="display:none;">*</span></label>
                <textarea class="modal-verifikasi-textarea" id="efilekelola_v_catatan" rows="3" placeholder="Wajib diisi jika ditolak / direvisi..."></textarea>
            </div>
        </div>
        <div class="modal-verifikasi-footer" id="efilekelola_verifFooter">
            <button type="button" class="modal-btn-batal" data-dismiss="modal"><i class="fas fa-times mr-2"></i>BATAL</button>
            <button type="submit" id="efilekelola_btnVerifikasi" class="modal-verifikasi-btn-verifikasi" form="efilekelola_formVerif">
                <i class="fas fa-check-double mr-2"></i>VERIFIKASI
            </button>
        </div>
    </form>
</div>

<script>
var EFILEKELOLA_CACHE_DATA = [], EFILEKELOLA_MASTER_PTK = [], EFILEKELOLA_MASTER_KAT = [], EFILEKELOLA_TABEL_INSTANCE = null, EFILEKELOLA_ROW_COUNT = 0; 
var EFILEKELOLA_USER_AKTIF = "", EFILEKELOLA_IS_ADMIN = false, EFILEKELOLA_UNIT_TERKUNCI = "", EFILEKELOLA_NPSN_TERKUNCI = "", EFILEKELOLA_SELECTED_PTK_FILES = [];
var EFILEKELOLA_SELECTED_PTK_STATUS = ""; 
var EFILEKELOLA_SELECTED_PTK_OBJ = null;

$(document).ready(function() {
    $('#efilekelola_tableState').hide(); SultanUI.showLoading('#efilekelola_loadingState');
    try {
        var user = typeof getSesiUser === 'function' ? getSesiUser() : {}; EFILEKELOLA_USER_AKTIF = user.nama_lengkap || user.username || "User Web";
        var rStr = String(user.role || "").toLowerCase(); EFILEKELOLA_IS_ADMIN = (typeof checkUserRoleIsAdmin==='function' && checkUserRoleIsAdmin()) || rStr.includes("admin") || rStr.includes("verifikator");
        EFILEKELOLA_NPSN_TERKUNCI = user.npsn || user.unit || user.username || ""; 
    } catch(e) { EFILEKELOLA_NPSN_TERKUNCI = ""; EFILEKELOLA_IS_ADMIN = false; }

    $(document).off('click', '#efilekelola_btnRefresh').on('click', '#efilekelola_btnRefresh', efilekelola_tarikDataServer);
    $(document).off('click', '#efilekelola_btnTambah').on('click', '#efilekelola_btnTambah', efilekelola_bukaModalTambah);
    $(document).off('change', '#efilekelola_filterStatus, #efilekelola_filterKategori').on('change', '#efilekelola_filterStatus, #efilekelola_filterKategori', efilekelola_terapkanFilterLokal);
    if(EFILEKELOLA_IS_ADMIN) $(document).off('change', '#efilekelola_filterUnit').on('change', '#efilekelola_filterUnit', efilekelola_terapkanFilterLokal);
    $(document).off('click', '.efilekelola-btn-catatan').on('click', '.efilekelola-btn-catatan', function() {
        var pesan = $(this).attr('data-pesan');
        if (pesan) {
            efilekelola_lihatCatatan(pesan);
        }
    });

    // Pilih Unit Kerja -> Isi dropdown PTK/Pegawai
    $(document).off('change', '#efilekelola_in_unit').on('change', '#efilekelola_in_unit', function() {
        var unitSel = $(this).val(); var $ptk = $('#efilekelola_in_ptk');
        $ptk.empty().append('<option value="">- Pilih Pegawai -</option>');
        if (unitSel) {
            var targetUnit = String(unitSel).toUpperCase();
            var filtered = EFILEKELOLA_MASTER_PTK.filter(function(p) {
                return String(p.npsn || "").toUpperCase() === targetUnit || String(p.unit || "").toUpperCase() === targetUnit;
            });
            filtered.forEach(function(p) { 
                var nipLabel = p.nip && String(p.nip).trim() !== "" ? ' (' + p.nip + ')' : '';
                $ptk.append($('<option>', { value: p.id_ptk, text: p.nama + nipLabel })); 
            });
            $ptk.prop('disabled', false);
        } else { $ptk.prop('disabled', true); }
        $('#efilekelola_uploadContainer').html('<div class="text-center text-muted p-3" id="efilekelola_msgPilihPtk"><i class="fas fa-info-circle mr-1"></i> Pilih pegawai terlebih dahulu.</div>');
        $('#efilekelola_btnAddRow, #efilekelola_btnSimpan').prop('disabled', true);
    });

    $(document).off('change', '#efilekelola_in_ptk').on('change', '#efilekelola_in_ptk', function() {
        var idPtk = $(this).val();
        if (idPtk) {
            var ptkData = EFILEKELOLA_MASTER_PTK.find(p => String(p.id_ptk).trim() === String(idPtk).trim());
            EFILEKELOLA_SELECTED_PTK_OBJ = ptkData || null;
            EFILEKELOLA_SELECTED_PTK_STATUS = ptkData ? ptkData.status : "";
            EFILEKELOLA_SELECTED_PTK_FILES = EFILEKELOLA_CACHE_DATA.filter(r => String(r.id_ptk).trim() === String(idPtk).trim());
            $('#efilekelola_msgPilihPtk').hide();
            $('#efilekelola_btnAddRow, #efilekelola_btnSimpan').prop('disabled', false);
            EFILEKELOLA_ROW_COUNT = 0; $('#efilekelola_uploadContainer').empty();
            efilekelola_createUploadRowContext($('#efilekelola_uploadContainer'));
        } else {
            EFILEKELOLA_SELECTED_PTK_OBJ = null;
            $('#efilekelola_uploadContainer').html('<div class="text-center text-muted p-3" id="efilekelola_msgPilihPtk"><i class="fas fa-info-circle mr-1"></i> Pilih pegawai terlebih dahulu.</div>');
            $('#efilekelola_btnAddRow, #efilekelola_btnSimpan').prop('disabled', true);
        }
    });

    $(document).off('click', '#efilekelola_btnAddRow').on('click', '#efilekelola_btnAddRow', efilekelola_createUploadRow);
    $(document).off('click', '.efilekelola-btn-del-row').on('click', '.efilekelola-btn-del-row', function() { $(this).closest('.efilekelola-upload-row').slideUp(200, function(){ $(this).remove(); }); });

    $(document).off('change', '.efilekelola-kategori-select').on('change', '.efilekelola-kategori-select', function() {
        var val = String($(this).val() || "").trim(); var katData = EFILEKELOLA_MASTER_KAT.find(function(k) { return String(k.idKat).trim() === val; });
        var row = $(this).closest('.efilekelola-upload-row');
        var fileIn = row.find('.efilekelola-file-input'); var fText = row.find('.efilekelola-format-text'); var fIcon = row.find('.efilekelola-format-icon');
        var pWrap = row.find('.efilekelola-periode-wrapper'); var pLabel = row.find('.efilekelola-periode-label'); var pInput = row.find('.efilekelola-periode-input');

        fileIn.val('').next('.custom-file-label').html('Pilih file...').removeClass('text-success font-weight-bold');

        if (katData) {
            var maxMb = katData.ukuran_max || 1;
            fileIn.attr('data-max-mb', maxMb);

            var fmt = String(katData.format).toUpperCase();
            if (fmt.includes('IMG') || fmt.includes('JPG') || fmt.includes('PNG') || fmt.includes('FOTO')) {
                fileIn.attr('accept', 'image/jpeg, image/png, image/jpg'); fText.text('JPG/PNG (Maks ' + maxMb + 'MB)'); fIcon.removeClass('fa-file-pdf fa-file-upload').addClass('fa-file-image');
            } else if (fmt.includes('ALL') || fmt.includes('BEBAS') || fmt.includes('ANY')) {
                fileIn.attr('accept', 'application/pdf, image/jpeg, image/png, image/jpg'); fText.text('PDF/JPG/PNG (Maks ' + maxMb + 'MB)'); fIcon.removeClass('fa-file-pdf fa-file-image').addClass('fa-file-upload');
            } else {
                fileIn.attr('accept', 'application/pdf'); fText.text('PDF (Maks ' + maxMb + 'MB)'); fIcon.removeClass('fa-file-image fa-file-upload').addClass('fa-file-pdf');
            }

            var jPeriode = String(katData.jenisPeriode || 'TAHUNAN').toUpperCase();
            var katWrapEl = row.find('.efilekelola-kat-wrapper');
            var fileWrapEl = row.find('.efilekelola-file-wrapper');
            var thnWrapEl = row.find('.efilekelola-tahun-wrapper');
            var thnInput = thnWrapEl.find('.efilekelola-tahun-input');
            var tahunSkrg = new Date().getFullYear();

            // Reset semua kelas kolom
            katWrapEl.removeClass('col-md-4 col-md-5 col-md-6 col-md-7 col-md-8 col-12');
            var katWrapEl = row.find('.efilekelola-kat-wrapper');
            var thnWrapEl = row.find('.efilekelola-tahun-wrapper');
            var pWrap = row.find('.efilekelola-periode-wrapper');
            var fileWrapEl = row.find('.efilekelola-file-wrapper');

            var thnInput = thnWrapEl.find('.efilekelola-tahun-input');
            var pLabel = pWrap.find('.efilekelola-periode-label');
            var pInput = pWrap.find('.efilekelola-periode-input, .efilekelola-periode-mulai, .efilekelola-periode-akhir, .efilekelola_p_periode_diklat_wrap');

            if (jPeriode.includes('TMT') || jPeriode === 'PERMANEN_TMT') {
                // TMT atau PERMANEN_TMT: sembunyikan tahun, gunakan date picker
                thnWrapEl.hide(); thnInput.prop('required', false).val('');
                pWrap.show(); pLabel.text('TMT');
                pInput.replaceWith('<input type="date" class="form-control form-control-sultan border-maroon efilekelola-periode-input" required>');
                row.find('.efilekelola-periode-input').prop('required', true).val('');
            } else if (jPeriode.includes('PERIODE')) {
                // Per Bulan: tampilkan tahun + rentang bulan
                thnWrapEl.show(); thnInput.prop('required', true);
                if (!thnInput.val()) thnInput.val(tahunSkrg);
                var bulanOpts = '<option value="">-</option><option>Jan</option><option>Feb</option><option>Mar</option><option>Apr</option><option>Mei</option><option>Jun</option><option>Jul</option><option>Agu</option><option>Sep</option><option>Okt</option><option>Nov</option><option>Des</option>';
                pWrap.show();
                pInput.replaceWith(
                    '<div class="d-flex align-items-center efilekelola-periode-input" style="gap:4px;">'
                    + '<select class="form-control form-control-sultan border-maroon efilekelola-periode-mulai" required style="min-width:65px; padding:2px 4px; height:31px; font-size:12px;">' + bulanOpts + '</select>'
                    + '<span class="font-weight-bold text-muted px-1" style="font-size:12px;">&ndash;</span>'
                    + '<select class="form-control form-control-sultan border-maroon efilekelola-periode-akhir" required style="min-width:65px; padding:2px 4px; height:31px; font-size:12px;">' + bulanOpts + '</select>'
                    + '</div>'
                );
                pLabel.text('Periode (Bln)');
            } else if (jPeriode === 'TRIWULAN') {
                thnWrapEl.show(); thnInput.prop('required', true);
                if (!thnInput.val()) thnInput.val(tahunSkrg);
                pWrap.show();
                pInput.replaceWith('<select class="form-control form-control-sultan border-maroon efilekelola-periode-input" required><option value="">-</option><option value="Triwulan 1">Triwulan 1</option><option value="Triwulan 2">Triwulan 2</option><option value="Triwulan 3">Triwulan 3</option><option value="Triwulan 4">Triwulan 4</option></select>');
                pLabel.text('Triwulan');
            } else if (jPeriode === 'SKP') {
                thnWrapEl.show(); thnInput.prop('required', true);
                if (!thnInput.val()) thnInput.val(tahunSkrg);
                pWrap.show();
                pInput.replaceWith('<select class="form-control form-control-sultan border-maroon efilekelola-periode-input" required><option value="">-</option><option value="Sasaran">Sasaran</option><option value="Triwulan 1">Triwulan 1</option><option value="Triwulan 2">Triwulan 2</option><option value="Triwulan 3">Triwulan 3</option><option value="Triwulan 4">Triwulan 4</option><option value="Tahunan">Tahunan</option></select>');
                pLabel.text('Periode SKP');
            } else if (jPeriode === 'SK_PPPK') {
                // SK PPPK: sembunyikan tahun, tambahkan isian TMT
                thnWrapEl.hide(); thnInput.prop('required', false).val('');
                pWrap.show();
                pInput.replaceWith(
                    '<div class="d-flex align-items-center efilekelola-periode-input" style="gap:6px;">'

function efilekelola_initMasterData() {
    if (EFILEKELOLA_IS_ADMIN) { $('#efilekelola_filterContainer').show(); $('#efilekelola_filterUnit').empty().append('<option value="SEMUA">- Semua Unit Kerja -</option>').prop('disabled', false).removeClass('bg-light text-maroon font-weight-bold'); } 
    else if (!EFILEKELOLA_NPSN_TERKUNCI) { $('#efilekelola_loadingState').find('.sultan-loading-text').html('<span class="text-danger"><i class="fas fa-ban mb-2"></i><br>Akses ditolak.</span>'); return; }

    google.script.run.withSuccessHandler(function(json) {
        var res = JSON.parse(json); if(!res.success) { $('#efilekelola_loadingState').find('.sultan-loading-text').html('<span class="text-danger"><i class="fas fa-exclamation-triangle mb-2"></i><br>' + efilekelola_escapeHtml(res.message) + '</span>'); return; }
        EFILEKELOLA_MASTER_KAT = res.kategori || []; EFILEKELOLA_MASTER_PTK = res.ptk || [];
        if (!EFILEKELOLA_IS_ADMIN && EFILEKELOLA_MASTER_PTK.length > 0) { EFILEKELOLA_UNIT_TERKUNCI = EFILEKELOLA_MASTER_PTK[0].unit || "UNIT_ANDA"; $('#efilekelola_filterContainer').show(); $('#efilekelola_filterUnit').empty().append($('<option>', {value: EFILEKELOLA_NPSN_TERKUNCI, text: EFILEKELOLA_UNIT_TERKUNCI})).prop('disabled', true); }
        var hk = '<option value="SEMUA">- Semua Kategori -</option>'; EFILEKELOLA_MASTER_KAT.forEach(function(k) { hk += `<option value="${k.idKat}">${k.namaKat}</option>`; }); $('#efilekelola_filterKategori').html(hk);
        $('#efilekelola_btnTambah').prop('disabled', false); efilekelola_tarikDataServer();
    }).withFailureHandler(function(){ $('#efilekelola_loadingState').find('.sultan-loading-text').html('<span class="text-danger"><i class="fas fa-wifi mb-2"></i><br>Koneksi Terputus.</span>'); }).getEfileMasterData(EFILEKELOLA_IS_ADMIN ? "" : EFILEKELOLA_NPSN_TERKUNCI);
}

function efilekelola_tarikDataServer() {
    var btn = $('#efilekelola_btnRefresh'); btn.prop('disabled', true).html('<i class="fas fa-spinner fa-spin text-maroon"></i>');
    if (!$.fn.DataTable.isDataTable('#efilekelola_tabelUtama')) { $('#efilekelola_tableState').hide(); SultanUI.showLoading('#efilekelola_loadingState'); }

    google.script.run.withSuccessHandler(function(json) {
        btn.prop('disabled', false).html('<i class="fas fa-sync-alt text-maroon"></i>'); var res = JSON.parse(json);
        if (!res.success) { $('#efilekelola_loadingState').find('.sultan-loading-text').html('<span class="text-danger"><i class="fas fa-exclamation-triangle mb-2"></i><br>' + efilekelola_escapeHtml(res.message) + '</span>'); return; }
        EFILEKELOLA_CACHE_DATA = res.data || [];
        if (EFILEKELOLA_IS_ADMIN) {
            var un = {}; EFILEKELOLA_MASTER_PTK.forEach(function(p) { if(p.npsn) un[p.npsn] = p.unit; });
            var su = $('#efilekelola_filterUnit'); var cu = su.val(); su.empty().append('<option value="SEMUA">- Semua Unit Kerja -</option>');
            Object.keys(un).forEach(function(n) { su.append($('<option>', {value: n, text: un[n]})); }); if(cu) su.val(cu);
        }
        if (!$.fn.DataTable.isDataTable('#efilekelola_tabelUtama')) efilekelola_initDataTables();
        efilekelola_terapkanFilterLokal(); SultanUI.hideLoading('#efilekelola_loadingState'); $('#efilekelola_tableState').show();
        if(EFILEKELOLA_TABEL_INSTANCE) setTimeout(function() { EFILEKELOLA_TABEL_INSTANCE.columns.adjust(); }, 150);
    }).withFailureHandler(function() { btn.prop('disabled', false).html('<i class="fas fa-sync-alt text-maroon"></i>'); $('#efilekelola_loadingState').find('.sultan-loading-text').html('<span class="text-danger"><i class="fas fa-wifi mb-2"></i><br>Koneksi Terputus.</span>'); }).getEfileData(EFILEKELOLA_IS_ADMIN ? "" : EFILEKELOLA_NPSN_TERKUNCI);
}

function efilekelola_initDataTables() {
    EFILEKELOLA_TABEL_INSTANCE = SultanTable.init('#efilekelola_tabelUtama', {
        "destroy": true, "ordering": false, "pageLength": 10, "autoWidth": false, "deferRender": true,
        "dom": "<'row mb-2'<'col-sm-12 col-md-6'l><'col-sm-12 col-md-6'f>>" + "<'row'<'col-sm-12'<'table-responsive sultan-scroll'tr>>>" + "<'row mt-2'<'col-sm-12 col-md-5'i><'col-sm-12 col-md-7'p>>",
        "columnDefs": [
            { "targets": 0, "width": "1%", "className": "col-sticky-left bg-white align-middle text-center text-nowrap" },
            { "targets": 1, "width": "1%", "className": "text-center align-middle text-nowrap" },
            { "targets": [2,3,7,8,9], "width": "auto", "className": "text-left align-middle" }, 
            { "targets": [4,5,6], "width": "1%", "className": "text-center align-middle text-nowrap" }

function efilekelola_terapkanFilterLokal() {
    if (!EFILEKELOLA_TABEL_INSTANCE) return;
    var fS = $('#efilekelola_filterStatus').val().toLowerCase(); var fK = $('#efilekelola_filterKategori').val(); var fN = EFILEKELOLA_IS_ADMIN ? $('#efilekelola_filterUnit').val() : "";
    var hasil = EFILEKELOLA_CACHE_DATA.filter(function(r) {
        var st = String(r.status || "").toLowerCase(); var rn = String(r.npsn || "");
        if (EFILEKELOLA_IS_ADMIN && fN !== "SEMUA" && fN !== "" && rn !== fN) return false;
        if (fK !== "SEMUA" && fK !== "" && String(r.id_kategori) !== fK) return false;
        if (fS !== "semua" && fS !== "") { var ns = "diproses"; if (st.includes('setuju') || st.includes('ok')) ns = "disetujui"; else if (st.includes('revisi')) ns = "revisi"; else if (st.includes('tolak')) ns = "ditolak"; if (ns !== fS) return false; }
        return true;
    }); efilekelola_renderTabel(hasil);
}

function efilekelola_renderTabel(dataRows) {
    var dtArray = [];
    dataRows.forEach(function(r) {
        var id = r.rowId; var st = String(r.status || "").toLowerCase(); var isDisetujui = st.includes('setuju') || st.includes('ok');
        var btnV = ""; if (EFILEKELOLA_IS_ADMIN) btnV = `<button type="button" class="sultan-btn-aksi sultan-btn-aksi-primary efilekelola-btn-verif" data-id="${id}" title="${st.includes('proses') ? 'Verif' : 'Edit Verif'}"><i class="fas fa-clipboard-check"></i></button>`;
        var btnP = `<button type="button" class="sultan-btn-aksi sultan-btn-aksi-warning efilekelola-btn-perbaiki" data-id="${id}" ${isDisetujui ? 'disabled style="opacity:0.5;" title="Tidak dapat diedit, status Disetujui"' : 'title="Edit Berkas"'}><i class="fas fa-edit"></i></button>`;
        var btnH = `<button type="button" class="sultan-btn-aksi sultan-btn-aksi-maroon efilekelola-btn-hapus" data-id="${id}" ${isDisetujui ? 'disabled style="opacity:0.5;"' : ''} title="Hapus Berkas"><i class="fas fa-trash-alt"></i></button>`;
        var aksi = `<div class="d-flex flex-nowrap justify-content-center" style="gap:5px;">${btnV}${btnP}${btnH}</div>`;

        var ptk = EFILEKELOLA_MASTER_PTK.find(p => String(p.id_ptk).trim() === String(r.id_ptk).trim());
        var unit = (ptk && ptk.unit) ? ptk.unit : (r.unit ? r.unit : r.npsn);
        var nip = (ptk && ptk.nip && String(ptk.nip).trim() !== "") ? ptk.nip : (r.nip && String(r.nip).trim() !== "" ? r.nip : "-");
        var txtPtk = `<div class="font-weight-bold text-dark text-uppercase text-wrap" style="font-size:13px;">${efilekelola_escapeHtml(r.nama)}</div><div class="text-muted" style="font-size:13px;">${efilekelola_escapeHtml(nip)}</div>`;
        if (EFILEKELOLA_IS_ADMIN) txtPtk += `<div class="text-danger font-weight-bold text-uppercase mt-1" style="font-size:13px;">${efilekelola_escapeHtml(unit)}</div>`;

        var txtKat = `<div class="font-weight-bold text-primary text-wrap" style="font-size:13px;">${efilekelola_escapeHtml(r.nama_kategori)}</div>`;
        
        var fn = String(r.file_name || "").toLowerCase(); var fi = "fa-file-pdf text-danger"; if (fn.endsWith('.jpg') || fn.endsWith('.png') || fn.endsWith('.jpeg')) fi = "fa-file-image text-success";
        var btnFile = `<button type="button" class="sultan-btn-pdf efilekelola-btn-preview" data-url="${r.url}" style="font-size:13px;"><i class="fas ${fi} mr-1"></i> LIHAT</button>`;

        var badge = efilekelola_buildBadgeStatus(r.status, r.catatan);
        var metaW = `<div style="line-height:1.2;font-size:13px;"><span class="d-block font-weight-bold text-dark">${r.tgl_upload}</span><span class="d-block text-muted">${efilekelola_escapeHtml(r.uploader)}</span></div>`;
        
        var tglEditDisp = (r.tgl_edit && r.tgl_edit !== "-") ? r.tgl_edit : "-";
        var userEditDisp = (r.user_edit && r.user_edit !== "-") ? r.user_edit : "";
        var metaE = `<div style="line-height:1.2;font-size:13px;"><span class="d-block font-weight-bold text-dark">${tglEditDisp}</span><span class="d-block text-muted">${efilekelola_escapeHtml(userEditDisp)}</span></div>`;
        
        var metaV = `<div style="line-height:1.2;font-size:13px;"><span class="d-block font-weight-bold text-dark">${r.tgl_verif}</span><span class="d-block text-muted text-uppercase">${efilekelola_escapeHtml(r.verifikator)}</span></div>`;

        var teksPeriode = r.periode || "-";
        if (teksPeriode.match(/^\d{4}-\d{2}-\d{2}$/)) {
            teksPeriode = Sultan.format.tanggal(teksPeriode);
        }
        // Label kecil konteks tipe periode
        var katItemTbl = EFILEKELOLA_MASTER_KAT.find(function(k) { return String(k.idKat).trim() === String(r.id_kategori).trim(); });
        var periodeLabelMap = { 'TAHUNAN': 'Tahunan', 'SKP': 'Periode SKP', 'TRIWULAN': 'Triwulan', 'PERIODE': 'Per Periode', 'TMT': 'Tgl Mulai', 'PERMANEN': 'Permanen', 'SK_PPPK': 'Pilihan SK', 'SK_KP': 'Golongan KP', 'SK_JF': 'Jenjang JF', 'IJAZAH': 'Tingkat Pend.', 'PERMANEN_TMT': 'Permanen TMT' };
        var jpTbl = katItemTbl ? String(katItemTbl.jenisPeriode || '').toUpperCase() : '';
        var labelTbl = jpTbl && periodeLabelMap[jpTbl] ? '<div class="text-muted" style="font-size:10px; margin-top:2px;">' + periodeLabelMap[jpTbl] + '</div>' : '';
        var periodeDisplay = teksPeriode !== '-' ? '<div>' + efilekelola_escapeHtml(teksPeriode) + '</div>' + labelTbl : '-';
        dtArray.push([ aksi, badge, txtPtk, txtKat, r.tahun, periodeDisplay, btnFile, metaW, metaE, metaV ]);
    });
    EFILEKELOLA_TABEL_INSTANCE.clear().rows.add(dtArray).draw(false);
}

function efilekelola_bukaModalTambah() {
    var $form = $('#efilekelola_formUpload'); 
    $form[0].reset(); 
    $form.removeClass('was-validated');
    
    var $unitSelect = $('#efilekelola_in_unit');
    var $ptkSelect = $('#efilekelola_in_ptk');
    
    $unitSelect.empty().append('<option value="">- Pilih Unit Kerja -</option>');
    $ptkSelect.empty().append('<option value="">- Pilih Pegawai -</option>').prop('disabled', true);
    
    // Kumpulkan daftar Unit Kerja unik
    var unitsObj = {};
    EFILEKELOLA_MASTER_PTK.forEach(function(p) {
        if (p.npsn && p.unit) {
            unitsObj[p.npsn] = p.unit;
        }
    });
    
    if (EFILEKELOLA_IS_ADMIN) {
        // Tampilkan seluruh Unit Kerja untuk admin
        Object.keys(unitsObj).sort().forEach(function(npsn) {
            $unitSelect.append($('<option>', { value: npsn, text: unitsObj[npsn] }));
        });
        $unitSelect.prop('disabled', false);
    } else {
        // Kunci unit kerja jika user login sekolah
        var defaultNpsn = EFILEKELOLA_NPSN_TERKUNCI;
        var defaultUnitName = EFILEKELOLA_UNIT_TERKUNCI || unitsObj[defaultNpsn] || "Unit Anda";
        
        $unitSelect.append($('<option>', { value: defaultNpsn, text: defaultUnitName }));
        $unitSelect.val(defaultNpsn).prop('disabled', true);
        
        // Auto-load daftar pegawai
        setTimeout(function() {
            $unitSelect.trigger('change');
        }, 100);
    }

    $('#global_modalFormHeader').removeClass('modal-header-sultan-primary modal-header-sultan-warning modal-header-sultan-danger modal-header-sultan-success modal-header-sultan-info modal-header-sultan-dark modal-header-edit modal-header-tambah-edit modal-header-hapus').addClass('modal-header-tambah-edit');

function efilekelola_getKategoriOptionsHTML(ptkObj) {
    var html = '<option value="">- Pilih Kategori -</option>';
    if (!ptkObj) return html;
    
    var pJenjang = String(ptkObj.jenjang || "").toUpperCase();
    var pKepeg = String(ptkObj.status || "").toUpperCase();
    var pTugas = String(ptkObj.tugas || "").toUpperCase();
    
    EFILEKELOLA_MASTER_KAT.forEach(function(k) {
        // 1. Evaluasi Filter Klasifikasi Target Jenjang
        if (k.klasifikasi_jenjang && k.klasifikasi_jenjang.trim() !== "" && k.klasifikasi_jenjang.toUpperCase() !== "ALL") {
            var jgList = k.klasifikasi_jenjang.split(',').map(function(s) { return s.trim().toUpperCase(); });
            if (jgList.indexOf(pJenjang) === -1) return; // Skip jika tidak cocok
        }
        
        // 2. Evaluasi Filter Klasifikasi Kepegawaian
        if (k.klasifikasi_kepeg && k.klasifikasi_kepeg.trim() !== "" && k.klasifikasi_kepeg.toUpperCase() !== "ALL") {
            var kpList = k.klasifikasi_kepeg.split(',').map(function(s) { return s.trim().toUpperCase(); });
            if (kpList.indexOf(pKepeg) === -1) return; // Skip jika tidak cocok
        }
        
        // 3. Evaluasi Filter Klasifikasi Tugas / Jabatan
        if (k.klasifikasi_tugas && k.klasifikasi_tugas.trim() !== "" && k.klasifikasi_tugas.toUpperCase() !== "ALL") {
            var tgList = k.klasifikasi_tugas.split(',').map(function(s) { return s.trim().toUpperCase(); });
            if (tgList.indexOf(pTugas) === -1) return; // Skip jika tidak cocok
        }
        
        // Evaluasi filter statusPegawaiWajib (legacy support)
        if(k.statusPegawaiWajib && k.statusPegawaiWajib.trim() !== "") {
            var statusList = k.statusPegawaiWajib.split(',').map(function(s) { return s.trim().toLowerCase(); });
            if (statusList.indexOf(pKepeg.toLowerCase()) === -1) return;
        }
        
        html += `<option value="${k.idKat}">${k.namaKat} (${k.parent})</option>`;
    });
    return html;
}

function efilekelola_submitBatchUpload(e) {
    e.preventDefault(); var $form = $(this);
    var idPtk = String($('#efilekelola_in_ptk').val() || "").trim();
    if (!idPtk) { Sultan.alert('warning', 'Pilih Pegawai', 'Anda belum memilih pegawai.'); return; }
    if (!$form[0].checkValidity()) { $form.addClass('was-validated'); return; }

    var ptkData = EFILEKELOLA_MASTER_PTK.find(p => String(p.id_ptk).trim() === idPtk);
    var filePromises = []; var rowEls = $form.find('.efilekelola-upload-row');
    var tracker = {}; var hasDup = false; var dupMsg = "";

    rowEls.each(function() {
        if(hasDup) return;
        var idKat = String($(this).find('.efilekelola-kategori-select').val() || '').trim();
        var thn = String($(this).find('.efilekelola-tahun-input').val() || '').trim();
        var katItemRow = EFILEKELOLA_MASTER_KAT.find(function(k) { return String(k.idKat).trim() === idKat; });
        var jpRow = katItemRow ? String(katItemRow.jenisPeriode || '').toUpperCase() : '';

        var per = '-';
        var pWrap = $(this).find('.efilekelola-periode-wrapper');
        if (pWrap.is(':visible')) {
            if (jpRow === 'DIKLAT') {
                var tglD = String($(this).find('.efilekelola-periode-diklat-tgl').val() || '').trim();
                var namaD = String($(this).find('.efilekelola-periode-diklat-nama').val() || '').trim();
                var jpD = String($(this).find('.efilekelola-periode-diklat-jp').val() || '').trim();
                per = (tglD && namaD && jpD) ? (tglD + ' | ' + namaD + ' | ' + jpD) : '';
            } else if (jpRow === 'SK_PPPK') {
                var skP = String($(this).find('.efilekelola-periode-pppk-sk').val() || '').trim();
                var tmtP = String($(this).find('.efilekelola-periode-pppk-tmt').val() || '').trim();
                per = (skP && tmtP) ? (skP + ' | ' + tmtP) : '';
            } else if (jpRow === 'SK_KP') {
                var golK = String($(this).find('.efilekelola-periode-kp-gol').val() || '').trim();
                var tmtK = String($(this).find('.efilekelola-periode-kp-tmt').val() || '').trim();
                per = (golK && tmtK) ? (golK + ' | ' + tmtK) : '';
            } else if (jpRow === 'SK_JF') {
                var jnjJ = String($(this).find('.efilekelola-periode-jf-jenjang').val() || '').trim();
                var tmtJ = String($(this).find('.efilekelola-periode-jf-tmt').val() || '').trim();
                per = (jnjJ && tmtJ) ? (jnjJ + ' | ' + tmtJ) : '';
            } else if (jpRow === 'IJAZAH') {
                var tktI = String($(this).find('.efilekelola-periode-ijazah-tingkat').val() || '').trim();
                var lulusI = String($(this).find('.efilekelola-periode-ijazah-lulus').val() || '').trim();
                per = (tktI && lulusI) ? (tktI + ' | ' + lulusI) : '';
            } else {
                var pMulai = $(this).find('.efilekelola-periode-mulai');
                var pAkhir = $(this).find('.efilekelola-periode-akhir');
                if (pMulai.length > 0) {
                    var bMulai = pMulai.val() || ''; var bAkhir = pAkhir.val() || '';
                    per = (bMulai && bAkhir) ? (bMulai + ' - ' + bAkhir + ' ' + thn) : '';
                } else {
                    per = String($(this).find('.efilekelola-periode-input').val() || '').trim();
                }
            }
        }

        if (jpRow === 'DIKLAT' && per && per !== '-') {
            var parts = per.split(' | ');
            thn = parts[0] ? parts[0].substring(0, 4) : String(new Date().getFullYear());
        } else if ((jpRow === 'SK_PPPK' || jpRow === 'SK_KP' || jpRow === 'SK_JF') && per && per !== '-') {
            var parts = per.split(' | ');
            thn = parts[1] ? parts[1].substring(0, 4) : String(new Date().getFullYear());
        } else if (jpRow === 'IJAZAH' && per && per !== '-') {
            var parts = per.split(' | ');
            thn = parts[1] ? parts[1] : String(new Date().getFullYear());
        } else if ((jpRow === 'TMT' || jpRow === 'PERMANEN_TMT') && per && per !== '-') {
            thn = String(per).substring(0, 4) || String(new Date().getFullYear());
        } else if (jpRow === 'PERMANEN') {
            thn = String(new Date().getFullYear()); per = 'PERMANEN';
        } else {
            if (!thn || thn === '') {
                thn = String(new Date().getFullYear());
            }
        }

        var fIn = $(this).find('.efilekelola-file-input')[0];
        if (!idKat || !thn || fIn.files.length === 0) return;
        var katData = katItemRow || { namaKat: 'Berkas' };
        var uni = idKat + '_' + thn + '_' + per.toLowerCase();
        
        if (tracker[uni]) { hasDup = true; dupMsg = `Anda mengunggah <b>${katData.namaKat}</b> periode <b>${thn} ${per}</b> lebih dari satu kali!`; return; }
        tracker[uni] = true;
        
        var inDb = EFILEKELOLA_SELECTED_PTK_FILES.find(f => String(f.id_kategori).trim() === idKat && String(f.tahun).trim() === thn && String(f.periode || "-").toLowerCase().trim() === per.toLowerCase());
        if (inDb) { hasDup = true; dupMsg = `Berkas <b>${katData.namaKat}</b> periode <b>${thn} ${per}</b> sudah ada (Status: ${inDb.status}).`; return; }

        var p = new Promise(function(resolve, reject) {
            var reader = new FileReader();
            reader.onload = function(ev) {
                var ext = fIn.files[0].name.split('.').pop().toLowerCase();
                var cName = "[" + thn + "] " + katData.namaKat + " " + ptkData.nama + (per !== "-" ? " (" + per + ")" : "") + "." + ext;
                resolve({
                    id_ptk: ptkData.id_ptk, nama_ptk: ptkData.nama, npsn: ptkData.npsn,
                    id_kategori: idKat, nama_kategori: katData.namaKat, tahun: thn, periode: per,
                    nama_file: cName, mimeType: fIn.files[0].type,
                    fileBase64: ev.target.result.split(',')[1], user_login: EFILEKELOLA_USER_AKTIF
                });
            };
            reader.onerror = function() { reject("Gagal baca file."); }; reader.readAsDataURL(fIn.files[0]);
        });
        filePromises.push(p);
    });

    if (hasDup) { Sultan.alert('warning', 'Duplikasi', dupMsg); return; }
    var btn = $('#efilekelola_btnSimpan'); var txt = btn.html(); btn.prop('disabled', true).html('<i class="fas fa-spinner fa-spin mr-2"></i> MENGUNGGAH BATCH...');

    Promise.all(filePromises).then(function(batch) {
        if(batch.length === 0) { btn.prop('disabled', false).html(txt); return; }
        google.script.run.withSuccessHandler(function(json) {
            btn.prop('disabled', false).html(txt); var res = JSON.parse(json);
            if (res.success) {
                Sultan.modal.tutupForm();
                if (res.skip > 0 && res.laporan && res.laporan.length > 0) {
                    // Ada item yang dilewati — tampilkan modal laporan
                    var laporHtml = '<div class="mb-2 small">';
                    res.laporan.forEach(function(l) {
                        var ic = l.result === 'OK' ? '<i class="fas fa-check-circle text-success mr-1"></i>' : '<i class="fas fa-exclamation-triangle text-warning mr-1"></i>';
                        laporHtml += '<div class="border-bottom py-1">' + ic + '<strong>' + $('<span>').text(l.nama_kategori).html() + '</strong> (' + $('<span>').text(l.tahun).html();
                        if (l.periode && l.periode !== '-') laporHtml += ' · ' + $('<span>').text(l.periode).html();
                        laporHtml += ')';
                        if (l.result !== 'OK') laporHtml += '<br><span class="text-muted ml-3">' + $('<span>').text(l.alasan).html() + '</span>';
                        laporHtml += '</div>';
                    });
                    laporHtml += '</div>';
                    Sultan.alert('info', 'Laporan Upload: ' + res.berhasil + ' OK, ' + res.skip + ' Dilewati', laporHtml);
                    setTimeout(function(){ efilekelola_tarikDataServer(); }, 400);
                } else {
                    setTimeout(function(){ Sultan.notif.crud.simpan(false); efilekelola_tarikDataServer(); }, 400);
                }
            } else {
                Sultan.notif.crud.gagal(res.message);
            }
        }).withFailureHandler(function(err){ btn.prop('disabled', false).html(txt); Sultan.notif.crud.gagal(err.message); }).simpanEfileBatch(batch);
    }).catch(function(err) { btn.prop('disabled', false).html(txt); Sultan.notif.crud.gagal(err); });
}

                + '<input type="number" id="efilekelola_p_periode_ijazah_lulus" class="form-control form-control-sultan border-warning" placeholder="Thn Lulus" required min="1950" max="2060" style="width:45%;" title="Tahun Lulus">'
                + '</div>'
            );
            var rawPeriode = data.periode && data.periode !== '-' ? data.periode : '';
            var pParts = rawPeriode.split(' | ');
            $('#efilekelola_p_periode_ijazah_tingkat').val(pParts[0] || '');
            $('#efilekelola_p_periode_ijazah_lulus').val(pParts[1] || '');
        } else if (jp === 'DIKLAT') {
            thnCol.hide(); thnInput.prop('required', false);
            pWrap.removeClass('col-md-6').addClass('col-md-12').show();
            pLbl.html('Tgl, Nama &amp; JP Diklat <span class="text-danger">*</span>');
            
            // Buat d-flex input untuk edit diklat
            $pIn.replaceWith(
                '<div class="d-flex align-items-center efilekelola_p_periode_diklat_wrap" style="gap:6px;">'
                + '<input type="date" id="efilekelola_p_periode_diklat_tgl" class="form-control form-control-sultan border-warning" required style="width:25%;" title="Tanggal Sertifikat">'
                + '<input type="text" id="efilekelola_p_periode_diklat_nama" class="form-control form-control-sultan border-warning" placeholder="Nama Diklat..." required style="width:55%;" title="Nama Diklat">'
                + '<input type="number" id="efilekelola_p_periode_diklat_jp" class="form-control form-control-sultan border-warning" placeholder="JP" required min="1" max="1000" style="width:20%;" title="JP">'
                + '</div>'
            );
            
            var rawPeriode = data.periode && data.periode !== '-' ? data.periode : '';
            var pParts = rawPeriode.split(' | ');
            $('#efilekelola_p_periode_diklat_tgl').val(pParts[0] || '');
            $('#efilekelola_p_periode_diklat_nama').val(pParts[1] || '');

function efilekelola_bukaModalVerif(rowId) {
    var data = EFILEKELOLA_CACHE_DATA.find(r => String(r.rowId) === String(rowId));
    if(!data) return;

    $('#efilekelola_v_rowid').val(rowId);
    $('#efilekelola_v_nama').text(data.nama);
    $('#efilekelola_v_kategori').text(data.nama_kategori);
    $('#efilekelola_v_tahun').text(data.tahun);
    if (data.periode && data.periode !== "-") {
        $('#efilekelola_v_periode').text(data.periode).show();
    } else {
        $('#efilekelola_v_periode').hide();
    }

    var st = String(data.status).toLowerCase();
    $('#efilekelola_v_status').val('');
    $('#efilekelola_v_catatan').val(data.catatan || "");
    $('#efilekelola_reqCatatan').hide();
    if(st.includes('setuju') || st.includes('ok')) {
        $('#efilekelola_v_status').val('Disetujui');
    } else if(st.includes('revisi')) {
        $('#efilekelola_v_status').val('Revisi');
    } else if(st.includes('tolak')) {
        $('#efilekelola_v_status').val('Ditolak');
    }
    if ($('#efilekelola_v_status').val() === 'Revisi' || $('#efilekelola_v_status').val() === 'Ditolak') {
        $('#efilekelola_reqCatatan').show();
    }

    var url = data.url || "";
    
    Sultan.modal.verifikasi({
        title: 'VERIFIKASI BERKAS E-FILE',
        url: url,
        isImage: url.toLowerCase().endsWith('.jpg') || url.toLowerCase().endsWith('.png') || url.toLowerCase().endsWith('.jpeg')
    });

    $('#efilekelola_formVerif').appendTo('#global_verifikasiFormArea');
    $('#efilekelola_verifFooter').appendTo('#global_verifikasiFooterArea');
    $('#global_verifikasiFooterArea').show();

    $('#global_modalVerifikasi').off('hidden.bs.modal').on('hidden.bs.modal.efileverif', function() {
        $('#efilekelola_verifFooter').appendTo('#efilekelola_formVerif');
        $('#efilekelola_formVerif').appendTo('#efilekelola_templates');
        $('#global_verifikasiFooterArea').hide().empty();
    });
}

function efilekelola_submitPerbaiki(e) {
    e.preventDefault(); var $f = $(this);
    if (!$f[0].checkValidity()) { $f.addClass('was-validated'); return; }
    
    var rId = $('#efilekelola_p_rowid').val(); 
    var dLama = EFILEKELOLA_CACHE_DATA.find(r => String(r.rowId) === String(rId));
    
    var kData = EFILEKELOLA_MASTER_KAT.find(function(k) { return String(k.idKat).trim() === String(dLama.id_kategori).trim(); });
    var jp = kData ? String(kData.jenisPeriode || 'TAHUNAN').toUpperCase() : '';

    var thn = String($('#efilekelola_p_tahun_input').val()).trim();
    var pIn = $('#efilekelola_p_periode_input');
    var per = '-';
    
    if (jp === 'DIKLAT') {
        var tglD = String($('#efilekelola_p_periode_diklat_tgl').val() || '').trim();
        var namaD = String($('#efilekelola_p_periode_diklat_nama').val() || '').trim();
        var jpD = String($('#efilekelola_p_periode_diklat_jp').val() || '').trim();
        per = (tglD && namaD && jpD) ? (tglD + ' | ' + namaD + ' | ' + jpD) : '';
    } else if (jp === 'SK_PPPK') {
        var skP = String($('#efilekelola_p_periode_pppk_sk').val() || '').trim();
        var tmtP = String($('#efilekelola_p_periode_pppk_tmt').val() || '').trim();
        per = (skP && tmtP) ? (skP + ' | ' + tmtP) : '';
    } else if (jp === 'SK_KP') {
        var golK = String($('#efilekelola_p_periode_kp_gol').val() || '').trim();
        var tmtK = String($('#efilekelola_p_periode_kp_tmt').val() || '').trim();
        per = (golK && tmtK) ? (golK + ' | ' + tmtK) : '';
    } else if (jp === 'SK_JF') {
        var jnjJ = String($('#efilekelola_p_periode_jf_jenjang').val() || '').trim();
        var tmtJ = String($('#efilekelola_p_periode_jf_tmt').val() || '').trim();
        per = (jnjJ && tmtJ) ? (jnjJ + ' | ' + tmtJ) : '';
    } else if (jp === 'IJAZAH') {
        var tktI = String($('#efilekelola_p_periode_ijazah_tingkat').val() || '').trim();
        var lulusI = String($('#efilekelola_p_periode_ijazah_lulus').val() || '').trim();
        per = (tktI && lulusI) ? (tktI + ' | ' + lulusI) : '';
    } else {
        per = pIn.is(':visible') ? String(pIn.val()).trim() : "-";
    }

    if (jp === 'DIKLAT' && per && per !== '-') {
        var parts = per.split(' | ');
        thn = parts[0] ? parts[0].substring(0, 4) : String(new Date().getFullYear());
    } else if ((jp === 'SK_PPPK' || jp === 'SK_KP' || jp === 'SK_JF') && per && per !== '-') {
        var parts = per.split(' | ');
        thn = parts[1] ? parts[1].substring(0, 4) : String(new Date().getFullYear());
    } else if (jp === 'IJAZAH' && per && per !== '-') {
        var parts = per.split(' | ');
        thn = parts[1] ? parts[1] : String(new Date().getFullYear());
    } else if ((jp === 'TMT' || jp === 'PERMANEN_TMT') && per && per !== '-') {
        thn = String(per).substring(0, 4) || String(new Date().getFullYear());
    } else if (jp === 'PERMANEN') {
        thn = String(new Date().getFullYear()); per = 'PERMANEN';
    } else {
        if (!thn || thn === '') {
            thn = String(new Date().getFullYear());
        }
    }
    
    if (thn !== String(dLama.tahun) || per.toLowerCase() !== String(dLama.periode || "-").toLowerCase()) {
        var inDb = EFILEKELOLA_CACHE_DATA.find(f => String(f.id_ptk) === String(dLama.id_ptk) && String(f.id_kategori) === String(dLama.id_kategori) && String(f.tahun) === thn && String(f.periode || "-").toLowerCase() === per.toLowerCase() && String(f.rowId) !== String(rId));
        if (inDb) { Sultan.alert('warning', 'Duplikasi', 'Berkas untuk Tahun dan Periode tersebut sudah ada di database.'); return; }
    }

    var btn = $('#efilekelola_btnSimpanPerbaiki'); var txt = btn.html(); btn.prop('disabled', true).html('<i class="fas fa-spinner fa-spin mr-2"></i> MENYIMPAN...');

    var fIn = $('#efilekelola_p_file')[0];
    var hasFile = fIn.files.length > 0;
    
    var oExt = hasFile ? fIn.files[0].name.split('.').pop().toLowerCase() : dLama.file_name.split('.').pop().toLowerCase();
    var cName = "[" + thn + "] " + dLama.nama_kategori + " " + dLama.nama + (per && per !== "-" ? " (" + per + ")" : "") + "." + oExt;

    var payload = { rowId: rId, id_ptk: $('#efilekelola_p_idptk').val(), nama_file: cName, tahun: thn, periode: per, user_login: EFILEKELOLA_USER_AKTIF };

    var execPerbaikan = function(fileData) {
        google.script.run.withSuccessHandler(function(json) {
            btn.prop('disabled', false).html(txt); var res = JSON.parse(json);
            if(res.success) { 
                Sultan.modal.tutupForm();
                // --- VAKSIN ZERO BLINK (PERBAIKI) ---
                var dIdx = EFILEKELOLA_CACHE_DATA.findIndex(function(r) { return String(r.rowId) === String(payload.rowId); });
                if (dIdx !== -1) {
                    EFILEKELOLA_CACHE_DATA[dIdx].tahun = payload.tahun;
                    EFILEKELOLA_CACHE_DATA[dIdx].periode = payload.periode;
                    EFILEKELOLA_CACHE_DATA[dIdx].status = "Diproses";
                    EFILEKELOLA_CACHE_DATA[dIdx].catatan = "";
                    EFILEKELOLA_CACHE_DATA[dIdx].tgl_upload = Sultan.format.tanggalSekarang();
                    EFILEKELOLA_CACHE_DATA[dIdx].uploader = EFILEKELOLA_USER_AKTIF;
                    EFILEKELOLA_CACHE_DATA[dIdx].verifikator = "-";
                    EFILEKELOLA_CACHE_DATA[dIdx].tgl_verif = "-";
                }
                setTimeout(function(){ 
                    Sultan.notif.crud.simpan(true); 
                    efilekelola_terapkanFilterLokal();
                }, 400); 
                // -------------------------------------
            } else { Sultan.notif.crud.gagal(res.message); }
        }).withFailureHandler(function(err){ btn.prop('disabled', false).html(txt); Sultan.notif.crud.gagal(err.message); }).perbaikiEfileData(payload, fileData);
    };

    if(hasFile) {
        var reader = new FileReader(); reader.onload = function(ev) { execPerbaikan({ data: ev.target.result.split(',')[1], mimeType: fIn.files[0].type }); }; reader.readAsDataURL(fIn.files[0]);
    } else {
        execPerbaikan(null);
    }
}

function efilekelola_submitVerif(e) {
    e.preventDefault();
    var $f = $(this);
    if (!$f[0].checkValidity()) {
        Sultan.alert('warning', 'Status', 'Isi status dan catatan.');
        return;
    }
    var rId = $('#efilekelola_v_rowid').val();
    var st = $('#efilekelola_v_status').val();
    var ket = $('#efilekelola_v_catatan').val();
    var btn = $('#efilekelola_btnVerifikasi');
    var txt = btn.html();
    btn.prop('disabled', true).html('<i class="fas fa-spinner fa-spin mr-2"></i> Eksekusi...');
    google.script.run.withSuccessHandler(function(json) {
        btn.prop('disabled', false).html(txt);
        var res = JSON.parse(json);
        if (res.success) { 
            Sultan.modal.tutupVerifikasi();
            // --- VAKSIN ZERO BLINK (VERIFIKASI) ---
            var dIdx = EFILEKELOLA_CACHE_DATA.findIndex(function(r) { return String(r.rowId) === String(rId); });
            if (dIdx !== -1) {
                EFILEKELOLA_CACHE_DATA[dIdx].status = st;
                EFILEKELOLA_CACHE_DATA[dIdx].catatan = ket;
                EFILEKELOLA_CACHE_DATA[dIdx].tgl_verif = Sultan.format.tanggalSekarang();
                EFILEKELOLA_CACHE_DATA[dIdx].verifikator = EFILEKELOLA_USER_AKTIF;
            }
            setTimeout(function() { 
                Sultan.notif.crud.sukses(res.message); 
                efilekelola_terapkanFilterLokal();
            }, 400); 
            // ---------------------------------------
        } else {
            Sultan.notif.crud.gagal(res.message);
        }
    }).withFailureHandler(function(err) {
        btn.prop('disabled', false).html(txt);
        Sultan.notif.crud.gagal(err.message);
    }).verifikasiEfileData(rId, st, ket, EFILEKELOLA_USER_AKTIF);
}

function efilekelola_bukaModalHapus(rowId) {
    var data = EFILEKELOLA_CACHE_DATA.find(r => String(r.rowId) === String(rowId));
    if(!data) return;

    var dDate = new Date();
    var kd = dDate.getFullYear() + "" + String(dDate.getMonth() + 1).padStart(2, '0') + "" + String(dDate.getDate()).padStart(2, '0');

    Sultan.modal.konfirmasiHapus({
        title: 'HAPUS BERKAS E-FILE',
        kode: kd,
        detail: {
            'NAMA PEGAWAI': data.nama || '-',
            'KATEGORI BERKAS': data.nama_kategori || '-',
            'TAHUN': data.tahun || '-'
        },
        onConfirm: function() {
            Sultan.notif.loading("Menghapus berkas...");
            google.script.run.withSuccessHandler(function(json) {
                Sultan.notif.tutup();
                var res = JSON.parse(json);
                if (res.success) { 
                    // --- VAKSIN ZERO BLINK (HAPUS) ---
                    var dIdx = EFILEKELOLA_CACHE_DATA.findIndex(function(r) { return String(r.rowId) === String(rowId); });
                    if (dIdx !== -1) {
                        EFILEKELOLA_CACHE_DATA.splice(dIdx, 1);
                    }
                    Sultan.notif.crud.hapus(); 
                    efilekelola_terapkanFilterLokal();
                    // ----------------------------------
                } else { 
                    Sultan.notif.crud.gagal(res.message); 
                }
            }).withFailureHandler(function(err){ 
                Sultan.notif.tutup();
                Sultan.notif.crud.gagal(err.message); 
            }).hapusEfileData(rowId, kd);
        }
    });
}

function efilekelola_bukaPreview(url) {
    if (!url) return;
    
    var finalUrl = url;
    var downloadUrl = "";
    var isGoogleDrive = url.indexOf('drive.google.com') > -1;
    var isImage = url.toLowerCase().endsWith('.jpg') || url.toLowerCase().endsWith('.png') || url.toLowerCase().endsWith('.jpeg');
    
    if (isGoogleDrive) {
        var match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
        if (match && match[1]) {
            finalUrl = 'https://drive.google.com/file/d/' + match[1] + '/preview';
            downloadUrl = 'https://drive.google.com/uc?export=download&id=' + match[1];
        }
    } else {
        downloadUrl = url;
    }

    Sultan.modal.preview({
        url: finalUrl,
        title: 'Pratinjau Dokumen E-File',
        downloadUrl: downloadUrl,
        isImage: isImage
    });
}

function efilekelola_lihatCatatan(p) { Sultan.alert('info', 'Catatan Verifikasi', p); }
function efilekelola_escapeHtml(t) { return t ? String(t).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;") : ""; }
function efilekelola_escapeJs(s) { return s ? String(s).replace(/\\/g, "\\\\").replace(/'/g, "\\'").replace(/"/g, "&quot;").replace(/(\r\n|\n|\r)/gm, "<br>") : ""; }
function efilekelola_buildBadgeStatus(st, ket) { 
    var s = String(st || "").toLowerCase(); var c = 'badge-sultan-diproses'; var i = 'clock'; var l = st || 'Diproses';
    if (s.includes('setuju') || s.includes('ok')) { c = 'badge-sultan-disetujui'; i = 'check-circle'; } else if (s.includes('revisi')) { c = 'badge-sultan-revisi'; i = 'sync-alt'; } else if (s.includes('tolak')) { c = 'badge-sultan-ditolak'; i = 'times-circle'; } 
    var b = `<span class="badge ${c}"><i class="fas fa-${i} mr-1"></i>${efilekelola_escapeHtml(l)}</span>`;
    if (ket && ket.trim().length > 2) return b + `<div class="mt-2"><button type="button" class="sultan-btn-note efilekelola-btn-catatan" data-pesan="${efilekelola_escapeJs(ket)}"><i class="fas fa-comment-dots mr-1"></i> BACA CATATAN</button></div>`;
    return b; 
}

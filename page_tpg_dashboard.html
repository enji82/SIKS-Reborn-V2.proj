<section class="content pt-2">
  <div class="container-fluid">
    <!-- Loading State -->
    <div id="tpgDb_loadingState" class="mt-3"></div>

    <!-- Main Container -->
    <div id="tpgDb_mainContainer" style="display: none;">
      
      <!-- Summary Cards Row -->
      <div class="row">
        <div class="col-lg-3 col-6">
          <div class="small-box bg-white shadow-sm border-left-primary" style="border-left: 4px solid #007bff; border-radius: 8px;">
            <div class="inner p-3">
              <h3 id="tpgDb_countTotal" class="font-weight-bold text-dark mb-1">0</h3>
              <p class="text-primary mb-0 font-weight-bold text-uppercase" style="font-size: 0.85rem; letter-spacing: 0.5px;">Total Pengajuan</p>
            </div>
            <div class="icon">
              <i class="fas fa-file-invoice" style="color: rgba(0,123,255,0.15);"></i>
            </div>
          </div>
        </div>
        
        <div class="col-lg-3 col-6">
          <div class="small-box bg-white shadow-sm border-left-success" style="border-left: 4px solid #28a745; border-radius: 8px;">
            <div class="inner p-3">
              <h3 id="tpgDb_countDisetujui" class="font-weight-bold text-dark mb-1">0</h3>
              <p class="text-success mb-0 font-weight-bold text-uppercase" style="font-size: 0.85rem; letter-spacing: 0.5px;">Disetujui</p>
            </div>
            <div class="icon">
              <i class="fas fa-check-circle" style="color: rgba(40,167,69,0.15);"></i>
            </div>
          </div>
        </div>
        
        <div class="col-lg-3 col-6">
          <div class="small-box bg-white shadow-sm border-left-warning" style="border-left: 4px solid #ffc107; border-radius: 8px;">
            <div class="inner p-3">
              <h3 id="tpgDb_countMenunggu" class="font-weight-bold text-dark mb-1">0</h3>
              <p class="text-warning mb-0 font-weight-bold text-uppercase" style="font-size: 0.85rem; letter-spacing: 0.5px;">Menunggu Verifikasi</p>
            </div>
            <div class="icon">
              <i class="fas fa-hourglass-half" style="color: rgba(255,193,7,0.15);"></i>
            </div>
          </div>
        </div>

        <div class="col-lg-3 col-6">
          <div class="small-box bg-white shadow-sm border-left-danger" style="border-left: 4px solid #dc3545; border-radius: 8px;">
            <div class="inner p-3">
              <h3 id="tpgDb_countRevisi" class="font-weight-bold text-dark mb-1">0</h3>
              <p class="text-danger mb-0 font-weight-bold text-uppercase" style="font-size: 0.85rem; letter-spacing: 0.5px;">Perlu Revisi / Ditolak</p>
            </div>
            <div class="icon">
              <i class="fas fa-exclamation-triangle" style="color: rgba(220,53,69,0.15);"></i>
            </div>
          </div>
        </div>
      </div>

      <!-- Charts Row 1 -->
      <div class="row mb-3">
        <div class="col-xl-8 col-lg-7 mb-3">
          <div class="card card-sultan shadow-sm" style="border-radius: 12px; border: none; height: 100%;">
            <div class="card-header bg-white border-bottom-0 pt-4 pb-2" style="border-radius: 12px 12px 0 0;">
              <h3 class="card-title font-weight-bold text-primary" style="font-family: 'Inter', sans-serif;"><i class="fas fa-chart-line mr-2"></i>Tren Pengajuan 6 Bulan Terakhir</h3>
            </div>
            <div class="card-body">
              <div style="position: relative; height: 300px;">
                <canvas id="tpgDb_trendChart"></canvas>
              </div>
            </div>
          </div>
        </div>
        
        <div class="col-xl-4 col-lg-5 mb-3">
          <div class="card card-sultan shadow-sm" style="border-radius: 12px; border: none; height: 100%;">
            <div class="card-header bg-white border-bottom-0 pt-4 pb-2" style="border-radius: 12px 12px 0 0;">
              <h3 class="card-title font-weight-bold text-info" style="font-family: 'Inter', sans-serif;"><i class="fas fa-chart-pie mr-2"></i>Distribusi Jenis SK</h3>
            </div>
            <div class="card-body d-flex align-items-center justify-content-center">
              <div style="position: relative; height: 300px; width: 100%;">
                <canvas id="tpgDb_jenisSkChart"></canvas>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Row 3 -->
      <div class="row mt-3">
        <div class="col-md-6 mb-3">
          <div class="card card-sultan shadow-sm" style="border-radius: 12px; border: none; height: 100%;">
            <div class="card-header bg-white border-bottom-0 pt-4 pb-2" style="border-radius: 12px 12px 0 0;">
              <h3 class="card-title font-weight-bold text-warning" style="font-family: 'Inter', sans-serif;"><i class="fas fa-users mr-2"></i>Distribusi Status Pegawai</h3>
            </div>
            <div class="card-body d-flex align-items-center justify-content-center">
              <div style="position: relative; height: 260px; width: 100%;">
                <canvas id="tpgDb_statusPegawaiChart"></canvas>
              </div>
            </div>
          </div>
        </div>

        

        <div class="col-md-6 mb-3">
          <div class="card card-sultan shadow-sm" style="border-radius: 12px; border: none; height: 100%;">
            <div class="card-header bg-white border-bottom-0 pt-4 pb-2" style="border-radius: 12px 12px 0 0;">
              <h3 class="card-title font-weight-bold text-success" style="font-family: 'Inter', sans-serif;"><i class="fas fa-history mr-2"></i>Aktivitas Terbaru</h3>
            </div>
            <div class="card-body p-3">
              <div class="timeline timeline-inverse" id="tpgDb_timeline" style="margin-left: 0;">
                <!-- Timeline populated here -->
              </div>
            </div>
          </div>
        </div>

      </div>

    </div>
  </div>
</section>

<style>
/* Custom style for this dashboard timeline to make it compact */
#tpgDb_timeline .time-label { display: none; }
#tpgDb_timeline > div > .fa { width: 24px; height: 24px; font-size: 12px; line-height: 24px; left: 10px; top: 2px; }
#tpgDb_timeline > div > .timeline-item { margin-left: 45px; margin-right: 0; padding: 0; border-radius: 8px; box-shadow: none; border: 1px solid #f0f0f0; background: #fff; word-break: break-word; }
#tpgDb_timeline > div > .timeline-item > .time { padding: 8px; font-size: 11px; }
#tpgDb_timeline > div > .timeline-item > .timeline-header { padding: 8px 10px; font-size: 13px; border-bottom: none; font-weight: 600; line-height: 1.3;}
#tpgDb_timeline > div > .timeline-item > .timeline-body { padding: 0 10px 8px 10px; font-size: 12px; }
#tpgDb_timeline > div { margin-bottom: 10px; }
</style>

<script>
  // Chart instances to destroy before re-rendering
  var tpgDb_charts = {
    trend: null,
    jenisSk: null,
    statusPegawai: null
  };

  function tpgDb_init() {
    var user = getSesiUser();
    var isAdmin = checkUserRoleIsAdmin();
    var unitKerja = String(user.unit || "").trim();

    SultanUI.showLoading('#tpgDb_loadingState', 'Memuat Data Dashboard...');
    $('#tpgDb_mainContainer').hide();

    google.script.run
      .withSuccessHandler(function (response) {
        SultanUI.hideLoading('#tpgDb_loadingState');
        if (response && response.status === 'success') {
          tpgDb_renderDashboard(response.data, isAdmin);
        } else {
          Sultan.modal.error({ title: 'Gagal', message: 'Gagal mengambil data dashboard: ' + (response ? response.message : 'Unknown error') });
        }
      })
      .withFailureHandler(function (error) {
        SultanUI.hideLoading('#tpgDb_loadingState');
        Sultan.modal.error({ title: 'Error', message: 'Terjadi kesalahan sistem: ' + error.message });
      })
      .tpg_getPerbaikanData(unitKerja, isAdmin);
  }

  function tpgDb_renderDashboard(data, isAdmin) {
    $('#tpgDb_mainContainer').fadeIn();
    
    // 1. Calculate Summary
    var total = data.length;
    var disetujui = 0;
    var menunggu = 0;
    var revisi = 0;

    var jenisSkCounts = {};
    var statusPegawaiCounts = {};
    var unitKerjaCounts = {};
    
    // Get last 6 months for trend
    var monthsObj = {};
    var monthNames = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Ags", "Sep", "Okt", "Nov", "Des"];
    var now = new Date();
    for (var i = 5; i >= 0; i--) {
      var d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      var key = d.getFullYear() + '-' + ('0' + (d.getMonth() + 1)).slice(-2);
      monthsObj[key] = { label: monthNames[d.getMonth()] + ' ' + d.getFullYear(), count: 0 };
    }

    data.forEach(function(row) {
      // Status
      if (row.status === 'Disetujui') disetujui++;
      else if (row.status === 'Revisi' || row.status === 'Ditolak') revisi++;
      else menunggu++; // Termasuk Diproses, Menunggu, dll

      // Jenis SK
      var sk = row.jenisSK || 'Lainnya';
      jenisSkCounts[sk] = (jenisSkCounts[sk] || 0) + 1;

      // Status Pegawai
      var sp = row.statusPegawai || 'Tidak Diketahui';
      statusPegawaiCounts[sp] = (statusPegawaiCounts[sp] || 0) + 1;

      // Unit Kerja
      var uk = row.unitKerja || 'Tidak Diketahui';
      unitKerjaCounts[uk] = (unitKerjaCounts[uk] || 0) + 1;

      // Trend Pengajuan (waktuUpload)
      if (row.waktuUpload) {
        var uploadDate = new Date(row.waktuUpload);
        var key = uploadDate.getFullYear() + '-' + ('0' + (uploadDate.getMonth() + 1)).slice(-2);
        if (monthsObj[key] !== undefined) {
          monthsObj[key].count++;
        }
      }
    });

    // Animate numbers
    tpgDb_animateValue('tpgDb_countTotal', 0, total, 1000);
    tpgDb_animateValue('tpgDb_countDisetujui', 0, disetujui, 1000);
    tpgDb_animateValue('tpgDb_countMenunggu', 0, menunggu, 1000);
    tpgDb_animateValue('tpgDb_countRevisi', 0, revisi, 1000);

    // 2. Render Charts
    tpgDb_renderTrendChart(monthsObj);
    tpgDb_renderJenisSkChart(jenisSkCounts);
    tpgDb_renderStatusPegawaiChart(statusPegawaiCounts);

    // 4. Render Timeline Activity
    tpgDb_renderTimeline(data);
  }

  function tpgDb_animateValue(id, start, end, duration) {
    if (start === end) {
      document.getElementById(id).innerHTML = end;
      return;
    }
    var range = end - start;
    var current = start;
    var increment = end > start ? 1 : -1;
    var stepTime = Math.abs(Math.floor(duration / range));
    var obj = document.getElementById(id);
    var timer = setInterval(function() {
      current += increment;
      obj.innerHTML = current;
      if (current == end) {
        clearInterval(timer);
      }
    }, stepTime);
  }

  function tpgDb_renderTrendChart(monthsObj) {
    if (tpgDb_charts.trend) tpgDb_charts.trend.destroy();
    
    var labels = [];
    var counts = [];
    
    Object.keys(monthsObj).sort().forEach(function(key) {
      labels.push(monthsObj[key].label);
      counts.push(monthsObj[key].count);
    });

    var ctx = document.getElementById('tpgDb_trendChart').getContext('2d');
    var gradient = ctx.createLinearGradient(0, 0, 0, 300);
    gradient.addColorStop(0, 'rgba(0, 123, 255, 0.4)');
    gradient.addColorStop(1, 'rgba(0, 123, 255, 0.05)');

    tpgDb_charts.trend = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: 'Jumlah Pengajuan',
          data: counts,
          backgroundColor: gradient,
          borderColor: '#007bff',
          borderWidth: 2,
          pointBackgroundColor: '#ffffff',
          pointBorderColor: '#007bff',
          pointRadius: 4,
          pointHoverRadius: 6,
          fill: true,
          tension: 0.3
        }]
      },
      options: {
        maintainAspectRatio: false,
        responsive: true,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: 'rgba(0,0,0,0.8)',
            titleFont: { size: 13 },
            bodyFont: { size: 14, weight: 'bold' },
            padding: 10,
            displayColors: false
          }
        },
        scales: {
          y: { 
            beginAtZero: true, 
            ticks: { precision: 0, font: {family: "'Inter', sans-serif"} },
            grid: { borderDash: [2, 4], color: '#e9ecef' },
            border: { display: false }
          },
          x: { 
            ticks: { font: {family: "'Inter', sans-serif"} },
            grid: { display: false },
            border: { display: false }
          }
        }
      }
    });
  }

  function tpgDb_renderJenisSkChart(jenisSkCounts) {
    if (tpgDb_charts.jenisSk) tpgDb_charts.jenisSk.destroy();
    
    var labels = Object.keys(jenisSkCounts);
    var data = Object.values(jenisSkCounts);
    
    // Colors matching Sultan UI premium feel
    var colors = ['#007bff', '#17a2b8', '#28a745', '#ffc107', '#fd7e14', '#e83e8c', '#6f42c1'];

    var ctx = document.getElementById('tpgDb_jenisSkChart').getContext('2d');
    tpgDb_charts.jenisSk = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: labels,
        datasets: [{
          data: data,
          backgroundColor: colors.slice(0, labels.length),
          borderWidth: 0,
          hoverOffset: 4
        }]
      },
      options: {
        maintainAspectRatio: false,
        responsive: true,
        cutout: '65%',
        plugins: {
          legend: {
            position: 'bottom',
            labels: { usePointStyle: true, padding: 20, font: {family: "'Inter', sans-serif"} }
          },
          tooltip: {
            backgroundColor: 'rgba(0,0,0,0.8)',
            padding: 10
          }
        }
      }
    });
  }

  function tpgDb_renderStatusPegawaiChart(statusPegawaiCounts) {
    if (tpgDb_charts.statusPegawai) tpgDb_charts.statusPegawai.destroy();
    
    var labels = Object.keys(statusPegawaiCounts);
    var data = Object.values(statusPegawaiCounts);
    var colors = ['#6f42c1', '#e83e8c', '#fd7e14', '#20c997', '#007bff'];

    var ctx = document.getElementById('tpgDb_statusPegawaiChart').getContext('2d');
    tpgDb_charts.statusPegawai = new Chart(ctx, {
      type: 'pie',
      data: {
        labels: labels,
        datasets: [{
          data: data,
          backgroundColor: colors.slice(0, labels.length),
          borderWidth: 0,
          hoverOffset: 4
        }]
      },
      options: {
        maintainAspectRatio: false,
        responsive: true,
        plugins: {
          legend: {
            position: 'bottom',
            labels: { usePointStyle: true, padding: 20, font: {family: "'Inter', sans-serif"} }
          }
        }
      }
    });
  }

  function tpgDb_renderTimeline(data) {
    var timeline = $('#tpgDb_timeline');
    timeline.empty();

    // Copy and sort by waktuUpload or waktuEdit descending
    var activities = [];
    data.forEach(function(r) {
      if (r.waktuUpload) {
        activities.push({
          type: 'upload',
          waktu: new Date(r.waktuUpload),
          nama: r.namaAsn,
          unit: r.unitKerja,
          icon: 'fas fa-cloud-upload-alt',
          bg: 'bg-primary',
          text: 'Mengajukan dokumen perbaikan gaji.'
        });
      }
      if (r.waktuVerifikasi && r.status !== 'Diproses') {
        var statusColor = r.status === 'Disetujui' ? 'bg-success' : 'bg-danger';
        var statusIcon = r.status === 'Disetujui' ? 'fas fa-check' : 'fas fa-times';
        activities.push({
          type: 'verifikasi',
          waktu: new Date(r.waktuVerifikasi),
          nama: r.namaAsn,
          unit: r.verifikasiOleh, // verifikator
          icon: statusIcon,
          bg: statusColor,
          text: 'Pengajuan <b>' + r.status + '</b> oleh ' + r.verifikasiOleh + '.'
        });
      }
    });

    activities.sort(function(a, b) { return b.waktu - a.waktu; });
    var recent = activities.slice(0, 6);

    if (recent.length === 0) {
      timeline.append('<div class="text-center text-muted py-4 w-100">Belum ada aktivitas.</div>');
      return;
    }

    recent.forEach(function(act) {
      var timeAgo = formatTimeAgoSultan(act.waktu);
      var html = '<div>' +
        '<i class="' + act.icon + ' ' + act.bg + '"></i>' +
        '<div class="timeline-item">' +
          '<span class="time text-muted"><i class="fas fa-clock mr-1"></i> ' + timeAgo + '</span>' +
          '<h3 class="timeline-header text-primary">' + act.nama + '</h3>' +
          '<div class="timeline-body text-dark">' + act.text + '</div>' +
        '</div>' +
      '</div>';
      timeline.append(html);
    });
    
    // Add end clock icon
    timeline.append('<div><i class="fas fa-clock bg-gray"></i></div>');
  }

  // Helper for time ago
  function formatTimeAgoSultan(dateObj) {
    var seconds = Math.floor((new Date() - dateObj) / 1000);
    var interval = seconds / 31536000;
    if (interval > 1) return Math.floor(interval) + " thn lalu";
    interval = seconds / 2592000;
    if (interval > 1) return Math.floor(interval) + " bln lalu";
    interval = seconds / 86400;
    if (interval > 1) return Math.floor(interval) + " hari lalu";
    interval = seconds / 3600;
    if (interval > 1) return Math.floor(interval) + " jam lalu";
    interval = seconds / 60;
    if (interval > 1) return Math.floor(interval) + " mnt lalu";
    return Math.floor(seconds) + " dtk lalu";
  }

  // Jalankan inisialisasi secara langsung
  tpgDb_init();
</script>

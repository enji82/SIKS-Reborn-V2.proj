<style>
    .sultan-scroll {
        overscroll-behavior: contain;
    }

    #sdagama_tabelUtama,
    #sdagama_tabelUtama th,
    #sdagama_tabelUtama td,
    #sdagama_tabelUtama .small,
    #sdagama_tabelUtama span,
    #sdagama_tabelUtama small {
        font-size: 13px !important;
    }

    .col-sticky-left {
        position: sticky;
        left: 0;
        z-index: 2;
        background-color: #ffffff !important;

    .dark-mode .col-sticky-left {

    #sdagama_tabelUtama tfoot th.col-footer-label {
        color: #85144b !important; /* Maroon for light mode */

    .dark-mode #sdagama_tabelUtama tfoot th.col-footer-label {
        color: #ffc107 !important; /* Yellow for dark mode */

    /* Adaptive Column Colors */
    .col-kelas-1 { background-color: #e3f2fd !important; color: #212529 !important; }
    .col-kelas-1-total { background-color: #bbdefb !important; color: #212529 !important; }
    .col-kelas-2 { background-color: #e8f5e9 !important; color: #212529 !important; }
    .col-kelas-2-total { background-color: #c8e6c9 !important; color: #212529 !important; }
    .col-kelas-3 { background-color: #fff3e0 !important; color: #212529 !important; }
    .col-kelas-3-total { background-color: #ffe0b2 !important; color: #212529 !important; }
    .col-kelas-4 { background-color: #f3e5f5 !important; color: #212529 !important; }
    .col-kelas-4-total { background-color: #e1bee7 !important; color: #212529 !important; }
    .col-kelas-5 { background-color: #fce4ec !important; color: #212529 !important; }
    .col-kelas-5-total { background-color: #f8bbd0 !important; color: #212529 !important; }
    .col-kelas-6 { background-color: #e0f2f1 !important; color: #212529 !important; }
    .col-kelas-6-total { background-color: #b2dfdb !important; color: #212529 !important; }

    /* Dark Mode Overrides */
    .dark-mode .col-kelas-1 { background-color: rgba(30, 58, 138, 0.15) !important; color: #e2e8f0 !important; }
    .dark-mode .col-kelas-1-total { background-color: rgba(37, 99, 235, 0.25) !important; color: #ffffff !important; font-weight: bold !important; }
    .dark-mode .col-kelas-2 { background-color: rgba(6, 95, 70, 0.15) !important; color: #e2e8f0 !important; }
    .dark-mode .col-kelas-2-total { background-color: rgba(5, 150, 105, 0.25) !important; color: #ffffff !important; font-weight: bold !important; }
    .dark-mode .col-kelas-3 { background-color: rgba(124, 45, 18, 0.15) !important; color: #e2e8f0 !important; }
    .dark-mode .col-kelas-3-total { background-color: rgba(202, 138, 4, 0.25) !important; color: #ffffff !important; font-weight: bold !important; }
    .dark-mode .col-kelas-4 { background-color: rgba(88, 28, 135, 0.15) !important; color: #e2e8f0 !important; }
    .dark-mode .col-kelas-4-total { background-color: rgba(124, 58, 237, 0.25) !important; color: #ffffff !important; font-weight: bold !important; }
    .dark-mode .col-kelas-5 { background-color: rgba(112, 26, 117, 0.15) !important; color: #e2e8f0 !important; }
    .dark-mode .col-kelas-5-total { background-color: rgba(219, 39, 119, 0.25) !important; color: #ffffff !important; font-weight: bold !important; }
    .dark-mode .col-kelas-6 { background-color: rgba(19, 78, 74, 0.15) !important; color: #e2e8f0 !important; }
    .dark-mode .col-kelas-6-total { background-color: rgba(15, 118, 110, 0.25) !important; color: #ffffff !important; font-weight: bold !important; }
    .dark-mode .col-total-semua { background-color: rgba(91, 33, 182, 0.3) !important; color: #ffffff !important; font-weight: bold !important; }
</style>

<div class="content-header pb-0">
    <div class="container-fluid">
        <div class="row mb-2">
            <div class="col-sm-12">
                <div class="sultan-page-header">
                    <h5 class="m-0 font-weight-bold text-uppercase">
                        <i class="fas fa-praying-hands text-maroon mr-2"></i>Jumlah Murid SD Menurut Agama
                    </h5>
                    <hr class="style-sultan-solid">
                </div>
            </div>
        </div>
    </div>
</div>

<section class="content">
    <div class="container-fluid">
        <div class="row justify-content-center">
            <div class="col-12">

                <div class="card-sultan mb-3">
                    <div class="card-body py-2 px-3">
                        <div class="d-flex align-items-center justify-content-between cursor-pointer"
                            data-toggle="collapse" data-target="#sdagama_infoCollapse">
                            <div class="d-flex align-items-center text-maroon font-weight-bold text-uppercase">
                                <i class="fas fa-info-circle mr-2"></i> Informasi
                            </div>
                            <i class="fas fa-chevron-down text-muted icon-sm"></i>
                        </div>
                        <div id="sdagama_infoCollapse" class="collapse">
                            <div class="mt-2 pt-2 border-top small text-muted">
                                <ul class="mb-0 pl-3">
                                    <li class="mb-1">Data bersumber dari Laporan Bulan terakhir.</li>
                                    <li class="mb-1">Tabel mencakup 6 Agama: Islam, Kristen, Katolik, Hindu, Buddha,
                                        Konghucu.</li>
                                    <li>Gunakan <b>Filter Tampilan</b> untuk menyembunyikan kolom dan fokus pada Kelas
                                        tertentu.</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="sultan-filter-pill-container shadow-sm mb-4">
                    <div class="sultan-filter-item">
                        <select id="sdagama_filterViewKelas" class="form-control">
                            <option value="TOT" selected>Rekap Total</option>
                            <option value="K1">Kelas 1</option>
                            <option value="K2">Kelas 2</option>
                            <option value="K3">Kelas 3</option>
                            <option value="K4">Kelas 4</option>
                            <option value="K5">Kelas 5</option>
                            <option value="K6">Kelas 6</option>
                            <option value="SEMUA">Semua (Berat)</option>
                        </select>
                        <i class="fas fa-chevron-down"></i>
                    </div>

                    <div class="sultan-filter-item">
                        <select id="sdagama_filterStatus" class="form-control">
                            <option value="SEMUA">- Semua Status -</option>
                        </select>
                        <i class="fas fa-chevron-down"></i>
                    </div>

                    <div class="sultan-filter-item" id="sdagama_filterContainer" style="display: none;">
                        <select id="sdagama_filterUnit" class="form-control" disabled>
                            <option value="">- Memvalidasi Akses... -</option>
                        </select>
                        <i class="fas fa-chevron-down"></i>
                    </div>

                    <div class="divider-vertical d-none d-md-block mx-2"></div>

                    <button type="button" id="sdagama_btnRefresh" class="sultan-btn-refresh" title="Segarkan Data">
                        <i class="fas fa-sync-alt"></i>
                    </button>

                    <button type="button" id="sdagama_btnExport" class="btn btn-link p-0 ml-3 sultan-btn-icon-excel"
                        title="Unduh Data ke Excel">
                        <i class="fas fa-file-excel fa-2x text-success"></i>
                    </button>
                </div>

                <div class="card-sultan w-100 overflow-hidden">
                    <div class="card-body p-3 w-100">

                        <div id="sdagama_loadingState">
                            <!-- Spinner Otomatis via SultanUI.showLoading -->
                        </div>

                        <div id="sdagama_tableState" style="display: none;">
                            <table id="sdagama_tabelUtama"
                                class="table table-bordered table-hover table-sm table-premium table-sultan-compact text-nowrap mb-0 w-100 text-center">
                                <thead id="sdagama_headData"
                                    class="thead-sultan-premium thead-tiered"></thead>
                                <tbody></tbody>
                                <tfoot id="sdagama_footData"
                                    class="bg-light font-weight-bold text-nowrap text-uppercase"></tfoot>
                            </table>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>
</section>

<script>
    // ======================================================================
    // ISOLASI VARIABEL GLOBAL
    // ======================================================================
    var SDAGAMA_CACHE_DATA = [];
    var SDAGAMA_TABEL_INSTANCE = null;

    var SDAGAMA_USER_AKTIF = "";
    var SDAGAMA_IS_ADMIN = false;
    var SDAGAMA_UNIT_TERKUNCI = "";
    var SDAGAMA_NPSN_TERKUNCI = "";

    // Peta Konfigurasi Kolom (Warna dikelompokkan: K1-K3 Greenish, K4-K6 Blueish, TOT Amber)
    var SDAGAMA_GROUPS = [
        { code: 'K1', label: 'KELAS 1', color: '#e8f5e9', startIdx: 4, endIdx: 21 },
        { code: 'K2', label: 'KELAS 2', color: '#e8f5e9', startIdx: 22, endIdx: 39 },
        { code: 'K3', label: 'KELAS 3', color: '#e8f5e9', startIdx: 40, endIdx: 57 },
        { code: 'K4', label: 'KELAS 4', color: '#e3f2fd', startIdx: 58, endIdx: 75 },
        { code: 'K5', label: 'KELAS 5', color: '#e3f2fd', startIdx: 76, endIdx: 93 },
        { code: 'K6', label: 'KELAS 6', color: '#e3f2fd', startIdx: 94, endIdx: 111 },
        { code: 'TOT', label: 'JUMLAH TOTAL', color: '#ffecb3', startIdx: 112, endIdx: 129 }
    ];

    var SDAGAMA_LIST_AGAMA = ['Islam', 'Kristen', 'Katolik', 'Hindu', 'Buddha', 'Konghucu'];

    $(document).ready(function () {
        SDAGAMA_TABEL_INSTANCE = null;
        $('#sdagama_tableState').hide();
        SultanUI.showLoading('#sdagama_loadingState');
        $('#sdagama_filterContainer').hide();

        try {
            var user = typeof getSesiUser === 'function' ? getSesiUser() : {};
            SDAGAMA_USER_AKTIF = user.nama_lengkap || user.fullname || user.nama || user.username || "User Web";
            SDAGAMA_IS_ADMIN = (user.role || "").toLowerCase().includes("admin");
            SDAGAMA_NPSN_TERKUNCI = user.npsn || user.username || "";
        } catch (e) { SDAGAMA_NPSN_TERKUNCI = ""; SDAGAMA_IS_ADMIN = false; }

        sdagama_generateHeaderFooterHTML();

        $(document).off('click', '#sdagama_btnRefresh').on('click', '#sdagama_btnRefresh', sdagama_tarikDataServer);
        $(document).off('change', '#sdagama_filterStatus').on('change', '#sdagama_filterStatus', sdagama_updateFilterUnit);
        $(document).off('change', '#sdagama_filterUnit').on('change', '#sdagama_filterUnit', sdagama_terapkanFilterLokal);
        $(document).off('change', '#sdagama_filterViewKelas').on('change', '#sdagama_filterViewKelas', sdagama_toggleColumnVisibility);
        $(document).off('click', '#sdagama_btnExport').on('click', '#sdagama_btnExport', sdagama_exportExcel);

        sdagama_validasiAksesUser();
    });

    function sdagama_generateHeaderFooterHTML() {
        var h1 = '<tr>'; var h2 = '<tr>'; var h3 = '<tr class="text-nowrap">';

        var staticCols = ['Nama Sekolah', 'Bln', 'Thn', 'Rombel'];
        for (var idx = 0; idx < staticCols.length; idx++) {
            var sticky = (idx === 0) ? 'position:sticky; left:0; z-index:50; min-width:250px; border-right: 2px solid #dee2e6;' : '';
            var colStickyClass = (idx === 0) ? 'col-sticky-left' : '';
            var textAlign = (idx === 0) ? 'text-left' : 'text-center';
            h1 += '<th rowspan="3" class="align-middle text-maroon py-1 px-2 text-uppercase ' + colStickyClass + ' ' + textAlign + '" style="' + sticky + ' border-bottom: 3px solid #85144b !important;">' + staticCols[idx].toUpperCase() + '</th>';
        }

        for (var gIdx = 0; gIdx < SDAGAMA_GROUPS.length; gIdx++) {
            var g = SDAGAMA_GROUPS[gIdx];
            var tHeadClass = 'col-view-' + g.code;
            
            var colClass = 'col-kelas-' + g.code.replace('K', '');
            if (g.code === 'TOT') colClass = 'col-total-semua';

            h1 += '<th colspan="18" class="' + tHeadClass + ' align-middle py-1 ' + colClass + '" style="border-bottom:1px solid #90caf9;">' + g.label + '</th>';

            for (var aIdx = 0; aIdx < SDAGAMA_LIST_AGAMA.length; aIdx++) {
                var a = SDAGAMA_LIST_AGAMA[aIdx];

                h2 += '<th colspan="3" class="' + tHeadClass + ' align-middle py-1 text-uppercase ' + colClass + '" style="border-bottom:1px solid #ccc;">' + a.toUpperCase() + '</th>';
                h3 += '<th class="' + tHeadClass + ' py-1 ' + colClass + '" style="border-bottom:3px solid #85144b !important;">L</th>';
                h3 += '<th class="' + tHeadClass + ' py-1 ' + colClass + '" style="border-bottom:3px solid #85144b !important;">P</th>';
                h3 += '<th class="' + tHeadClass + ' py-1 ' + colClass + '" style="border-bottom:3px solid #85144b !important; font-weight:bold;">JML</th>';
            }
        }

        h1 += '</tr>'; h2 += '</tr>'; h3 += '</tr>';
        $('#sdagama_headData').html(h1 + h2 + h3);

        var f = '<tr>';
        f += '<th class="text-left pl-3 align-middle col-sticky-left col-footer-label" style="z-index:40;">TOTAL KESELURUHAN</th>';
        f += '<th class="text-center py-2">-</th>'; // Bln
        f += '<th class="text-center py-2">-</th>'; // Thn
        f += '<th class="text-center py-2"></th>'; // Rombel

        for (var fgIdx = 0; fgIdx < SDAGAMA_GROUPS.length; fgIdx++) {
            var fg = SDAGAMA_GROUPS[fgIdx];
            var colClass = 'col-kelas-' + fg.code.replace('K', '');
            if (fg.code === 'TOT') colClass = 'col-total-semua';
            
            for (var i = 0; i < 18; i++) {
                f += '<th class="col-view-' + fg.code + ' text-center py-2 ' + colClass + '"></th>';
            }
        }
        f += '</tr>';
        $('#sdagama_footData').html(f);
    }

    function sdagama_validasiAksesUser() {
        if (SDAGAMA_IS_ADMIN) {
            $('#sdagama_filterContainer').show();
            $('#sdagama_filterUnit').empty().append('<option value="SEMUA">- Semua Sekolah -</option>').prop('disabled', false).removeClass('bg-light text-maroon font-weight-bold');
            sdagama_tarikDataServer();
        } else {
            if (!SDAGAMA_NPSN_TERKUNCI) {
                $('#sdagama_filterUnit').empty().append('<option value="">AKSES DITOLAK</option>');
                $('#sdagama_loadingState').find('.sultan-loading-text').html('<span class="text-danger"><i class="fas fa-ban mb-2"></i><br>Akses ditolak: Sesi login tidak valid.</span>');
                return;
            }

            google.script.run
                .withSuccessHandler(function (resUnit) {
                    var dataUnit = JSON.parse(resUnit);
                    if (dataUnit.error) {
                        $('#sdagama_filterUnit').empty().append('<option value="">AKSES DITOLAK</option>');
                        $('#sdagama_loadingState').find('.sultan-loading-text').html('<span class="text-danger"><i class="fas fa-exclamation-triangle mb-2"></i><br>' + sdagama_escapeHtml(dataUnit.error) + '</span>');
                        return;
                    }
                    SDAGAMA_UNIT_TERKUNCI = dataUnit.unitKerja;
                    $('#sdagama_filterUnit').empty().append('<option value="' + SDAGAMA_UNIT_TERKUNCI + '">' + SDAGAMA_UNIT_TERKUNCI + '</option>').prop('disabled', true);
                    sdagama_tarikDataServer();
                })
                .withFailureHandler(function (err) {
                    $('#sdagama_filterUnit').empty().append('<option value="">ERROR SERVER</option>');
                    $('#sdagama_loadingState').find('.sultan-loading-text').html('<span class="text-danger"><i class="fas fa-wifi mb-2"></i><br>Koneksi Terputus: ' + sdagama_escapeHtml(err.message) + '</span>');
                })
                .getUnitKerjaByNpsnPTK(SDAGAMA_NPSN_TERKUNCI);
        }
    }

    function sdagama_tarikDataServer() {
        var btn = $('#sdagama_btnRefresh');
        btn.prop('disabled', true).html('<i class="fas fa-spinner fa-spin text-maroon"></i>');

        if (!$.fn.DataTable.isDataTable('#sdagama_tabelUtama')) {
            $('#sdagama_tableState').hide();
        }

        google.script.run.withSuccessHandler(function (dataArray) {
            btn.prop('disabled', false).html('<i class="fas fa-sync-alt text-maroon"></i>');
            if (!Array.isArray(dataArray)) {
                $('#sdagama_loadingState').find('.sultan-loading-text').html('<span class="text-danger"><i class="fas fa-times-circle mb-2"></i><br>Gagal memproses struktur JSON Server.</span>');
                return;
            }
            try {
                SDAGAMA_CACHE_DATA = dataArray;
                if (SDAGAMA_IS_ADMIN) {
                    var uniqueStatus = {};
                    SDAGAMA_CACHE_DATA.forEach(function (row) {
                        var s = String(row[2] || "").trim();
                        if (s) uniqueStatus[s] = true;
                    });
                    var selStatus = $('#sdagama_filterStatus'); var curS = selStatus.val();
                    selStatus.empty().append('<option value="SEMUA">- Semua Status -</option>');
                    Object.keys(uniqueStatus).sort().forEach(function (s) { selStatus.append('<option value="' + s + '">' + s + '</option>'); });
                    if (curS && uniqueStatus[curS]) selStatus.val(curS);
                    sdagama_updateFilterUnit();
                }

                if (!$.fn.DataTable.isDataTable('#sdagama_tabelUtama')) { sdagama_initDataTables(); }
                sdagama_terapkanFilterLokal();

                SultanUI.hideLoading('#sdagama_loadingState');
                $('#sdagama_tableState').show();
                if (SDAGAMA_TABEL_INSTANCE) { setTimeout(function () { SDAGAMA_TABEL_INSTANCE.columns.adjust(); }, 150); }

            } catch (e) { $('#sdagama_loadingState').find('.sultan-loading-text').html('<span class="text-danger"><i class="fas fa-exclamation-triangle mb-2"></i><br>Gagal merakit tabel: ' + sdagama_escapeHtml(e.message) + '</span>'); }
        }).withFailureHandler(function (e) {
            btn.prop('disabled', false).html('<i class="fas fa-sync-alt text-maroon"></i>');
            $('#sdagama_loadingState').find('.sultan-loading-text').html('<span class="text-danger"><i class="fas fa-wifi mb-2"></i><br>Koneksi Server Terputus.</span>');
        }).getDataMuridSDAgama();
    }

    function sdagama_updateFilterUnit() {
        if (!SDAGAMA_IS_ADMIN) return;
        var selStatus = $('#sdagama_filterStatus').val();
        var uniqueUnit = {};

        SDAGAMA_CACHE_DATA.forEach(function (row) {
            var u = String(row[0] || "").trim();
            var s = String(row[2] || "").trim();
            if (selStatus === "SEMUA" || s === selStatus) { if (u) uniqueUnit[u] = true; }
        });

        var selUnit = $('#sdagama_filterUnit'); var curU = selUnit.val();
        selUnit.empty().append('<option value="SEMUA">- Semua Sekolah -</option>');
        Object.keys(uniqueUnit).sort().forEach(function (u) { selUnit.append('<option value="' + u + '">' + u + '</option>'); });
        if (curU && uniqueUnit[curU]) selUnit.val(curU); else selUnit.val('SEMUA');
        sdagama_terapkanFilterLokal();
    }

    function sdagama_getColGroup(i) {
        for (var k = 0; k < SDAGAMA_GROUPS.length; k++) {
            if (i >= SDAGAMA_GROUPS[k].startIdx && i <= SDAGAMA_GROUPS[k].endIdx) return SDAGAMA_GROUPS[k];
        }
        return null;
    }

    function sdagama_initDataTables() {
        var cols = [];
        for (var i = 0; i <= 129; i++) { cols.push(i); }

        SDAGAMA_TABEL_INSTANCE = SultanTable.init('#sdagama_tabelUtama', {
            "destroy": true, "ordering": false, "pageLength": 10, "autoWidth": false, "deferRender": true,
            "dom": "<'row mb-2'<'col-sm-12 col-md-6'l><'col-sm-12 col-md-6'f>>" +
                "<'row'<'col-sm-12'<'table-responsive sultan-scroll'tr>>>" +
                "<'row mt-2'<'col-sm-12 col-md-5'i><'col-sm-12 col-md-7'p>>",
            "columnDefs": [
                { "targets": 0, "width": "auto", "className": "col-sticky-left align-middle text-left font-weight-bold text-nowrap px-3" },
                { "targets": [1, 2], "width": "1%", "className": "text-center align-middle text-nowrap px-2" },
                { "targets": 3, "width": "1%", "className": "text-center align-middle font-weight-bold text-nowrap px-2" },
                { "targets": cols.slice(4), "width": "35px", "className": "text-center align-middle text-nowrap px-2" }
            ],
            "language": { "url": "//cdn.datatables.net/plug-ins/1.10.25/i18n/Indonesian.json", "emptyTable": "Tidak ada data Agama SD untuk filter yang dipilih." },

            "createdRow": function (row, data, dataIndex) {
                var tds = row.children;
                for (var i = 0; i < tds.length; i++) {
                    var cell = tds[i];
                    var rawVal = cell.textContent.trim();

                    if (i === 0) {
                        cell.style.position = 'sticky'; cell.style.left = '0'; cell.style.zIndex = '2'; cell.style.backgroundColor = '#ffffff';
                        cell.classList.add('col-sticky-left');
                    }
                    else if (i >= 4) {
                        var group = sdagama_getColGroup(i);
                        if (group) {
                            var colClass = 'col-kelas-' + group.code.replace('K', '');
                            if (group.code === 'TOT') colClass = 'col-total-semua';
                            cell.classList.add(colClass);
                        }

                        if (rawVal === "0" || rawVal === "-" || rawVal === "") {
                            cell.innerHTML = '<span class="text-muted opacity-50">-</span>';
                        } else {
                            cell.classList.add('font-weight-bold');
                            var offset = i - (group ? group.startIdx : 4);
                            if (offset % 3 === 2) cell.classList.add('text-maroon');
                        }
                    }
                }
            },

            "footerCallback": function (row, data, start, end, display) {
                var api = this.api();
                if (api.data().length === 0) return;

                var extractNumber = function (str) {
                    if (typeof str === 'number') return str;
                    if (!str) return 0;
                    var cleanStr = String(str).replace(/(<([^>]+)>)/gi, "");
                    var num = parseInt(cleanStr.replace(/[^0-9]/g, ''), 10);
                    return isNaN(num) ? 0 : num;
                };

                var totalArr = [];
                for (var i = 3; i <= 129; i++) {
                    var sum = api.column(i, { search: 'applied' }).data().reduce(function (a, b) {
                        return extractNumber(a) + extractNumber(b);
                    }, 0);
                    totalArr.push(sum);
                }

                var cellRombel = api.column(3).footer();
                if (cellRombel) {
                    cellRombel.innerHTML = (totalArr[0] === 0 ? '-' : totalArr[0].toLocaleString('id-ID'));
                    cellRombel.className = 'text-center py-2 font-weight-bold';
                }

                for (var c = 4; c <= 129; c++) {
                    var val = totalArr[c - 3];
                    var cellDom = api.column(c).footer();
                    if (cellDom) {
                        cellDom.innerHTML = (val === 0 ? '-' : val.toLocaleString('id-ID'));
                        var group = sdagama_getColGroup(c);
                        if (group) {
                            var colClass = 'col-kelas-' + group.code.replace('K', '');
                            if (group.code === 'TOT') colClass = 'col-total-semua';
                            cellDom.classList.add(colClass);
                            
                            var offset = c - group.startIdx;
                            cellDom.className += ' ' + ((offset % 3 === 2) ? 'text-maroon' : '');
                        }
                    }
                }
            }
        });

        setTimeout(function () { sdagama_toggleColumnVisibility(); }, 100);
    }

    function sdagama_toggleColumnVisibility() {
        if (!SDAGAMA_TABEL_INSTANCE) return;
        var mode = $('#sdagama_filterViewKelas').val();
        var dt = SDAGAMA_TABEL_INSTANCE;



        setTimeout(function () {
            var arrAll = [];
            for (var i = 4; i <= 129; i++) arrAll.push(i);
            dt.columns(arrAll).visible(false, false);

            if (mode === "SEMUA") {
                dt.columns(arrAll).visible(true, false);
                $('th[class*="col-view-"]').show();
            } else {
                var targetGroup = null;
                for (var k = 0; k < SDAGAMA_GROUPS.length; k++) {
                    if (SDAGAMA_GROUPS[k].code === mode) { targetGroup = SDAGAMA_GROUPS[k]; break; }
                }
                if (targetGroup) {
                    var showIndexes = [];
                    for (var c = targetGroup.startIdx; c <= targetGroup.endIdx; c++) { showIndexes.push(c); }
                    dt.columns(showIndexes).visible(true, false);
                }
                $('th[class*="col-view-"]').hide();
                $('.col-view-' + mode).show();
            }

            dt.columns.adjust().draw(false);

        }, 100);
    }

    function sdagama_terapkanFilterLokal() {
        if (!SDAGAMA_TABEL_INSTANCE) return;
        var fStatus = $('#sdagama_filterStatus').val() || "SEMUA";
        var fUnit = SDAGAMA_IS_ADMIN ? String($('#sdagama_filterUnit').val() || "SEMUA").trim().toUpperCase() : String(SDAGAMA_UNIT_TERKUNCI).trim().toUpperCase();

        var hasil = SDAGAMA_CACHE_DATA.filter(function (row) {
            var rUnit = String(row[0] || "").trim().toUpperCase();
            var rStatus = String(row[2] || "").trim();

            if (SDAGAMA_IS_ADMIN) { if (fUnit !== "SEMUA" && fUnit !== "" && rUnit !== fUnit) return false; }
            else { if (rUnit !== fUnit) return false; }

            if (fStatus !== "SEMUA" && fStatus !== "" && rStatus !== fStatus) return false;
            return true;
        });

        sdagama_renderTabel(hasil);
    }

    function sdagama_renderTabel(dataRows) {
        var dtArray = [];

        dataRows.forEach(function (row) {
            var arrRow = [];

            var namaLembaga = sdagama_escapeHtml(row[0] || "-");
            var npsn = sdagama_escapeHtml(row[1] || "-");
            arrRow.push(namaLembaga + '<br><span class="text-muted">' + npsn + '</span>');
            arrRow.push(sdagama_escapeHtml(row[3] || "-"));
            arrRow.push(sdagama_escapeHtml(row[4] || "-"));

            var rombelVal = (row[5] === undefined || row[5] === null || String(row[5]).trim() === "" || String(row[5]).trim() === "0") ? "-" : String(row[5]).trim();
            arrRow.push(sdagama_escapeHtml(rombelVal));

            for (var c = 6; c <= 131; c++) {
                var val = (row[c] === undefined || row[c] === null || String(row[c]).trim() === "" || String(row[c]).trim() === "0") ? "-" : String(row[c]).trim();
                arrRow.push(sdagama_escapeHtml(val));
            }

            dtArray.push(arrRow);
        });

        SDAGAMA_TABEL_INSTANCE.clear().rows.add(dtArray).draw(false);
        sdagama_toggleColumnVisibility();
    }

    function sdagama_exportExcel() {
        if (!SDAGAMA_TABEL_INSTANCE) { Sultan.alert('warning', 'Belum Ada Data', 'Silakan tunggu data dimuat terlebih dahulu.'); return; }
        var btn = $('#sdagama_btnExport'); var txt = btn.html();
        btn.prop('disabled', true).html('<i class="fas fa-spinner fa-spin mr-1"></i> Mengekspor...');

        setTimeout(function () {
            var info = SDAGAMA_TABEL_INSTANCE.page.info();
            var currLen = info.length; var currPage = info.page;
            SDAGAMA_TABEL_INSTANCE.page.len(-1).draw('page');

            var tableClone = document.getElementById('sdagama_tabelUtama').cloneNode(true);
            SDAGAMA_TABEL_INSTANCE.page.len(currLen).page(currPage).draw('page');

            $(tableClone).find('[style*="display: none"]').remove();
            $(tableClone).find('th, td').css({ 'border': '1px solid #000000', 'border-collapse': 'collapse', 'font-family': 'Satoshi, Arial, sans-serif' });
            $(tableClone).find('.opacity-50').css('color', '#cccccc');

            var htmlData = tableClone.outerHTML;
            var template = '<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="utf-8"></head><body>' + htmlData + '<' + '/body><' + '/html>';
            var blob = new Blob([template], { type: 'application/vnd.ms-excel' });
            var url = URL.createObjectURL(blob);

            var a = document.createElement('a'); a.href = url;
            var viewCode = $('#sdagama_filterViewKelas').val();
            a.download = 'Rekap_SD_Agama_' + viewCode + '.xls';
            document.body.appendChild(a); a.click();

            document.body.removeChild(a); URL.revokeObjectURL(url);
            btn.prop('disabled', false).html(txt);
            Sultan.notif.sukses('Data berhasil diunduh ke Excel.');
        }, 200);
    }

    function sdagama_escapeHtml(text) {
        if (!text) return "";
        return String(text).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }
</script>

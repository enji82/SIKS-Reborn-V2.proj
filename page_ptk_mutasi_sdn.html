<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Riwayat Usulan PTK</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        body { background-color: #f4f6f9; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .text-maroon { color: #800000; }
        .btn-maroon { background-color: #800000; color: white; }
        .btn-maroon:hover { background-color: #600000; color: white; }
    </style>
</head>
<body>
    <div class="card p-5 text-center" style="max-width: 500px;">
        <div class="mb-4">
            <i class="fas fa-exchange-alt fa-3x text-maroon"></i>
        </div>
        <h4 class="font-weight-bold mb-3">Halaman Telah Dipindahkan</h4>
        <p class="text-muted mb-4">
            Menu <strong>Riwayat Usulan</strong> kini telah digabungkan ke dalam halaman <strong>Kelola PTK</strong> untuk memberikan pengalaman yang lebih baik.
        </p>
        <button class="btn btn-maroon btn-lg btn-block" onclick="navigateToKelola()">
            <i class="fas fa-users mr-2"></i> Buka Kelola PTK
        </button>
    </div>

    <script>
        function navigateToKelola() {
            if (typeof window.loadContent === 'function') {
                window.loadContent('ptk_kelola_sdn');
            } else if (parent && typeof parent.loadContent === 'function') {
                parent.loadContent('ptk_kelola_sdn');
            } else {
                alert('Silakan akses menu Kelola PTK dari sidebar.');
            }
        }
    </script>
</body>
</html>
